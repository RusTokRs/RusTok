# Docker Compose configuration for the full development stack.
# Usage: docker compose -f docker-compose.yml -f docker-compose.full-dev.yml --profile full-dev up -d --build
#
# The Leptos storefront is an SSR library embedded in `rustok-server` and is
# available on port 5150. It is intentionally not represented as a separate
# container or a nonexistent apps/storefront/Dockerfile.

services:
  # ============================================================================
  # Backend Server (Axum + embedded Leptos admin/storefront)
  # ============================================================================
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: development
    container_name: rustok_server
    environment:
      DATABASE_URL: postgres://rustok:rustok@db:5432/rustok_dev
      RUSTOK_ENV: development
      RUST_LOG: debug
      SUPERADMIN_EMAIL: admin@localhost.invalid
      SUPERADMIN_PASSWORD: DevelopmentOnly-2026!ChangeMe
      SUPERADMIN_TENANT_SLUG: default
      SUPERADMIN_TENANT_NAME: Default
    ports:
      - "5150:5150"
    volumes:
      - ./apps/server:/workspace/apps/server
      - ./crates:/workspace/crates
      - ./modules.toml:/workspace/modules.toml:ro
      - cargo_cache:/usr/local/cargo/registry
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:5150/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    profiles:
      - full-dev
      - server

  # ============================================================================
  # Next.js Admin Panel
  # ============================================================================
  admin-next:
    build:
      context: ./apps/next-admin
      dockerfile: Dockerfile
      target: development
    container_name: rustok_admin_next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5150
      NEXT_PUBLIC_GRAPHQL_ENDPOINT: /api/graphql
      NEXT_PUBLIC_AUTH_BASE_URL: /api/auth
      API_PROXY_TARGET: http://server:5150
    ports:
      - "3000:3000"
    volumes:
      - ./apps/next-admin:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - full-dev
      - admin

  # ============================================================================
  # Standalone Leptos Admin (development CSR host only)
  # ============================================================================
  admin-leptos:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: development
    container_name: rustok_admin_leptos
    environment:
      RUSTOK_API_URL: http://localhost:5150
      RUSTOK_GRAPHQL_ENDPOINT: /api/graphql
      RUSTOK_AUTH_BASE_URL: /api/auth
    ports:
      - "3001:3001"
    volumes:
      - ./apps/admin:/workspace/apps/admin
      - ./crates:/workspace/crates
      - ./Cargo.toml:/workspace/Cargo.toml:ro
      - ./Cargo.lock:/workspace/Cargo.lock:ro
      - admin_node_modules:/workspace/apps/admin/node_modules
      - cargo_cache:/usr/local/cargo/registry
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:3001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    profiles:
      - full-dev
      - admin

  # ============================================================================
  # Next.js Storefront. The Rust/Leptos storefront is served by `server`.
  # ============================================================================
  storefront-next:
    build:
      context: ./apps/next-frontend
      dockerfile: Dockerfile
      target: development
    container_name: rustok_storefront_next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5150
      NEXT_PUBLIC_GRAPHQL_ENDPOINT: /api/graphql
      API_PROXY_TARGET: http://server:5150
    ports:
      - "3100:3100"
    volumes:
      - ./apps/next-frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:3100/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - full-dev
      - storefront

  # Optional reverse proxy can depend on server, admin-next, admin-leptos and
  # storefront-next. Do not add a standalone Leptos storefront service: the
  # supported Rust storefront host is the server process.

volumes:
  cargo_cache:
    driver: local
  admin_node_modules:
    driver: local
