<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>RusToK Admin</title>
    <script>
      (function () {
        try {
          var theme = window.localStorage.getItem("rustok-admin-theme");
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (_) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="output.css" />
    <script type="module" src="/richtext/frame/leptos-adapter.mjs"></script>
    <link data-trunk rel="rust" data-target-name="rustok-admin-app" />
  </head>
  <body></body>
</html>
