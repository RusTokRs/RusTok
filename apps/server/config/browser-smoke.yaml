logger:
  enable: true
  pretty_backtrace: true
  level: info
  format: compact

server:
  binding: 127.0.0.1
  host: http://127.0.0.1
  port: 5150

database:
  uri: postgres://rustok_browser:rustok_browser_password@127.0.0.1:5432/rustok_browser_smoke
  enable_logging: false
  connect_timeout: 5000
  idle_timeout: 30000
  min_connections: 1
  max_connections: 5
  auto_migrate: false

auth:
  jwt:
    secret: browser-smoke-only-jwt-secret-with-sufficient-length-and-symbols-9Qv!2Lm#7Rx
    expiration: 3600

settings:
  auth:
    refresh_expiration: 7200
    issuer: rustok-browser-smoke
    audience: rustok-browser-smoke-admin
  rustok:
    tenant:
      profile: multi_tenant
      enabled: true
      resolution: header
      header_name: x-tenant-slug
      fallback_mode: disabled
    build:
      enabled: false
    search:
      enabled: false
      driver: memory
      url: ""
      index_prefix: browser_smoke
    features:
      registration_enabled: false
      email_verification: false
      multi_tenant: true
      search_indexing: false
      oauth_enabled: false
    rate_limit:
      enabled: false
      backend: memory
      trusted_auth_dimensions: false
    events:
      delivery_profile: memory
      channel_capacity: 128
      backpressure:
        enabled: true
        max_queue_depth: 128
        warning_threshold: 0.75
        critical_threshold: 0.9
    email:
      enabled: false
      provider: none
    registry:
      remote_executor:
        enabled: false
    runtime:
      host_mode: full
      background_workers:
        workflow_cron_enabled: false
        seo_bulk_enabled: false
      guardrails:
        rollout: enforce
      request_trust:
        forwarded_headers_mode: ignore
    readiness:
      outbox_max_pending_lag_seconds: 300
      search_max_lag_seconds: 300
