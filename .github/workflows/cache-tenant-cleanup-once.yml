name: One-shot tenant cache invalidation cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cache-tenant-cleanup-once.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Remove dead per-key invalidation and expose canonical listener state
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, name: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{name}: expected one exact match, found {count}")
              return text.replace(old, new, 1)

          def sub_once(text: str, pattern: str, replacement: str, name: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{name}: expected one regex match, found {count}")
              return updated

          tenant_path = Path("apps/server/src/middleware/tenant.rs")
          tenant = tenant_path.read_text()
          tenant = replace_once(
              tenant,
              "    CacheEnvelope, CacheInvalidationMessage, CacheKeyBuilder as CanonicalCacheKeyBuilder,\n",
              "    CacheEnvelope, CacheKeyBuilder as CanonicalCacheKeyBuilder,\n",
              "tenant cache imports",
          )
          tenant = replace_once(
              tenant,
              "#[cfg(feature = \"redis-cache\")]\nuse rustok_core::EventConsumerRuntime;\n",
              "",
              "legacy consumer import",
          )
          tenant = replace_once(
              tenant,
              "use std::sync::atomic::{AtomicU64, AtomicU8, Ordering};\n",
              "use std::sync::atomic::{AtomicU64, Ordering};\n",
              "tenant atomic imports",
          )
          tenant = replace_once(
              tenant,
              "use tokio::sync::RwLock;\nuse tokio::task::JoinHandle;\n",
              "",
              "legacy listener imports",
          )
          tenant = replace_once(
              tenant,
              "use crate::services::server_runtime_context::ServerRuntimeContext;\n",
              "use crate::services::server_runtime_context::ServerRuntimeContext;\n"
              "pub use crate::services::tenant_cache_generation::{\n"
              "    TenantCacheGenerationListenerSnapshot as TenantInvalidationListenerSnapshot,\n"
              "    TenantCacheGenerationListenerStatus as TenantInvalidationListenerStatus,\n"
              "};\n",
              "canonical listener aliases",
          )
          tenant = replace_once(
              tenant,
              "const TENANT_INVALIDATION_CHANNEL: &str = \"tenant.cache.invalidate\";\n",
              "",
              "legacy invalidation channel",
          )
          tenant = replace_once(
              tenant,
              "#[cfg(feature = \"redis-cache\")]\nconst TENANT_INVALIDATION_RETRY_DELAY: Duration = Duration::from_secs(5);\n",
              "",
              "legacy retry delay",
          )
          tenant = replace_once(
              tenant,
              "    invalidation_publisher: Arc<TenantInvalidationPublisher>,\n    invalidation_listener_state: Arc<TenantInvalidationListenerState>,\n",
              "",
              "legacy infrastructure fields",
          )
          tenant = sub_once(
              tenant,
              r"\n#\[derive\(Clone\)\]\nstruct TenantInvalidationPublisher \{.*?\n#\[derive\(Clone\)\]\nstruct TenantCacheMetricsStore",
              "\n#[derive(Clone)]\nstruct TenantCacheMetricsStore",
              "legacy publisher block",
          )
          tenant = sub_once(
              tenant,
              r"\n#\[derive\(Debug, Clone, Copy, PartialEq, Eq\)\]\npub enum TenantInvalidationListenerStatus \{.*?\nimpl TenantCacheMetricsStore",
              "\nimpl TenantCacheMetricsStore",
              "legacy listener state block",
          )
          tenant = replace_once(
              tenant,
              "            invalidation_publisher: Arc::new(TenantInvalidationPublisher::new(cache_service)),\n            invalidation_listener_state: Arc::new(TenantInvalidationListenerState::new()),\n",
              "",
              "legacy infrastructure construction",
          )
          tenant = sub_once(
              tenant,
              r"pub async fn init_tenant_cache_infrastructure\(\n    ctx: &ServerRuntimeContext,\n    cache_service: &CacheService,\n\) \{.*?\nfn tenant_infra",
              "pub async fn init_tenant_cache_infrastructure(\n"
              "    ctx: &ServerRuntimeContext,\n"
              "    cache_service: &CacheService,\n"
              ") {\n"
              "    if ctx.shared_contains::<Arc<TenantCacheInfrastructure>>() {\n"
              "        return;\n"
              "    }\n\n"
              "    ctx.shared_insert(Arc::new(TenantCacheInfrastructure::new(cache_service).await));\n"
              "}\n\n"
              "fn tenant_infra",
              "legacy listener runtime",
          )
          tenant = sub_once(
              tenant,
              r"pub async fn tenant_invalidation_listener_snapshot\(.*?\nfn cache_load_error_to_status",
              "pub async fn tenant_invalidation_listener_snapshot(\n"
              "    ctx: &ServerRuntimeContext,\n"
              ") -> TenantInvalidationListenerSnapshot {\n"
              "    crate::services::tenant_cache_generation::tenant_cache_generation_listener_snapshot(ctx)\n"
              "        .await\n"
              "}\n\n"
              "fn cache_load_error_to_status",
              "legacy public invalidation API",
          )
          tenant_path.write_text(tenant)

          tests_path = Path("apps/server/src/middleware/tenant_tests.rs")
          tests = tests_path.read_text()
          tests = sub_once(
              tests,
              r"#\[cfg\(feature = \"redis-cache\"\)\]\nuse super::\{.*?\n\};\n",
              "",
              "legacy tenant test imports",
          )
          tests = sub_once(
              tests,
              r"#\[cfg\(feature = \"redis-cache\"\)\]\n#\[test\]\nfn parse_invalidation_payload_returns_both_keys\(\).*?\n#\[test\]\nfn canonical_tenant_keys_are_bounded_and_do_not_embed_long_identifiers",
              "#[test]\nfn canonical_tenant_keys_are_bounded_and_do_not_embed_long_identifiers",
              "legacy tenant invalidation tests",
          )
          tests_path.write_text(tests)

          generation_path = Path("apps/server/src/services/tenant_cache_generation.rs")
          generation = generation_path.read_text()
          generation = replace_once(
              generation,
              "use std::sync::Arc;\n",
              "use std::sync::atomic::{AtomicU8, Ordering};\nuse std::sync::Arc;\n",
              "generation atomic imports",
          )
          generation = replace_once(
              generation,
              "use tokio::sync::broadcast;\n",
              "use tokio::sync::{broadcast, RwLock};\n",
              "generation sync imports",
          )
          generation = replace_once(
              generation,
              "const LISTENER_RESTART_DELAY: Duration = Duration::from_secs(1);\n",
              "const LISTENER_RESTART_DELAY: Duration = Duration::from_secs(1);\n"
              "const GENERATION_RECONCILE_INTERVAL: Duration = Duration::from_secs(30);\n"
              "const MAX_LISTENER_ERROR_BYTES: usize = 512;\n\n"
              "#[derive(Debug, Clone, Copy, PartialEq, Eq)]\n"
              "pub enum TenantCacheGenerationListenerStatus {\n"
              "    Disabled,\n"
              "    Starting,\n"
              "    Healthy,\n"
              "    Degraded,\n"
              "}\n\n"
              "impl TenantCacheGenerationListenerStatus {\n"
              "    fn as_u8(self) -> u8 {\n"
              "        match self {\n"
              "            Self::Disabled => 0,\n"
              "            Self::Starting => 1,\n"
              "            Self::Healthy => 2,\n"
              "            Self::Degraded => 3,\n"
              "        }\n"
              "    }\n\n"
              "    fn from_u8(value: u8) -> Self {\n"
              "        match value {\n"
              "            1 => Self::Starting,\n"
              "            2 => Self::Healthy,\n"
              "            3 => Self::Degraded,\n"
              "            _ => Self::Disabled,\n"
              "        }\n"
              "    }\n\n"
              "    pub fn metric_value(self) -> i64 {\n"
              "        i64::from(self.as_u8())\n"
              "    }\n"
              "}\n\n"
              "#[derive(Debug, Clone)]\n"
              "pub struct TenantCacheGenerationListenerSnapshot {\n"
              "    pub status: TenantCacheGenerationListenerStatus,\n"
              "    pub last_error: Option<String>,\n"
              "}\n\n"
              "#[derive(Debug)]\n"
              "struct TenantCacheGenerationListenerState {\n"
              "    status: AtomicU8,\n"
              "    last_error: RwLock<Option<String>>,\n"
              "}\n\n"
              "impl TenantCacheGenerationListenerState {\n"
              "    fn new() -> Self {\n"
              "        Self {\n"
              "            status: AtomicU8::new(TenantCacheGenerationListenerStatus::Starting.as_u8()),\n"
              "            last_error: RwLock::new(None),\n"
              "        }\n"
              "    }\n\n"
              "    async fn mark_starting(&self) {\n"
              "        self.status.store(\n"
              "            TenantCacheGenerationListenerStatus::Starting.as_u8(),\n"
              "            Ordering::Release,\n"
              "        );\n"
              "        *self.last_error.write().await = None;\n"
              "    }\n\n"
              "    async fn mark_healthy(&self) {\n"
              "        self.status.store(\n"
              "            TenantCacheGenerationListenerStatus::Healthy.as_u8(),\n"
              "            Ordering::Release,\n"
              "        );\n"
              "        *self.last_error.write().await = None;\n"
              "    }\n\n"
              "    async fn mark_degraded(&self, error: impl Into<String>) {\n"
              "        self.status.store(\n"
              "            TenantCacheGenerationListenerStatus::Degraded.as_u8(),\n"
              "            Ordering::Release,\n"
              "        );\n"
              "        *self.last_error.write().await = Some(bounded_listener_error(error.into()));\n"
              "    }\n\n"
              "    async fn snapshot(&self) -> TenantCacheGenerationListenerSnapshot {\n"
              "        TenantCacheGenerationListenerSnapshot {\n"
              "            status: TenantCacheGenerationListenerStatus::from_u8(\n"
              "                self.status.load(Ordering::Acquire),\n"
              "            ),\n"
              "            last_error: self.last_error.read().await.clone(),\n"
              "        }\n"
              "    }\n"
              "}\n\n"
              "fn bounded_listener_error(error: String) -> String {\n"
              "    if error.len() <= MAX_LISTENER_ERROR_BYTES {\n"
              "        return error;\n"
              "    }\n"
              "    let mut boundary = MAX_LISTENER_ERROR_BYTES;\n"
              "    while !error.is_char_boundary(boundary) {\n"
              "        boundary -= 1;\n"
              "    }\n"
              "    format!(\"{}…\", &error[..boundary])\n"
              "}\n",
              "generation listener status contract",
          )
          generation = replace_once(
              generation,
              "#[derive(Clone)]\npub struct TenantCacheGenerationListenerHandle;\n",
              "#[derive(Clone)]\n"
              "pub struct TenantCacheGenerationListenerHandle {\n"
              "    state: Arc<TenantCacheGenerationListenerState>,\n"
              "}\n\n"
              "pub async fn tenant_cache_generation_listener_snapshot(\n"
              "    ctx: &ServerRuntimeContext,\n"
              ") -> TenantCacheGenerationListenerSnapshot {\n"
              "    match ctx.shared_get::<TenantCacheGenerationListenerHandle>() {\n"
              "        Some(handle) => handle.state.snapshot().await,\n"
              "        None => TenantCacheGenerationListenerSnapshot {\n"
              "            status: TenantCacheGenerationListenerStatus::Disabled,\n"
              "            last_error: Some(\"tenant cache generation listener is not initialized\".to_string()),\n"
              "        },\n"
              "    }\n"
              "}\n",
              "generation listener handle",
          )
          generation = replace_once(
              generation,
              "    let listener = TenantCacheGenerationListener::new(cache.clone());\n    if let Err(error) = listener.recover_shared_generation().await {\n        tracing::warn!(%error, \"Tenant cache generation startup recovery failed; isolated boot namespace remains active\");\n        rustok_telemetry::metrics::record_event_error(\n            \"tenant.cache.generation\",\n            \"startup_recovery\",\n        );\n    }\n",
              "    let state = Arc::new(TenantCacheGenerationListenerState::new());\n"
              "    state.mark_starting().await;\n"
              "    let listener = TenantCacheGenerationListener::new(cache.clone());\n"
              "    match listener.recover_shared_generation().await {\n"
              "        Ok(_) if !cache.redis_configuration_present() => state.mark_healthy().await,\n"
              "        Ok(_) => {}\n"
              "        Err(error) => {\n"
              "            state.mark_degraded(error.to_string()).await;\n"
              "            tracing::warn!(%error, \"Tenant cache generation startup recovery failed; isolated boot namespace remains active\");\n"
              "            rustok_telemetry::metrics::record_event_error(\n"
              "                \"tenant.cache.generation\",\n"
              "                \"startup_recovery\",\n"
              "            );\n"
              "        }\n"
              "    }\n",
              "generation startup state",
          )
          generation = sub_once(
              generation,
              r"    let mut local = cache.*?\n    if cache\.redis_client_initialized\(\) \{",
              "    let mut local = cache\n"
              "        .invalidations()\n"
              "        .subscribe_local_channel(TENANT_CACHE_GENERATION_CHANNEL);\n"
              "    let local_listener = listener.clone();\n"
              "    let local_state = Arc::clone(&state);\n"
              "    let local_only = !cache.redis_configuration_present();\n"
              "    tokio::spawn(async move {\n"
              "        let runtime = EventConsumerRuntime::new(\"tenant_cache_generation_local\");\n"
              "        runtime.restarted(\"startup\");\n"
              "        loop {\n"
              "            match local.recv().await {\n"
              "                Ok(message) => match local_listener.handle_message(message).await {\n"
              "                    Ok(()) => {\n"
              "                        if local_only {\n"
              "                            local_state.mark_healthy().await;\n"
              "                        }\n"
              "                    }\n"
              "                    Err(error) => {\n"
              "                        local_state.mark_degraded(error.to_string()).await;\n"
              "                        tracing::error!(%error, \"Local tenant cache generation apply failed\");\n"
              "                        rustok_telemetry::metrics::record_event_error(\n"
              "                            \"tenant.cache.generation\",\n"
              "                            \"local_apply\",\n"
              "                        );\n"
              "                    }\n"
              "                },\n"
              "                Err(broadcast::error::RecvError::Lagged(skipped)) => {\n"
              "                    runtime.lagged(skipped);\n"
              "                    match local_listener.recover_shared_generation().await {\n"
              "                        Ok(_) if local_only => local_state.mark_healthy().await,\n"
              "                        Ok(_) => {}\n"
              "                        Err(error) => {\n"
              "                            local_state.mark_degraded(error.to_string()).await;\n"
              "                            tracing::error!(%error, \"Tenant cache generation recovery after local lag failed\");\n"
              "                            rustok_telemetry::metrics::record_event_error(\n"
              "                                \"tenant.cache.generation\",\n"
              "                                \"local_lag_recovery\",\n"
              "                            );\n"
              "                        }\n"
              "                    }\n"
              "                }\n"
              "                Err(broadcast::error::RecvError::Closed) => {\n"
              "                    runtime.closed();\n"
              "                    local_state\n"
              "                        .mark_degraded(\"local tenant generation subscription closed\")\n"
              "                        .await;\n"
              "                    break;\n"
              "                }\n"
              "            }\n"
              "        }\n"
              "    });\n\n"
              "    if cache.redis_client_initialized() {",
              "generation local listener state",
          )
          generation = sub_once(
              generation,
              r"    if cache\.redis_client_initialized\(\) \{.*?\n    ctx\.shared_insert\(TenantCacheGenerationListenerHandle\);",
              "    if cache.redis_client_initialized() {\n"
              "        let redis_listener = listener.clone();\n"
              "        let invalidations = cache.invalidations();\n"
              "        let redis_state = Arc::clone(&state);\n"
              "        tokio::spawn(async move {\n"
              "            let runtime = EventConsumerRuntime::new(\"tenant_cache_generation_redis\");\n"
              "            let mut reason = \"startup\";\n"
              "            loop {\n"
              "                runtime.restarted(reason);\n"
              "                redis_state.mark_starting().await;\n"
              "                let ready_listener = redis_listener.clone();\n"
              "                let ready_state = Arc::clone(&redis_state);\n"
              "                let handler_listener = redis_listener.clone();\n"
              "                let handler_state = Arc::clone(&redis_state);\n"
              "                let result = invalidations\n"
              "                    .consume_subscription_with_ready(\n"
              "                        TENANT_CACHE_GENERATION_CHANNEL,\n"
              "                        move || {\n"
              "                            let ready_listener = ready_listener.clone();\n"
              "                            let ready_state = Arc::clone(&ready_state);\n"
              "                            async move {\n"
              "                                match ready_listener.recover_shared_generation().await {\n"
              "                                    Ok(_) => ready_state.mark_healthy().await,\n"
              "                                    Err(error) => {\n"
              "                                        ready_state.mark_degraded(error.to_string()).await;\n"
              "                                        tracing::warn!(%error, \"Tenant cache generation post-subscribe recovery failed\");\n"
              "                                        rustok_telemetry::metrics::record_event_error(\n"
              "                                            \"tenant.cache.generation\",\n"
              "                                            \"redis_ready_recovery\",\n"
              "                                        );\n"
              "                                    }\n"
              "                                }\n"
              "                            }\n"
              "                        },\n"
              "                        move |message| {\n"
              "                            let handler_listener = handler_listener.clone();\n"
              "                            let handler_state = Arc::clone(&handler_state);\n"
              "                            async move {\n"
              "                                match handler_listener.handle_message(message).await {\n"
              "                                    Ok(()) => handler_state.mark_healthy().await,\n"
              "                                    Err(error) => {\n"
              "                                        handler_state.mark_degraded(error.to_string()).await;\n"
              "                                        tracing::error!(%error, \"Redis tenant cache generation apply failed\");\n"
              "                                        rustok_telemetry::metrics::record_event_error(\n"
              "                                            \"tenant.cache.generation\",\n"
              "                                            \"redis_apply\",\n"
              "                                        );\n"
              "                                    }\n"
              "                                }\n"
              "                            }\n"
              "                        },\n"
              "                    )\n"
              "                    .await;\n"
              "                redis_state\n"
              "                    .mark_degraded(format!(\"Redis tenant generation subscriber stopped: {result:?}\"))\n"
              "                    .await;\n"
              "                tracing::warn!(?result, \"Tenant cache generation Redis subscriber stopped\");\n"
              "                reason = \"reconnect\";\n"
              "                tokio::time::sleep(LISTENER_RESTART_DELAY).await;\n"
              "            }\n"
              "        });\n\n"
              "        let reconcile_listener = listener.clone();\n"
              "        let reconcile_state = Arc::clone(&state);\n"
              "        tokio::spawn(async move {\n"
              "            let mut interval = tokio::time::interval(GENERATION_RECONCILE_INTERVAL);\n"
              "            interval.set_missed_tick_behavior(tokio::time::MissedTickBehavior::Skip);\n"
              "            loop {\n"
              "                interval.tick().await;\n"
              "                match reconcile_listener.recover_shared_generation().await {\n"
              "                    Ok(_) => reconcile_state.mark_healthy().await,\n"
              "                    Err(error) => {\n"
              "                        reconcile_state.mark_degraded(error.to_string()).await;\n"
              "                        tracing::warn!(%error, \"Periodic tenant cache generation reconciliation failed\");\n"
              "                        rustok_telemetry::metrics::record_event_error(\n"
              "                            \"tenant.cache.generation\",\n"
              "                            \"periodic_reconciliation\",\n"
              "                        );\n"
              "                    }\n"
              "                }\n"
              "            }\n"
              "        });\n"
              "    }\n\n"
              "    ctx.shared_insert(TenantCacheGenerationListenerHandle { state });",
              "generation Redis listener state and reconciliation",
          )
          generation = replace_once(
              generation,
              "    fn generation_test_lock() -> &'static tokio::sync::Mutex<()> {\n",
              "    #[tokio::test]\n"
              "    async fn listener_state_snapshot_reflects_degraded_status() {\n"
              "        let state = TenantCacheGenerationListenerState::new();\n"
              "        state.mark_degraded(\"redis unavailable\").await;\n"
              "        let snapshot = state.snapshot().await;\n"
              "        assert_eq!(snapshot.status, TenantCacheGenerationListenerStatus::Degraded);\n"
              "        assert_eq!(snapshot.last_error.as_deref(), Some(\"redis unavailable\"));\n"
              "    }\n\n"
              "    fn generation_test_lock() -> &'static tokio::sync::Mutex<()> {\n",
              "generation state regression test",
          )
          generation_path.write_text(generation)

          guard_path = Path("apps/server/tests/tenant_cache_architecture_guard.rs")
          guard = guard_path.read_text()
          guard = sub_once(
              guard,
              r"#\[test\]\nfn tenant_invalidation_payload_parser_rejects_extra_parts\(\) \{.*?\n\}\n",
              "#[test]\n"
              "fn tenant_middleware_has_no_parallel_per_key_pubsub_invalidation() {\n"
              "    let tenant = source(\"apps/server/src/middleware/tenant.rs\");\n"
              "    assert!(!tenant.contains(\"tenant.cache.invalidate\"));\n"
              "    assert!(!tenant.contains(\"TenantInvalidationPublisher\"));\n"
              "    assert!(!tenant.contains(\"consume_tenant_invalidation_messages\"));\n"
              "    assert!(tenant.contains(\"tenant_cache_generation_listener_snapshot\"));\n"
              "}\n",
              "tenant invalidation architecture guard",
          )
          guard_path.write_text(guard)
          PY
      - name: Format
        run: cargo fmt --all
      - name: Targeted compile and tests
        run: |
          cargo check -p rustok-server --lib
          cargo test -p rustok-server tenant_cache --lib
          cargo test -p rustok-server tenant_cache_generation --lib
          cargo test -p rustok-server --test tenant_cache_architecture_guard
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/server/src/middleware/tenant.rs \
                  apps/server/src/middleware/tenant_tests.rs \
                  apps/server/src/services/tenant_cache_generation.rs \
                  apps/server/tests/tenant_cache_architecture_guard.rs
          git commit -m "refactor(cache): remove dead tenant per-key invalidation"
          git push origin HEAD:main
