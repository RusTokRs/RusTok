name: SEO application services patch

on:
  push:
    branches:
      - agent/seo-application-services

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seo-application-services
          fetch-depth: 0

      - name: Apply focused SEO application services refactor
        run: python3 scripts/apply_seo_application_services_patch.py

      - name: Commit clean SEO application service slice
        run: |
          git rm .github/workflows/seo-application-services-patch.yml
          git rm scripts/apply_seo_application_services_patch.py
          git add --all
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor(seo): expose focused application services"
          git push origin HEAD:agent/seo-application-services
