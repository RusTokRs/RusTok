name: Cache rustfmt capture once

on:
  pull_request:
    paths:
      - "apps/server/src/services/tenant_cache_generation_status.rs"
      - "apps/server/tests/tenant_generation_readiness_guard.rs"
      - ".github/workflows/cache-rustfmt-capture-once.yml"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Generate rustfmt patch
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch
      - uses: actions/upload-artifact@v4
        with:
          name: cache-rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error
