name: Migration Infrastructure Approval

on:
  pull_request_target:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base git ref or commit
        required: true
        default: main
      head_ref:
        description: Head git ref or commit
        required: true
        default: main
      allow_infrastructure_changes:
        description: Explicitly approve migration compatibility harness changes
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  checks: write

concurrency:
  group: migration-infrastructure-approval-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BASE_REPOSITORY: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.repo.full_name || github.repository }}
  HEAD_REPOSITORY: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
  BASE_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.base.sha || inputs.base_ref }}
  HEAD_REF: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || inputs.head_ref }}

jobs:
  infrastructure-approval:
    name: Migration harness approval evaluator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout base policy source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          repository: ${{ env.BASE_REPOSITORY }}
          ref: ${{ env.BASE_REF }}
          path: base
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout head policy as untrusted data
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          repository: ${{ env.HEAD_REPOSITORY }}
          ref: ${{ env.HEAD_REF }}
          path: head
          fetch-depth: 1
          persist-credentials: false
          allow-unsafe-pr-checkout: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22

      - name: Verify base approval policy fixtures
        run: >-
          node "$GITHUB_WORKSPACE/base/scripts/verify/verify-migration-infrastructure-approval.mjs"
          --self-test

      - name: Require approval for migration harness changes
        id: approval
        shell: bash
        env:
          PR_LABELS_JSON: ${{ github.event_name == 'pull_request_target' && toJson(github.event.pull_request.labels.*.name) || '[]' }}
          EXPLICIT_APPROVAL: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_infrastructure_changes || false }}
        run: |
          set +e
          node "$GITHUB_WORKSPACE/base/scripts/verify/verify-migration-infrastructure-approval.mjs" \
            --base-dir "$GITHUB_WORKSPACE/base" \
            --head-dir "$GITHUB_WORKSPACE/head" \
            --labels-json "$PR_LABELS_JSON" \
            --explicitly-approved "$EXPLICIT_APPROVAL"
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Publish migration approval check on PR head
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EXIT_CODE: ${{ steps.approval.outputs.exit_code }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EXIT_CODE" == "0" ]]; then
            conclusion=success
            title="Migration infrastructure approval passed"
            summary="Protected migration infrastructure is unchanged or explicitly approved."
          else
            conclusion=failure
            title="Migration infrastructure approval required"
            summary="Protected migration infrastructure changed without migration-infra-approved."
          fi
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/$GITHUB_REPOSITORY/check-runs" \
            -f name="Migration harness approval" \
            -f head_sha="$HEAD_SHA" \
            -f status="completed" \
            -f conclusion="$conclusion" \
            -f details_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            -f "output[title]=$title" \
            -f "output[summary]=$summary"

      - name: Enforce migration approval decision
        if: steps.approval.outputs.exit_code != '0'
        run: exit 1
