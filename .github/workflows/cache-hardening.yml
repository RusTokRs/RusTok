name: Cache hardening

on:
  push:
    branches: [main]
    paths:
      - "crates/rustok-cache/**"
      - "crates/rustok-core/src/cache.rs"
      - "crates/rustok-core/src/cache_tests.rs"
      - "crates/rustok-core/src/context.rs"
      - "crates/rustok-core/src/lib.rs"
      - "crates/rustok-core/src/events/memory.rs"
      - "crates/rustok-core/tests/**"
      - "crates/rustok-telemetry/src/lib.rs"
      - "apps/server/src/middleware/mod.rs"
      - "apps/server/src/middleware/tenant.rs"
      - "apps/server/src/middleware/tenant_tests.rs"
      - "apps/server/src/middleware/channel.rs"
      - "apps/server/src/middleware/channel_tests.rs"
      - "apps/server/src/middleware/locale.rs"
      - "apps/server/src/middleware/rate_limit.rs"
      - "apps/server/src/middleware/rate_limit_tests.rs"
      - "apps/server/src/services/app_runtime.rs"
      - "apps/server/src/services/event_transport_factory.rs"
      - "apps/server/src/services/module_event_dispatcher.rs"
      - "apps/server/src/services/server_runtime_context.rs"
      - "apps/server/src/services/tenant_cache_generation.rs"
      - "apps/server/src/services/tenant_cache_generation_status.rs"
      - "apps/server/src/services/mod.rs"
      - "apps/server/src/services/field_definition_cache.rs"
      - "apps/server/src/services/rbac_runtime.rs"
      - "apps/server/tests/cache_architecture_guard.rs"
      - "apps/server/tests/cache_redis_status_architecture_guard.rs"
      - "apps/server/tests/generation_store_architecture_guard.rs"
      - "apps/server/tests/tenant_cache_architecture_guard.rs"
      - "apps/server/tests/tenant_generation_concurrency_guard.rs"
      - "apps/server/tests/tenant_generation_readiness_guard.rs"
      - "apps/server/tests/tenant_listener_handle_guard.rs"
      - "crates/rustok-seo/src/services/mod.rs"
      - "crates/rustok-seo/src/services/redirects.rs"
      - ".github/workflows/cache-hardening.yml"
  pull_request:
    paths:
      - "crates/rustok-cache/**"
      - "crates/rustok-core/src/cache.rs"
      - "crates/rustok-core/src/cache_tests.rs"
      - "crates/rustok-core/src/context.rs"
      - "crates/rustok-core/src/lib.rs"
      - "crates/rustok-core/src/events/memory.rs"
      - "crates/rustok-core/tests/**"
      - "crates/rustok-telemetry/src/lib.rs"
      - "apps/server/src/middleware/mod.rs"
      - "apps/server/src/middleware/tenant.rs"
      - "apps/server/src/middleware/tenant_tests.rs"
      - "apps/server/src/middleware/channel.rs"
      - "apps/server/src/middleware/channel_tests.rs"
      - "apps/server/src/middleware/locale.rs"
      - "apps/server/src/middleware/rate_limit.rs"
      - "apps/server/src/middleware/rate_limit_tests.rs"
      - "apps/server/src/services/app_runtime.rs"
      - "apps/server/src/services/event_transport_factory.rs"
      - "apps/server/src/services/module_event_dispatcher.rs"
      - "apps/server/src/services/server_runtime_context.rs"
      - "apps/server/src/services/tenant_cache_generation.rs"
      - "apps/server/src/services/tenant_cache_generation_status.rs"
      - "apps/server/src/services/mod.rs"
      - "apps/server/src/services/field_definition_cache.rs"
      - "apps/server/src/services/rbac_runtime.rs"
      - "apps/server/tests/cache_architecture_guard.rs"
      - "apps/server/tests/cache_redis_status_architecture_guard.rs"
      - "apps/server/tests/generation_store_architecture_guard.rs"
      - "apps/server/tests/tenant_cache_architecture_guard.rs"
      - "apps/server/tests/tenant_generation_concurrency_guard.rs"
      - "apps/server/tests/tenant_generation_readiness_guard.rs"
      - "apps/server/tests/tenant_listener_handle_guard.rs"
      - "crates/rustok-seo/src/services/mod.rs"
      - "crates/rustok-seo/src/services/redirects.rs"
      - ".github/workflows/cache-hardening.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cache-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiled-contract:
    name: Compiled cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Format
        run: cargo fmt --all --check
      - name: Compile cache and server
        run: |
          cargo check -p rustok-core --lib --features redis-cache
          cargo check -p rustok-cache --lib
          cargo check -p rustok-server --lib
      - name: Cache unit and architecture tests
        run: |
          cargo test -p rustok-core cache --lib --features redis-cache
          cargo test -p rustok-cache --lib
          cargo test -p rustok-cache --test atomic_cas concurrent_local_compare_and_set_has_exactly_one_winner
          cargo test -p rustok-cache --test redis_health_regression
          cargo test -p rustok-cache --test generation_store_regression
          cargo test -p rustok-server --test cache_architecture_guard --test cache_redis_status_architecture_guard --test generation_store_architecture_guard --test tenant_cache_architecture_guard --test tenant_generation_concurrency_guard --test tenant_generation_readiness_guard --test tenant_listener_handle_guard
          cargo test -p rustok-server tenant_cache --lib
          cargo test -p rustok-server tenant_cache_generation --lib
          cargo test -p rustok-server channel_cache --lib
          cargo test -p rustok-server rate_limit --lib
          cargo test -p rustok-server tenant_locale_cache --lib
          cargo test -p rustok-server permission_cache_weight --lib
          cargo test -p rustok-seo redirect_cache --lib
      - name: Clippy
        run: |
          cargo clippy -p rustok-core --lib --features redis-cache -- -D warnings
          cargo clippy -p rustok-cache --lib -- -D warnings
          cargo clippy -p rustok-server --lib -- -D warnings
      - name: Module contract
        run: |
          cargo xtask module validate cache
          cargo xtask module test cache

  live-redis:
    name: Live Redis cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      RUSTOK_CACHE_REAL_REDIS_URL: redis://127.0.0.1:6379/
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Redis ping
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools
          redis-cli -h 127.0.0.1 -p 6379 ping
      - name: Cache library live Redis tests
        run: cargo test -p rustok-cache --lib -- --ignored --nocapture --test-threads=1
      - name: Cache atomic CAS live Redis test
        run: cargo test -p rustok-cache --test atomic_cas -- --ignored --nocapture --test-threads=1
      - name: Cache hardening live Redis tests
        run: cargo test -p rustok-cache --test real_redis_hardening -- --ignored --nocapture --test-threads=1
      - name: Core live Redis tests
        run: cargo test -p rustok-core cache --features redis-cache -- --ignored --nocapture --test-threads=1

# FALLBACK_CONVERGENCE_ONCE_BEGIN
  fallback-convergence-once:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Verify and publish fallback convergence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Patch fallback convergence
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          path = Path("crates/rustok-cache/src/fallback.rs")
          text = path.read_text()

          prune_start = text.index("        let scan = state\n")
          prune_end = text.index(
              "\n\n        if state.keys.len() >= self.maximum_keys {",
              prune_start,
          )
          new_prune = (
              "        let scan = DEGRADED_WRITE_PRUNE_SCAN.min(state.insertion_order.len());\n"
              "        for _ in 0..scan {\n"
              "            let Some(candidate) = state.insertion_order.pop_front() else {\n"
              "                break;\n"
              "            };\n"
              "            if !state.keys.contains(&candidate) {\n"
              "                continue;\n"
              "            }\n"
              "            if fallback.get(&candidate).await?.is_none() {\n"
              "                state.keys.remove(&candidate);\n"
              "            } else {\n"
              "                state.insertion_order.push_back(candidate);\n"
              "            }\n"
              "        }"
          )
          text = text[:prune_start] + new_prune + text[prune_end:]

          old_hit = "                    Some(value) => Ok(Some(value)),"
          new_hit = textwrap.dedent(
              """
                                  Some(value) => {
                                      if let Err(error) =
                                          self.fallback.set(key.to_string(), value.clone()).await
                                      {
                                          tracing::warn!(
                                              %error,
                                              key,
                                              "Failed to refresh local cache mirror from primary read"
                                          );
                                      }
                                      Ok(Some(value))
                                  }
              """
          ).strip("\n")
          if text.count(old_hit) != 1:
              raise SystemExit(f"expected one primary hit line, found {text.count(old_hit)}")
          text = text.replace(old_hit, new_hit, 1)

          tests = textwrap.dedent(
              """
                  #[tokio::test]
                  async fn primary_hit_refreshes_the_local_mirror() {
                      let primary = Arc::new(RecoveringStaleBackend {
                          fail_writes: AtomicBool::new(false),
                          value: StdMutex::new(Some(b"fresh".to_vec())),
                      });
                      let fallback = Arc::new(InMemoryCacheBackend::new(Duration::from_secs(30), 16));
                      fallback
                          .set("key".to_string(), b"stale".to_vec())
                          .await
                          .unwrap();
                      let backend = backend(primary, Arc::clone(&fallback));

                      assert_eq!(backend.get("key").await.unwrap(), Some(b"fresh".to_vec()));
                      assert_eq!(fallback.get("key").await.unwrap(), Some(b"fresh".to_vec()));
                  }

                  #[tokio::test]
                  async fn degraded_tracker_rotates_prune_candidates_without_tombstone_growth() {
                      let tracker = DegradedWriteTracker::new(3);
                      let fallback = InMemoryCacheBackend::new(Duration::from_secs(30), 64);
                      fallback
                          .set("live".to_string(), b"live".to_vec())
                          .await
                          .unwrap();
                      tracker.insert("live", b"live", &fallback).await.unwrap();

                      for index in 0..64 {
                          let key = format!("expired-{index}");
                          fallback
                              .set(key.clone(), b"temporary".to_vec())
                              .await
                              .unwrap();
                          tracker
                              .insert(&key, b"temporary", &fallback)
                              .await
                              .unwrap();
                          fallback.invalidate(&key).await.unwrap();
                      }

                      fallback
                          .set("fresh".to_string(), b"fresh".to_vec())
                          .await
                          .unwrap();
                      tracker
                          .insert("fresh", b"fresh", &fallback)
                          .await
                          .unwrap();

                      let state = tracker.state.lock().await;
                      assert!(state.keys.contains("live"));
                      assert!(state.keys.contains("fresh"));
                      assert!(state.insertion_order.len() <= tracker.maximum_keys);
                      assert_eq!(state.insertion_order.len(), state.keys.len());
                  }
              """
          ).strip("\n")
          marker = (
              "    #[tokio::test]\n"
              "    async fn zero_ttl_delete_fails_closed_when_shared_primary_is_unavailable() {"
          )
          if text.count(marker) != 1:
              raise SystemExit(f"expected one final fallback test marker, found {text.count(marker)}")
          text = text.replace(marker, tests + "\n\n" + marker, 1)
          path.write_text(text)
          PY
      - name: Format, compile, and test
        run: |
          rustfmt --edition 2021 crates/rustok-cache/src/fallback.rs
          rustfmt --edition 2021 --check crates/rustok-cache/src/fallback.rs
          cargo check -p rustok-cache --lib
          cargo test -p rustok-cache --lib fallback::tests
      - name: Restore workflow and publish verified source
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path(".github/workflows/cache-hardening.yml")
          text = path.read_text()
          begin = text.index("\n# FALLBACK_CONVERGENCE_ONCE_BEGIN\n")
          end_marker = "# FALLBACK_CONVERGENCE_ONCE_END\n"
          end = text.index(end_marker, begin) + len(end_marker)
          text = text[:begin] + "\n"
          text = text.replace(
              "permissions:\n  contents: write",
              "permissions:\n  contents: read",
              1,
          )
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-cache/src/fallback.rs .github/workflows/cache-hardening.yml
          git commit -m "fix(cache): converge local fallback after primary reads"
          git pull --rebase origin main
          git push origin HEAD:main
# FALLBACK_CONVERGENCE_ONCE_END
