  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cache-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiled-contract:
    name: Compiled cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Format
        run: cargo fmt --all --check
      - name: Compile cache and server
        run: |
          cargo check -p rustok-core --lib --features redis-cache
          cargo check -p rustok-cache --lib
          cargo check -p flex --lib
          cargo check -p rustok-auth --lib
          cargo check -p rustok-product --lib
          cargo check -p rustok-commerce --lib
          cargo check -p rustok-forum --lib
          cargo check -p rustok-channel --lib
          cargo check -p rustok-server --lib
      - name: Cache unit and architecture tests
        run: |
          cargo test -p rustok-core cache --lib --features redis-cache
          cargo test -p rustok-core --test cache_atomic_backend_guard
          cargo test -p rustok-core circuit_breaker --lib
          cargo test -p rustok-cache --lib
          cargo test -p rustok-cache --test alert_rules_guard
          cargo test -p rustok-cache --test atomic_cas
          cargo test -p rustok-cache --test generation_store_regression
          cargo test -p rustok-cache --test invalidation_failure_metrics
          cargo test -p rustok-cache --test redis_health_regression
          cargo test -p flex cache_generation --lib
          cargo test -p rustok-channel invalidation_generation --lib
          cargo test -p rustok-channel sqlite_triggers_advance_generation_and_replay_preserves_it --lib
          cargo test -p rustok-server --test cache_architecture_guard --test cache_legacy_fallback_guard --test cache_redis_monitor_architecture_guard --test cache_redis_status_architecture_guard --test cache_worker_guardrail_architecture_guard --test channel_cache_architecture_guard --test field_definition_cache_generation_guard --test field_definition_cache_runtime_guard --test generation_store_architecture_guard --test locale_cache_architecture_guard --test marketplace_cache_architecture_guard --test rate_limit_cache_runtime_guard --test seo_redirect_cache_reconciliation_guard --test tenant_cache_architecture_guard --test tenant_generation_concurrency_guard --test tenant_generation_delivery_gate_guard --test tenant_generation_preflight_guard --test tenant_generation_readiness_guard --test tenant_listener_handle_guard --test tenant_locale_generation_guard
          cargo test -p rustok-server --test channel_cache_resolved_value
          cargo test -p rustok-server tenant_cache --lib
          cargo test -p rustok-server tenant_cache_generation --lib
          cargo test -p rustok-server tenant_generation_delivery_gate --lib
          cargo test -p rustok-server tenant_locale_generation --lib
          cargo test -p rustok-server channel_cache --lib
          cargo test -p rustok-server channel_cache_invalidation --lib
          cargo test -p rustok-server field_definition_cache_generation --lib
          cargo test -p rustok-server rate_limit --lib
          cargo test -p rustok-server tenant_locale_cache --lib
          cargo test -p rustok-server seo_redirect_cache_reconciliation --lib
          cargo test -p rustok-server permission_cache_weight --lib
          cargo test -p rustok-seo redirect_cache --lib
      - name: Clippy
        run: |
          cargo clippy -p rustok-core --lib --features redis-cache -- -D warnings
          cargo clippy -p rustok-cache --lib -- -D warnings
          cargo clippy -p flex --lib -- -D warnings
          cargo clippy -p rustok-channel --lib -- -D warnings
          cargo clippy -p rustok-server --lib -- -D warnings
      - name: Module contract
        run: |
          cargo xtask module validate cache
          cargo xtask module test cache

  postgres-channel:
    name: PostgreSQL cache generation contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rustok_channel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rustok_channel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      RUSTOK_CHANNEL_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/rustok_channel
      RUSTOK_FLEX_TEST_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/rustok_channel
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: PostgreSQL channel generation recovery
        run: cargo test -p rustok-channel --test postgres_invalidation_generation -- --ignored --nocapture --test-threads=1
      - name: PostgreSQL Flex generation recovery
        run: cargo test -p flex --test postgres_cache_generation -- --ignored --nocapture --test-threads=1

  live-redis:
    name: Live Redis cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      RUSTOK_CACHE_REAL_REDIS_URL: redis://127.0.0.1:6379/
      RUSTOK_CACHE_REDIS_SERVER_BIN: /usr/bin/redis-server
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Redis ping
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server redis-tools
          redis-cli -h 127.0.0.1 -p 6379 ping
      - name: Cache library live Redis tests
        run: cargo test -p rustok-cache --lib -- --ignored --nocapture --test-threads=1
      - name: Cache atomic CAS live Redis test
        run: cargo test -p rustok-cache --test atomic_cas -- --ignored --nocapture --test-threads=1
      - name: Cache fallback CAS outage recovery
        run: cargo test -p rustok-cache --test fallback_cas_live -- --ignored --nocapture --test-threads=1
      - name: Cache hardening live Redis tests
        run: cargo test -p rustok-cache --test real_redis_hardening -- --ignored --nocapture --test-threads=1
      - name: Tenant locale Redis recovery
        run: cargo test -p rustok-server tenant_locale_generation --lib -- --ignored --nocapture --test-threads=1
      - name: Channel replica Redis recovery
        run: cargo test -p rustok-server redis_publication_drives_remote_replica_readiness_recovery --lib -- --ignored --nocapture --test-threads=1
      - name: Channel resolved value Redis recovery
        run: cargo test -p rustok-server --test channel_cache_resolved_value -- --ignored --nocapture --test-threads=1
