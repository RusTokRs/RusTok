  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cache-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiled-contract:
    name: Compiled cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Format
        run: cargo fmt --all --check
      - name: Compile cache and server
        run: |
          cargo check -p rustok-core --lib --features redis-cache
          cargo check -p rustok-cache --lib
          cargo check -p rustok-server --lib
      - name: Cache unit and architecture tests
        run: |
          cargo test -p rustok-core cache --lib --features redis-cache
          cargo test -p rustok-core --test cache_atomic_backend_guard
          cargo test -p rustok-core circuit_breaker --lib
          cargo test -p rustok-cache --lib
          cargo test -p rustok-cache --test atomic_cas concurrent_local_compare_and_set_has_exactly_one_winner
          cargo test -p rustok-cache --test generation_store_regression
          cargo test -p rustok-cache --test invalidation_failure_metrics
          cargo test -p rustok-cache --test redis_health_regression
          cargo test -p rustok-server --test cache_architecture_guard --test cache_legacy_fallback_guard --test cache_redis_monitor_architecture_guard --test cache_redis_status_architecture_guard --test cache_worker_guardrail_architecture_guard --test channel_cache_architecture_guard --test field_definition_cache_runtime_guard --test generation_store_architecture_guard --test locale_cache_architecture_guard --test marketplace_cache_architecture_guard --test rate_limit_cache_runtime_guard --test tenant_cache_architecture_guard --test tenant_generation_concurrency_guard --test tenant_generation_delivery_gate_guard --test tenant_generation_preflight_guard --test tenant_generation_readiness_guard --test tenant_listener_handle_guard --test tenant_locale_generation_guard
          cargo test -p rustok-server tenant_cache --lib
          cargo test -p rustok-server tenant_cache_generation --lib
          cargo test -p rustok-server tenant_generation_delivery_gate --lib
          cargo test -p rustok-server tenant_locale_generation --lib
          cargo test -p rustok-server channel_cache --lib
          cargo test -p rustok-server rate_limit --lib
          cargo test -p rustok-server tenant_locale_cache --lib
          cargo test -p rustok-server permission_cache_weight --lib
          cargo test -p rustok-seo redirect_cache --lib
      - name: Clippy
        run: |
          cargo clippy -p rustok-core --lib --features redis-cache -- -D warnings
          cargo clippy -p rustok-cache --lib -- -D warnings
          cargo clippy -p rustok-server --lib -- -D warnings
      - name: Module contract
        run: |
          cargo xtask module validate cache
          cargo xtask module test cache

  live-redis:
    name: Live Redis cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      RUSTOK_CACHE_REAL_REDIS_URL: redis://127.0.0.1:6379/
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Redis ping
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools
          redis-cli -h 127.0.0.1 -p 6379 ping
      - name: Cache library live Redis tests
        run: cargo test -p rustok-cache --lib -- --ignored --nocapture --test-threads=1
      - name: Cache atomic CAS live Redis test
        run: cargo test -p rustok-cache --test atomic_cas -- --ignored --nocapture --test-threads=1
      - name: Cache hardening live Redis tests
        run: cargo test -p rustok-cache --test real_redis_hardening -- --ignored --nocapture --test-threads=1
