name: One-off Migration Action Pin Status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.issue.number == 1817 &&
      github.event.comment.body == '/status-migration-action-pin'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Persist migration action pin diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-pin-migration-actions.yml \
            --limit 5 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url)
          failed_run=$(printf '%s' "$runs" | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const run = JSON.parse(input).find(item => item.conclusion === "failure");
              if (run) process.stdout.write(String(run.databaseId));
            });
          ')
          failure_tail='No failed pinning run found.'
          if [[ -n "$failed_run" ]]; then
            set +e
            failure_tail=$(gh run view "$failed_run" --repo "$GITHUB_REPOSITORY" --log-failed 2>&1 | tail -n 100)
            set -e
          fi
          {
            printf 'Migration action pin diagnostics.\n\n## Runs\n\n```json\n%s\n```\n\n' "$runs"
            printf '## Latest failure\n\n```text\n%s\n```\n' "$failure_tail"
          } >/tmp/migration-action-pin-status.md
          gh issue edit 1817 --repo "$GITHUB_REPOSITORY" --body-file /tmp/migration-action-pin-status.md
