name: Index guarded 1m runner documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/index-1m-standard-runner-docs-once.yml"
      - "scripts/verify/enable-index-1m-standard-runner-once.py"

permissions:
  contents: write

concurrency:
  group: index-1m-standard-runner-docs
  cancel-in-progress: false

jobs:
  synchronize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply guarded 1m runner policy documentation
        shell: bash
        run: |
          set -o pipefail
          python scripts/verify/enable-index-1m-standard-runner-once.py 2>&1 | tee policy-diagnostic.txt
      - name: Archive policy diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: index-1m-standard-runner-docs-diagnostic-${{ github.sha }}
          path: policy-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
      - name: Verify and commit clean policy diff
        shell: bash
        run: |
          git diff --check
          test "$(git diff --name-only | sort | tr '\n' ' ')" = "DECISIONS/2026-07-24-index-storage-layout.md crates/rustok-index/docs/implementation-plan.md crates/rustok-index/docs/storage-benchmark.md "
          grep -Fq "runner_label: ${{ vars.INDEX_BENCH_LARGE_RUNNER || 'ubuntu-latest' }}" .github/workflows/index-storage-scale-evidence.yml
          grep -Fq '93,030,404,096' crates/rustok-index/docs/storage-benchmark.md
          grep -Fq '35,000,000,000' DECISIONS/2026-07-24-index-storage-layout.md
          git rm \
            .github/workflows/index-1m-standard-runner-docs-once.yml \
            scripts/verify/enable-index-1m-standard-runner-once.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            DECISIONS/2026-07-24-index-storage-layout.md \
            crates/rustok-index/docs/implementation-plan.md \
            crates/rustok-index/docs/storage-benchmark.md
          git commit -m "docs(index): enable guarded 1m standard-runner fallback"
          git push origin HEAD:${{ github.head_ref }}
