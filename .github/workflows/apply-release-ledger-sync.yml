name: Apply Release Ledger Sync

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.issue.title == '[automation] sync release hardening ledger'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 1

      - name: Apply exact release and ledger patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact replacement, found {count}")
              file.write_text(source.replace(old, new, 1))

          replace_once(
              ".github/workflows/release.yml",
              '''          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main || {
''',
              '''          git show-ref --verify --quiet refs/remotes/origin/main || {
            echo "Checkout did not fetch the main ref required for release ancestry validation" >&2
            exit 1
          }
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main || {
''',
          )

          replace_once(
              "scripts/verify/verify-release-supply-chain-contract.mjs",
              '''  "git merge-base --is-ancestor",
  "repos/${GITHUB_REPOSITORY}/immutable-releases",
''',
              '''  "git show-ref --verify --quiet refs/remotes/origin/main",
  "git merge-base --is-ancestor",
  "repos/${GITHUB_REPOSITORY}/immutable-releases",
''',
          )
          replace_once(
              "scripts/verify/verify-release-supply-chain-contract.mjs",
              '''  "gh release view",
  "docker buildx imagetools inspect",
''',
              '''  "gh release view",
  "git fetch --no-tags origin main",
  "docker buildx imagetools inspect",
''',
          )

          plan = "docs/verification/PLATFORM_HARDENING_IMPLEMENTATION_PLAN.md"
          replace_once(
              plan,
              "The plan was initially revalidated against `main` on 2026-07-17 at commit `9c3a5f1b443d7fc0fa1dae8ee9b09a29d2edfb67`. The progress ledger was refreshed on 2026-07-18 after completing the typed tenant profile, cross-transport tenant isolation coverage, bounded CSP violation collection, server-hosted and standalone script/style-element nonce enforcement, production WSS-only browser connections, zeroing the Rust-hosted and Next/React inline-style baselines, protecting the classic admin bootstrap, removing runtime style generation from the reviewed Next roots and completing dependency feature cleanup.",
              "The plan was initially revalidated against `main` on 2026-07-17 at commit `9c3a5f1b443d7fc0fa1dae8ee9b09a29d2edfb67`. The progress ledger was refreshed on 2026-07-18 after completing strict style-attribute CSP enforcement, typed tenant resolution and cross-transport isolation, API compatibility and migration compatibility gates, bounded worker admission primitives, and a signed, reproducible and attested release source contract with commit-pinned actions and pinned runtime inputs.",
          )
          replace_once(
              plan,
              '''1. The enforced UI Content Security Policy still permits inline style attributes through the explicit `style-src-attr 'unsafe-inline'` rollout boundary. Both exception registers are empty; the Rust gate is `0/0` and the Next gate is `0 props / 0 files / 0 runtime style elements / 0 DOM style writes`. Cross-stack browser evidence and the subsequent enforced promotion remain required before `HARD-101` is complete.
2. Browser E2E runs in a dedicated workflow, but repository branch protection has not yet been verified to require that workflow.
3. Two dependency waivers remain until `Cargo.lock` is regenerated after disabling the unused SeaORM migration CLI/MySQL and Postcard heapless default features.
4. Production JWT bootstrap policy validates algorithm-specific key material, issuer, audience and HS256 secret quality; operational key rotation and emergency revocation remain separate production-readiness work.
''',
              '''1. Browser E2E runs in a dedicated workflow, but repository branch protection has not yet been verified to require that workflow.
2. Two dependency waivers remain until `Cargo.lock` is regenerated after disabling the unused SeaORM migration CLI/MySQL and Postcard heapless default features.
3. Production JWT bootstrap policy validates algorithm-specific key material, issuer, audience and HS256 secret quality; operational key rotation and emergency revocation remain separate production-readiness work.
4. The release source contract is implemented, but repository immutable-release configuration and the first signed-tag production execution still require operator evidence. The tag workflow fails closed when immutability is unavailable.
''',
          )
          replace_once(
              plan,
              "4. Style elements share the same request nonce; the broader `style-src 'unsafe-inline'` source was replaced by nonce-bearing `style-src` plus an isolated temporary `style-src-attr` allowance.",
              "4. Style elements share the same request nonce; enforced server-hosted and standalone admin policies use nonce-bearing `style-src` and unconditionally block style attributes with `style-src-attr 'none'`.",
          )
          replace_once(
              plan,
              "40. Production JWT claims cannot use framework defaults; HS256 requires at least 64 bytes and rejects common placeholder or low-diversity secrets.\n",
              """40. Production JWT claims cannot use framework defaults; HS256 requires at least 64 bytes and rejects common placeholder or low-diversity secrets.
41. OpenAPI and GraphQL artifacts are exported for base and head, compared by base-owned policy, and governed by explicit exception and infrastructure approvals.
42. Migration compatibility covers append-only plans, fresh and incremental PostgreSQL installs, N-1 upgrades, rollback smoke and exact backfill fixture assertions under a bounded non-superuser database role.
43. Signed canonical SemVer tags drive reproducible server archives, server-only SPDX 2.3 dependency closure, exact checksums, GitHub attestations, GHCR digest publication and immutable GitHub release assets.
44. Release workflows and their base-owned approval policy use commit-pinned GitHub actions; the runtime image uses a digest-pinned dated Debian base and fixed Debian Snapshot package sources.
""",
          )
          replace_once(
              plan,
              '''1. Complete `HARD-101` by capturing cross-stack browser evidence under the strict report-only policy, then promote enforced `style-src-attr` from `'unsafe-inline'` to `'none'` without restoring any source exception.
2. Regenerate `Cargo.lock`, verify `rsa` and `atomic-polyfill` are absent from the selected graph and remove the final two audit waivers.
3. Make `HARD-201` a required branch-protection check.
4. `HARD-204` API compatibility diff gates.
5. `HARD-205` Migration upgrade and rollback verification.
6. `HARD-206` Signed SemVer release workflow and artifacts.
7. `HARD-005` Protected main branch and merge policy.
8. `HARD-006` Benchmark claim evidence cleanup.
9. `HARD-202` Leptos admin/storefront browser smoke coverage.
10. `HARD-305` JWT/key rotation and emergency revocation runbooks.
11. `HARD-301` SLI/SLO definitions and dashboards.
12. `HARD-302` Worker backpressure and cancellation policy.
13. `HARD-307` Per-tenant resource quotas.
14. `HARD-304` Restore drills and disaster recovery evidence.
15. `HARD-306` Dependency degradation and chaos tests.
16. `HARD-406` Reproducible performance regression suite.
17. `HARD-108` Database-level tenant integrity checks for every tenant-owned relation.
18. `HARD-303` Structured audit logs for privileged and tenant-changing operations.
19. `HARD-308` Compliance evidence pack with threat model and data-flow diagrams.
20. `HARD-208` Release readiness checklist with rollback evidence.
''',
              '''1. Regenerate `Cargo.lock`, verify `rsa` and `atomic-polyfill` are absent from the selected graph and remove the final two audit waivers.
2. Enable protected `main` and require browser, hardening, API compatibility, migration compatibility and release-infrastructure checks (`HARD-005`/`HARD-201`).
3. Execute the first signed-tag release, verify repository immutable releases, published attestations, GHCR digest and five-asset checksum set (`HARD-206` operational evidence).
4. Add Leptos admin/storefront browser smoke coverage (`HARD-202`).
5. Add database-level tenant integrity checks for every tenant-owned relation (`HARD-108`).
6. Publish JWT/key rotation and emergency revocation runbooks (`HARD-305`).
7. Define SLIs/SLOs and production dashboards (`HARD-301`).
8. Complete worker backpressure, timeout and cancellation coverage across every worker lane (`HARD-302`).
9. Add per-tenant resource quotas and noisy-neighbor protection (`HARD-307`).
10. Add restore drills and disaster recovery evidence (`HARD-304`).
11. Add dependency degradation and chaos tests (`HARD-306`).
12. Add a reproducible performance regression suite (`HARD-406`).
13. Add structured audit logs for privileged and tenant-changing operations (`HARD-303`).
14. Produce the compliance evidence pack with threat model and data-flow diagrams (`HARD-308`).
15. Publish the release readiness checklist with rollback and failed-release recovery evidence (`HARD-208`).
16. Add mobile build/analyze/test and API contract smoke coverage (`HARD-203`).
17. Remove or evidence unsupported benchmark claims (`HARD-006`).
18. Finish release-oriented changelog cleanup (`HARD-207`).
19. Exercise image/release collision recovery without mutating a published release.
20. Profile independently scaling workload lanes before extraction (`HARD-401`).
''',
          )
          replace_once(
              plan,
              "node scripts/verify/verify-advisory-exceptions.mjs\n",
              """node scripts/verify/verify-advisory-exceptions.mjs
node scripts/verify/verify-api-compatibility-contract.mjs
node scripts/verify/verify-migration-plan-self-test.mjs
node scripts/verify/verify-migration-backfill-self-test.mjs
node scripts/verify/verify-migration-compatibility-contract.mjs
node scripts/verify/verify-release-tooling-self-test.mjs
node scripts/verify/verify-release-infra-self-test.mjs
node scripts/verify/verify-release-supply-chain-contract.mjs
node scripts/verify/verify-release-runtime-image-contract.mjs
""",
          )
          replace_once(
              plan,
              "| `HARD-101` CSP enforcement hardening | Source migration complete; browser evidence and enforced promotion pending | Shared nonce `8492391`; main-server policy `9b1b1af`/`700d4cb`; standalone adapter `8b80543`/`611e50a`; report-only boundary `ac93c41`; Rust `0/0` source gate `e250e42`/`3a61789`; classic admin class-only bootstrap `bf8816e`/`cfc29c4`; Next register/gate `044d4d3`/`4ac34c2`; shell migration `659544b`; chart migration/gate `9187417`/`83aeb33`/`35c546a`; data-table cleanup/gate `7682dc6`/`be1fb0d`/`ba1de73`; storefront search migration `34e8265`; empty Next register and `0/0/0` gate `d54306f`/`a02d69e`; final inventory `266ece9`; browser evidence and enforced promotion remain |",
              "| `HARD-101` CSP enforcement hardening | Completed at source and gate level; browser smoke remains operational evidence | Shared nonce and nonce-only script/style elements; empty Rust and Next exception registers; enforced `style-src-attr 'none'` in `2a606aaf`; strict source gates in `907829d0`; report collector remains enabled |",
          )
          replace_once(
              plan,
              "| `HARD-201` Browser E2E CI | Implemented, not yet required | Workflow `8982982`; branch-protection requirement unverified |\n",
              """| `HARD-201` Browser E2E CI | Implemented, not yet required | Workflow `8982982`; branch-protection requirement unverified |
| `HARD-204` OpenAPI and GraphQL compatibility diff | Implemented; required-check configuration unverified | `.github/workflows/api-compatibility.yml`, base-owned comparator and exception/infrastructure approval policies |
| `HARD-205` Migration compatibility and backfills | Implemented; execution evidence pending | Plan artifact handoff `5b3ec605`; structural gates `c3a3cc67`/`699b4176`; strict fixture executor `4084235d`; bounded PostgreSQL role `5559a413`/`eb91ce9b` |
| `HARD-206` Signed and attested release pipeline | Source implementation complete; first production tag pending | `.github/workflows/release.yml`; canonical tag/changelog contract; reproducible archive; server-only SPDX; exact five-asset checksum set; commit-pinned actions; base-owned `release-infra-approved` policy; pinned Debian runtime inputs |
""",
          )
          PY

          git rm .github/workflows/apply-release-ledger-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/release.yml scripts/verify/verify-release-supply-chain-contract.mjs docs/verification/PLATFORM_HARDENING_IMPLEMENTATION_PLAN.md
          git commit -m "docs(hardening): sync release and compatibility status"
          git push origin HEAD:main
