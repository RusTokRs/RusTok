name: Agent Check Pages

on:
  push:
    branches:
      - agent/pages-current-only

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-current-only
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - name: Fix current Pages workspace
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/rustok-pages/admin/src/composition.rs')
          source = path.read_text()
          old = '''                let status = page.status.clone();
                let select = on_select;
                view! {
'''
          new = '''                let status_label = page.status.clone();
                let status_class = core::status_badge_class(&status_label);
                let select = on_select;
                view! {
'''
          if old in source:
              if source.count(old) != 1:
                  raise SystemExit(f'expected one navigator status binding, found {source.count(old)}')
              source = source.replace(old, new, 1)
          elif 'let status_label = page.status.clone();' not in source:
              raise SystemExit('navigator status binding is neither old nor fixed')
          old = '''                            <span class=format!(
                                "rounded-full px-2 py-1 text-[10px] font-semibold uppercase {}",
                                core::status_badge_class(&status)
                            )>{status}</span>
'''
          new = '''                            <span class=format!(
                                "rounded-full px-2 py-1 text-[10px] font-semibold uppercase {}",
                                status_class
                            )>{status_label}</span>
'''
          if old in source:
              if source.count(old) != 1:
                  raise SystemExit(f'expected one navigator status render, found {source.count(old)}')
              source = source.replace(old, new, 1)
          elif '>{status_label}</span>' not in source:
              raise SystemExit('navigator status render is neither old nor fixed')
          path.write_text(source)
          PY
          cargo fmt -p rustok-pages-admin
      - name: Commit fix
        run: |
          if git diff --quiet -- crates/rustok-pages/admin; then
            echo "Pages workspace fix already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-pages/admin
          git commit -m "fix(pages): make builder workspace compile"
          git push origin HEAD:agent/pages-current-only
