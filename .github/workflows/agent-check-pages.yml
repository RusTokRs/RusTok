name: Agent Check Pages

on:
  push:
    branches:
      - agent/pages-current-only

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: never

jobs:
  check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-current-only
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Remove unused workspace binding
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/rustok-pages/admin/src/composition.rs')
          source = path.read_text()
          needle = '    let page_id = page.id.clone();\n    let title = page\n'
          if source.count(needle) != 1:
              raise SystemExit(f'expected one PageWorkspace binding, found {source.count(needle)}')
          path.write_text(source.replace(needle, '    let title = page\n', 1))
          PY
      - name: Format Pages admin
        run: cargo fmt -p rustok-pages-admin
      - name: Check Pages admin
        run: cargo check -p rustok-pages-admin --lib
      - name: Lint Pages admin
        run: cargo clippy -p rustok-pages-admin --lib -- -D warnings
      - name: Commit validated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-pages/admin
          git commit -m "fix(pages): keep builder workspace warning-free"
          git push origin HEAD:agent/pages-current-only
