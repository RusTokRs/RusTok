name: Agent Check Pages

on:
  push:
    branches:
      - agent/pages-current-only

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: never

jobs:
  check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-current-only
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Fix current Pages workspace
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/rustok-pages/admin/src/composition.rs')
          source = path.read_text()
          old = '''                let status = page.status.clone();
                let select = on_select;
                view! {
'''
          new = '''                let status_label = page.status.clone();
                let status_class = core::status_badge_class(&status_label);
                let select = on_select;
                view! {
'''
          if source.count(old) != 1:
              raise SystemExit(f'expected one navigator status binding, found {source.count(old)}')
          source = source.replace(old, new, 1)
          old = '''                            <span class=format!(
                                "rounded-full px-2 py-1 text-[10px] font-semibold uppercase {}",
                                core::status_badge_class(&status)
                            )>{status}</span>
'''
          new = '''                            <span class=format!(
                                "rounded-full px-2 py-1 text-[10px] font-semibold uppercase {}",
                                status_class
                            )>{status_label}</span>
'''
          if source.count(old) != 1:
              raise SystemExit(f'expected one navigator status render, found {source.count(old)}')
          path.write_text(source.replace(old, new, 1))
          PY
          cargo fmt -p rustok-pages-admin
      - name: Capture Pages admin diagnostics
        shell: bash
        run: |
          set +e
          cargo check -p rustok-pages-admin --lib > /tmp/pages-check.log 2>&1
          check_status=$?
          if [ "$check_status" -eq 0 ]; then
            cargo clippy -p rustok-pages-admin --lib -- -D warnings > /tmp/pages-clippy.log 2>&1
            clippy_status=$?
          else
            clippy_status=99
            echo "clippy skipped because cargo check failed" > /tmp/pages-clippy.log
          fi
          mkdir -p .agent
          {
            echo "check_status=$check_status"
            echo "clippy_status=$clippy_status"
            echo
            echo "=== cargo check tail ==="
            tail -n 240 /tmp/pages-check.log
            echo
            echo "=== cargo clippy tail ==="
            tail -n 240 /tmp/pages-clippy.log
          } > .agent/pages-check-report.txt
          exit 0
      - name: Commit diagnostics and fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-pages/admin .agent/pages-check-report.txt
          git commit -m "fix(pages): make builder workspace compile"
          git push origin HEAD:agent/pages-current-only
