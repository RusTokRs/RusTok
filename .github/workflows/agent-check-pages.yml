name: Agent Check Pages

on:
  push:
    branches:
      - agent/pages-current-only

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: never

jobs:
  check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-current-only
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - name: Apply safe workspace cleanup
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/rustok-pages/admin/src/composition.rs')
          source = path.read_text()
          needle = '    let page_id = page.id.clone();\n    let title = page\n'
          if needle in source:
              if source.count(needle) != 1:
                  raise SystemExit(f'expected at most one PageWorkspace binding, found {source.count(needle)}')
              path.write_text(source.replace(needle, '    let title = page\n', 1))
          PY
          cargo fmt -p rustok-pages-admin
      - name: Capture Pages admin diagnostics
        shell: bash
        run: |
          set +e
          cargo check -p rustok-pages-admin --lib > /tmp/pages-check.log 2>&1
          check_status=$?
          if [ "$check_status" -eq 0 ]; then
            cargo clippy -p rustok-pages-admin --lib -- -D warnings > /tmp/pages-clippy.log 2>&1
            clippy_status=$?
          else
            clippy_status=99
            echo "clippy skipped because cargo check failed" > /tmp/pages-clippy.log
          fi
          mkdir -p .agent
          {
            echo "check_status=$check_status"
            echo "clippy_status=$clippy_status"
            echo
            echo "=== cargo check tail ==="
            tail -n 240 /tmp/pages-check.log
            echo
            echo "=== cargo clippy tail ==="
            tail -n 240 /tmp/pages-clippy.log
          } > .agent/pages-check-report.txt
          exit 0
      - name: Commit diagnostics and safe fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-pages/admin .agent/pages-check-report.txt
          git commit -m "test(pages): capture builder workspace diagnostics"
          git push origin HEAD:agent/pages-current-only
