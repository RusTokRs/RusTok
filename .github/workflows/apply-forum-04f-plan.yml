name: Apply FORUM-04F plan synchronization

on:
  push:
    branches:
      - agent/forum-04f-category-subtree-lifecycle

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forum-04f-category-subtree-lifecycle
          fetch-depth: 1
      - name: Synchronize canonical plan and fixture wording
        run: |
          python - <<'PY'
          from pathlib import Path

          plan_path = Path("crates/rustok-forum/docs/implementation-plan.md")
          plan = plan_path.read_text()
          plan = plan.replace(
              "| `FORUM-04` | `in_progress` | FORUM-04A adds the bounded tree read; FORUM-04B/C add atomic placement and write guards; FORUM-04D routes admin placement through owner commands; FORUM-04E adds tenant-scoped topic policy. Subtree archive/restore and interactive drag-and-drop remain. |",
              "| `FORUM-04` | `in_progress` | FORUM-04A-E deliver bounded hierarchy, atomic placement, write guards, admin transport and topic policy; FORUM-04F adds atomic subtree archive/restore. Interactive drag-and-drop remains. |",
          )
          plan = plan.replace(
              "### Remaining scope\n\n- make archive/restore behavior explicit for subtrees;\n- wire interactive admin drag-and-drop UI to the existing owner-command\n  transport facade, never direct row writes.\n",
              "### Delivered in `FORUM-04F`\n\n- `CategoryService::archive_subtree` and `restore_subtree` serialize lifecycle changes with the tenant category-tree lock;\n- compatibility-default lifecycle rows preserve existing categories as active without backfill;\n- archive writes descendants before ancestors and restore removes ancestor lifecycle rows before descendants;\n- REST, GraphQL, OpenAPI and the canonical tree expose subtree lifecycle state and owner commands;\n- PostgreSQL and SQLite reject active children beneath archived parents, partial restore and new topic placement in archived categories;\n- existing topics are preserved and shared PostgreSQL/SQLite scenarios cover archive, restore, tenant isolation and direct-write guards.\n\n### Remaining scope\n\n- wire interactive admin drag-and-drop UI to the existing owner-command\n  transport facade, never direct row writes.\n",
          )
          plan = plan.replace(
              "cargo test -p rustok-forum --test category_policy_postgres -- --nocapture --test-threads=1\n",
              "cargo test -p rustok-forum --test category_policy_postgres -- --nocapture --test-threads=1\ncargo test -p rustok-forum --test category_lifecycle_sqlite -- --nocapture\ncargo test -p rustok-forum --test category_lifecycle_postgres -- --nocapture --test-threads=1\n",
          )
          plan_path.write_text(plan)

          test_path = Path("crates/rustok-forum/tests/support/category_lifecycle.rs")
          test = test_path.read_text().replace(
              'assert_error_contains(direct_parent_archive.map(|_| ()), "lifecycle")?;',
              'assert_error_contains(direct_parent_archive.map(|_| ()), "forum category")?;',
          )
          test_path.write_text(test)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/rustok-forum/docs/implementation-plan.md crates/rustok-forum/tests/support/category_lifecycle.rs
          if ! git diff --cached --quiet; then
            git commit -m "docs(forum): synchronize FORUM-04F plan"
            git push origin HEAD:agent/forum-04f-category-subtree-lifecycle
          fi
