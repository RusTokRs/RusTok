name: SEO bulk terminal reindex preservation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: seo-bulk-terminal-reindex-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-and-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/seo-bulk-terminal-transaction-v4
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Preserve and verify bulk terminal reindex behavior
        id: apply
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            python3 .github/seo_bulk_terminal_reindex_patch.py

            rustfmt --edition 2024 \
              crates/rustok-seo/src/services/bulk.rs \
              crates/rustok-seo/src/services/events.rs
            rustfmt --edition 2024 --check \
              crates/rustok-seo/src/services/bulk.rs \
              crates/rustok-seo/src/services/events.rs
            cargo fmt -p rustok-seo -- --check
            cargo check -p rustok-seo
            cargo test -p rustok-seo --no-run
            cargo test -p rustok-seo --test bulk_terminal_transaction
            cargo test -p rustok-seo --lib services::bulk::tests::
            cargo test -p rustok-seo --lib services::events::tests::seo_bulk_

            rm -f .github/workflows/seo-bulk-terminal-reindex-bootstrap.yml
            git add -A
            python3 .github/seo_bulk_terminal_reindex_patch.py --guard
            rm -f .github/seo_bulk_terminal_reindex_patch.py
            git add -A
            git diff --cached --check
            git config user.name "RusTok Automation"
            git config user.email "actions@users.noreply.github.com"
            git commit -m "fix(seo): preserve bulk terminal reindex dispatch"
            git push origin HEAD:fix/seo-bulk-terminal-transaction-v4
          ) >seo-bulk-terminal-reindex.log 2>&1
          status=$?
          cat seo-bulk-terminal-reindex.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bulk terminal reindex log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: seo-bulk-terminal-reindex-log
          path: seo-bulk-terminal-reindex.log
          retention-days: 1

      - name: Fail when reindex verification failed
        if: steps.apply.outputs.status != '0'
        run: exit 1
