name: One-off Final Rust Inline Style Migration

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply-final-migration:
    if: >-
      github.event.issue.title == '[automation] finalize Rust inline style migration' &&
      (github.event_name == 'issues' || github.event.comment.body == '/run-final-inline-style-migration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebase on current main
        run: git pull --rebase origin main

      - name: Apply exact source and gate migration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact match, found {count}: {old!r}")
              file.write_text(source.replace(old, new, 1))

          modules = "apps/admin/src/features/modules/components/modules_list.rs"
          replace_once(
              modules,
              '                                let progress_width = format!("width: {}%;", build.progress);',
              '                                let progress_value = build.progress.clamp(0, 100);',
          )
          replace_once(
              modules,
              '{format!("{}%", build.progress)}',
              '{format!("{}%", progress_value)}',
          )
          replace_once(
              modules,
              '<div class="h-2 overflow-hidden rounded-full bg-primary/15"><div class="h-full rounded-full bg-primary transition-all" style=progress_width></div></div>',
              '<progress class="h-2 w-full overflow-hidden rounded-full accent-primary" max="100" value=progress_value></progress>',
          )

          register_path = Path("docs/security/csp-inline-style-attribute-exceptions.json")
          register = json.loads(register_path.read_text())
          expected_paths = {
              "apps/admin/src/features/modules/components/modules_list.rs",
              "crates/rustok-forum/admin/src/ui/leptos.rs",
          }
          actual_paths = {entry.get("path") for entry in register.get("exceptions", [])}
          if actual_paths != expected_paths:
              raise SystemExit(
                  f"inline-style register paths changed: expected {sorted(expected_paths)}, found {sorted(actual_paths)}"
              )
          register["exceptions"] = []
          register_path.write_text(json.dumps(register, indent=2) + "\n")

          verifier = "scripts/verify/verify-csp-inline-style-exceptions.mjs"
          replace_once(verifier, "const maxRegisteredSites = 2;", "const maxRegisteredSites = 0;")
          replace_once(verifier, "const maxRegisteredFiles = 2;", "const maxRegisteredFiles = 0;")
          replace_once(
              verifier,
              """if (entries.length === 0) {
            failures.push(`${registerPath}: exceptions must contain at least one reviewed entry`);
          }""",
              """if (!Array.isArray(register.exceptions)) {
            failures.push(`${registerPath}: exceptions must be an array`);
          }""",
          )
          replace_once(
              verifier,
              '  "css_hex_accent_class",',
              '  "css_hex_accent_class",\n  "css_background_accent_class",',
          )
          replace_once(
              verifier,
              '  \'xmlns="http://www.w3.org/1999/xhtml"\',\n',
              "",
          )

          migration_contract = """requireMarkers("crates/rustok-forum/admin/src/ui/leptos.rs", [
            "css_background_accent_class(vm.accent_style.as_str())",
            "absolute inset-y-0 left-0 w-1.5",
          ]);
          forbidMarkers("crates/rustok-forum/admin/src/ui/leptos.rs", [
            "style=vm.accent_style",
          ]);
          requireMarkers("apps/admin/src/features/modules/components/modules_list.rs", [
            "let progress_value = build.progress.clamp(0, 100)",
            "<progress",
            "max=\"100\"",
            "value=progress_value",
          ]);
          forbidMarkers("apps/admin/src/features/modules/components/modules_list.rs", [
            "progress_width",
            "style=progress_width",
          ]);

          """
          replace_once(
              verifier,
              "for (const [file, required] of [\n",
              migration_contract + "for (const [file, required] of [\n",
          )

          workflow = Path(".github/workflows/one-off-final-rust-inline-style.yml")
          if not workflow.exists():
              raise SystemExit("one-off workflow file is missing")
          workflow.unlink()
          PY

      - name: Verify exact patch shape
        run: |
          git diff --check
          test -n "$(git status --short)"
          test ! -e .github/workflows/one-off-final-rust-inline-style.yml

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: remove final Rust inline style attribute"
          git push origin HEAD:main

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Exact source migration committed; the one-off workflow removed itself."
