name: Field definition cache hardening

on:
  push:
    branches: [main]
    paths:
      - "apps/server/src/services/field_definition_cache.rs"
      - "apps/server/tests/field_definition_cache_runtime_guard.rs"
      - ".github/workflows/field-definition-cache-hardening.yml"
  pull_request:
    paths:
      - "apps/server/src/services/field_definition_cache.rs"
      - "apps/server/tests/field_definition_cache_runtime_guard.rs"
      - ".github/workflows/field-definition-cache-hardening.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: field-definition-cache-hardening-${{ github.ref }}
  cancel-in-progress: true

jobs:
  field-definition-cache:
    name: Field definition cache contract
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: field-definition-cache-hardening
      - name: Format
        run: cargo fmt --all --check
      - name: Compile server
        run: cargo check -p rustok-server --lib
      - name: Field definition cache tests
        run: |
          cargo test -p rustok-server field_definition_cache --lib
          cargo test -p rustok-server --test field_definition_cache_runtime_guard
      - name: Clippy
        run: cargo clippy -p rustok-server --lib -- -D warnings
