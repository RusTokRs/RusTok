name: CSP Contract Probe

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  probe:
    name: CSP reporting contract probe
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - name: Run CSP verifier and capture output
        id: verifier
        shell: bash
        run: |
          set +e
          node scripts/verify/verify-csp-reporting-contract.mjs > csp-contract-output.txt 2>&1
          exit_code=$?
          set -e
          cat csp-contract-output.txt
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
      - name: Upload CSP verifier output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: csp-contract-output-${{ github.run_id }}
          path: csp-contract-output.txt
          if-no-files-found: error
          retention-days: 1
      - name: Enforce CSP verifier result
        if: steps.verifier.outputs.exit_code != '0'
        run: exit 1
