name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - "scripts/temporary/apply_pages_current_only_baseline.py"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: write

jobs:
  publish-current-only-pages-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-current-only-baseline-v2
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-baseline-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply and verify current-only Pages baseline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/temporary/apply_pages_current_only_baseline.py
          cargo fmt -p rustok-pages
          cargo test -p rustok-pages --lib
          cargo clippy -p rustok-pages --lib --tests --no-deps -- -D warnings
          node scripts/verify/verify-pages-current-only.mjs
      - name: Remove technical files and publish product commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/fly-page-builder.yml > .github/workflows/fly-page-builder.yml
          rm scripts/temporary/apply_pages_current_only_baseline.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/fly-page-builder.yml \
            scripts/temporary/apply_pages_current_only_baseline.py \
            crates/rustok-pages/src/seo_targets.rs \
            crates/rustok-pages/src/services/page/helpers.rs \
            crates/rustok-pages/src/services/page/lifecycle.rs \
            crates/rustok-pages/src/services/page/read.rs \
            crates/rustok-pages/src/services/page/reviewed_publish.rs \
            crates/rustok-pages/src/services/page_builder_artifact.rs
          git commit -m "fix(pages): restore current-only baseline"
          git push origin HEAD:agent/pages-current-only-baseline-v2
