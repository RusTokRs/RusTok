name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - "scripts/temporary/remove_unused_pages_binding.py"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: read

jobs:
  diagnose-current-only-pages-clippy-no-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-clippy-fix
      - name: Run Pages-only Clippy and capture log
        shell: bash
        run: |
          set +e
          python scripts/temporary/remove_unused_pages_binding.py
          cargo fmt -p rustok-pages
          cargo test -p rustok-pages --lib --tests --no-run 2>&1 | tee /tmp/pages-current-only-compile.log
          test_status=${PIPESTATUS[0]}
          cargo clippy -p rustok-pages --lib --tests --no-deps -- -D warnings 2>&1 | tee /tmp/pages-current-only-clippy-no-deps.log
          clippy_status=${PIPESTATUS[0]}
          printf '%s\n' "$test_status" > /tmp/pages-current-only-compile.status
          printf '%s\n' "$clippy_status" > /tmp/pages-current-only-clippy-no-deps.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pages-current-only-clippy-no-deps
          path: |
            /tmp/pages-current-only-compile.log
            /tmp/pages-current-only-compile.status
            /tmp/pages-current-only-clippy-no-deps.log
            /tmp/pages-current-only-clippy-no-deps.status
          if-no-files-found: error
