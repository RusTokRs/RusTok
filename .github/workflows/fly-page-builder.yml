name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - "scripts/temporary/remove_unused_pages_binding.py"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: write

jobs:
  publish-current-only-pages-clippy-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-clippy-fix
      - name: Apply and verify current-only Pages clippy fix
        run: |
          python scripts/temporary/remove_unused_pages_binding.py
          cargo fmt -p rustok-pages
          cargo clippy -p rustok-pages --lib --tests -- -D warnings
      - name: Remove diagnostic files and publish product commit
        shell: bash
        run: |
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/fly-page-builder.yml > .github/workflows/fly-page-builder.yml
          rm scripts/temporary/remove_unused_pages_binding.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/fly-page-builder.yml \
            crates/rustok-pages/src/services/page_builder_artifact.rs \
            scripts/temporary/remove_unused_pages_binding.py
          git commit -m "fix(pages): remove unused artifact binding helper"
          git push origin HEAD:${{ github.head_ref }}
