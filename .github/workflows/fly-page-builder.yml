name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: read

jobs:
  diagnose-active-menu-binding-v3-port:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-active-menu-binding-v3
          fetch-depth: 0
      - name: Capture scoped three-way port diagnostics
        shell: bash
        run: |
          set +e
          git fetch origin main agent/pages-active-menu-binding-v2
          source_branch=origin/agent/pages-active-menu-binding-v2
          source_base=$(git merge-base origin/main "$source_branch")
          printf '%s\n' "$source_base" > /tmp/active-menu-source-base.txt
          git diff --binary "$source_base" "$source_branch" -- \
            crates/rustok-pages/src/dto/menu.rs \
            crates/rustok-pages/src/dto/mod.rs \
            crates/rustok-pages/src/entities/menu_binding.rs \
            crates/rustok-pages/src/entities/mod.rs \
            crates/rustok-pages/src/lib.rs \
            crates/rustok-pages/src/migrations/m20260721_000008_create_active_menu_bindings.rs \
            crates/rustok-pages/src/migrations/mod.rs \
            crates/rustok-pages/src/services/menu_binding.rs \
            crates/rustok-pages/src/services/mod.rs \
            crates/rustok-pages/tests/menu_binding_service.rs \
            crates/rustok-pages/tests/menu_transport_contract.rs \
            > /tmp/active-menu-binding.patch
          git apply --3way /tmp/active-menu-binding.patch > /tmp/active-menu-apply.log 2>&1
          printf '%s\n' "$?" > /tmp/active-menu-apply.status
          git status --short > /tmp/active-menu-status.txt
          git diff --name-only --diff-filter=U > /tmp/active-menu-conflicts.txt
          git diff > /tmp/active-menu-worktree.diff
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: active-menu-binding-v3-port-diagnostics
          path: |
            /tmp/active-menu-source-base.txt
            /tmp/active-menu-binding.patch
            /tmp/active-menu-apply.log
            /tmp/active-menu-apply.status
            /tmp/active-menu-status.txt
            /tmp/active-menu-conflicts.txt
            /tmp/active-menu-worktree.diff
          if-no-files-found: error
