name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - "scripts/temporary/apply_pages_current_only_baseline.py"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: read

jobs:
  diagnose-current-only-pages-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-baseline-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Capture current-only baseline evidence
        shell: bash
        run: |
          set +e
          python scripts/temporary/apply_pages_current_only_baseline.py 2>&1 | tee /tmp/pages-baseline-patch.log
          patch_status=${PIPESTATUS[0]}
          printf '%s\n' "$patch_status" > /tmp/pages-baseline-patch.status

          if [[ "$patch_status" -eq 0 ]]; then
            cargo fmt -p rustok-pages 2>&1 | tee /tmp/pages-baseline-format.log
            format_status=${PIPESTATUS[0]}
            cargo test -p rustok-pages --lib --tests 2>&1 | tee /tmp/pages-baseline-tests.log
            test_status=${PIPESTATUS[0]}
            cargo clippy -p rustok-pages --lib --tests --no-deps -- -D warnings 2>&1 | tee /tmp/pages-baseline-clippy.log
            clippy_status=${PIPESTATUS[0]}
            node scripts/verify/verify-pages-current-only.mjs 2>&1 | tee /tmp/pages-baseline-guard.log
            guard_status=${PIPESTATUS[0]}
            tar -czf /tmp/pages-current-only-baseline-files.tar.gz \
              crates/rustok-pages/src/seo_targets.rs \
              crates/rustok-pages/src/services/page/helpers.rs \
              crates/rustok-pages/src/services/page/lifecycle.rs \
              crates/rustok-pages/src/services/page/read.rs \
              crates/rustok-pages/src/services/page/reviewed_publish.rs \
              crates/rustok-pages/src/services/page_builder_artifact.rs
          else
            format_status=125
            test_status=125
            clippy_status=125
            guard_status=125
            : > /tmp/pages-baseline-format.log
            : > /tmp/pages-baseline-tests.log
            : > /tmp/pages-baseline-clippy.log
            : > /tmp/pages-baseline-guard.log
          fi

          printf '%s\n' "$format_status" > /tmp/pages-baseline-format.status
          printf '%s\n' "$test_status" > /tmp/pages-baseline-tests.status
          printf '%s\n' "$clippy_status" > /tmp/pages-baseline-clippy.status
          printf '%s\n' "$guard_status" > /tmp/pages-baseline-guard.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pages-current-only-baseline-evidence
          path: |
            /tmp/pages-baseline-patch.log
            /tmp/pages-baseline-patch.status
            /tmp/pages-baseline-format.log
            /tmp/pages-baseline-format.status
            /tmp/pages-baseline-tests.log
            /tmp/pages-baseline-tests.status
            /tmp/pages-baseline-clippy.log
            /tmp/pages-baseline-clippy.status
            /tmp/pages-baseline-guard.log
            /tmp/pages-baseline-guard.status
            /tmp/pages-current-only-baseline-files.tar.gz
          if-no-files-found: warn
