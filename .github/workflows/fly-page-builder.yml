name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - "scripts/temporary/remove_unused_pages_binding.py"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: read

jobs:
  diagnose-current-only-pages-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-clippy-fix
      - name: Run current-only Pages Clippy and capture log
        shell: bash
        run: |
          set +e
          python scripts/temporary/remove_unused_pages_binding.py
          cargo fmt -p rustok-pages
          cargo clippy -p rustok-pages --lib --tests -- -D warnings 2>&1 | tee /tmp/pages-current-only-clippy.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" > /tmp/pages-current-only-clippy.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pages-current-only-clippy-diagnostics
          path: |
            /tmp/pages-current-only-clippy.log
            /tmp/pages-current-only-clippy.status
          if-no-files-found: error
