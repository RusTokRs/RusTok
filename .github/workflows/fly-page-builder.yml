name: Fly Page Builder

on:
  push:
    branches: [main]
    paths:
      - "crates/fly/**"
      - "crates/fly-ui/**"
      - "crates/fly-browser/**"
      - "crates/fly-leptos/**"
      - "crates/rustok-page-builder/**"
      - "crates/rustok-page-builder-storefront/**"
      - "crates/rustok-pages/**"
      - "apps/admin/src/main.rs"
      - "apps/admin/src/app/shell.rs"
      - "apps/admin/Cargo.toml"
      - "apps/next-admin/packages/blog/**"
      - "apps/next-admin/src/app/dashboard/blog/**"
      - "scripts/verify/verify-fly-*.mjs"
      - "scripts/verify/verify-pages-current-only.mjs"
      - ".github/workflows/fly-page-builder.yml"
  pull_request:
    paths:
      - "crates/fly/**"
      - "crates/fly-ui/**"
      - "crates/fly-browser/**"
      - "crates/fly-leptos/**"
      - "crates/rustok-page-builder/**"
      - "crates/rustok-page-builder-storefront/**"
      - "crates/rustok-pages/**"
      - "apps/admin/src/main.rs"
      - "apps/admin/src/app/shell.rs"
      - "apps/admin/Cargo.toml"
      - "apps/next-admin/packages/blog/**"
      - "apps/next-admin/src/app/dashboard/blog/**"
      - "scripts/verify/verify-fly-*.mjs"
      - "scripts/verify/verify-pages-current-only.mjs"
      - ".github/workflows/fly-page-builder.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fly-page-builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-current-only-pages-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-compile-fix
      - name: Apply current-only Pages fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          artifact = Path("crates/rustok-pages/src/services/page_builder_artifact.rs")
          text = artifact.read_text()
          old = """use rustok_page_builder::{\n    ComponentRegistryManifest, LandingSectionSnapshot, PageBuilderMaterializedStaticLandingArtifact,\n    PageBuilderPreviewRuntime, PageBuilderStaticLandingMaterializationIdentity, PageHead,\n    StaticLandingArtifact, StaticLandingBuildIdentity, StaticLandingPage,\n    compile_materialized_static_landing,\n};\n"""
          new = """use rustok_page_builder::dto::PageBuilderPreviewRuntime;\nuse rustok_page_builder::{\n    ComponentRegistryManifest, LandingSectionSnapshot, PageBuilderMaterializedStaticLandingArtifact,\n    PageBuilderStaticLandingMaterializationIdentity, PageHead, StaticLandingArtifact,\n    StaticLandingBuildIdentity, StaticLandingPage, compile_materialized_static_landing,\n};\n"""
          assert old in text
          artifact.write_text(text.replace(old, new, 1))

          read = Path("crates/rustok-pages/src/services/page/read.rs")
          text = read.read_text()
          old = "use sea_orm::{ColumnTrait, EntityTrait, PaginatorTrait, QueryFilter, QueryOrder, QuerySelect};"
          new = "use sea_orm::{ColumnTrait, EntityTrait, PaginatorTrait, QueryFilter, QueryOrder};"
          assert old in text
          read.write_text(text.replace(old, new, 1))

          lifecycle = Path("crates/rustok-pages/src/services/page/lifecycle.rs")
          text = lifecycle.read_text()
          old = '''            let digest = Sha256::digest(format!("{}\\0{}", body.format, body.content).as_bytes());\n            (\n                body.locale.clone(),\n                format!("{}:{digest:x}", body.updated_at),\n            )\n'''
          new = '''            let digest = Sha256::digest(format!("{}\\0{}", body.format, body.content).as_bytes());\n            (\n                body.locale.clone(),\n                format!("{}:{}", body.updated_at, encode_digest(&digest)),\n            )\n'''
          assert old in text
          text = text.replace(old, new, 1)
          marker = "\nfn format_body_revisions(revisions: &BodyRevisionSnapshot) -> String {"
          helper = '''\nfn encode_digest(digest: &[u8]) -> String {\n    use std::fmt::Write as _;\n\n    let mut encoded = String::with_capacity(digest.len() * 2);\n    for byte in digest {\n        write!(&mut encoded, "{byte:02x}").expect("writing to a String cannot fail");\n    }\n    encoded\n}\n'''
          assert marker in text
          lifecycle.write_text(text.replace(marker, helper + marker, 1))

          seo = Path("crates/rustok-pages/src/seo_targets.rs")
          text = seo.read_text()
          old_import = '''use crate::{\n    BlockPayload, ListPagesFilter, PageListItem, PageResponse, PageService, PageTranslationResponse,\n};'''
          new_import = '''use crate::{\n    ListPagesFilter, PageListItem, PageResponse, PageService, PageTranslationResponse,\n};'''
          assert old_import in text
          text = text.replace(old_import, new_import, 1)
          start = text.index("fn page_primary_image_descriptor(")
          end_marker = "\n    None\n}\n"
          end = text.index(end_marker, start) + len(end_marker)
          replacement = r'''fn page_primary_image_descriptor(
              page: &PageResponse,
              fallback_alt: &str,
          ) -> Option<SeoTargetImageRecord> {
              let fallback_alt = normalize_image_text(Some(fallback_alt.to_string()));
              let document = page.body.as_ref()?.content_json.as_ref()?;
              find_image_descriptor(document, fallback_alt.as_deref())
          }

          fn find_image_descriptor(
              value: &serde_json::Value,
              fallback_alt: Option<&str>,
          ) -> Option<SeoTargetImageRecord> {
              match value {
                  serde_json::Value::Array(items) => items
                      .iter()
                      .find_map(|item| find_image_descriptor(item, fallback_alt)),
                  serde_json::Value::Object(object) => {
                      let local_alt = ["alt", "caption", "title"]
                          .iter()
                          .find_map(|key| object.get(*key).and_then(serde_json::Value::as_str))
                          .and_then(|text| normalize_image_text(Some(text.to_string())))
                          .or_else(|| fallback_alt.map(str::to_string));
                      let image_component = object
                          .get("type")
                          .and_then(serde_json::Value::as_str)
                          .is_some_and(|kind| matches!(kind, "image" | "hero" | "gallery"))
                          || object
                              .get("tagName")
                              .and_then(serde_json::Value::as_str)
                              .is_some_and(|tag| tag.eq_ignore_ascii_case("img"));
                      let explicit_keys = [
                          "background_image_url",
                          "backgroundImage",
                          "background-image",
                          "image_url",
                          "imageUrl",
                      ];
                      let image_url = explicit_keys
                          .iter()
                          .find_map(|key| object.get(*key).and_then(serde_json::Value::as_str))
                          .or_else(|| {
                              image_component
                                  .then(|| object.get("src").and_then(serde_json::Value::as_str))
                                  .flatten()
                          })
                          .map(str::trim)
                          .filter(|url| !url.is_empty());
                      if let Some(url) = image_url {
                          if let Some(record) = SeoTargetImageRecord::from_parts(
                              url.to_string(),
                              local_alt,
                              None,
                              None,
                              None,
                          ) {
                              return Some(record);
                          }
                      }
                      object
                          .values()
                          .find_map(|item| find_image_descriptor(item, fallback_alt))
                  }
                  _ => None,
              }
          }
'''
          seo.write_text(text[:start] + replacement + text[end:])
          PY
      - name: Format and compile Pages
        shell: bash
        run: |
          set +e
          cargo fmt -p rustok-pages
          cargo test -p rustok-pages --lib --tests --no-run 2>&1 | tee /tmp/pages-current-only-compile.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" > /tmp/pages-current-only-compile.status
          tar -czf /tmp/pages-current-only-compile-fix.tar.gz \
            crates/rustok-pages/src/services/page_builder_artifact.rs \
            crates/rustok-pages/src/services/page/lifecycle.rs \
            crates/rustok-pages/src/services/page/read.rs \
            crates/rustok-pages/src/seo_targets.rs
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pages-current-only-compile-fix
          path: |
            /tmp/pages-current-only-compile-fix.tar.gz
            /tmp/pages-current-only-compile.log
            /tmp/pages-current-only-compile.status
          if-no-files-found: error

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fly-page-builder
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check focused formatting
        run: >-
          cargo fmt
          -p fly
          -p fly-browser
          -p rustok-page-builder-admin
          -p rustok-pages
          -p rustok-pages-admin
          -p rustok-pages-storefront
          -p rustok-admin
          -- --check

      - name: Run Fly unit tests
        run: cargo test -p fly --lib

      - name: Run Fly browser contract tests
        run: cargo test -p fly-browser --lib

      - name: Run Page Builder admin unit tests
        run: cargo test -p rustok-page-builder-admin --lib

      - name: Run Pages domain unit tests
        run: cargo test -p rustok-pages --lib

      - name: Run Pages integration unit tests
        run: cargo test -p rustok-pages-admin --lib

      - name: Check Pages storefront
        run: cargo check -p rustok-pages-storefront --lib

      - name: Check Page Builder storefront
        run: cargo check -p rustok-page-builder-storefront --lib

      - name: Check admin SSR Page Builder endpoint
        run: cargo check -p rustok-admin --bin rustok-admin --no-default-features --features ssr

      - name: Lint Fly
        run: cargo clippy -p fly --lib -- -D warnings

      - name: Lint Fly browser and Page Builder integrations
        run: >-
          cargo clippy
          -p fly-browser
          -p rustok-page-builder-admin
          -p rustok-pages
          -p rustok-pages-admin
          -p rustok-pages-storefront
          --lib -- -D warnings

      - name: Verify current-only Pages runtime
        run: node scripts/verify/verify-pages-current-only.mjs

      - name: Verify SSR-first architecture
        run: node scripts/verify/verify-fly-ssr-first.mjs

      - name: Verify Fly contribution access
        run: node scripts/verify/verify-fly-ui-contributions.mjs

      - name: Verify landing readiness wiring
        run: node scripts/verify/verify-fly-landing-readiness.mjs

      - name: Verify internal links end to end
        run: node scripts/verify/verify-fly-internal-links.mjs

      - name: Verify actions forms and fields end to end
        run: node scripts/verify/verify-fly-actions-forms.mjs

      - name: Verify SSR assets end to end
        run: node scripts/verify/verify-fly-ssr-assets.mjs

      - name: Verify editor capability policy
        run: node scripts/verify/verify-fly-ui-capability-policy.mjs

      - name: Verify capability denial response
        run: node scripts/verify/verify-fly-capability-denial-response.mjs
