name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - "scripts/temporary/prepare_pages_current_only_fix.py"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: write

jobs:
  publish-current-only-pages-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-current-only-compile-fix
      - name: Apply and verify current-only Pages fixes
        run: |
          python scripts/temporary/prepare_pages_current_only_fix.py
          cargo fmt -p rustok-pages
          cargo test -p rustok-pages --lib --tests --no-run
      - name: Remove diagnostic files and publish product commit
        shell: bash
        run: |
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/fly-page-builder.yml > .github/workflows/fly-page-builder.yml
          git show FETCH_HEAD:crates/rustok-pages/src/dto/mod.rs > crates/rustok-pages/src/dto/mod.rs
          rm scripts/temporary/prepare_pages_current_only_fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/fly-page-builder.yml \
            crates/rustok-pages/src/dto/mod.rs \
            crates/rustok-pages/src/services/page_builder_artifact.rs \
            crates/rustok-pages/src/services/page/lifecycle.rs \
            crates/rustok-pages/src/services/page/read.rs \
            crates/rustok-pages/src/seo_targets.rs \
            scripts/temporary/prepare_pages_current_only_fix.py
          git commit -m "fix(pages): restore current-only compilation"
          git push origin HEAD:${{ github.head_ref }}
