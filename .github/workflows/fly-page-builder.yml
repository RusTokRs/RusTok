name: Fly Page Builder

on:
  push:
    branches: [main]
    paths:
      - "crates/fly/**"
      - "crates/fly-ui/**"
      - "crates/fly-browser/**"
      - "crates/fly-leptos/**"
      - "crates/rustok-page-builder/**"
      - "crates/rustok-page-builder-storefront/**"
      - "crates/rustok-pages/**"
      - "apps/admin/src/main.rs"
      - "apps/admin/src/app/shell.rs"
      - "apps/admin/Cargo.toml"
      - "scripts/verify/verify-fly-*.mjs"
      - ".github/workflows/fly-page-builder.yml"
  pull_request:
    paths:
      - "crates/fly/**"
      - "crates/fly-ui/**"
      - "crates/fly-browser/**"
      - "crates/fly-leptos/**"
      - "crates/rustok-page-builder/**"
      - "crates/rustok-page-builder-storefront/**"
      - "crates/rustok-pages/**"
      - "apps/admin/src/main.rs"
      - "apps/admin/src/app/shell.rs"
      - "apps/admin/Cargo.toml"
      - "scripts/verify/verify-fly-*.mjs"
      - ".github/workflows/fly-page-builder.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fly-page-builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup-page-blocks:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/pages-remove-blocks' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-remove-blocks
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt
      - name: Remove PageService block lifecycle
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return source.replace(old, new, 1)

          path = Path('crates/rustok-pages/src/services/page.rs')
          source = path.read_text()
          source = replace_once(
              source,
              '''use crate::services::{
    BlockService, PageBuilderArtifactService, PageBuilderScenarioBaselineService,
};
''',
              '''use crate::services::{PageBuilderArtifactService, PageBuilderScenarioBaselineService};
''',
              'service imports',
          )
          source = replace_once(
              source,
              '''struct PageResponseParts {
    channel_slugs: Vec<String>,
    blocks: Vec<BlockResponse>,
    locale: String,
    fallback_locale: Option<String>,
}

pub struct PageService {
    db: DatabaseConnection,
    event_bus: TransactionalEventBus,
    blocks: BlockService,
}
''',
              '''struct PageResponseParts {
    channel_slugs: Vec<String>,
    locale: String,
    fallback_locale: Option<String>,
}

pub struct PageService {
    db: DatabaseConnection,
    event_bus: TransactionalEventBus,
}
''',
              'service state',
          )
          source = replace_once(
              source,
              '''    pub fn new(db: DatabaseConnection, event_bus: TransactionalEventBus) -> Self {
        Self {
            db: db.clone(),
            event_bus: event_bus.clone(),
            blocks: BlockService::new(db, event_bus),
        }
    }
''',
              '''    pub fn new(db: DatabaseConnection, event_bus: TransactionalEventBus) -> Self {
        Self { db, event_bus }
    }
''',
              'constructor',
          )
          source = replace_once(
              source,
              '''        if let Some(blocks) = input.blocks {
            for block in blocks {
                BlockService::create_in_tx(&txn, tenant_id, security.clone(), page_id, block)
                    .await?;
            }
        }

''',
              '',
              'create blocks',
          )
          source = replace_once(
              source,
              '''        let blocks = self
            .blocks
            .list_for_page(tenant_id, security, page_id)
            .await?;
        self.build_page_response(
            page,
            translations,
            bodies,
            PageResponseParts {
                channel_slugs,
                blocks,
                locale: locale.clone(),
                fallback_locale,
            },
        )
''',
              '''        self.build_page_response(
            page,
            translations,
            bodies,
            PageResponseParts {
                channel_slugs,
                locale: locale.clone(),
                fallback_locale,
            },
        )
''',
              'get blocks',
          )
          source = replace_once(
              source,
              '''        let blocks = self
            .blocks
            .list_for_page(tenant_id, security, page.id)
            .await?;
        self.build_page_response(
            page,
            translations,
            bodies,
            PageResponseParts {
                channel_slugs,
                blocks,
                locale: requested_locale,
                fallback_locale: normalized_fallback_locale,
            },
        )
''',
              '''        self.build_page_response(
            page,
            translations,
            bodies,
            PageResponseParts {
                channel_slugs,
                locale: requested_locale,
                fallback_locale: normalized_fallback_locale,
            },
        )
''',
              'slug blocks',
          )
          source = replace_once(
              source,
              '''        BlockService::delete_all_for_page_in_tx(&txn, tenant_id, page_id).await?;
''',
              '',
              'delete blocks',
          )
          source = replace_once(
              source,
              '''            channel_slugs: parts.channel_slugs,
            blocks: parts.blocks,
            metadata: page.metadata,
''',
              '''            channel_slugs: parts.channel_slugs,
            metadata: page.metadata,
''',
              'response blocks',
          )
          path.write_text(source)

          ui_path = Path('crates/rustok-pages/storefront/src/ui/leptos.rs')
          ui = ui_path.read_text()
          ui = replace_once(
              ui,
              'No page body or legacy blocks yet.',
              'No published page body is available yet.',
              'storefront empty state',
          )
          ui_path.write_text(ui)
          PY
          cargo fmt -p rustok-pages -p rustok-pages-storefront
      - name: Commit runtime cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-pages crates/rustok-pages/storefront
          git commit -m "refactor(pages): remove block lifecycle from runtime"
          git push origin HEAD:agent/pages-remove-blocks

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fly-page-builder
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check focused formatting
        run: >-
          cargo fmt
          -p fly
          -p fly-browser
          -p rustok-page-builder-admin
          -p rustok-pages-admin
          -p rustok-admin
          -- --check

      - name: Run Fly unit tests
        run: cargo test -p fly --lib

      - name: Run Fly browser contract tests
        run: cargo test -p fly-browser --lib

      - name: Run Page Builder admin unit tests
        run: cargo test -p rustok-page-builder-admin --lib

      - name: Run Pages integration unit tests
        run: cargo test -p rustok-pages-admin --lib

      - name: Check Page Builder storefront
        run: cargo check -p rustok-page-builder-storefront --lib

      - name: Check admin SSR Page Builder endpoint
        run: cargo check -p rustok-admin --bin rustok-admin --no-default-features --features ssr

      - name: Lint Fly
        run: cargo clippy -p fly --lib -- -D warnings

      - name: Lint Fly browser and Page Builder integrations
        run: >-
          cargo clippy
          -p fly-browser
          -p rustok-page-builder-admin
          -p rustok-pages-admin
          --lib -- -D warnings

      - name: Verify SSR-first architecture
        run: node scripts/verify/verify-fly-ssr-first.mjs

      - name: Verify Fly contribution access
        run: node scripts/verify/verify-fly-ui-contributions.mjs

      - name: Verify landing readiness wiring
        run: node scripts/verify/verify-fly-landing-readiness.mjs

      - name: Verify internal links end to end
        run: node scripts/verify/verify-fly-internal-links.mjs

      - name: Verify actions forms and fields end to end
        run: node scripts/verify/verify-fly-actions-forms.mjs

      - name: Verify SSR assets end to end
        run: node scripts/verify/verify-fly-ssr-assets.mjs

      - name: Verify editor capability policy
        run: node scripts/verify/verify-fly-ui-capability-policy.mjs

      - name: Verify capability denial response
        run: node scripts/verify/verify-fly-capability-denial-response.mjs
