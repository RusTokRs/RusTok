name: Fly Page Builder

on:
  pull_request:
    paths:
      - "crates/rustok-pages/**"
      - ".github/workflows/fly-page-builder.yml"

permissions:
  contents: read

jobs:
  diagnose-active-menu-binding-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pages-active-menu-binding-v3
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-active-menu-binding-v3
      - name: Port active-menu product diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main agent/pages-active-menu-binding-v2
          source_branch=origin/agent/pages-active-menu-binding-v2
          source_base=$(git merge-base origin/main "$source_branch")
          git diff --binary "$source_base" "$source_branch" -- \
            crates/rustok-pages/src/dto/menu.rs \
            crates/rustok-pages/src/dto/mod.rs \
            crates/rustok-pages/src/entities/menu_binding.rs \
            crates/rustok-pages/src/entities/mod.rs \
            crates/rustok-pages/src/lib.rs \
            crates/rustok-pages/src/migrations/m20260721_000008_create_active_menu_bindings.rs \
            crates/rustok-pages/src/migrations/mod.rs \
            crates/rustok-pages/src/services/menu_binding.rs \
            crates/rustok-pages/src/services/mod.rs \
            crates/rustok-pages/tests/menu_binding_service.rs \
            crates/rustok-pages/tests/menu_transport_contract.rs \
            > /tmp/active-menu-binding.patch
          test -s /tmp/active-menu-binding.patch
          set +e
          git apply --3way /tmp/active-menu-binding.patch
          apply_status=$?
          set -e
          if [[ "$apply_status" -ne 0 ]]; then
            conflicts=$(git diff --name-only --diff-filter=U)
            test "$conflicts" = "crates/rustok-pages/src/lib.rs"
            git checkout --ours crates/rustok-pages/src/lib.rs
            python - <<'PY'
          from pathlib import Path

          path = Path("crates/rustok-pages/src/lib.rs")
          text = path.read_text()
          old_entities = "    Menu, Page, PageBuilderScenarioBaseline, PagePublishOperation,\n"
          new_entities = "    Menu, MenuBinding, Page, PageBuilderScenarioBaseline, PagePublishOperation,\n"
          if text.count(old_entities) != 1:
              raise SystemExit("expected one current entity export line")
          text = text.replace(old_entities, new_entities, 1)
          old_services = "    MenuService, PageBuilderArtifactService, PageBuilderScenarioBaselineService, PageService,\n"
          new_services = "    MenuBindingService, MenuService, PageBuilderArtifactService,\n    PageBuilderScenarioBaselineService, PageService,\n"
          if text.count(old_services) != 1:
              raise SystemExit("expected one current service export line")
          path.write_text(text.replace(old_services, new_services, 1))
          PY
            git add crates/rustok-pages/src/lib.rs
          fi
          test -z "$(git diff --name-only --diff-filter=U)"

          python - <<'PY'
          from pathlib import Path

          path = Path("crates/rustok-pages/tests/menu_binding_service.rs")
          text = path.read_text()
          channel_end = '''    .await
              .expect("channel table should exist for active menu bindings");
          '''
          replacement = channel_end + '''    create_current_menu_schema(&db).await;
          '''
          if text.count(channel_end) != 1:
              raise SystemExit("expected one channel schema marker")
          text = text.replace(channel_end, replacement, 1)

          old_migrations = '''    let manager = SchemaManager::new(&db);
              for migration in PagesModule.migrations() {
                  migration
                      .up(&manager)
                      .await
                      .expect("pages migration should apply");
              }
          '''
          new_migrations = '''    let manager = SchemaManager::new(&db);
              let active_menu_migration = PagesModule
                  .migrations()
                  .pop()
                  .expect("active menu binding migration should be registered last");
              active_menu_migration
                  .up(&manager)
                  .await
                  .expect("active menu binding migration should apply");
          '''
          if text.count(old_migrations) != 1:
              raise SystemExit("expected one full migration loop")
          text = text.replace(old_migrations, new_migrations, 1)

          marker = '''async fn seed_tenant(db: &DatabaseConnection, tenant_id: Uuid, slug: &str) {
          '''
          helper = r'''async fn create_current_menu_schema(db: &DatabaseConnection) {
              for statement in [
                  r#"
                  CREATE TABLE menus (
                      id TEXT PRIMARY KEY NOT NULL,
                      tenant_id TEXT NOT NULL,
                      location TEXT NOT NULL,
                      created_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      updated_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      UNIQUE (tenant_id, id)
                  )
                  "#,
                  r#"
                  CREATE TABLE menu_translations (
                      id TEXT PRIMARY KEY NOT NULL,
                      tenant_id TEXT NOT NULL,
                      menu_id TEXT NOT NULL,
                      locale TEXT NOT NULL,
                      name TEXT NOT NULL,
                      UNIQUE (tenant_id, menu_id, locale),
                      FOREIGN KEY (tenant_id, menu_id)
                          REFERENCES menus (tenant_id, id)
                          ON UPDATE CASCADE ON DELETE CASCADE
                  )
                  "#,
                  r#"
                  CREATE TABLE menu_items (
                      id TEXT PRIMARY KEY NOT NULL,
                      menu_id TEXT NOT NULL,
                      tenant_id TEXT NOT NULL,
                      parent_item_id TEXT NULL,
                      page_id TEXT NULL,
                      position INTEGER NOT NULL,
                      url TEXT NOT NULL,
                      icon TEXT NULL,
                      created_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      updated_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP,
                      UNIQUE (tenant_id, menu_id, id),
                      FOREIGN KEY (tenant_id, menu_id)
                          REFERENCES menus (tenant_id, id)
                          ON UPDATE CASCADE ON DELETE CASCADE,
                      FOREIGN KEY (tenant_id, menu_id, parent_item_id)
                          REFERENCES menu_items (tenant_id, menu_id, id)
                          ON UPDATE CASCADE ON DELETE CASCADE
                  )
                  "#,
                  r#"
                  CREATE TABLE menu_item_translations (
                      id TEXT PRIMARY KEY NOT NULL,
                      tenant_id TEXT NOT NULL,
                      menu_id TEXT NOT NULL,
                      menu_item_id TEXT NOT NULL,
                      locale TEXT NOT NULL,
                      title TEXT NOT NULL,
                      UNIQUE (tenant_id, menu_id, menu_item_id, locale),
                      FOREIGN KEY (tenant_id, menu_id, menu_item_id)
                          REFERENCES menu_items (tenant_id, menu_id, id)
                          ON UPDATE CASCADE ON DELETE CASCADE,
                      FOREIGN KEY (tenant_id, menu_id, locale)
                          REFERENCES menu_translations (tenant_id, menu_id, locale)
                          ON UPDATE CASCADE ON DELETE CASCADE
                  )
                  "#,
              ] {
                  db.execute(Statement::from_string(db.get_database_backend(), statement))
                      .await
                      .expect("current menu schema statement should apply");
              }
          }

          '''
          if text.count(marker) != 1:
              raise SystemExit("expected seed_tenant marker")
          path.write_text(text.replace(marker, helper + marker, 1))
          PY
      - name: Capture active-menu verification evidence
        shell: bash
        run: |
          set +e
          cargo fmt -p rustok-pages 2>&1 | tee /tmp/active-menu-format.log
          format_status=${PIPESTATUS[0]}
          git add \
            crates/rustok-pages/src/dto/menu.rs \
            crates/rustok-pages/src/dto/mod.rs \
            crates/rustok-pages/src/entities/menu_binding.rs \
            crates/rustok-pages/src/entities/mod.rs \
            crates/rustok-pages/src/lib.rs \
            crates/rustok-pages/src/migrations/m20260721_000008_create_active_menu_bindings.rs \
            crates/rustok-pages/src/migrations/mod.rs \
            crates/rustok-pages/src/services/menu_binding.rs \
            crates/rustok-pages/src/services/mod.rs \
            crates/rustok-pages/tests/menu_binding_service.rs \
            crates/rustok-pages/tests/menu_transport_contract.rs

          cargo test -p rustok-pages --lib 2>&1 | tee /tmp/active-menu-lib.log
          lib_status=${PIPESTATUS[0]}
          cargo test -p rustok-pages --test menu_binding_service 2>&1 | tee /tmp/active-menu-service.log
          service_status=${PIPESTATUS[0]}
          cargo test -p rustok-pages --test menu_transport_contract 2>&1 | tee /tmp/active-menu-guard.log
          guard_status=${PIPESTATUS[0]}
          cargo clippy -p rustok-pages --lib --tests --no-deps -- -D warnings 2>&1 | tee /tmp/active-menu-clippy.log
          clippy_status=${PIPESTATUS[0]}

          actual=/tmp/active-menu-actual-files.txt
          expected=/tmp/active-menu-expected-files.txt
          git diff --name-only --cached | sort > "$actual"
          cat > "$expected" <<'EOF'
          crates/rustok-pages/src/dto/menu.rs
          crates/rustok-pages/src/dto/mod.rs
          crates/rustok-pages/src/entities/menu_binding.rs
          crates/rustok-pages/src/entities/mod.rs
          crates/rustok-pages/src/lib.rs
          crates/rustok-pages/src/migrations/m20260721_000008_create_active_menu_bindings.rs
          crates/rustok-pages/src/migrations/mod.rs
          crates/rustok-pages/src/services/menu_binding.rs
          crates/rustok-pages/src/services/mod.rs
          crates/rustok-pages/tests/menu_binding_service.rs
          crates/rustok-pages/tests/menu_transport_contract.rs
          EOF
          sort -o "$expected" "$expected"
          diff -u "$expected" "$actual" > /tmp/active-menu-files.diff 2>&1
          files_status=$?
          git status --short > /tmp/active-menu-worktree.txt
          test -z "$(git diff --name-only)"
          worktree_status=$?

          printf '%s\n' "$format_status" > /tmp/active-menu-format.status
          printf '%s\n' "$lib_status" > /tmp/active-menu-lib.status
          printf '%s\n' "$service_status" > /tmp/active-menu-service.status
          printf '%s\n' "$guard_status" > /tmp/active-menu-guard.status
          printf '%s\n' "$clippy_status" > /tmp/active-menu-clippy.status
          printf '%s\n' "$files_status" > /tmp/active-menu-files.status
          printf '%s\n' "$worktree_status" > /tmp/active-menu-worktree.status
          tar -czf /tmp/active-menu-binding-v3-files.tar.gz \
            crates/rustok-pages/src/dto/menu.rs \
            crates/rustok-pages/src/dto/mod.rs \
            crates/rustok-pages/src/entities/menu_binding.rs \
            crates/rustok-pages/src/entities/mod.rs \
            crates/rustok-pages/src/lib.rs \
            crates/rustok-pages/src/migrations/m20260721_000008_create_active_menu_bindings.rs \
            crates/rustok-pages/src/migrations/mod.rs \
            crates/rustok-pages/src/services/menu_binding.rs \
            crates/rustok-pages/src/services/mod.rs \
            crates/rustok-pages/tests/menu_binding_service.rs \
            crates/rustok-pages/tests/menu_transport_contract.rs
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: active-menu-binding-v3-evidence
          path: |
            /tmp/active-menu-format.log
            /tmp/active-menu-format.status
            /tmp/active-menu-lib.log
            /tmp/active-menu-lib.status
            /tmp/active-menu-service.log
            /tmp/active-menu-service.status
            /tmp/active-menu-guard.log
            /tmp/active-menu-guard.status
            /tmp/active-menu-clippy.log
            /tmp/active-menu-clippy.status
            /tmp/active-menu-actual-files.txt
            /tmp/active-menu-expected-files.txt
            /tmp/active-menu-files.diff
            /tmp/active-menu-files.status
            /tmp/active-menu-worktree.txt
            /tmp/active-menu-worktree.status
            /tmp/active-menu-binding-v3-files.tar.gz
          if-no-files-found: error
