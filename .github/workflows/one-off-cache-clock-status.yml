name: One-off Cache Clock Status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-cache-clock-status.yml
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      (github.event_name == 'push' &&
       github.event.head_commit.message == 'test(ci): report current cache clock run') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.title == '[automation] harden cache system clock' &&
       github.event.comment.user.login == 'loid345' &&
       github.event.comment.body == '/status-cache-system-clock')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      ISSUE_NUMBER: 1841
    steps:
      - name: Report current cache clock run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-harden-cache-clock.yml \
            --limit 8 \
            --json databaseId,event,status,conclusion,createdAt,updatedAt,headSha,url)
          failure_tail=$(gh api \
            "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.body | startswith("Cache clock library tests failed"))] | last | .body // ""' \
            | tail -n 70)
          current_body=$(gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          base_body=$(printf '%s\n' "$current_body" | sed '/^## Latest cache clock diagnostic$/,$d')
          {
            printf '%s\n\n' "$base_body"
            printf '## Latest cache clock diagnostic\n\n'
            printf 'Run status:\n\n```json\n%s\n```\n\n' "$runs"
            printf 'Last captured failure:\n\n%s\n' "${failure_tail:-No captured failure.}"
          } > /tmp/cache-clock-issue-body.md
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/cache-clock-issue-body.md
