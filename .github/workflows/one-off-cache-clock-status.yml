name: One-off Cache Clock Status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.issue.title == '[automation] harden cache system clock' &&
      github.event.issue.user.login == 'loid345' &&
      github.event.comment.user.login == 'loid345' &&
      github.event.comment.body == '/status-cache-system-clock'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Persist cache clock workflow status and failure tail
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-harden-cache-clock.yml \
            --limit 5 \
            --json databaseId,event,status,conclusion,createdAt,updatedAt,headSha,url)
          run_id=$(printf '%s' "$runs" | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const run = JSON.parse(input).find(item => item.conclusion && item.conclusion !== "skipped");
              if (run) process.stdout.write(String(run.databaseId));
            });
          ')
          failure_tail="No completed non-skipped run found."
          if [ -n "$run_id" ]; then
            set +e
            failure_tail=$(gh run view "$run_id" \
              --repo "$GITHUB_REPOSITORY" \
              --log-failed 2>&1 | tail -n 120)
            set -e
          fi
          current_body=$(gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          base_body=$(printf '%s\n' "$current_body" | sed '/^## Latest cache clock diagnostic$/,$d')
          {
            printf '%s\n\n' "$base_body"
            printf '## Latest cache clock diagnostic\n\n'
            printf 'Run status:\n\n```json\n%s\n```\n\n' "$runs"
            printf 'Failure tail:\n\n```text\n%s\n```\n' "$failure_tail"
          } > /tmp/cache-clock-issue-body.md
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/cache-clock-issue-body.md
