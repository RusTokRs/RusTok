name: One-off Cache Clock Status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-cache-clock-status.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.head_commit.message == 'test(ci): capture cache publish failure'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      ISSUE_NUMBER: 1841
      FAILED_RUN_ID: 29731753820
    steps:
      - name: Persist exact cache publish failure
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          set +e
          failure_tail=$(gh run view "$FAILED_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --log-failed 2>&1 | tail -n 140)
          set -e
          current_body=$(gh issue view "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          base_body=$(printf '%s\n' "$current_body" | sed '/^## Latest cache clock diagnostic$/,$d')
          {
            printf '%s\n\n' "$base_body"
            printf '## Latest cache clock diagnostic\n\n'
            printf 'Validated run `%s`: cache check, tests, self-delete and final scope all passed.\n\n' "$FAILED_RUN_ID"
            printf 'Publish failure tail:\n\n```text\n%s\n```\n' "$failure_tail"
          } > /tmp/cache-clock-issue-body.md
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/cache-clock-issue-body.md
