name: Marketplace listing owner outbox

on:
  push:
    branches: [main]
    paths:
      - "crates/rustok-events/src/contract.rs"
      - "crates/rustok-events/src/marketplace_listing.rs"
      - "crates/rustok-marketplace-listing/**"
      - "crates/rustok-outbox/src/transactional.rs"
      - "crates/rustok-outbox/src/transport.rs"
      - "apps/server/tests/marketplace_listing_event_contract_guard.rs"
      - "scripts/verify/verify-marketplace-listing-event-contract.mjs"
      - ".github/workflows/marketplace-listing-owner-outbox.yml"
  pull_request:
    paths:
      - "crates/rustok-events/src/contract.rs"
      - "crates/rustok-events/src/marketplace_listing.rs"
      - "crates/rustok-marketplace-listing/**"
      - "crates/rustok-outbox/src/transactional.rs"
      - "crates/rustok-outbox/src/transport.rs"
      - "apps/server/tests/marketplace_listing_event_contract_guard.rs"
      - "scripts/verify/verify-marketplace-listing-event-contract.mjs"
      - ".github/workflows/marketplace-listing-owner-outbox.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: marketplace-listing-owner-outbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  owner-outbox:
    name: Listing owner outbox contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: marketplace-listing-owner-outbox
      - name: Format listing crate
        run: cargo fmt --package rustok-marketplace-listing -- --check
      - name: Compile listing crate
        run: cargo check -p rustok-marketplace-listing --all-targets
      - name: Test listing owner atomicity
        run: cargo test -p rustok-marketplace-listing
      - name: Clippy listing crate
        run: cargo clippy -p rustok-marketplace-listing --all-targets -- -D warnings
      - name: Verify sealed event and outbox source contract
        run: node scripts/verify/verify-marketplace-listing-event-contract.mjs
