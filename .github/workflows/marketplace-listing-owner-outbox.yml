name: Marketplace payout owner diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/marketplace-listing-owner-outbox.yml"

permissions:
  contents: read

jobs:
  diagnose-payout-owner:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: marketplace-payout-owner-diagnostics
      - name: Format payout owner and capture patch
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt -p rustok-marketplace-payout
          git diff -- crates/rustok-marketplace-payout > rustfmt.patch
          mkdir -p formatted
          cp -R --parents crates/rustok-marketplace-payout/src formatted/
          cp -R --parents crates/rustok-marketplace-payout/tests formatted/
      - name: Check payout owner
        id: check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo check -p rustok-marketplace-payout --all-targets 2>&1 | tee cargo-check.log
      - name: Test payout owner
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p rustok-marketplace-payout -- --nocapture 2>&1 | tee cargo-test.log
      - name: Clippy payout owner
        id: clippy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p rustok-marketplace-payout --all-targets --no-deps -- -D warnings 2>&1 | tee cargo-clippy.log
      - name: Record outcomes
        if: always()
        shell: bash
        run: |
          cat > outcomes.txt <<EOF
          rustfmt_clean=$([ ! -s rustfmt.patch ] && echo true || echo false)
          check=${{ steps.check.outcome }}
          tests=${{ steps.tests.outcome }}
          clippy=${{ steps.clippy.outcome }}
          EOF
      - name: Upload payout diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-payout-owner-diagnostics
          path: |
            formatted/
            rustfmt.patch
            outcomes.txt
            cargo-check.log
            cargo-test.log
            cargo-clippy.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce payout gates
        if: always()
        shell: bash
        run: |
          failed=0
          test ! -s rustfmt.patch || failed=1
          test "${{ steps.check.outcome }}" = success || failed=1
          test "${{ steps.tests.outcome }}" = success || failed=1
          test "${{ steps.clippy.outcome }}" = success || failed=1
          exit "$failed"
