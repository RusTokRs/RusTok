name: Apply FORUM-04D GraphQL adapter patch

on:
  push:
    branches:
      - agent/forum-04d-admin-category-placement

permissions:
  contents: write

jobs:
  patch-adapter:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forum-04d-admin-category-placement
          fetch-depth: 1
      - name: Patch GraphQL category placement adapter
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("crates/rustok-forum/admin/src/transport/graphql_adapter.rs")
          text = path.read_text()

          replacements = [
              (
                  'const UPDATE_CATEGORY_MUTATION: &str = "mutation ForumAdminUpdateCategory($id: UUID!, $input: UpdateForumCategoryInput!) { updateForumCategory(id: $id, input: $input) { id requested_locale: requestedLocale locale effective_locale: effectiveLocale available_locales: availableLocales name slug description icon color parent_id: parentId position topic_count: topicCount reply_count: replyCount moderated } }";\n',
                  'const UPDATE_CATEGORY_MUTATION: &str = "mutation ForumAdminUpdateCategory($id: UUID!, $input: UpdateForumCategoryInput!) { updateForumCategory(id: $id, input: $input) { id requested_locale: requestedLocale locale effective_locale: effectiveLocale available_locales: availableLocales name slug description icon color parent_id: parentId position topic_count: topicCount reply_count: replyCount moderated } }";\nconst MOVE_CATEGORY_MUTATION: &str = "mutation ForumAdminMoveCategory($categoryId: UUID!, $input: MoveForumCategoryInput!) { moveForumCategory(categoryId: $categoryId, input: $input) { moved { id } } }";\nconst REORDER_CATEGORY_SIBLINGS_MUTATION: &str = "mutation ForumAdminReorderCategorySiblings($input: ReorderForumCategorySiblingsInput!) { reorderForumCategorySiblings(input: $input) { siblings { id } } }";\n',
              ),
              (
                  '''#[derive(Debug, Serialize)]
struct CategoryUpdateVariables<T> {
    id: String,
    input: T,
}
''',
                  '''#[derive(Debug, Serialize)]
struct CategoryUpdateVariables<T> {
    id: String,
    input: T,
}

#[derive(Debug, Serialize)]
struct CategoryMoveVariables {
    #[serde(rename = "categoryId")]
    category_id: String,
    input: MoveCategoryInput,
}

#[derive(Debug, Serialize)]
struct CategoryReorderVariables {
    input: ReorderCategorySiblingsInput,
}
''',
              ),
              (
                  '''#[derive(Debug, Serialize)]
struct UpdateCategoryInput {
    locale: String,
    name: Option<String>,
    slug: Option<String>,
    description: Option<String>,
    icon: Option<String>,
    color: Option<String>,
    position: Option<i32>,
    moderated: Option<bool>,
}
''',
                  '''#[derive(Debug, Serialize)]
struct UpdateCategoryInput {
    locale: String,
    name: Option<String>,
    slug: Option<String>,
    description: Option<String>,
    icon: Option<String>,
    color: Option<String>,
    moderated: Option<bool>,
}

#[derive(Debug, Serialize)]
struct MoveCategoryInput {
    #[serde(rename = "parentId")]
    parent_id: Option<String>,
    position: i32,
}

#[derive(Debug, Serialize)]
struct ReorderCategorySiblingsInput {
    #[serde(rename = "parentId")]
    parent_id: Option<String>,
    #[serde(rename = "orderedCategoryIds")]
    ordered_category_ids: Vec<String>,
}
''',
              ),
              (
                  '''pub async fn create_category(
    token: Option<String>,
    tenant_slug: Option<String>,
    draft: CategoryDraft,
) -> Result<CategoryDetail, ApiError> {
    let response: CreateCategoryResponse = request(
        CREATE_CATEGORY_MUTATION,
        CategoryMutationVariables {
            input: create_category_input(draft),
        },
        token,
        tenant_slug,
    )
    .await?;
    Ok(response.create_forum_category)
}
''',
                  '''pub async fn create_category(
    token: Option<String>,
    tenant_slug: Option<String>,
    draft: CategoryDraft,
) -> Result<CategoryDetail, ApiError> {
    let locale = draft.locale.clone();
    let requested_position = placement_position(draft.position)?;
    let response: CreateCategoryResponse = request(
        CREATE_CATEGORY_MUTATION,
        CategoryMutationVariables {
            input: create_category_input(draft),
        },
        token.clone(),
        tenant_slug.clone(),
    )
    .await?;
    let category = response.create_forum_category;
    move_category(
        token.clone(),
        tenant_slug.clone(),
        category.id.clone(),
        category.parent_id.clone(),
        requested_position,
    )
    .await?;
    fetch_category(token, tenant_slug, category.id, locale).await
}
''',
              ),
              (
                  '''pub async fn update_category(
    token: Option<String>,
    tenant_slug: Option<String>,
    id: String,
    draft: CategoryDraft,
) -> Result<CategoryDetail, ApiError> {
    let response: UpdateCategoryResponse = request(
        UPDATE_CATEGORY_MUTATION,
        CategoryUpdateVariables {
            id,
            input: update_category_input(draft),
        },
        token,
        tenant_slug,
    )
    .await?;
    Ok(response.update_forum_category)
}
''',
                  '''pub async fn update_category(
    token: Option<String>,
    tenant_slug: Option<String>,
    id: String,
    draft: CategoryDraft,
) -> Result<CategoryDetail, ApiError> {
    let locale = draft.locale.clone();
    let requested_position = placement_position(draft.position)?;
    let response: UpdateCategoryResponse = request(
        UPDATE_CATEGORY_MUTATION,
        CategoryUpdateVariables {
            id: id.clone(),
            input: update_category_input(draft.clone()),
        },
        token.clone(),
        tenant_slug.clone(),
    )
    .await?;
    let category = response.update_forum_category;
    if category.position != draft.position {
        move_category(
            token.clone(),
            tenant_slug.clone(),
            id.clone(),
            category.parent_id,
            requested_position,
        )
        .await?;
        return fetch_category(token, tenant_slug, id, locale).await;
    }
    Ok(category)
}

pub async fn move_category(
    token: Option<String>,
    tenant_slug: Option<String>,
    category_id: String,
    parent_id: Option<String>,
    position: u32,
) -> Result<(), ApiError> {
    let position = i32::try_from(position)
        .map_err(|_| "Category position exceeds GraphQL integer range".to_string())?;
    let _: serde_json::Value = request(
        MOVE_CATEGORY_MUTATION,
        CategoryMoveVariables {
            category_id,
            input: MoveCategoryInput {
                parent_id,
                position,
            },
        },
        token,
        tenant_slug,
    )
    .await?;
    Ok(())
}

pub async fn reorder_category_siblings(
    token: Option<String>,
    tenant_slug: Option<String>,
    parent_id: Option<String>,
    ordered_category_ids: Vec<String>,
) -> Result<(), ApiError> {
    let _: serde_json::Value = request(
        REORDER_CATEGORY_SIBLINGS_MUTATION,
        CategoryReorderVariables {
            input: ReorderCategorySiblingsInput {
                parent_id,
                ordered_category_ids,
            },
        },
        token,
        tenant_slug,
    )
    .await?;
    Ok(())
}
''',
              ),
              (
                  '''        parent_id: None,
        position: Some(draft.position),
        moderated: draft.moderated,
''',
                  '''        parent_id: None,
        position: None,
        moderated: draft.moderated,
''',
              ),
              (
                  '''        color: optional_text(draft.color),
        position: Some(draft.position),
        moderated: Some(draft.moderated),
''',
                  '''        color: optional_text(draft.color),
        moderated: Some(draft.moderated),
''',
              ),
              (
                  '''fn optional_text(value: String) -> Option<String> {
    normalize_ui_text(value.as_str())
}
''',
                  '''fn placement_position(position: i32) -> Result<u32, ApiError> {
    u32::try_from(position).map_err(|_| "Category position must be zero or greater".to_string())
}

fn optional_text(value: String) -> Option<String> {
    normalize_ui_text(value.as_str())
}
''',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"missing expected adapter anchor: {old[:120]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - name: Commit adapter patch
        shell: bash
        run: |
          if git diff --quiet -- crates/rustok-forum/admin/src/transport/graphql_adapter.rs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-forum/admin/src/transport/graphql_adapter.rs
          git commit -m "fix(forum-admin): route GraphQL placement through owner commands [adapter-patched]"
          git push origin HEAD:agent/forum-04d-admin-category-placement
