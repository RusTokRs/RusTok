name: Dependency Advisory Reachability

on:
  push:
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/audit.toml
      - deny.toml
      - apps/**/Cargo.toml
      - crates/**/Cargo.toml
      - tests/**/Cargo.toml
      - ops/**/Cargo.toml
      - UI/**/Cargo.toml
      - xtask/**/Cargo.toml
      - docs/security/advisory-exceptions.md
      - docs/security/rsa-rustsec-2023-0071.md
      - scripts/verify/verify-advisory-exceptions.mjs
      - scripts/verify/verify-dependency-feature-hygiene.mjs
      - scripts/verify/verify-dependency-advisory-reachability-contract.mjs
      - .github/workflows/dependency-advisory-reachability.yml
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/audit.toml
      - deny.toml
      - apps/**/Cargo.toml
      - crates/**/Cargo.toml
      - tests/**/Cargo.toml
      - ops/**/Cargo.toml
      - UI/**/Cargo.toml
      - xtask/**/Cargo.toml
      - docs/security/advisory-exceptions.md
      - docs/security/rsa-rustsec-2023-0071.md
      - scripts/verify/verify-advisory-exceptions.mjs
      - scripts/verify/verify-dependency-feature-hygiene.mjs
      - scripts/verify/verify-dependency-advisory-reachability-contract.mjs
      - .github/workflows/dependency-advisory-reachability.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: never

jobs:
  reachability:
    name: Dependency advisory reachability
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Verify dependency policy structure
        run: |
          node scripts/verify/verify-dependency-feature-hygiene.mjs
          node scripts/verify/verify-advisory-exceptions.mjs
          node scripts/verify/verify-dependency-advisory-reachability-contract.mjs
      - name: Verify ignored packages remain lockfile-only
        shell: bash
        run: |
          set -euo pipefail
          grep -q '^name = "rsa"$' Cargo.lock
          grep -q '^name = "atomic-polyfill"$' Cargo.lock

          check_empty_tree() {
            local package=$1
            local target=$2
            local output="/tmp/${package}-${target}.tree"
            cargo tree --locked --workspace --all-features --target "$target" -i "$package" \
              > "$output" 2> "/tmp/${package}-${target}.stderr"
            if [ -s "$output" ]; then
              cat "$output"
              echo "$package became build-reachable for target $target" >&2
              exit 1
            fi
          }

          check_empty_tree rsa all
          for target in \
            all \
            thumbv6m-none-eabi \
            riscv32i-unknown-none-elf \
            riscv32imc-unknown-none-elf \
            xtensa-esp32s2-none-elf
          do
            check_empty_tree atomic-polyfill "$target"
          done
      - name: Verify locked graph
        run: cargo metadata --locked --all-features --format-version 1 >/dev/null
