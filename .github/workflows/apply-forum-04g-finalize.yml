name: Apply FORUM-04G final synchronization

on:
  push:
    branches:
      - agent/forum-04g-admin-category-dnd

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forum-04g-admin-category-dnd
          fetch-depth: 1
      - name: Finalize model, DnD capture and canonical plan
        run: |
          python - <<'PY'
          from pathlib import Path

          model_path = Path("crates/rustok-forum/admin/src/model.rs")
          model = model_path.read_text()
          model = model.replace(
              "    pub reply_count: i32,\n    pub children: Vec<CategoryTreeNode>,\n",
              "    pub reply_count: i32,\n    #[serde(default)]\n    pub children: Vec<CategoryTreeNode>,\n",
              1,
          )
          model_path.write_text(model)

          dnd_path = Path("crates/rustok-forum/admin/src/ui/category_dnd.rs")
          dnd = dnd_path.read_text()
          dnd = dnd.replace(
              "                let item_id = item.id.clone();\n",
              "                let item_is_busy = vm.is_busy;\n                let item_id = item.id.clone();\n",
              1,
          )
          dnd = dnd.replace(
              "disabled=move || vm.is_busy || move_busy.get()",
              "disabled=move || item_is_busy || move_busy.get()",
          )
          dnd_path.write_text(dnd)

          plan_path = Path("crates/rustok-forum/docs/implementation-plan.md")
          plan = plan_path.read_text()
          plan = plan.replace(
              "| `FORUM-04` | `in_progress` | FORUM-04A-E deliver bounded hierarchy, atomic placement, write guards, admin transport and topic policy; FORUM-04F adds atomic subtree archive/restore. Interactive drag-and-drop remains. |",
              "| `FORUM-04` | `in_progress` | FORUM-04A-G implement the bounded tree, atomic placement, write guards, topic policy, subtree lifecycle and canonical-tree admin drag-and-drop. Maintainer-run verification remains. |",
          )
          plan = plan.replace(
              "### Remaining scope\n\n- wire interactive admin drag-and-drop UI to the existing owner-command\n  transport facade, never direct row writes.\n",
              "### Delivered in `FORUM-04G`\n\n- forum-admin loads the bounded canonical category tree through GraphQL-first transport with REST fallback instead of reconstructing hierarchy from the flat compatibility list;\n- the tree is flattened in deterministic preorder with `parent_id`, `depth`, `position`, topic policy and archive state retained for rendering and drop planning;\n- interactive drag-and-drop supports moving before a sibling, nesting inside a category and moving to the end of the root set;\n- pure drop planning rejects no-op, self/subtree cycles and active moves beneath archived categories before transport execution;\n- every accepted drop calls the existing owner `move_category` command and refreshes the canonical tree; generic category update is never used;\n- the forum-admin boundary verifier and fixtures reject flat hierarchy reads and DnD placement bypasses.\n\n### Remaining scope\n\n- run the maintainer verification commands below and promote `FORUM-04` to `done` when they pass.\n",
          )
          plan_path.write_text(plan)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/rustok-forum/admin/src/model.rs crates/rustok-forum/admin/src/ui/category_dnd.rs crates/rustok-forum/docs/implementation-plan.md
          if ! git diff --cached --quiet; then
            git commit -m "docs(forum): synchronize FORUM-04G delivery state"
            git push origin HEAD:agent/forum-04g-admin-category-dnd
          fi
