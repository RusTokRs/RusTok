name: One-off Alloy Repair Status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.issue.number == 1853 &&
      github.event.comment.body == '/status-alloy-repair'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Persist Alloy repair runs and failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-alloy-seaorm-diagnostic.yml \
            --limit 10 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url)
          failed_run=$(printf '%s' "$runs" | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const run = JSON.parse(input).find(item => item.conclusion === "failure");
              if (run) process.stdout.write(String(run.databaseId));
            });
          ')
          failure_tail="No failed Alloy repair run found."
          if [ -n "$failed_run" ]; then
            set +e
            failure_tail=$(gh run view "$failed_run" \
              --repo "$GITHUB_REPOSITORY" \
              --log-failed 2>&1 | tail -n 80)
            set -e
          fi
          {
            printf 'Track the bounded Alloy SeaORM compatibility repair.\n\n'
            printf '## Repair runs\n\n```json\n%s\n```\n\n' "$runs"
            printf '## Latest repair failure\n\n```text\n%s\n```\n' "$failure_tail"
          } >/tmp/alloy-repair-status.md
          gh issue edit 1853 --repo "$GITHUB_REPOSITORY" --body-file /tmp/alloy-repair-status.md
