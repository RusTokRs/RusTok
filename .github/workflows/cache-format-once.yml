name: One-shot cache hardening rustfmt

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cache-format-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Format cache hardening files
        run: |
          rustfmt --edition 2021 \
            crates/rustok-cache/src/event_dedupe.rs \
            crates/rustok-cache/src/tenant_generation_observability.rs \
            crates/rustok-cache/src/lib.rs \
            apps/server/src/middleware/mod.rs \
            apps/server/src/services/tenant_cache_generation.rs \
            apps/server/src/services/tenant_cache_generation_status.rs \
            apps/server/src/services/mod.rs \
            apps/server/tests/tenant_cache_architecture_guard.rs \
            apps/server/tests/tenant_generation_concurrency_guard.rs \
            apps/server/tests/tenant_generation_readiness_guard.rs
      - name: Commit formatting proof
        run: |
          printf 'verified_source=%s\n' "$(git rev-parse HEAD)" > .github/cache-format-verified.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/cache-format-verified.txt \
            crates/rustok-cache/src/event_dedupe.rs \
            crates/rustok-cache/src/tenant_generation_observability.rs \
            crates/rustok-cache/src/lib.rs \
            apps/server/src/middleware/mod.rs \
            apps/server/src/services/tenant_cache_generation.rs \
            apps/server/src/services/tenant_cache_generation_status.rs \
            apps/server/src/services/mod.rs \
            apps/server/tests/tenant_cache_architecture_guard.rs \
            apps/server/tests/tenant_generation_concurrency_guard.rs \
            apps/server/tests/tenant_generation_readiness_guard.rs
          git commit -m "chore(cache): verify focused rustfmt"
          git push origin HEAD:main
