name: One-off Publish Alloy Repair

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: one-off-publish-alloy-repair
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    if: github.repository == 'RusTokRs/RusTok' && github.head_ref == 'agent/fix-alloy-current-main-compile'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/fix-alloy-current-main-compile
          fetch-depth: 0

      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0

      - name: Apply bounded repairs and diagnostic assertion
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/crate::MAX_TEST_ERROR_LENGTH/crate::model::MAX_TEST_ERROR_LENGTH/g' \
            crates/alloy/src/runner/test.rs
          sed -i 's/use crate::TEST_RUN_LEASE_SECONDS;/use crate::model::TEST_RUN_LEASE_SECONDS;/' \
            crates/alloy/src/runner/test.rs
          sed -i 's/crate::test_run_lease_expires_at/crate::model::test_run_lease_expires_at/g' \
            crates/alloy/src/storage/memory.rs \
            crates/alloy/src/storage/sea_orm.rs
          sed -i 's/G: AlloyReleaseGovernance,/G: AlloyReleaseGovernance + ?Sized,/g' \
            crates/alloy/src/runner/release.rs
          sed -i 's/Expr::col(Column::UpdatedAt))/Expr::col(Column::UpdatedAt).into())/g' \
            crates/alloy/src/storage/sea_orm.rs
          python3 -c 'from pathlib import Path; p=Path("crates/alloy/src/api/dto.rs"); s=p.read_text(); old="#[cfg(test)]\nmod tests {\n    use super::*;\n    use chrono::{TimeZone, Utc};"; new="#[cfg(test)]\nmod execution_log_tests {\n    use super::*;\n    use chrono::{TimeZone, Utc};"; assert s.count(old)==1; p.write_text(s.replace(old,new,1))'
          python3 -c 'from pathlib import Path; p=Path("crates/rustok-modules/src/migrations/m20260718_000031_artifact_data_exports.rs"); s=p.read_text(); old="        manager\n            .get_connection()\n            .execute_unprepared(\"DROP TABLE module_artifact_data_exports\")\n            .await\n"; new="        manager\n            .get_connection()\n            .execute_unprepared(\"DROP TABLE module_artifact_data_exports\")\n            .await?;\n        Ok(())\n"; assert s.count(old)==1; p.write_text(s.replace(old,new,1))'
          python3 -c 'from pathlib import Path; p=Path("crates/alloy/src/lib.rs"); s=p.read_text(); old="        assert!(results.iter().all(ExecutionResult::is_success));"; new="        assert!(\n            results.iter().all(ExecutionResult::is_success),\n            \"on-commit results: {results:#?}\"\n        );"; assert s.count(old)==1; p.write_text(s.replace(old,new,1))'
          cargo fmt -p alloy -p rustok-modules
          git diff --check

      - name: Diagnose Alloy over stacked prerequisite
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/alloy-repair-publish
        run: |
          set +e
          cargo test --locked -p alloy tests::on_commit_persists_one_execution_log_per_script -- --nocapture > alloy-stacked-test.log 2>&1
          exit_code=$?
          set -e
          echo "$exit_code" > alloy-stacked-test.exit
          tail -n 440 alloy-stacked-test.log

      - name: Upload Alloy stacked diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: alloy-stacked-test-${{ github.run_id }}
          path: |
            alloy-stacked-test.log
            alloy-stacked-test.exit
          if-no-files-found: error
          retention-days: 1

      - name: Stop after diagnostic
        run: exit 1
