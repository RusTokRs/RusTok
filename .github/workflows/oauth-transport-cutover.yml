name: OAuth transport cutover

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"

concurrency:
  group: oauth-transport-cutover
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'automation/oauth-transport-cutover'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply cutover
        run: python3 scripts/maintenance/apply_oauth_transport_cutover.py

      - name: Format
        run: cargo fmt --all

      - name: Verify multilingual DB contract
        run: node scripts/verify/verify-db-multilingual-contract.mjs

      - name: Check Auth admin SSR
        run: cargo check -p rustok-auth-admin --no-default-features --features ssr --locked

      - name: Check Channel admin SSR
        run: cargo check -p rustok-channel-admin --no-default-features --features ssr --locked

      - name: Check host admin SSR
        run: cargo check -p rustok-admin --no-default-features --features ssr --locked

      - name: Validate patch
        run: git diff --check

      - name: Commit verified cutover to PR branch
        shell: bash
        run: |
          set -euo pipefail
          rm scripts/maintenance/apply_oauth_transport_cutover.py
          rm .github/workflows/oauth-transport-cutover.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(i18n): cut OAuth transports over to exact locale copy'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
