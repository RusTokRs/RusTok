name: One-off Pin Migration Actions

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-pin-migration-actions.yml

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pin-actions:
    if: github.event.head_commit.message == 'security(ci): execute migration action pin patch'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0

      - name: Apply and verify immutable migration actions
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main
          python3 scripts/maintenance/pin-migration-actions.py
          node --check scripts/verify/verify-migration-compatibility-contract.mjs
          node scripts/verify/verify-migration-compatibility-contract.mjs
          git diff --check

      - name: Commit immutable migration actions
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'security(ci): pin migration compatibility actions'
          git push origin HEAD:main
