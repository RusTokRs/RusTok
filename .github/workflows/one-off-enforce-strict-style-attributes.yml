name: One-off Enforce Strict Style Attributes

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enforce-strict-style-attributes:
    if: >-
      github.event.issue.title == '[automation] enforce strict style attributes' &&
      (github.event_name == 'issues' || github.event.comment.body == '/enforce-strict-style-attributes')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact strict-style cutover
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          def replace_once(path: Path, old: str, new: str) -> None:
              source = path.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old!r}")
              path.write_text(source.replace(old, new, 1))

          def regex_once(path: Path, pattern: str, replacement: str) -> None:
              source = path.read_text()
              updated, count = re.subn(pattern, replacement, source, count=1, flags=re.MULTILINE | re.DOTALL)
              if count != 1:
                  raise SystemExit(f"{path}: expected one regex match, found {count}: {pattern!r}")
              path.write_text(updated)

          server = Path("apps/server/src/middleware/security_headers.rs")
          replace_once(
              server,
              "/// Trusted inline scripts and style elements receive one per-response nonce. Inline event handlers\n/// and all dynamic string compilation are prohibited. Inline style attributes remain temporary\n/// migration debt until component-level style usage is moved to classes or hashes.\n",
              "/// Trusted inline scripts and style elements receive one per-response nonce. Inline event handlers,\n/// dynamic string compilation, and inline style attributes are prohibited.\n",
          )
          replace_once(
              server,
              "const UI_CSP_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";\nconst UI_CSP_STRICT_STYLE_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";\n",
              "const UI_CSP_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";\n",
          )
          replace_once(
              server,
              "        plaintext_websocket_allowed(),\n        strict_style_attributes_enabled(),\n",
              "        plaintext_websocket_allowed(),\n",
          )
          regex_once(
              server,
              r"\nfn strict_style_attributes_enabled\(\) -> bool \{.*?\n\}\n",
              "\n",
          )
          replace_once(
              server,
              "    allow_plaintext_websocket: bool,\n    strict_style_attributes: bool,\n",
              "    allow_plaintext_websocket: bool,\n",
          )
          replace_once(
              server,
              "        let template = if strict_style_attributes {\n            UI_CSP_STRICT_STYLE_TEMPLATE\n        } else {\n            UI_CSP_TEMPLATE\n        };\n        template\n",
              "        UI_CSP_TEMPLATE\n",
          )
          server_source = server.read_text()
          server_source = re.sub(r"select_csp\(([^\n;]*?), false, false\)", r"select_csp(\1, false)", server_source)
          server_source = re.sub(r"select_csp\(([^\n;]*?), true, false\)", r"select_csp(\1, true)", server_source)
          server_source = server_source.replace("assert!(enforced.contains(\"style-src-attr 'unsafe-inline'\"));", "assert!(enforced.contains(\"style-src-attr 'none'\"));")
          strict_test = re.compile(
              r"    #\[test\]\n    fn strict_style_attribute_profile_enforces_none\(\) \{.*?\n    \}\n",
              re.MULTILINE | re.DOTALL,
          )
          server_source, count = strict_test.subn(
              "    #[test]\n    fn ui_policy_always_enforces_strict_style_attributes() {\n        let nonce = CspNonce::generate();\n        let policy = select_csp(\"/admin\", Some(&nonce), false);\n\n        assert!(policy.contains(\"style-src-attr 'none'\"));\n        assert!(!policy.contains(\"style-src-attr 'unsafe-inline'\"));\n        assert!(policy.contains(nonce.source_expression().as_str()));\n    }\n",
              server_source,
              count=1,
          )
          if count != 1:
              raise SystemExit("server strict-style test replacement failed")
          if "select_csp(path, Some(&nonce), false, false)" in server_source:
              raise SystemExit("server legacy select_csp call remains")
          server.write_text(server_source)

          admin = Path("apps/admin/src/app/security.rs")
          replace_once(
              admin,
              "const ADMIN_UI_CSP_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";\nconst ADMIN_UI_CSP_STRICT_STYLE_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";\n",
              "const ADMIN_UI_CSP_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";\n",
          )
          replace_once(
              admin,
              "        !is_production_environment(),\n        strict_style_attributes_enabled(),\n",
              "        !is_production_environment(),\n",
          )
          regex_once(
              admin,
              r"\nfn strict_style_attributes_enabled\(\) -> bool \{.*?\n\}\n",
              "\n",
          )
          replace_once(
              admin,
              "    allow_plaintext_websocket: bool,\n    strict_style_attributes: bool,\n",
              "    allow_plaintext_websocket: bool,\n",
          )
          replace_once(
              admin,
              "    let template = if strict_style_attributes {\n        ADMIN_UI_CSP_STRICT_STYLE_TEMPLATE\n    } else {\n        ADMIN_UI_CSP_TEMPLATE\n    };\n    template\n",
              "    ADMIN_UI_CSP_TEMPLATE\n",
          )
          admin_source = admin.read_text()
          admin_source = re.sub(r"select_csp\(([^\n;]*?), false, false\)", r"select_csp(\1, false)", admin_source)
          admin_source = re.sub(r"select_csp\(([^\n;]*?), true, false\)", r"select_csp(\1, true)", admin_source)
          admin_source = admin_source.replace("assert!(production.contains(\"style-src-attr 'unsafe-inline'\"));", "assert!(production.contains(\"style-src-attr 'none'\"));")
          admin_strict_test = re.compile(
              r"    #\[test\]\n    fn standalone_strict_style_attribute_profile_enforces_none\(\) \{.*?\n    \}\n",
              re.MULTILINE | re.DOTALL,
          )
          admin_source, count = admin_strict_test.subn(
              "    #[test]\n    fn standalone_admin_always_enforces_strict_style_attributes() {\n        let nonce = CspNonce::generate();\n        let policy = select_csp(\"/dashboard\", Some(&nonce), false);\n\n        assert!(policy.contains(\"style-src-attr 'none'\"));\n        assert!(!policy.contains(\"style-src-attr 'unsafe-inline'\"));\n        assert!(policy.contains(nonce.source_expression().as_str()));\n    }\n",
              admin_source,
              count=1,
          )
          if count != 1:
              raise SystemExit("admin strict-style test replacement failed")
          admin.write_text(admin_source)

          reporting = Path("scripts/verify/verify-csp-reporting-contract.mjs")
          replace_once(
              reporting,
              "  if (!policy.includes(\"style-src-attr 'unsafe-inline'\")) {\n    failures.push(`${file}: ${label} policy must isolate temporary inline style attributes`);\n  }\n",
              "  if (!policy.includes(\"style-src-attr 'none'\")) {\n    failures.push(`${file}: ${label} policy must block inline style attributes`);\n  }\n  if (policy.includes(\"style-src-attr 'unsafe-inline'\")) {\n    failures.push(`${file}: ${label} policy restores inline style attributes`);\n  }\n",
          )
          replace_once(reporting, "  \"style-src-attr 'unsafe-inline'\",\n", "  \"style-src-attr 'none'\",\n")
          reporting_source = reporting.read_text()
          marker = "verifyNoncePolicy(\n  stringConstant(standaloneAdminSecurity, \"ADMIN_UI_CSP_TEMPLATE\", standaloneAdminSecurityFile),"
          if marker not in reporting_source:
              raise SystemExit("reporting standalone marker missing")
          reporting_source = reporting_source.replace(
              marker,
              "forbidMarker(headers, \"style-src-attr 'unsafe-inline'\", headersFile);\nforbidMarker(standaloneAdminSecurity, \"style-src-attr 'unsafe-inline'\", standaloneAdminSecurityFile);\n\n" + marker,
              1,
          )
          reporting.write_text(reporting_source)

          register = Path("docs/security/csp-inline-style-attribute-exceptions.json")
          document = json.loads(register.read_text())
          if document.get("exceptions") != []:
              raise SystemExit("inline style exception register must be empty before enforcement")
          document["policy"] = {
              "directive": "style-src-attr 'none'",
              "owner": "Platform security and UI maintainers",
              "approved_on": "2026-07-18",
              "review_by": "2027-07-18",
              "exit_criteria": "Any reintroduction of an inline style attribute or an unsafe style-src-attr source must fail the repository hardening gates.",
          }
          register.write_text(json.dumps(document, indent=2) + "\n")

          inline_gate = Path("scripts/verify/verify-csp-inline-style-exceptions.mjs")
          inline_source = inline_gate.read_text()
          anchor = "requireNonEmpty(register.policy?.directive, `${registerPath}: policy.directive`);\n"
          replacement = anchor + "if (register.policy?.directive !== \"style-src-attr 'none'\") {\n  failures.push(`${registerPath}: policy.directive must enforce style-src-attr 'none'`);\n}\n"
          if inline_source.count(anchor) != 1:
              raise SystemExit("inline gate directive anchor missing")
          inline_source = inline_source.replace(anchor, replacement, 1)
          final_anchor = "if (failures.length > 0) {\n"
          source_contract = "for (const file of [\n  \"apps/server/src/middleware/security_headers.rs\",\n  \"apps/admin/src/app/security.rs\",\n]) {\n  requireMarkers(file, [\"style-src-attr 'none'\"]);\n  forbidMarkers(file, [\n    \"style-src-attr 'unsafe-inline'\",\n    \"RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES\",\n    \"STRICT_STYLE_TEMPLATE\",\n  ]);\n}\n\n"
          if inline_source.count(final_anchor) != 1:
              raise SystemExit("inline gate final anchor missing")
          inline_source = inline_source.replace(final_anchor, source_contract + final_anchor, 1)
          inline_gate.write_text(inline_source)

          workflow = Path(".github/workflows/one-off-enforce-strict-style-attributes.yml")
          workflow.unlink()
          PY
      - name: Commit strict-style cutover
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security(csp): enforce strict style attributes"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Strict style-attribute enforcement committed; one-off workflow removed itself."
