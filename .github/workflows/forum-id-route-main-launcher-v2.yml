name: Forum ID route main launcher v2

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: forum-id-route-main-launcher-v2
  cancel-in-progress: false

jobs:
  finalize:
    if: startsWith(github.event.head_commit.message, 'ci(forum): trigger ID route finalizer v2')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch the task branch and current main
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/agent/forum-id-route-fixture:refs/remotes/origin/agent/forum-id-route-fixture"
          git checkout -B agent/forum-id-route-fixture refs/remotes/origin/agent/forum-id-route-fixture
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit refs/remotes/origin/main

      - name: Apply and normalize the Forum route contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          category_id = "11111111-1111-4111-8111-111111111111"
          topic_id = "22222222-2222-4222-8222-222222222222"

          fixture_path = Path("apps/next-frontend/contracts/seo/runtime-parity-fixtures.json")
          fixture = fixture_path.read_text()
          old_forum = '''    {
              "ownerModule": "rustok-forum",
              "routePatterns": [
                "/modules/forum?topic=:slug",
                "/forum/:slug"
              ],
              "targetKind": "forum_topic",
              "nextSmokeRoute": {
                "locale": "en",
                "routeSegment": "forum",
                "query": {
                  "topic": "welcome"
                }
              },
              "rustStorefrontRoute": "/modules/forum?topic=welcome"
            }'''
          new_forum = f'''    {{
              "ownerModule": "rustok-forum",
              "routePatterns": [
                "/modules/forum?category=:category_id",
                "/modules/forum?topic=:topic_id",
                "/modules/forum?category=:category_id&topic=:topic_id"
              ],
              "targetKind": "forum_topic",
              "nextSmokeRoute": {{
                "locale": "en",
                "routeSegment": "forum",
                "query": {{
                  "category": "{category_id}",
                  "topic": "{topic_id}"
                }}
              }},
              "rustStorefrontRoute": "/modules/forum?category={category_id}&topic={topic_id}"
            }}'''
          if old_forum in fixture:
              fixture = fixture.replace(old_forum, new_forum, 1)
          elif new_forum not in fixture:
              raise SystemExit("unexpected Forum route fixture shape")
          fixture = fixture.replace(
              '  "updatedAt": "2026-06-26T00:00:00Z",',
              '  "updatedAt": "2026-07-24T00:00:00Z",',
              1,
          )
          if any(token in fixture for token in ["/forum/:slug", "topic=welcome", '"topic": "welcome"']):
              raise SystemExit("legacy Forum slug route remains")
          json.loads(fixture)
          fixture_path.write_text(fixture)

          verifier_path = Path("apps/next-frontend/scripts/verify-seo-runtime-fixtures.mjs")
          verifier = verifier_path.read_text()
          smoke_marker = "const smokeRows = fixtures.smokeEvidence ?? [];"
          marker_start = verifier.find(smoke_marker)
          if marker_start < 0:
              raise SystemExit("missing smokeRows verifier marker")
          guard_lines = [
              'const forumRoute = routeRows.find((item) => item.targetKind === "forum_topic");',
              f'const forumCategoryId = "{category_id}";',
              f'const forumTopicId = "{topic_id}";',
              'const expectedForumRoutePatterns = [',
              '  "/modules/forum?category=:category_id",',
              '  "/modules/forum?topic=:topic_id",',
              '  "/modules/forum?category=:category_id&topic=:topic_id",',
              '];',
              'assert(',
              '  JSON.stringify(forumRoute?.routePatterns) === JSON.stringify(expectedForumRoutePatterns),',
              '  "Forum route fixtures must remain on the accepted ID-based compatibility contract until FORUM-24",',
              ');',
              'assert(',
              '  forumRoute?.nextSmokeRoute?.query?.category === forumCategoryId &&',
              '    forumRoute?.nextSmokeRoute?.query?.topic === forumTopicId,',
              '  "Forum Next route fixture must use deterministic UUID category/topic values",',
              ');',
              'assert(',
              '  forumRoute?.rustStorefrontRoute ===',
              '    `/modules/forum?category=${forumCategoryId}&topic=${forumTopicId}`,',
              '  "Forum Rust storefront fixture must match the canonical ID-based topic route",',
              ');',
              'assert(',
              '  !(forumRoute?.routePatterns ?? []).some((pattern) => pattern.includes(":slug")),',
              '  "Forum route fixtures must not advertise localized slug paths before FORUM-24",',
              ');',
              '',
          ]
          clean_guard = "\n".join(guard_lines)
          existing_start = verifier.find("const forumRoute = routeRows.find")
          replace_start = verifier.rfind("\n", 0, existing_start if existing_start >= 0 else marker_start) + 1
          marker_end = marker_start + len(smoke_marker)
          verifier = verifier[:replace_start] + clean_guard + smoke_marker + verifier[marker_end:]
          if verifier.count("const expectedForumRoutePatterns") != 1:
              raise SystemExit("Forum route verifier guard is not unique")
          verifier_path.write_text(verifier)

          plan_path = Path("crates/rustok-forum/docs/implementation-plan.md")
          plan = plan_path.read_text().replace("last_reviewed: 2026-07-22", "last_reviewed: 2026-07-24", 1)
          base_line = "ID routes remain internal compatibility paths, not the primary storefront UX."
          base_start = plan.find(base_line)
          next_heading = plan.find("## `FORUM-25`", base_start)
          if base_start < 0 or next_heading < 0:
              raise SystemExit("missing FORUM-24 compatibility boundaries")
          base_end = base_start + len(base_line)
          contract_lines = [
              "", "", "### Current compatibility contract", "",
              "Until FORUM-24 is implemented atomically, runtime route resolution and SEO",
              "parity evidence remain UUID-based:", "",
              "- category compatibility routes use `/modules/forum?category=<uuid>`;",
              "- topic compatibility routes accept `/modules/forum?topic=<uuid>` and emit",
              "  `/modules/forum?category=<uuid>&topic=<uuid>` as the canonical owner route;",
              "- `/forum/:slug`, `topic=<slug>` and localized slug claims are rejected;",
              "- the compile-free SEO fixture verifier and",
              "  `forum_route_contract_remains_id_based` backend test must stay aligned;",
              "- no Forum smoke-evidence row is claimed until seeded UUID runtime evidence",
              "  is captured.", "", "",
          ]
          plan = plan[:base_end] + "\n".join(contract_lines) + plan[next_heading:]
          plan_path.write_text(plan)

          for workflow in [
              ".github/workflows/apply-forum-id-route-fixture-once.yml",
              ".github/workflows/forum-id-route-fixture-runner.yml",
              ".github/workflows/forum-id-route-comment-runner.yml",
              ".github/workflows/forum-id-route-cleanup-runner-v2.yml",
              ".github/workflows/forum-id-route-finalizer.yml",
              ".github/workflows/forum-id-route-main-launcher.yml",
              ".github/workflows/forum-id-route-main-launcher-v2.yml",
          ]:
              Path(workflow).unlink(missing_ok=True)
          PY

          git diff --check
          git add -A
          git commit -m "fix(forum): align SEO fixture with ID routes"
          git push origin HEAD:agent/forum-id-route-fixture
