name: Cache diagnostics once

on:
  pull_request:
    paths:
      - ".github/workflows/cache-diagnostics-once.yml"
      - ".github/workflows/cache-hardening.yml"
      - "crates/rustok-cache/**"
      - "apps/server/src/services/tenant_cache_generation_status.rs"
      - "apps/server/tests/tenant_generation_readiness_guard.rs"

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Capture changed-file format context
        shell: bash
        run: |
          set +e
          report="$RUNNER_TEMP/cache-format-diagnostic.txt"
          changed="$RUNNER_TEMP/cache-changed-rust.txt"
          {
            echo "event=${{ github.event_name }}"
            echo "base=${{ github.event.pull_request.base.sha }}"
            echo "head=${{ github.event.pull_request.head.sha }}"
            echo "checkout=$(git rev-parse HEAD)"
            echo "available refs:"
            git show-ref
            echo "diff command output:"
          } > "$report"
          git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- '*.rs' > "$changed" 2>> "$report"
          diff_status=$?
          echo "diff_status=$diff_status" >> "$report"
          echo "changed Rust files:" >> "$report"
          cat "$changed" >> "$report"
          cargo fmt --all >> "$report" 2>&1
          fmt_status=$?
          echo "fmt_status=$fmt_status" >> "$report"
          echo "formatted working tree diff:" >> "$report"
          git diff --stat >> "$report"
          git diff >> "$report"
          cp "$changed" "$RUNNER_TEMP/cache-changed-rust.txt"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cache-format-diagnostic
          path: |
            ${{ runner.temp }}/cache-format-diagnostic.txt
            ${{ runner.temp }}/cache-changed-rust.txt
          if-no-files-found: error

  redis-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      RUSTOK_CACHE_REAL_REDIS_URL: redis://127.0.0.1:6379/
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Run library ignored tests with full output
        shell: bash
        run: |
          set +e
          set -o pipefail
          cargo test -p rustok-cache --lib -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee "$RUNNER_TEMP/cache-live-redis-library.log"
          status=${PIPESTATUS[0]}
          echo "$status" > "$RUNNER_TEMP/cache-live-redis-library.status"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cache-live-redis-library-diagnostic
          path: |
            ${{ runner.temp }}/cache-live-redis-library.log
            ${{ runner.temp }}/cache-live-redis-library.status
          if-no-files-found: error
