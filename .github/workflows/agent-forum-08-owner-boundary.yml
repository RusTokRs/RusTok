name: Apply FORUM-08 owner boundary cutover

on:
  push:
    branches:
      - agent/forum-08-retire-raw-lifecycle-services

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[forum-08-cutover]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forum-08-retire-raw-lifecycle-services
          fetch-depth: 0
      - name: Apply owner boundary edits
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, marker=None):
              file = Path(path)
              text = file.read_text()
              if marker and marker in text:
                  return
              if old not in text:
                  raise SystemExit(f"missing expected text in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "crates/rustok-forum/src/services/mod.rs",
              "/// Raw persistence service retained temporarily for compatibility.\npub mod reply;",
              "// Persistence implementation; external callers use the root ReplyService owner facade.\nmod reply;",
              "external callers use the root ReplyService owner facade",
          )
          replace_once(
              "crates/rustok-forum/src/services/mod.rs",
              "/// Raw persistence service retained temporarily for compatibility.\npub mod topic;",
              "// Persistence implementation; external callers use the root TopicService owner facade.\nmod topic;",
              "external callers use the root TopicService owner facade",
          )

          topic_owner = Path("crates/rustok-forum/src/services/topic_owner.rs")
          topic_text = topic_owner.read_text()
          topic_text = topic_text.replace("use std::ops::Deref;\n\n", "", 1)
          if "CreateTopicInput" not in topic_text:
              topic_text = topic_text.replace(
                  "use crate::entities::{forum_reply, forum_solution};\nuse crate::error::{ForumError, ForumResult};",
                  "use crate::dto::{CreateTopicInput, ListTopicsFilter, TopicListItem, TopicResponse, UpdateTopicInput};\nuse crate::entities::{forum_reply, forum_solution};\nuse crate::error::{ForumError, ForumResult};",
                  1,
              )
          topic_marker = "    pub async fn get_with_locale_fallback("
          if topic_marker not in topic_text:
              constructor = """    pub fn new(db: DatabaseConnection, event_bus: TransactionalEventBus) -> Self {
        Self {
            inner: topic::TopicService::new(db.clone(), event_bus.clone()),
            db,
            event_bus,
        }
    }
"""
              delegates = constructor + """
    pub async fn create(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        input: CreateTopicInput,
    ) -> ForumResult<TopicResponse> {
        self.inner.create(tenant_id, security, input).await
    }

    pub async fn get(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        topic_id: Uuid,
        locale: &str,
    ) -> ForumResult<TopicResponse> {
        self.inner.get(tenant_id, security, topic_id, locale).await
    }

    pub async fn get_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        topic_id: Uuid,
        locale: &str,
        fallback_locale: Option<&str>,
    ) -> ForumResult<TopicResponse> {
        self.inner
            .get_with_locale_fallback(tenant_id, security, topic_id, locale, fallback_locale)
            .await
    }

    pub async fn update(
        &self,
        tenant_id: Uuid,
        topic_id: Uuid,
        security: SecurityContext,
        input: UpdateTopicInput,
    ) -> ForumResult<TopicResponse> {
        self.inner.update(tenant_id, topic_id, security, input).await
    }

    pub async fn list(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        filter: ListTopicsFilter,
    ) -> ForumResult<(Vec<TopicListItem>, u64)> {
        self.inner.list(tenant_id, security, filter).await
    }

    pub async fn list_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        filter: ListTopicsFilter,
        fallback_locale: Option<&str>,
    ) -> ForumResult<(Vec<TopicListItem>, u64)> {
        self.inner
            .list_with_locale_fallback(tenant_id, security, filter, fallback_locale)
            .await
    }

    pub async fn list_storefront_visible_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        filter: ListTopicsFilter,
        fallback_locale: Option<&str>,
        channel_slug: Option<&str>,
    ) -> ForumResult<(Vec<TopicListItem>, u64)> {
        self.inner
            .list_storefront_visible_with_locale_fallback(
                tenant_id,
                security,
                filter,
                fallback_locale,
                channel_slug,
            )
            .await
    }
"""
              if constructor not in topic_text:
                  raise SystemExit("topic owner constructor changed")
              topic_text = topic_text.replace(constructor, delegates, 1)
          deref = """impl Deref for TopicService {
    type Target = topic::TopicService;

    fn deref(&self) -> &Self::Target {
        &self.inner
    }
}

"""
          topic_text = topic_text.replace(deref, "", 1)
          topic_owner.write_text(topic_text)

          reply_owner = Path("crates/rustok-forum/src/services/reply_owner.rs")
          reply_text = reply_owner.read_text()
          reply_text = reply_text.replace("use std::ops::Deref;\n\n", "", 1)
          reply_text = reply_text.replace(
              "use crate::dto::{CreateReplyInput, ReplyResponse};",
              "use crate::dto::{CreateReplyInput, ListRepliesFilter, ReplyListItem, ReplyResponse, UpdateReplyInput};",
              1,
          )
          reply_marker = "    pub async fn list_response_for_topic_by_statuses_with_locale_fallback("
          if reply_marker not in reply_text:
              constructor = """    pub fn new(db: DatabaseConnection, event_bus: TransactionalEventBus) -> Self {
        Self {
            inner: reply::ReplyService::new(db.clone(), event_bus.clone()),
            db,
            event_bus,
        }
    }
"""
              delegates = constructor + """
    pub async fn get(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        reply_id: Uuid,
        locale: &str,
    ) -> ForumResult<ReplyResponse> {
        self.inner.get(tenant_id, security, reply_id, locale).await
    }

    pub async fn get_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        reply_id: Uuid,
        locale: &str,
        fallback_locale: Option<&str>,
    ) -> ForumResult<ReplyResponse> {
        self.inner
            .get_with_locale_fallback(tenant_id, security, reply_id, locale, fallback_locale)
            .await
    }

    pub async fn update(
        &self,
        tenant_id: Uuid,
        reply_id: Uuid,
        security: SecurityContext,
        input: UpdateReplyInput,
    ) -> ForumResult<ReplyResponse> {
        self.inner.update(tenant_id, reply_id, security, input).await
    }

    pub async fn list_for_topic(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        topic_id: Uuid,
        filter: ListRepliesFilter,
    ) -> ForumResult<(Vec<ReplyListItem>, u64)> {
        self.inner
            .list_for_topic(tenant_id, security, topic_id, filter)
            .await
    }

    pub async fn list_for_topic_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        topic_id: Uuid,
        filter: ListRepliesFilter,
        fallback_locale: Option<&str>,
    ) -> ForumResult<(Vec<ReplyListItem>, u64)> {
        self.inner
            .list_for_topic_with_locale_fallback(
                tenant_id,
                security,
                topic_id,
                filter,
                fallback_locale,
            )
            .await
    }

    pub async fn list_response_for_topic_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        topic_id: Uuid,
        filter: ListRepliesFilter,
        fallback_locale: Option<&str>,
    ) -> ForumResult<(Vec<ReplyResponse>, u64)> {
        self.inner
            .list_response_for_topic_with_locale_fallback(
                tenant_id,
                security,
                topic_id,
                filter,
                fallback_locale,
            )
            .await
    }

    pub async fn list_response_for_topic_by_statuses_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        topic_id: Uuid,
        filter: ListRepliesFilter,
        fallback_locale: Option<&str>,
        statuses: Option<&[ReplyStatus]>,
    ) -> ForumResult<(Vec<ReplyResponse>, u64)> {
        self.inner
            .list_response_for_topic_by_statuses_with_locale_fallback(
                tenant_id,
                security,
                topic_id,
                filter,
                fallback_locale,
                statuses,
            )
            .await
    }
"""
              if constructor not in reply_text:
                  raise SystemExit("reply owner constructor changed")
              reply_text = reply_text.replace(constructor, delegates, 1)
          deref = """impl Deref for ReplyService {
    type Target = reply::ReplyService;

    fn deref(&self) -> &Self::Target {
        &self.inner
    }
}

"""
          reply_text = reply_text.replace(deref, "", 1)
          reply_owner.write_text(reply_text)

          package = Path("package.json")
          package_text = package.read_text()
          package_marker = '"verify:forum:owner-boundary"'
          if package_marker not in package_text:
              old = '    "verify:forum:admin-boundary": "node scripts/verify/verify-forum-admin-boundary.mjs",\n    "test:verify:forum:admin-boundary": "node scripts/verify/verify-forum-admin-boundary.test.mjs",'
              new = '    "verify:forum:owner-boundary": "node scripts/verify/verify-forum-owner-boundary.mjs",\n    "test:verify:forum:owner-boundary": "node scripts/verify/verify-forum-owner-boundary.test.mjs",\n' + old
              if old not in package_text:
                  raise SystemExit("package forum scripts changed")
              package.write_text(package_text.replace(old, new, 1))

          plan = Path("crates/rustok-forum/docs/implementation-plan.md")
          plan_text = plan.read_text()
          plan_text = plan_text.replace(
              "2. retire raw lifecycle compatibility imports left by `FORUM-08`;",
              "2. keep the completed `FORUM-08` owner-boundary verifier green;",
              1,
          )
          old_section = """## `FORUM-08` compatibility cleanup — retire raw lifecycle services

**Status:** residual cleanup under completed `FORUM-08`  
**Priority:** P1  
**Dependencies:** all downstream call sites use root owner services

### Scope

- find and migrate direct imports of `services::topic::TopicService` and
  `services::reply::ReplyService`;
- make raw persistence modules crate-private;
- retain database triggers as invariant protection;
- add an architecture verifier rejecting new direct imports.

### Definition of done

Workspace consumers compile through the root owner services and no public
contract exposes persistence services.
"""
          new_section = """## `FORUM-08` compatibility cleanup — retire raw lifecycle services

**Status:** `done`  
**Priority:** P1  
**Dependencies:** completed owner lifecycle services

### Delivered

- raw `topic` and `reply` persistence modules are crate-private;
- root `TopicService` and `ReplyService` expose explicit create/read/update/list
  owner methods and no longer dereference into persistence implementations;
- the owner delete methods remain the only public deletion workflows, preserving
  tombstones, counter reconciliation and semantic events;
- `verify-forum-owner-boundary.mjs` rejects public raw modules, persistence
  `Deref` exposure and workspace imports that bypass the root owner facade.

### Verification

```bash
cargo check -p rustok-forum --all-targets --all-features
node scripts/verify/verify-forum-owner-boundary.mjs
node scripts/verify/verify-forum-owner-boundary.test.mjs
```
"""
          if old_section in plan_text:
              plan_text = plan_text.replace(old_section, new_section, 1)
          elif "**Status:** `done`" not in plan_text[plan_text.find("## `FORUM-08`"):plan_text.find("## `FORUM-12`")]:
              raise SystemExit("FORUM-08 plan section changed")
          plan.write_text(plan_text)

          crate_api = Path("crates/rustok-forum/CRATE_API.md")
          crate_api_text = crate_api.read_text()
          marker = "## Owner Service Boundary"
          if marker not in crate_api_text:
              section = """## Owner Service Boundary
- Public topic/reply workflows use the root `TopicService` and `ReplyService` exports.
- Raw `services::topic` and `services::reply` persistence modules are crate-private.
- Owner services expose explicit create/read/update/list methods and do not implement `Deref` to persistence services.
- Topic/reply deletion must use owner `delete` methods so tombstones, counters and semantic events remain atomic.
- Run `node scripts/verify/verify-forum-owner-boundary.mjs` after changing topic/reply service visibility or consumers.

"""
              anchor = "## Dependencies on Other RusToK Crates"
              if anchor not in crate_api_text:
                  raise SystemExit("CRATE_API dependency anchor changed")
              crate_api.write_text(crate_api_text.replace(anchor, section + anchor, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add crates/rustok-forum/src/services/mod.rs \
              crates/rustok-forum/src/services/topic_owner.rs \
              crates/rustok-forum/src/services/reply_owner.rs \
              crates/rustok-forum/docs/implementation-plan.md \
              crates/rustok-forum/CRATE_API.md package.json
            git commit -m "refactor(forum): retire raw lifecycle service exposure [forum-08-cutover]"
            git push origin HEAD:agent/forum-08-retire-raw-lifecycle-services
          fi
