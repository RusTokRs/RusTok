name: Index typed two-hop benchmark fix

on:
  push:
    branches:
      - agent/index-m2-1m-standard-runner
    paths:
      - ".github/workflows/index-two-hop-target-types-once.yml"
      - "scripts/verify/fix-index-two-hop-target-types-once.py"

permissions:
  contents: write

concurrency:
  group: index-two-hop-target-types-once
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/index-m2-1m-standard-runner
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply typed-link target predicates
        shell: bash
        run: |
          set -o pipefail
          python scripts/verify/fix-index-two-hop-target-types-once.py 2>&1 | tee patch-diagnostic.txt
      - name: Archive patch diagnostic
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: index-two-hop-target-types-diagnostic-${{ github.sha }}
          path: patch-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
      - name: Verify and commit clean benchmark fix
        shell: bash
        run: |
          git diff --check
          test "$(git diff --name-only | sort | tr '\n' ' ')" = "DECISIONS/2026-07-24-index-storage-layout.md crates/rustok-index/docs/implementation-plan.md crates/rustok-index/docs/storage-benchmark.md ops/benches/src/index_storage/sql/eav.rs ops/benches/src/index_storage/sql/hot.rs ops/benches/src/index_storage/sql/jsonb.rs scripts/verify/verify-index-fba.mjs "
          for file in \
            ops/benches/src/index_storage/sql/jsonb.rs \
            ops/benches/src/index_storage/sql/eav.rs \
            ops/benches/src/index_storage/sql/hot.rs; do
            grep -Fq "product_variant.target_entity = 'variant'" "$file"
            grep -Fq "variant_channel.target_entity = 'sales_channel'" "$file"
          done
          node scripts/verify/verify-index-fba.mjs
          git rm \
            .github/workflows/index-two-hop-target-types-once.yml \
            scripts/verify/fix-index-two-hop-target-types-once.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            DECISIONS/2026-07-24-index-storage-layout.md \
            crates/rustok-index/docs/implementation-plan.md \
            crates/rustok-index/docs/storage-benchmark.md \
            ops/benches/src/index_storage/sql/eav.rs \
            ops/benches/src/index_storage/sql/hot.rs \
            ops/benches/src/index_storage/sql/jsonb.rs \
            scripts/verify/verify-index-fba.mjs
          git commit -m "fix(index): constrain typed two-hop link targets"
          git push origin HEAD:agent/index-m2-1m-standard-runner
