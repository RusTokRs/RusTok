name: Complete tenant hardening contract

on:
  push:
    branches: [main]
    paths:
      - scripts/migrations/complete_tenant_hardening.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: complete-tenant-hardening-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Apply and validate tenant hardening completion
        id: completion
        shell: bash
        env:
          PYTHONWARNINGS: ignore::SyntaxWarning
        run: |
          set +e
          {
            python3 scripts/migrations/fix_seo_service_move.py && \
            python3 scripts/migrations/complete_tenant_profile_contract.py && \
            python3 scripts/migrations/complete_tenant_resolution_telemetry.py && \
            python3 scripts/migrations/complete_tenant_isolation_coverage.py && \
            rustfmt --edition 2021 \
              crates/rustok-seo/src/services/services_base.rs \
              apps/server/src/common/settings.rs \
              apps/server/src/middleware/tenant_resolution.rs \
              apps/server/src/middleware/tenant.rs \
              apps/server/src/controllers/graphql.rs \
              apps/server/tests/tenant_resolver_invariants_test.rs \
              crates/rustok-telemetry/src/metrics.rs \
              crates/rustok-telemetry/tests/metrics_test.rs && \
            node scripts/verify/verify-tenant-resolution-architecture.mjs && \
            cargo check -p rustok-seo && \
            cargo test -p rustok-telemetry --test metrics_test && \
            cargo test -p rustok-server tenant_policy_ && \
            cargo test -p rustok-server middleware::tenant_resolution::tests && \
            cargo test -p rustok-server graphql_ws_tenant_handshake_fails_closed && \
            cargo test -p rustok-server --test tenant_resolver_invariants_test && \
            git diff --check
          } > /tmp/tenant-hardening-completion.log 2>&1
          status=$?
          cat /tmp/tenant-hardening-completion.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Reset partial changes after failure
        if: steps.completion.outputs.status != '0'
        run: git reset --hard HEAD

      - name: Remove previous failure report
        if: steps.completion.outputs.status == '0'
        run: rm -f TENANT_HARDENING_COMPLETION_FAILURE.md

      - name: Prepare failure report
        if: steps.completion.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '# Tenant hardening completion failure'
            echo
            echo '```text'
            cat /tmp/tenant-hardening-completion.log
            echo '```'
          } > TENANT_HARDENING_COMPLETION_FAILURE.md

      - name: Remove one-time staging files
        shell: bash
        run: |
          rm -f \
            .github/workflows/complete-tenant-hardening.yml \
            scripts/migrations/fix_seo_service_move.py \
            scripts/migrations/complete_tenant_profile_contract.py \
            scripts/migrations/complete_tenant_resolution_telemetry.py \
            scripts/migrations/complete_tenant_isolation_coverage.py \
            scripts/migrations/complete_tenant_hardening.trigger

      - name: Commit atomically to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.completion.outputs.status }}" == "0" ]]; then
            message="security(tenant): complete runtime isolation contract"
          else
            message="chore: record tenant hardening completion failure"
          fi
          git commit -m "$message"
          git pull --rebase origin main
          git push origin HEAD:main
