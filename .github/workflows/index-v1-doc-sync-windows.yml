name: Index v1 documentation Windows sync

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/index-v1-doc-sync-windows.yml"
      - "scripts/verify/sync-index-v1-docs-once.py"

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply guarded documentation patch
        shell: pwsh
        run: |
          python scripts/verify/sync-index-v1-docs-once.py 2>&1 | Tee-Object -FilePath sync-diagnostic.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Archive synchronization diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: index-v1-doc-sync-windows-diagnostic-${{ github.sha }}
          path: sync-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
      - name: Verify and commit clean documentation diff
        shell: pwsh
        run: |
          $patterns = @(
            'index\.read_model\.v1',
            'index\.rebuild\.v1',
            'IndexReadModelPort',
            'crates/rustok-index/contracts/index-fba-registry.json',
            'crates/rustok-index/contracts/evidence/index-runtime-fallback-smoke.json'
          )
          $files = @(
            'docs/modules/registry.md',
            'docs/research/fluid-backend-architecture-unified-plan.md',
            'crates/rustok-index/docs/implementation-plan.md'
          )
          foreach ($pattern in $patterns) {
            if (Select-String -Path $files -Pattern $pattern -Quiet) {
              Write-Error "Removed Index v1 reference remains: $pattern"
              exit 1
            }
          }
          git diff --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git rm `
            .github/workflows/index-v1-doc-sync-branch.yml `
            .github/workflows/index-v1-doc-sync-pr.yml `
            .github/workflows/index-v1-doc-sync-macos.yml `
            .github/workflows/index-v1-doc-sync-windows.yml `
            scripts/verify/sync-index-v1-docs-once.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add `
            docs/modules/registry.md `
            docs/research/fluid-backend-architecture-unified-plan.md `
            crates/rustok-index/docs/implementation-plan.md
          git commit -m "docs(index): synchronize complete v1 removal"
          git push origin HEAD:${{ github.head_ref }}
