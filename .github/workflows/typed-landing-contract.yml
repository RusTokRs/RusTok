name: Validate typed landing contract

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/typed-landing-contract.yml

permissions:
  contents: write

concurrency:
  group: typed-landing-contract
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96
          components: rustfmt

      - name: Mark built-in landing templates
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/fly/src/registry.rs')
          text = path.read_text(encoding='utf-8')
          markers = {
              'fly.hero': 'hero',
              'fly.two_columns': 'two_columns',
              'fly.feature_grid': 'feature_grid',
              'fly.cta': 'call_to_action',
              'fly.contact_form': 'contact_form',
          }
          for block_id, marker in markers.items():
              block = text.index(f'"{block_id}"')
              root = text.index('"type": "section",', block)
              insertion = root + len('"type": "section",')
              marker_line = f'\n                "flyLandingSection": "{marker}",'
              if text[insertion:insertion + len(marker_line)] != marker_line:
                  text = text[:insertion] + marker_line + text[insertion:]
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate contract and consumers
        id: validation
        shell: bash
        run: |
          set +e
          {
            cargo fmt --package fly && \
            cargo check -p fly --all-features --all-targets && \
            cargo test -p fly --lib landing_contract::tests && \
            cargo test -p fly --lib registry::tests && \
            cargo test -p rustok-page-builder --lib --all-features && \
            cargo check -p rustok-page-builder-admin -p rustok-pages-admin && \
            git diff --check
          } > /tmp/typed-landing-contract.log 2>&1
          status=$?
          cat /tmp/typed-landing-contract.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record failure
        if: steps.validation.outputs.status != '0'
        shell: bash
        run: |
          git reset --hard HEAD
          {
            echo '# Typed landing contract validation failure'
            echo
            echo '```text'
            cat /tmp/typed-landing-contract.log
            echo '```'
          } > TYPED_LANDING_CONTRACT_FAILURE.md

      - name: Remove one-time workflow
        run: rm -f .github/workflows/typed-landing-contract.yml

      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.validation.outputs.status }}" == "0" ]]; then
            message="feat(fly): mark typed landing templates"
          else
            message="chore(fly): record typed landing contract failure"
          fi
          git commit -m "$message"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done
          exit 1
