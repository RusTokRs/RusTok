name: Index v1 documentation finalizer

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/index-v1-doc-finalize-slim.yml"
      - "scripts/verify/finalize-index-v1-docs-once.py"

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Remove remaining active Index v1 claims
        run: python scripts/verify/finalize-index-v1-docs-once.py
      - name: Verify and commit final documentation
        shell: bash
        run: |
          git diff --check
          git rm \
            .github/workflows/index-v1-doc-finalize-slim.yml \
            scripts/verify/finalize-index-v1-docs-once.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/modules/registry.md docs/research/fluid-backend-architecture-unified-plan.md
          git commit -m "docs(index): remove remaining active v1 claims"
          git push origin HEAD:${{ github.head_ref }}
