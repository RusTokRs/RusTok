name: SEO bulk terminal transaction slice

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: ${{ contains(github.event.head_commit.message, 'ci(seo): launch bulk terminal transaction runner') }}
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: "2011"
      HEAD_BRANCH: fix/seo-bulk-terminal-transaction-v2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply transactional bulk terminal patch
        run: python scripts/seo/apply_bulk_terminal_transaction.py

      - name: Format
        run: |
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Check SEO crate
        run: cargo check -p rustok-seo

      - name: Test SEO crate
        run: cargo test -p rustok-seo

      - name: Commit verified slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(seo): persist bulk terminal transitions atomically"
          git push --force origin HEAD:${HEAD_BRANCH}
