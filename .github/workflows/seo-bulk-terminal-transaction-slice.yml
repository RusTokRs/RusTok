name: SEO bulk terminal transaction slice

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/seo-bulk-terminal-transaction-v2' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_BRANCH }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Load trusted patch runner
        run: |
          git fetch origin main
          git show origin/main:scripts/seo/apply_bulk_terminal_transaction.py > /tmp/apply_bulk_terminal_transaction.py

      - name: Apply transactional bulk terminal patch
        run: python /tmp/apply_bulk_terminal_transaction.py

      - name: Format
        run: |
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Check SEO crate
        run: cargo check -p rustok-seo

      - name: Test SEO crate
        run: cargo test -p rustok-seo

      - name: Commit verified slice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(seo): persist bulk terminal transitions atomically"
          git push origin HEAD:${HEAD_BRANCH}
