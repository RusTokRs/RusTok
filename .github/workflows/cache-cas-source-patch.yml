name: Cache CAS source patch

on:
  push:
    branches: [main]
    paths:
      - "ci-cache-cas-patch-trigger"

permissions:
  contents: write

concurrency:
  group: cache-cas-source-patch-main
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Apply atomic entry-compute patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          cache_path = Path("crates/rustok-core/src/cache.rs")
          source = cache_path.read_text()

          old_import = "use moka::future::Cache;\nuse moka::Expiry;"
          new_import = "use moka::future::Cache;\nuse moka::ops::compute::{CompResult, Op};\nuse moka::Expiry;"
          if old_import not in source:
              raise SystemExit("expected Moka import block not found")
          source = source.replace(old_import, new_import, 1)

          old_cas = '''        let _guard = self.write_lock(key).lock().await;
          let current = self.cache.get(key).await;
          if current.as_ref().map(|entry| entry.payload.as_slice()) != Some(expected) {
              return Ok(CacheCompareAndSetOutcome::Mismatch);
          }

          self.write_value_unlocked(key.to_string(), value, ttl.unwrap_or(self.default_ttl))
              .await;
          Ok(CacheCompareAndSetOutcome::Applied)
'''
          new_cas = '''        let _guard = self.write_lock(key).lock().await;
          let ttl = ttl.unwrap_or(self.default_ttl);
          let replacement = InMemoryCacheValue {
              payload: value,
              ttl,
          };
          let result = self
              .cache
              .entry(key.to_string())
              .and_compute_with(|current| {
                  let operation = match current {
                      Some(entry) if entry.value().payload.as_slice() == expected => {
                          if ttl.is_zero() {
                              Op::Remove
                          } else {
                              Op::Put(replacement)
                          }
                      }
                      _ => Op::Nop,
                  };
                  std::future::ready(operation)
              })
              .await;

          Ok(match result {
              CompResult::ReplacedWith(_) | CompResult::Removed(_) => {
                  CacheCompareAndSetOutcome::Applied
              }
              CompResult::Unchanged(_) | CompResult::StillNone(_) => {
                  CacheCompareAndSetOutcome::Mismatch
              }
              CompResult::Inserted(_) => {
                  debug_assert!(false, "compare-and-set must never insert a missing entry");
                  CacheCompareAndSetOutcome::Mismatch
              }
          })
'''
          if source.count(old_cas) != 1:
              raise SystemExit(f"expected exactly one local CAS block, found {source.count(old_cas)}")
          source = source.replace(old_cas, new_cas, 1)
          cache_path.write_text(source)

          test_path = Path("crates/rustok-cache/tests/atomic_cas.rs")
          tests = test_path.read_text()
          marker = '''#[tokio::test]
          #[ignore = "requires a live Redis instance; set RUSTOK_CACHE_REAL_REDIS_URL"]
          async fn real_redis_compare_and_set_is_binary_safe_and_conditionally_deletes() {
'''
          guard = '''#[test]
          fn local_compare_and_set_uses_atomic_moka_entry_compute() {
              let source = include_str!("../../rustok-core/src/cache.rs");
              assert!(source.contains(".and_compute_with(|current|"));
              assert!(source.contains("CompResult::ReplacedWith(_) | CompResult::Removed(_)"));
              assert!(!source.contains("let current = self.cache.get(key).await;"));
          }

'''
          if guard not in tests:
              if marker not in tests:
                  raise SystemExit("Redis CAS test marker not found")
              tests = tests.replace(marker, guard + marker, 1)
              test_path.write_text(tests)
          PY
          rustfmt --edition 2021 crates/rustok-core/src/cache.rs crates/rustok-cache/tests/atomic_cas.rs
          git diff --check
      - name: Commit atomic CAS patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-core/src/cache.rs crates/rustok-cache/tests/atomic_cas.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(cache): make local CAS atomic with Moka entry compute"
          git pull --rebase origin main
          git push origin HEAD:main
