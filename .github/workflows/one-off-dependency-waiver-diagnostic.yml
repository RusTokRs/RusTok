name: One-off Dependency Waiver Diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIAGNOSTIC_ISSUE: 1851

jobs:
  inspect:
    if: >-
      github.event.head_commit.message == 'test(ci): inspect all-target waiver paths'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Persist all-target inverse dependency trees
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          capture_tree() {
            local package="$1"
            local output="/tmp/${package}.all-target.tree"
            local error="/tmp/${package}.all-target.error"
            set +e
            cargo tree --locked -i "$package" --workspace --all-features --target all \
              >"$output" 2>"$error"
            local status=$?
            set -e
            printf 'exit=%s\n' "$status"
            if [ -s "$output" ]; then
              cat "$output"
            else
              tail -n 40 "$error"
            fi
          }
          current_body=$(gh issue view "$DIAGNOSTIC_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          base_body=$(printf '%s\n' "$current_body" | sed '/^## All-target dependency paths$/,$d')
          {
            printf '%s\n\n' "$base_body"
            printf '## All-target dependency paths\n\n'
            printf '### atomic-polyfill\n\n```text\n'
            capture_tree atomic-polyfill
            printf '```\n\n### rsa\n\n```text\n'
            capture_tree rsa
            printf '```\n'
          } >/tmp/dependency-waiver-all-target.md
          gh issue edit "$DIAGNOSTIC_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-waiver-all-target.md
