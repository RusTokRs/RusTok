name: One-off Capture Atomic Advisory Tree

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SECURITY_ISSUE: 1851
  CARGO_TERM_COLOR: never

jobs:
  trace:
    if: >-
      github.event.head_commit.message == 'test(security): capture atomic advisory tree'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Persist atomic inverse tree
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo tree --locked --workspace --all-features --target all -i atomic-polyfill \
            > /tmp/atomic-polyfill.tree 2> /tmp/atomic-polyfill.stderr
          {
            printf 'Capture the exact locked all-target atomic-polyfill inverse tree.\n\n'
            printf '## Atomic inverse tree\n\n```text\n'
            cat /tmp/atomic-polyfill.tree
            printf '\n```\n\n## Cargo diagnostics\n\n```text\n'
            tail -n 20 /tmp/atomic-polyfill.stderr
            printf '\n```\n'
          } >/tmp/atomic-tree-body.md
          gh issue edit "$SECURITY_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/atomic-tree-body.md
