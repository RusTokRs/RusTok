name: One-off Retire Dependency Waivers

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SECURITY_ISSUE: 1851

jobs:
  retire:
    if: >-
      github.event.head_commit.message == 'test(security): capture waiver pruning exception'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Verify feature policy and all-target unreachability
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify/verify-dependency-feature-hygiene.mjs
          test -z "$(cargo tree --locked -i atomic-polyfill --workspace --all-features --target all 2>/dev/null)"
          test -z "$(cargo tree --locked -i rsa --workspace --all-features --target all 2>/dev/null)"
      - name: Prune disconnected lock packages and close waivers
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo metadata --locked --all-features --format-version 1 \
            > /tmp/cargo-metadata-all-features.json
          set +e
          python3 scripts/maintenance/retire-dependency-waivers.py \
            > /tmp/waiver-prune.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            {
              printf 'Retire the two temporary dependency waivers after proving all-target unreachability.\n\n'
              printf '## Exact workspace-root pruning failure\n\n```text\n'
              cat /tmp/waiver-prune.log
              printf '\n```\n'
            } > /tmp/waiver-prune-failure.md
            gh issue edit "$SECURITY_ISSUE" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/waiver-prune-failure.md
            exit "$status"
          fi
      - name: Verify retired-waiver contract
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify/verify-dependency-feature-hygiene.mjs
          node scripts/verify/verify-advisory-exceptions.mjs
          ! grep -qE 'RUSTSEC-2023-0071|RUSTSEC-2023-0089' .cargo/audit.toml
          ! grep -qE '^name = "(atomic-polyfill|rsa)"$' Cargo.lock
          cargo metadata --locked --all-features --format-version 1 >/dev/null
      - name: Verify bounded source diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(
            .cargo/audit.toml
            Cargo.lock
            docs/security/advisory-exceptions.md
            docs/security/rsa-rustsec-2023-0071.md
          )
          test "${#changed[@]}" = "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${changed[$index]}" = "${expected[$index]}"
          done
      - name: Commit and publish retired waivers
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cargo/audit.toml Cargo.lock docs/security/advisory-exceptions.md docs/security/rsa-rustsec-2023-0071.md
          git commit -m "security: retire unreachable dependency waivers"
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git merge-base --is-ancestor origin/main HEAD; then
              git rebase origin/main
              node scripts/verify/verify-dependency-feature-hygiene.mjs
              node scripts/verify/verify-advisory-exceptions.mjs
              ! grep -qE '^name = "(atomic-polyfill|rsa)"$' Cargo.lock
              cargo metadata --locked --all-features --format-version 1 >/dev/null
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
          done
          exit 1
      - name: Record closure evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            printf 'Temporary waivers retired. Pruned unreachable lockfile packages:\n\n```text\n'
            cat /tmp/removed-lock-packages.txt
            printf '```\n'
          } >/tmp/waiver-closure.md
          gh issue comment "$SECURITY_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/waiver-closure.md
