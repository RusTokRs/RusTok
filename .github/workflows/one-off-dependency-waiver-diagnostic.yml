name: One-off Trace RSA Feature Activation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SECURITY_ISSUE: 1851
  CARGO_TERM_COLOR: never

jobs:
  trace:
    if: >-
      github.event.head_commit.message == 'test(security): capture clean RSA feature activation'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Apply proposed root feature policy
        run: |
          python3 scripts/maintenance/retire-dependency-waivers.py
          node scripts/verify/verify-dependency-feature-hygiene.mjs
      - name: Persist clean feature-expanded RSA path
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo tree --all-features --target all -i rsa -e features \
            > /tmp/rsa-feature-tree.txt \
            2> /tmp/rsa-feature-tree.stderr
          test -s /tmp/rsa-feature-tree.txt
          {
            printf 'Trace the exact feature that keeps RSA active after disabling base SeaORM defaults.\n\n'
            printf '## Feature-expanded RSA path\n\n```text\n'
            cat /tmp/rsa-feature-tree.txt
            printf '\n```\n'
          } > /tmp/rsa-feature-body.md
          gh issue edit "$SECURITY_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/rsa-feature-body.md
