name: One-off Dependency Waiver Diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIAGNOSTIC_ISSUE: 1851

jobs:
  inspect:
    if: >-
      github.event.head_commit.message == 'test(ci): capture compact dependency waiver paths'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Capture compact locked dependency paths
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          capture_tree() {
            local package="$1"
            local output="/tmp/${package}.tree"
            local error="/tmp/${package}.error"
            set +e
            cargo tree --locked -i "$package" --workspace --all-features \
              >"$output" 2>"$error"
            local status=$?
            set -e
            printf 'exit=%s\n' "$status"
            if [ -s "$output" ]; then
              cat "$output"
            else
              tail -n 30 "$error"
            fi
          }
          {
            printf 'Compact dependency waiver evidence for `%s`.\n\n' "$GITHUB_SHA"
            printf '### Cargo.lock package names\n\n```text\n'
            grep -nE '^name = "(atomic-polyfill|rsa)"$' Cargo.lock || true
            printf '```\n\n### atomic-polyfill inverse tree\n\n```text\n'
            capture_tree atomic-polyfill
            printf '```\n\n### rsa inverse tree\n\n```text\n'
            capture_tree rsa
            printf '```\n'
          } > /tmp/dependency-waiver-compact.md
          gh issue comment "$DIAGNOSTIC_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-waiver-compact.md
