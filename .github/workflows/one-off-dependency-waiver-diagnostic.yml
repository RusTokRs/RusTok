name: One-off Inspect RSA Trace Run

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  actions: read
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SECURITY_ISSUE: 1851

jobs:
  inspect:
    if: >-
      github.event.head_commit.message == 'test(ci): inspect RSA trace run'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Persist diagnostic workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-dependency-waiver-diagnostic.yml \
            --limit 12 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url)
          {
            printf 'Inspect recent RSA dependency diagnostic runs.\n\n'
            printf '## Diagnostic runs\n\n```json\n%s\n```\n' "$runs"
          } >/tmp/rsa-trace-runs.md
          gh issue edit "$SECURITY_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/rsa-trace-runs.md
