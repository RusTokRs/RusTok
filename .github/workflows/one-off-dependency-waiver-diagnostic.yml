name: One-off Dependency Waiver Diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIAGNOSTIC_ISSUE: 1851

jobs:
  inspect:
    if: >-
      github.event.head_commit.message == 'test(ci): persist dependency waiver paths'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Persist compact locked dependency paths
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cargo tree --locked -i atomic-polyfill --workspace --all-features \
            >/tmp/atomic.tree 2>/tmp/atomic.error || true
          cargo tree --locked -i rsa --workspace --all-features \
            >/tmp/rsa.tree 2>/tmp/rsa.error || true
          {
            printf 'Verify and retire the temporary dependency waivers from the current locked graph.\n\n'
            printf '## Cargo.lock presence\n\n```text\n'
            grep -nE '^name = "(atomic-polyfill|rsa)"$' Cargo.lock || true
            printf '```\n\n## atomic-polyfill inverse tree\n\n```text\n'
            if [ -s /tmp/atomic.tree ]; then cat /tmp/atomic.tree; else tail -n 20 /tmp/atomic.error; fi
            printf '```\n\n## rsa inverse tree\n\n```text\n'
            if [ -s /tmp/rsa.tree ]; then cat /tmp/rsa.tree; else tail -n 20 /tmp/rsa.error; fi
            printf '```\n'
          } >/tmp/dependency-waiver-body.md
          gh issue edit "$DIAGNOSTIC_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-waiver-body.md
