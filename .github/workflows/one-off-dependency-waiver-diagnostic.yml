name: One-off Trace Atomic Target Triples

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-diagnostic.yml

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SECURITY_ISSUE: 1851
  CARGO_TERM_COLOR: never

jobs:
  trace:
    if: >-
      github.event.head_commit.message == 'test(security): trace atomic target triples'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Persist target-specific atomic inverse trees
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            thumbv6m-none-eabi
            riscv32i-unknown-none-elf
            riscv32imc-unknown-none-elf
            xtensa-esp32s2-none-elf
          )
          {
            printf 'Trace atomic-polyfill reachability for the exact target conditions reported by locked metadata.\n\n'
            for target in "${targets[@]}"; do
              set +e
              cargo tree --locked --workspace --all-features --target "$target" -i atomic-polyfill \
                > "/tmp/${target}.tree" 2> "/tmp/${target}.stderr"
              status=$?
              set -e
              printf '## %s (exit %s)\n\n```text\n' "$target" "$status"
              cat "/tmp/${target}.tree"
              if [ ! -s "/tmp/${target}.tree" ]; then
                tail -n 8 "/tmp/${target}.stderr"
              fi
              printf '\n```\n\n'
            done
          } >/tmp/atomic-target-trees.md
          gh issue edit "$SECURITY_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/atomic-target-trees.md
