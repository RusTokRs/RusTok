name: ULID compatibility once

on:
  pull_request:
    paths:
      - ".github/workflows/ulid-compat-once.yml"

permissions:
  contents: write

concurrency:
  group: ulid-compat-once-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/cache-hardening-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cache-hardening-continuation
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - name: Apply ULID 2 API migration
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          paths = [
              Path("crates/rustok-events/src/types.rs"),
              Path("crates/rustok-core/src/id.rs"),
          ]
          for path in paths:
              text = path.read_text()
              old = "Ulid::new()"
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one {old}, found {count}")
              path.write_text(text.replace(old, "Ulid::gen()", 1))
          PY
          ! grep -R "Ulid::new()" crates/rustok-events/src/types.rs crates/rustok-core/src/id.rs
          cargo check -p rustok-events --lib
          cargo check -p rustok-core --lib
      - name: Commit branch-only compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/ulid-compat-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-events/src/types.rs crates/rustok-core/src/id.rs .github/workflows/ulid-compat-once.yml
          git commit -m "fix(events): support ulid 2 generation API"
          git push origin HEAD:agent/cache-hardening-continuation
