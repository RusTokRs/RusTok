name: Forum category lifecycle subquery once

on:
  push:
    branches:
      - "agent/forum-category-lifecycle-subquery"
    paths:
      - ".github/workflows/forum-category-lifecycle-subquery-once.yml"

permissions:
  contents: write

concurrency:
  group: forum-category-lifecycle-subquery-once
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply guarded Forum category query patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service_path = Path("crates/rustok-forum/src/services/category.rs")
          source = service_path.read_text()

          old_import = """use sea_orm::{
              ActiveModelTrait, ActiveValue::Set, ColumnTrait, ConnectionTrait, DatabaseBackend,
              DatabaseConnection, DatabaseTransaction, EntityTrait, PaginatorTrait, QueryFilter, QueryOrder,
              Statement, TransactionTrait,
          };
          """
          new_import = """use sea_orm::{
              ActiveModelTrait, ActiveValue::Set, ColumnTrait, ConnectionTrait, DatabaseBackend,
              DatabaseConnection, DatabaseTransaction, EntityTrait, PaginatorTrait, QueryFilter, QueryOrder,
              Statement, TransactionTrait,
              sea_query::{Expr, Query, SelectStatement},
          };
          """

          old_query = """        let archived_category_ids = forum_category_lifecycle::Entity::find()
              .filter(forum_category_lifecycle::Column::TenantId.eq(tenant_id))
              .all(&self.db)
              .await?
              .into_iter()
              .map(|lifecycle| lifecycle.category_id)
              .collect::<Vec<_>>();
          let query = forum_category::Entity::find()
              .filter(forum_category::Column::TenantId.eq(tenant_id));
          let query = if archived_category_ids.is_empty() {
              query
          } else {
              query.filter(forum_category::Column::Id.is_not_in(archived_category_ids))
          };
          """
          new_query = """        let query = forum_category::Entity::find()
              .filter(forum_category::Column::TenantId.eq(tenant_id))
              .filter(
                  Expr::col((forum_category::Entity, forum_category::Column::Id))
                      .not_in_subquery(archived_category_ids_subquery(tenant_id)),
              );
          """

          helper_marker = "\nasync fn lock_category_tree_in_tx("
          helper = """
          fn archived_category_ids_subquery(tenant_id: Uuid) -> SelectStatement {
              Query::select()
                  .column(forum_category_lifecycle::Column::CategoryId)
                  .from(forum_category_lifecycle::Entity)
                  .and_where(
                      Expr::col((
                          forum_category_lifecycle::Entity,
                          forum_category_lifecycle::Column::TenantId,
                      ))
                      .eq(tenant_id),
                  )
                  .to_owned()
          }

          """

          for label, old in [("SeaORM imports", old_import), ("archived ID preload", old_query)]:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"expected exactly one {label} block, found {count}")
          if source.count(helper_marker) != 1:
              raise SystemExit("expected exactly one category tree lock helper marker")
          if "fn archived_category_ids_subquery" in source:
              raise SystemExit("category lifecycle subquery helper already exists")

          source = source.replace(old_import, new_import, 1)
          source = source.replace(old_query, new_query, 1)
          source = source.replace(helper_marker, "\n" + helper + "async fn lock_category_tree_in_tx(", 1)
          service_path.write_text(source)

          test_path = Path("crates/rustok-forum/tests/category_lifecycle_query_contract.rs")
          test_path.write_text(r'''const SOURCE: &str = include_str!("../src/services/category.rs");

fn function_source(name: &str) -> &str {
    let marker = format!("pub async fn {name}(");
    let start = SOURCE
        .find(marker.as_str())
        .unwrap_or_else(|| panic!("missing category service function {name}"));
    let after_start = &SOURCE[start + marker.len()..];
    let end = after_start
        .find("\n    pub async fn ")
        .unwrap_or(after_start.len());
    &SOURCE[start..start + marker.len() + end]
}

#[test]
fn category_pagination_filters_archived_rows_in_sql_without_preloading_ids() {
    let list_source = function_source("list_paginated_with_locale_fallback");

    assert!(
        list_source.contains("not_in_subquery(archived_category_ids_subquery(tenant_id))"),
        "category pagination must exclude archived rows in the database query"
    );
    assert!(
        !list_source.contains("forum_category_lifecycle::Entity::find()"),
        "category pagination must not load all lifecycle rows into memory"
    );
    assert!(
        !list_source.contains(".all(&self.db)"),
        "category pagination must remain bounded before hydration"
    );

    let helper_start = SOURCE
        .find("fn archived_category_ids_subquery")
        .expect("missing lifecycle subquery helper");
    let helper = &SOURCE[helper_start..SOURCE[helper_start..]
        .find("\nasync fn lock_category_tree_in_tx")
        .map(|offset| helper_start + offset)
        .expect("missing helper boundary")];
    assert!(helper.contains("forum_category_lifecycle::Column::CategoryId"));
    assert!(helper.contains("forum_category_lifecycle::Column::TenantId"));
    assert!(helper.contains(".eq(tenant_id)"));
}
''')

          Path(".github/workflows/forum-category-lifecycle-subquery-once.yml").unlink()
          PY

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-forum/src/services/category.rs \
            crates/rustok-forum/tests/category_lifecycle_query_contract.rs \
            .github/workflows/forum-category-lifecycle-subquery-once.yml
          git commit -m "fix(forum): filter archived categories in SQL"
          git push origin HEAD:${GITHUB_REF_NAME}
