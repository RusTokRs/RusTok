name: One-off Finalize Next Zero Style

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  finalize-next-zero-style:
    if: >-
      github.event.issue.title == '[automation] finalize Next zero-style boundary' &&
      (github.event_name == 'issues' || github.event.comment.body == '/finalize-next-zero-style')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact zero-style ratchet
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-csp-next-style-boundary.mjs")
          source = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"expected one exact gate match, found {count}: {old!r}")
              source = source.replace(old, new, 1)

          replace_once("const maxRegisteredFiles = 1;", "const maxRegisteredFiles = 0;")
          replace_once("const maxStyleAttributeSites = 43;", "const maxStyleAttributeSites = 0;")
          search_contract = '''requireMarkers("apps/next-frontend/packages/search/src/index.tsx", [
            "rounded-[1.75rem] border border-zinc-300 p-7",
            "grid-cols-[repeat(auto-fit,minmax(220px,1fr))]",
            "isSelected",
            "dark:border-zinc-700",
          ]);
          forbidMarkers("apps/next-frontend/packages/search/src/index.tsx", [
            "style=",
            "React.CSSProperties",
            "background:",
          ]);
          '''
          replace_once(
              'requireMarkers("apps/next-admin/src/widgets/data-table/data-table.tsx", [\n',
              search_contract + 'requireMarkers("apps/next-admin/src/widgets/data-table/data-table.tsx", [\n',
          )
          path.write_text(source)

          workflow = Path(".github/workflows/one-off-finalize-next-zero-style.yml")
          if not workflow.exists():
              raise SystemExit("one-off finalizer is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'const maxRegisteredFiles = 0;' scripts/verify/verify-csp-next-style-boundary.mjs
          grep -Fq 'const maxStyleAttributeSites = 0;' scripts/verify/verify-csp-next-style-boundary.mjs
          test ! -e .github/workflows/one-off-finalize-next-zero-style.yml
      - name: Commit zero-style ratchet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: enforce zero Next inline style boundary"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Next JSX style-prop and runtime style-element ratchets are zero; finalizer removed itself."
