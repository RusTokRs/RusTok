name: Apply current Page Builder cleanup

on:
  push:
    branches: [main]
    paths:
      - scripts/migrations/cleanup_page_builder_current.py
      - .github/workflows/cleanup-page-builder-current.yml
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: cleanup-page-builder-current-main
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.event_name == 'push' ||
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96
          components: rustfmt

      - name: Apply and validate cleanup
        id: cleanup
        shell: bash
        run: |
          set +e
          {
            python3 scripts/migrations/cleanup_page_builder_current.py && \
            cargo fmt --all && \
            cargo check -p fly -p rustok-page-builder --all-features && \
            cargo test -p fly --lib && \
            cargo test -p rustok-page-builder --lib --all-features && \
            git diff --check
          } > /tmp/page-builder-cleanup.log 2>&1
          status=$?
          cat /tmp/page-builder-cleanup.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Reset partial changes after failure
        if: steps.cleanup.outputs.status != '0'
        run: git reset --hard HEAD

      - name: Write failure report
        if: steps.cleanup.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '# Page Builder current-only cleanup failure'
            echo
            echo '```text'
            cat /tmp/page-builder-cleanup.log
            echo '```'
          } > PAGE_BUILDER_CLEANUP_FAILURE.md

      - name: Remove one-time files
        run: |
          rm -f \
            scripts/migrations/cleanup_page_builder_current.py \
            .github/workflows/cleanup-page-builder-current.yml

      - name: Commit atomically to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.cleanup.outputs.status }}" == "0" ]]; then
            message="refactor(page-builder): keep only the current API"
          else
            message="chore(page-builder): record current-only cleanup failure"
          fi
          git commit -m "$message"
          git pull --rebase origin main
          git push origin HEAD:main
