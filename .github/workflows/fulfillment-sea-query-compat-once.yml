name: Fulfillment SeaQuery compatibility once

on:
  pull_request:
    paths:
      - ".github/workflows/fulfillment-sea-query-compat-once.yml"

permissions:
  contents: write

concurrency:
  group: fulfillment-sea-query-compat-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/cache-hardening-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cache-hardening-continuation
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Apply and verify fulfillment compatibility
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          expected = {
              Path("crates/rustok-fulfillment/src/services/provider_operation.rs"): 1,
              Path("crates/rustok-fulfillment/src/services/provider_operation_recovery.rs"): 5,
          }
          old = "Expr::current_timestamp(),"
          new = "Expr::current_timestamp().into(),"
          for path, expected_count in expected.items():
              text = path.read_text()
              count = text.count(old)
              if count != expected_count:
                  raise SystemExit(
                      f"{path}: expected {expected_count} timestamp migrations, found {count}"
                  )
              path.write_text(text.replace(old, new))
          PY
          rustfmt --edition 2021 \
            crates/rustok-fulfillment/src/services/provider_operation.rs \
            crates/rustok-fulfillment/src/services/provider_operation_recovery.rs
          cargo check -p rustok-fulfillment --lib
      - name: Commit branch-only fulfillment fix
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/server-compile-diagnostics-once.yml
          rm .github/workflows/fulfillment-sea-query-compat-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/rustok-fulfillment/src/services/provider_operation.rs \
            crates/rustok-fulfillment/src/services/provider_operation_recovery.rs \
            .github/workflows/server-compile-diagnostics-once.yml \
            .github/workflows/fulfillment-sea-query-compat-once.yml
          git commit -m "fix(build): adapt fulfillment timestamps to SeaQuery API"
          git push origin HEAD:agent/cache-hardening-continuation
