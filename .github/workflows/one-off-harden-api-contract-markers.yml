name: One-off Harden API Contract Markers

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  harden-markers:
    if: >-
      github.event.issue.title == '[automation] harden API contract markers' &&
      (github.event_name == 'issues' || github.event.comment.body == '/harden-api-contract-markers')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact marker patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-api-compatibility-contract.mjs")
          source = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"expected one structural marker match, found {count}: {old!r}")
              source = source.replace(old, new, 1)

          replace_once(
              'requireMarkers("apps/server/src/bin/export_api_contracts.rs", [\n  "build_openapi_document",\n',
              'requireMarkers("apps/server/src/bin/export_api_contracts.rs", [\n'
              '  "let settings = RustokSettings::default();",\n'
              '  "settings.runtime.is_registry_only()",\n'
              '  "API compatibility export requires the full runtime host profile",\n'
              '  "build_openapi_document(&settings)",\n',
          )
          replace_once(
              'requireMarkers("scripts/verify/verify-api-compatibility-exceptions.mjs", [\n'
              '  \'"--file"\',\n'
              '  "policy.review_by",\n'
              '  "expires_on",\n'
              '  "openapi|graphql",\n'
              '  "VERIFICATION_DATE",\n'
              ']);\n',
              'requireMarkers("scripts/verify/verify-api-compatibility-exceptions.mjs", [\n'
              '  \'"--file"\',\n'
              '  "policy.review_by",\n'
              '  "expires_on",\n'
              '  "openapi|graphql",\n'
              '  "VERIFICATION_DATE",\n'
              ']);\n'
              'requireMarkers("scripts/verify/verify-api-compatibility-exceptions-local.mjs", [\n'
              '  "verify-api-compatibility-exceptions.mjs",\n'
              '  "docs/api/compatibility-exceptions.json",\n'
              '  \'"--file"\',\n'
              ']);\n',
          )

          path.write_text(source)
          workflow = Path(".github/workflows/one-off-harden-api-contract-markers.yml")
          if not workflow.exists():
              raise SystemExit("one-off workflow is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'settings.runtime.is_registry_only()' scripts/verify/verify-api-compatibility-contract.mjs
          grep -Fq 'verify-api-compatibility-exceptions-local.mjs' scripts/verify/verify-api-compatibility-contract.mjs
          test ! -e .github/workflows/one-off-harden-api-contract-markers.yml
      - name: Commit marker hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(api): guard full-profile contract export"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Full-profile export and local exception wrapper markers are now guarded; one-off workflow removed itself."
