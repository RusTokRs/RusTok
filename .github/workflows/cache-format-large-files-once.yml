name: Cache focused rustfmt once

on:
  pull_request:
    paths:
      - ".github/workflows/cache-format-large-files-once.yml"

permissions:
  contents: write

concurrency:
  group: cache-focused-rustfmt-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/cache-hardening-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cache-hardening-continuation
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Format changed large Rust files
        shell: bash
        run: |
          set -euo pipefail
          rustfmt --edition 2021 \
            crates/rustok-inventory/src/ports.rs \
            crates/rustok-events/src/types.rs
          cargo check -p rustok-inventory --lib
          cargo check -p rustok-events --lib
      - name: Commit branch-only formatting
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/cache-format-large-files-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-inventory/src/ports.rs crates/rustok-events/src/types.rs \
            .github/workflows/cache-format-large-files-once.yml
          git commit -m "style(build): format compatibility fixes"
          git push origin HEAD:agent/cache-hardening-continuation
