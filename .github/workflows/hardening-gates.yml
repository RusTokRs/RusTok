name: Hardening Gates

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repository-hardening:
    name: Repository Hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Verify module manifest documentation parity
        run: node scripts/verify/verify-module-manifest-docs-drift.mjs
      - name: Verify security advisory exceptions
        run: node scripts/verify/verify-advisory-exceptions.mjs

  tenant-hardening-completion:
    name: Tenant Hardening Completion
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'agent/finalize-tenant-hardening')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply focused SEO repair
        run: python3 scripts/migrations/fix_seo_service_move.py

      - name: Apply tenant runtime profile
        run: python3 scripts/migrations/complete_tenant_profile_contract.py

      - name: Apply tenant telemetry
        run: python3 scripts/migrations/complete_tenant_resolution_telemetry.py

      - name: Apply tenant isolation coverage
        env:
          PYTHONWARNINGS: ignore::SyntaxWarning
        run: python3 scripts/migrations/complete_tenant_isolation_coverage.py

      - name: Format changed Rust files
        run: |
          rustfmt --edition 2021 \
            crates/rustok-seo/src/services/services_base.rs \
            apps/server/src/common/settings.rs \
            apps/server/src/middleware/tenant_resolution.rs \
            apps/server/src/middleware/tenant.rs \
            apps/server/src/controllers/graphql.rs \
            apps/server/tests/tenant_resolver_invariants_test.rs \
            crates/rustok-telemetry/src/metrics.rs \
            crates/rustok-telemetry/tests/metrics_test.rs

      - name: Normalize generated text
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          paths = [
              "crates/rustok-seo/src/services/services_base.rs",
              "apps/server/src/common/settings.rs",
              "apps/server/src/middleware/tenant_resolution.rs",
              "apps/server/src/middleware/tenant.rs",
              "apps/server/src/controllers/graphql.rs",
              "apps/server/tests/tenant_resolver_invariants_test.rs",
              "crates/rustok-telemetry/src/metrics.rs",
              "crates/rustok-telemetry/tests/metrics_test.rs",
              "apps/server/config/development.yaml",
              "apps/server/config/test.yaml",
              "apps/server/config/production.redis.example.yaml",
              "DECISIONS/2026-04-03-request-trust-and-tenant-hardening.md",
              "docs/guides/metrics.md",
              "docs/verification/PLATFORM_HARDENING_IMPLEMENTATION_PLAN.md",
              "scripts/verify/verify-tenant-resolution-architecture.mjs",
          ]
          for raw_path in paths:
              path = Path(raw_path)
              text = path.read_text()
              path.write_text("\n".join(line.rstrip() for line in text.splitlines()) + "\n")
          PY

      - name: Verify tenant architecture
        run: node scripts/verify/verify-tenant-resolution-architecture.mjs

      - name: Verify generated diff
        run: git diff --check

      - name: Publish tenant result branch
        shell: bash
        run: |
          cat > .github/workflows/hardening-gates.yml <<'WORKFLOW'
          name: Hardening Gates

          on:
            push:
              branches:
                - "**"
            pull_request:
              branches:
                - "**"
            workflow_dispatch:

          permissions:
            contents: read

          concurrency:
            group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
            cancel-in-progress: true

          env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

          jobs:
            repository-hardening:
              name: Repository Hardening
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v7
                - uses: actions/setup-node@v6
                  with:
                    node-version: 22
                - name: Verify module manifest documentation parity
                  run: node scripts/verify/verify-module-manifest-docs-drift.mjs
                - name: Verify security advisory exceptions
                  run: node scripts/verify/verify-advisory-exceptions.mjs
          WORKFLOW
          sed -i 's/^          //' .github/workflows/hardening-gates.yml
          rm -f \
            TENANT_HARDENING_COMPLETION_FAILURE.md \
            scripts/migrations/fix_seo_service_move.py \
            scripts/migrations/complete_tenant_profile_contract.py \
            scripts/migrations/complete_tenant_resolution_telemetry.py \
            scripts/migrations/complete_tenant_isolation_coverage.py \
            scripts/migrations/complete_tenant_hardening.trigger
          git diff --check
          git checkout -B agent/tenant-hardening-result-final
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security(tenant): complete runtime isolation contract"
          git push --force origin HEAD:agent/tenant-hardening-result-final
