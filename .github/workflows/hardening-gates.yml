name: Hardening Gates

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repository-hardening:
    name: Repository Hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
      - name: Verify module manifest documentation parity
        run: node scripts/verify/verify-module-manifest-docs-drift.mjs
      - name: Verify security advisory exceptions
        run: node scripts/verify/verify-advisory-exceptions.mjs
      - name: Verify dependency feature hygiene
        run: node scripts/verify/verify-dependency-feature-hygiene.mjs
      - name: Verify dependency advisory reachability structure
        run: node scripts/verify/verify-dependency-advisory-reachability-contract.mjs
      - name: Verify Alloy SeaORM compatibility contract
        run: node scripts/verify/verify-alloy-seaorm-compat.mjs
      - name: Verify cache clock fail-closed contract
        run: node scripts/verify/verify-cache-clock-contract.mjs
      - name: Verify CSP reporting contract
        run: node scripts/verify/verify-csp-reporting-contract.mjs
      - name: Verify Rust-hosted CSP style boundary
        run: node scripts/verify/verify-csp-inline-style-exceptions.mjs
      - name: Verify Next CSP style boundary
        run: node scripts/verify/verify-csp-next-style-boundary.mjs
      - name: Verify API compatibility comparator fixtures
        run: node scripts/verify/verify-api-compatibility-self-test.mjs
      - name: Verify API compatibility exception approval fixtures
        run: node scripts/verify/verify-api-compatibility-exception-approval-self-test.mjs
      - name: Verify API compatibility infrastructure approval fixtures
        run: node scripts/verify/verify-api-compatibility-infra-self-test.mjs
      - name: Verify API compatibility exceptions
        run: >-
          node scripts/verify/verify-api-compatibility-exceptions.mjs
          --file docs/api/compatibility-exceptions.json
      - name: Verify API compatibility gate structure
        run: node scripts/verify/verify-api-compatibility-contract.mjs
      - name: Verify migration plan comparator fixtures
        run: node scripts/verify/verify-migration-plan-self-test.mjs
      - name: Verify migration backfill contract fixtures
        run: node scripts/verify/verify-migration-backfill-self-test.mjs
      - name: Verify migration infrastructure approval fixtures
        run: node scripts/verify/verify-migration-infra-self-test.mjs
      - name: Verify repository ruleset contract fixtures
        run: node scripts/verify/verify-repository-ruleset-self-test.mjs
      - name: Verify migration compatibility gate structure
        run: node scripts/verify/verify-migration-compatibility-contract.mjs
      - name: Verify release tooling fixtures
        run: node scripts/verify/verify-release-tooling-self-test.mjs
      - name: Verify release infrastructure approval fixtures
        run: node scripts/verify/verify-release-infra-self-test.mjs
      - name: Verify release supply-chain gate structure
        run: node scripts/verify/verify-release-supply-chain-contract.mjs
      - name: Verify release runtime image pin
        run: node scripts/verify/verify-release-runtime-image-contract.mjs
      - name: Verify release readiness documentation
        run: node scripts/verify/verify-release-readiness-contract.mjs
      - name: Verify Rust-host browser smoke structure
        run: node scripts/verify/verify-rust-host-browser-contract.mjs
      - name: Verify development container topology
        run: node scripts/verify/verify-development-container-topology.mjs
