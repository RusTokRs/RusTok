name: One-off Pin Release Actions

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pin-release-actions:
    if: >-
      github.event.issue.title == '[automation] pin release actions' &&
      (github.event_name == 'issues' || github.event.comment.body == '/pin-release-actions')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Pin release action references
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          pins = {
              "actions/checkout@v7": "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7",
              "actions/setup-node@v6": "actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6",
              "actions/upload-artifact@v7": "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7",
              "actions/download-artifact@v5": "actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5",
              "actions/attest@v4": "actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4",
          }

          for relative in [
              ".github/workflows/release.yml",
              ".github/workflows/release-infrastructure.yml",
              ".github/workflows/hardening-gates.yml",
          ]:
              path = Path(relative)
              source = path.read_text()
              for old, new in pins.items():
                  source = source.replace(old, new)
              path.write_text(source)

          verifier = Path("scripts/verify/verify-release-supply-chain-contract.mjs")
          source = verifier.read_text()
          replacements = {
              'if (!/@v\\d+$/.test(reference)) {': 'if (!/@[0-9a-f]{40}$/.test(reference)) {',
              'action reference must use an explicit major release tag': 'action reference must be pinned to a full commit SHA',
              '"actions/checkout@v7",': '"actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0",',
              '"actions/setup-node@v6",': '"actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38",',
              '"actions/upload-artifact@v7",': '"actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a",',
              '"actions/download-artifact@v5",': '"actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0",',
              '"actions/attest@v4",': '"actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6",',
              '"actions/attest@v4"': '"actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6"',
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f"release verifier marker missing: {old}")
              source = source.replace(old, new)
          verifier.write_text(source)

          Path(".github/workflows/one-off-pin-release-actions.yml").unlink()
          PY
      - name: Commit pinned release actions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security(release): pin GitHub actions by commit"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Release and policy actions pinned to full commit SHAs; one-off workflow removed itself."
