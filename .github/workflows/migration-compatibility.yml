name: Migration Compatibility

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"

jobs:
  oauth-cutover-artifact:
    if: github.head_ref == 'automation/oauth-transport-cutover'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Apply OAuth transport cutover
        run: python3 scripts/maintenance/apply_oauth_transport_cutover.py

      - name: Format
        run: cargo fmt --all

      - name: Verify multilingual DB contract
        run: node scripts/verify/verify-db-multilingual-contract.mjs

      - name: Check Auth admin SSR
        run: cargo check -p rustok-auth-admin --no-default-features --features ssr --locked

      - name: Check Channel admin SSR
        run: cargo check -p rustok-channel-admin --no-default-features --features ssr --locked

      - name: Check host admin SSR
        run: cargo check -p rustok-admin --no-default-features --features ssr --locked

      - name: Validate patch
        run: git diff --check

      - name: Package verified files
        run: |
          tar -czf oauth-cutover.tar.gz \
            crates/rustok-auth/admin/src/transport/native_server_adapter.rs \
            apps/admin/src/features/oauth_apps/transport/native_server_adapter.rs \
            crates/rustok-channel/admin/src/transport/native_server_adapter.rs \
            docs/architecture/database-multilingual-contract.json \
            docs/architecture/database-multilingual-transport-drift.md \
            docs/architecture/database-multilingual-audit.md

      - name: Upload verified OAuth cutover
        uses: actions/upload-artifact@v7
        with:
          name: oauth-cutover-${{ github.sha }}
          path: oauth-cutover.tar.gz
          if-no-files-found: error
          retention-days: 7
