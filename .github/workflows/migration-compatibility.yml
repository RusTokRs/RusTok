name: Migration Compatibility

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: oauth-cutover-final
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"

jobs:
  oauth-cutover-publisher:
    if: github.head_ref == 'automation/oauth-cutover-final'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: automation/oauth-cutover-final
          fetch-depth: 0

      - name: Detect completed staging publication
        id: state
        shell: bash
        run: |
          if test -f .github/oauth-cutover-published; then
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Capture baseline multilingual DB verification
        if: steps.state.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          node scripts/verify/verify-db-multilingual-contract.mjs > verifier-before.log 2>&1
          echo "$?" > verifier-before.exit
          cat verifier-before.log
          exit 0

      - name: Apply OAuth transport cutover
        if: steps.state.outputs.apply == 'true'
        run: python3 scripts/maintenance/apply_oauth_transport_cutover.py

      - name: Format
        if: steps.state.outputs.apply == 'true'
        run: cargo fmt --all

      - name: Capture patched multilingual DB verification
        if: steps.state.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          node scripts/verify/verify-db-multilingual-contract.mjs > verifier-after.log 2>&1
          echo "$?" > verifier-after.exit
          cat verifier-after.log
          if cmp -s verifier-before.log verifier-after.log; then
            echo 0 > verifier-delta.exit
          else
            echo 1 > verifier-delta.exit
            diff -u verifier-before.log verifier-after.log || true
          fi
          exit 0

      - name: Capture Auth admin SSR check
        if: steps.state.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          cargo check -p rustok-auth-admin --no-default-features --features ssr > auth-admin.log 2>&1
          echo "$?" > auth-admin.exit
          tail -n 160 auth-admin.log
          exit 0

      - name: Capture Channel admin SSR check
        if: steps.state.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          cargo check -p rustok-channel-admin --no-default-features --features ssr > channel-admin.log 2>&1
          echo "$?" > channel-admin.exit
          tail -n 160 channel-admin.log
          exit 0

      - name: Capture host admin baseline
        if: steps.state.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          cargo check -p rustok-admin --no-default-features --features ssr > host-admin.log 2>&1
          echo "$?" > host-admin.exit
          tail -n 160 host-admin.log
          exit 0

      - name: Validate and publish staging blobs
        if: steps.state.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat verifier-delta.exit)" = 0
          test "$(cat auth-admin.exit)" = 0
          test "$(cat channel-admin.exit)" = 0
          git diff --check
          git restore Cargo.lock
          printf '%s\n' \
            'OAuth transport blobs generated by run ${{ github.run_id }}.' \
            'Verifier delta: zero; rustok-auth-admin SSR: success; rustok-channel-admin SSR: success.' \
            'Host admin remains blocked by unrelated rustok-product baseline errors.' \
            > .github/oauth-cutover-published
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            crates/rustok-auth/admin/src/transport/native_server_adapter.rs \
            apps/admin/src/features/oauth_apps/transport/native_server_adapter.rs \
            crates/rustok-channel/admin/src/transport/native_server_adapter.rs \
            docs/architecture/database-multilingual-contract.json \
            docs/architecture/database-multilingual-transport-drift.md \
            docs/architecture/database-multilingual-audit.md \
            .github/oauth-cutover-published
          git commit -m 'fix(i18n): stage verified OAuth exact-locale transports'
          git push origin HEAD:automation/oauth-cutover-final
