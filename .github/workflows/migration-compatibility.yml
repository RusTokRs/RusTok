name: Migration Compatibility

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"

jobs:
  oauth-cutover-artifact:
    if: github.head_ref == 'automation/oauth-cutover-final'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Apply OAuth transport cutover
        run: python3 scripts/maintenance/apply_oauth_transport_cutover.py

      - name: Format
        run: cargo fmt --all

      - name: Capture multilingual DB verification
        shell: bash
        run: |
          set +e
          node scripts/verify/verify-db-multilingual-contract.mjs > verifier.log 2>&1
          echo "$?" > verifier.exit
          cat verifier.log
          exit 0

      - name: Capture Auth admin SSR check
        shell: bash
        run: |
          set +e
          cargo check -p rustok-auth-admin --no-default-features --features ssr --locked > auth-admin.log 2>&1
          echo "$?" > auth-admin.exit
          tail -n 160 auth-admin.log
          exit 0

      - name: Capture Channel admin SSR check
        shell: bash
        run: |
          set +e
          cargo check -p rustok-channel-admin --no-default-features --features ssr --locked > channel-admin.log 2>&1
          echo "$?" > channel-admin.exit
          tail -n 160 channel-admin.log
          exit 0

      - name: Capture host admin SSR check
        shell: bash
        run: |
          set +e
          cargo check -p rustok-admin --no-default-features --features ssr --locked > host-admin.log 2>&1
          echo "$?" > host-admin.exit
          tail -n 160 host-admin.log
          exit 0

      - name: Capture patch validation
        shell: bash
        run: |
          set +e
          git diff --check > diff-check.log 2>&1
          echo "$?" > diff-check.exit
          cat diff-check.log
          exit 0

      - name: Package patched files and diagnostics
        if: always()
        run: |
          tar -czf oauth-cutover.tar.gz \
            crates/rustok-auth/admin/src/transport/native_server_adapter.rs \
            apps/admin/src/features/oauth_apps/transport/native_server_adapter.rs \
            crates/rustok-channel/admin/src/transport/native_server_adapter.rs \
            docs/architecture/database-multilingual-contract.json \
            docs/architecture/database-multilingual-transport-drift.md \
            docs/architecture/database-multilingual-audit.md \
            verifier.log verifier.exit \
            auth-admin.log auth-admin.exit \
            channel-admin.log channel-admin.exit \
            host-admin.log host-admin.exit \
            diff-check.log diff-check.exit

      - name: Upload OAuth cutover artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: oauth-cutover-${{ github.sha }}
          path: oauth-cutover.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Enforce captured checks
        shell: bash
        run: |
          test "$(cat verifier.exit)" = 0
          test "$(cat auth-admin.exit)" = 0
          test "$(cat channel-admin.exit)" = 0
          test "$(cat host-admin.exit)" = 0
          test "$(cat diff-check.exit)" = 0
