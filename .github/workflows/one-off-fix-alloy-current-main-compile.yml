name: One-off Fix Alloy Current Main Compile

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: one-off-fix-alloy-current-main-compile
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repair-and-verify:
    if: github.repository == 'RusTokRs/RusTok' && github.head_ref == 'agent/fix-alloy-current-main-compile'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/fix-alloy-current-main-compile
          fetch-depth: 0

      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0

      - name: Apply bounded Alloy repair and temporary prerequisite
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path("crates/alloy/src/runner/test.rs"): [
                  ("crate::MAX_TEST_ERROR_LENGTH", "crate::model::MAX_TEST_ERROR_LENGTH", 1),
              ],
              Path("crates/alloy/src/storage/memory.rs"): [
                  ("crate::test_run_lease_expires_at", "crate::model::test_run_lease_expires_at", 2),
              ],
              Path("crates/alloy/src/storage/sea_orm.rs"): [
                  ("crate::test_run_lease_expires_at", "crate::model::test_run_lease_expires_at", 2),
                  (
                      ".col_expr(Column::UpdatedAt, Expr::col(Column::UpdatedAt))",
                      ".col_expr(Column::UpdatedAt, Expr::col(Column::UpdatedAt).into())",
                      2,
                  ),
              ],
              Path("crates/alloy/src/runner/release.rs"): [
                  ("G: AlloyReleaseGovernance,", "G: AlloyReleaseGovernance + ?Sized,", 2),
              ],
          }

          for path, edits in replacements.items():
              source = path.read_text()
              for old, new, expected in edits:
                  found = source.count(old)
                  if found == expected:
                      source = source.replace(old, new)
                  elif found == 0 and source.count(new) == expected:
                      continue
                  else:
                      raise SystemExit(
                          f"{path}: expected {expected} occurrence(s) of {old!r}, found {found}"
                      )
              path.write_text(source)

          migration = Path(
              "crates/rustok-modules/src/migrations/m20260718_000031_artifact_data_exports.rs"
          )
          source = migration.read_text()
          old = '''        manager
            .get_connection()
            .execute_unprepared("DROP TABLE module_artifact_data_exports")
            .await
'''
          new = '''        manager
            .get_connection()
            .execute_unprepared("DROP TABLE module_artifact_data_exports")
            .await?;
        Ok(())
'''
          if source.count(old) != 1:
              raise SystemExit("artifact export down prerequisite marker not found exactly once")
          migration.write_text(source.replace(old, new, 1))
          PY
          cargo fmt -p alloy -p rustok-modules
          git diff --check

      - name: Verify Alloy with known stacked prerequisite
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/alloy-current-main-compile
        run: cargo test --locked -p alloy

      - name: Commit and publish verified Alloy repair
        shell: bash
        run: |
          set -euo pipefail
          git restore -- \
            crates/rustok-modules/src/migrations/m20260718_000031_artifact_data_exports.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f -- .github/workflows/one-off-fix-alloy-current-main-compile.yml
          git add crates/alloy
          git diff --cached --check
          git commit -m "fix(alloy): restore current main compilation"
          git push origin HEAD:agent/fix-alloy-current-main-compile
