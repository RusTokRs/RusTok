name: One-off Fix Alloy Current Main Compile

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: one-off-fix-alloy-current-main-compile
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repair-and-verify:
    if: github.repository == 'RusTokRs/RusTok' && github.head_ref == 'agent/fix-alloy-current-main-compile'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/fix-alloy-current-main-compile
          fetch-depth: 0

      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0

      - name: Apply and verify bounded Alloy repair
        id: verify
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/alloy-current-main-compile
        run: |
          set +e
          (
            set -euo pipefail
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            python3 - <<'PY'
            from pathlib import Path

            replacements = {
                Path("crates/alloy/src/runner/test.rs"): [
                    ("crate::MAX_TEST_ERROR_LENGTH", "crate::model::MAX_TEST_ERROR_LENGTH", 1),
                ],
                Path("crates/alloy/src/storage/memory.rs"): [
                    ("crate::test_run_lease_expires_at", "crate::model::test_run_lease_expires_at", 2),
                ],
                Path("crates/alloy/src/storage/sea_orm.rs"): [
                    ("crate::test_run_lease_expires_at", "crate::model::test_run_lease_expires_at", 2),
                    (
                        ".col_expr(Column::UpdatedAt, Expr::col(Column::UpdatedAt))",
                        ".col_expr(Column::UpdatedAt, Expr::col(Column::UpdatedAt).into())",
                        2,
                    ),
                ],
                Path("crates/alloy/src/runner/release.rs"): [
                    ("G: AlloyReleaseGovernance,", "G: AlloyReleaseGovernance + ?Sized,", 2),
                ],
            }

            for path, edits in replacements.items():
                source = path.read_text()
                for old, new, expected in edits:
                    found = source.count(old)
                    if found == expected:
                        source = source.replace(old, new)
                    elif found == 0 and source.count(new) == expected:
                        pass
                    else:
                        raise SystemExit(
                            f"{path}: expected {expected} occurrence(s) of {old!r}, found {found}"
                        )
                path.write_text(source)
            PY

            git rm -f --ignore-unmatch .github/workflows/one-off-fix-alloy-current-main-compile.yml
            cargo fmt -p alloy
            cargo test --locked -p alloy
            cargo check --locked -p rustok-modules -p rustok-migrations
            cargo run --locked -p rustok-migrations --bin export_migration_plan -- \
              --output /tmp/alloy-current-main-migration-plan.json
            test -s /tmp/alloy-current-main-migration-plan.json
            git diff --check

            git add crates/alloy .github/workflows
            git commit -m "fix(alloy): restore current main compilation"
          ) > alloy-current-main-compile.log 2>&1
          exit_code=$?
          set -e
          tail -n 360 alloy-current-main-compile.log
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Upload Alloy compile diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: alloy-current-main-compile-${{ github.run_id }}
          path: alloy-current-main-compile.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce Alloy verification
        if: steps.verify.outputs.exit_code != '0'
        run: exit 1

      - name: Publish verified Alloy repair
        if: steps.verify.outputs.exit_code == '0'
        run: git push origin HEAD:agent/fix-alloy-current-main-compile
