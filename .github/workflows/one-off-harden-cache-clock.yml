          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(cache): fail closed on invalid system clock"
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git merge-base --is-ancestor origin/main HEAD; then
              git rebase origin/main
              node scripts/verify/verify-cache-clock-contract.mjs
              cargo check --locked -p rustok-cache --no-default-features
              cargo test --locked -p rustok-cache --no-default-features --lib
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
          done
          exit 1
      - name: Close cache clock issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
