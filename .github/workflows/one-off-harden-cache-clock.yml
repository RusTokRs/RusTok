name: One-off Publish Validated Cache Clock

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-harden-cache-clock.yml

permissions:
  contents: write
  issues: write

concurrency:
  group: one-off-publish-cache-clock
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CACHE_CLOCK_ISSUE: 1841

jobs:
  publish:
    if: >-
      github.event.head_commit.message == 'fix(ci): publish validated cache clock source'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0
      - name: Rebase onto current main
        run: git pull --rebase origin main
      - name: Install exact Rust formatter
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Recreate the validated cache clock source diff
        run: |
          python3 scripts/maintenance/apply-cache-clock-hardening.py
          rustfmt --edition 2021 \
            crates/rustok-cache/src/clock.rs \
            crates/rustok-cache/src/negative.rs \
            crates/rustok-cache/src/typed.rs \
            crates/rustok-cache/src/refresh.rs
          node scripts/verify/verify-cache-clock-contract.mjs
      - name: Verify validated implementation scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          mapfile -t changed < <(
            { git diff --name-only; git ls-files --others --exclude-standard; } | sort -u
          )
          expected=(
            .github/workflows/hardening-gates.yml
            crates/rustok-cache/src/clock.rs
            crates/rustok-cache/src/lib.rs
            crates/rustok-cache/src/negative.rs
            crates/rustok-cache/src/refresh.rs
            crates/rustok-cache/src/typed.rs
            scripts/verify/README.md
            scripts/verify/verify-all.sh
            scripts/verify/verify-cache-clock-contract.mjs
          )
          test "${#changed[@]}" = "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${changed[$index]}" = "${expected[$index]}"
          done
      - name: Exclude workflow wiring from GitHub App push
        run: git checkout -- .github/workflows/hardening-gates.yml
      - name: Verify source-only publish scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          mapfile -t changed < <(
            { git diff --name-only; git ls-files --others --exclude-standard; } | sort -u
          )
          expected=(
            crates/rustok-cache/src/clock.rs
            crates/rustok-cache/src/lib.rs
            crates/rustok-cache/src/negative.rs
            crates/rustok-cache/src/refresh.rs
            crates/rustok-cache/src/typed.rs
            scripts/verify/README.md
            scripts/verify/verify-all.sh
            scripts/verify/verify-cache-clock-contract.mjs
          )
          test "${#changed[@]}" = "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${changed[$index]}" = "${expected[$index]}"
          done
      - name: Commit and publish validated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/rustok-cache/src/clock.rs \
            crates/rustok-cache/src/lib.rs \
            crates/rustok-cache/src/negative.rs \
            crates/rustok-cache/src/refresh.rs \
            crates/rustok-cache/src/typed.rs \
            scripts/verify/README.md \
            scripts/verify/verify-all.sh \
            scripts/verify/verify-cache-clock-contract.mjs
          git commit -m "fix(cache): fail closed on invalid system clock"
          git push origin HEAD:main
      - name: Record source publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh issue comment "$CACHE_CLOCK_ISSUE"
          --repo "$GITHUB_REPOSITORY"
          --body "Validated cache clock source published. Workflow wiring and temporary-file cleanup are being completed through the GitHub connector because the Actions token has no workflows permission."
