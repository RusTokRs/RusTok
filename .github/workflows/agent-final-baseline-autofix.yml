name: Agent Final Baseline Autofix

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-final-baseline-autofix
  cancel-in-progress: true

jobs:
  autofix:
    if: ${{ github.event.pull_request.head.ref == 'agent/ci-baseline-final-clean' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/ci-baseline-final-clean
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/next-admin/package-lock.json
      - name: Apply verified baseline repairs
        shell: bash
        run: |
          cp scripts/ci/agent_final_baseline_autofix.py /tmp/agent_final_baseline_autofix.py
          set +e
          {
            set -euo pipefail
            git fetch origin main
            git reset --hard origin/main
            python /tmp/agent_final_baseline_autofix.py
            echo 'run cargo fmt --all'
            cargo fmt --all
            echo 'run Next Admin Prettier'
            npm ci --prefix apps/next-admin
            npm run --prefix apps/next-admin format
            echo 'update payment lockfile and compile stripe feature'
            cargo check -p rustok-payment --all-features
            git diff --check
          } > /tmp/final-baseline-autofix.log 2>&1
          status=$?
          cat /tmp/final-baseline-autofix.log
          echo "$status" > /tmp/final-baseline-autofix.status
          exit 0
      - name: Upload final autofix log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-final-baseline-autofix-log
          path: |
            /tmp/final-baseline-autofix.log
            /tmp/final-baseline-autofix.status
      - name: Commit verified baseline repairs
        shell: bash
        run: |
          status=$(cat /tmp/final-baseline-autofix.status)
          if [[ "$status" != "0" ]]; then
            exit "$status"
          fi
          git config user.name "RusToK CI Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix(ci): repair current repository baseline [agent-final-autofix]"
          git push --force-with-lease origin HEAD:agent/ci-baseline-final-clean
