name: One-off Finalize Next Chart Gate

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  finalize-chart-gate:
    if: >-
      github.event.issue.title == '[automation] migrate Next chart style boundary' &&
      github.event.comment.body == '/finalize-next-chart-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact gate reduction
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-csp-next-style-boundary.mjs")
          source = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"expected one exact gate match, found {count}: {old!r}")
              source = source.replace(old, new, 1)

          replace_once("const maxRegisteredFiles = 3;", "const maxRegisteredFiles = 2;")
          replace_once("const maxStyleAttributeSites = 47;", "const maxStyleAttributeSites = 45;")
          replace_once("const maxRuntimeStyleElements = 1;", "const maxRuntimeStyleElements = 0;")
          replace_once(
              '''requireMarkers("apps/next-admin/src/shared/ui/shadcn/chart.tsx", [
            "<style",
            "dangerouslySetInnerHTML",
            "--color-${configKey}",
          ]);''',
              '''requireMarkers("apps/next-admin/src/shared/ui/shadcn/chart.tsx", [
            "const CHART_INDICATOR_CLASSES",
            "function chartIndicatorClass",
            "chartIndicatorClass(index)",
          ]);
          forbidMarkers("apps/next-admin/src/shared/ui/shadcn/chart.tsx", [
            "style=",
            "<style",
            "dangerouslySetInnerHTML",
            "--color-${configKey}",
            "ChartStyle",
          ]);
          requireMarkers("apps/next-admin/src/features/overview/components/area-graph.tsx", [
            "stroke='var(--primary)'",
            "stopColor='var(--primary)'",
          ]);
          forbidMarkers("apps/next-admin/src/features/overview/components/area-graph.tsx", [
            "var(--color-desktop)",
            "var(--color-mobile)",
          ]);''',
          )
          path.write_text(source)

          workflow = Path(".github/workflows/one-off-finalize-next-chart-gate.yml")
          if not workflow.exists():
              raise SystemExit("one-off finalizer is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'const maxRuntimeStyleElements = 0;' scripts/verify/verify-csp-next-style-boundary.mjs
          grep -Fq 'function chartIndicatorClass' scripts/verify/verify-csp-next-style-boundary.mjs
          test ! -e .github/workflows/one-off-finalize-next-chart-gate.yml
      - name: Commit gate reduction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: close Next chart style boundary"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Next chart source, register and gate now use a zero-runtime-style contract; finalizer removed itself."
