name: Media port compatibility once

on:
  pull_request:
    paths:
      - ".github/workflows/media-port-compat-once.yml"

permissions:
  contents: write

concurrency:
  group: media-port-compat-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/cache-hardening-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cache-hardening-continuation
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Apply and test media port mapping
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("crates/rustok-media/src/ports.rs")
          text = path.read_text()

          mapping_pattern = re.compile(
              r'''(\s*MediaError::UnsupportedMimeType\(content_type\) => PortError::validation\(\s*
                  "media\.unsupported_mime_type",\s*
                  format!\("unsupported media type: \{content_type\}"\),\s*
              \),)\s*
              (MediaError::FileTooLarge \{ size, max \} => PortError::validation\()''',
              re.X,
          )
          mapping_replacement = '''\1
              MediaError::InvalidMediaContent { declared, reason } => PortError::validation(
                  "media.invalid_content",
                  format!("media content does not match declared type `{declared}`: {reason}"),
              ),
              \2'''
          text, mapping_count = mapping_pattern.subn(mapping_replacement, text, count=1)
          if mapping_count != 1:
              raise SystemExit(f"media mapping: expected one structural match, found {mapping_count}")

          oversized_line = '''        let oversized = media_error_to_port_error(MediaError::FileTooLarge { size: 12, max: 10 });'''
          invalid_block = '''        let invalid_content = media_error_to_port_error(MediaError::InvalidMediaContent {
              declared: "image/png".to_string(),
              reason: "signature mismatch".to_string(),
          });
          let oversized = media_error_to_port_error(MediaError::FileTooLarge { size: 12, max: 10 });'''
          if text.count(oversized_line) != 1:
              raise SystemExit(f"media oversized test anchor: expected one match, found {text.count(oversized_line)}")
          text = text.replace(oversized_line, invalid_block, 1)

          loop_anchor = '''        for error in [unsupported, oversized, invalid_locale] {'''
          loop_replacement = '''        assert_eq!(invalid_content.code, "media.invalid_content");
          for error in [unsupported, invalid_content, oversized, invalid_locale] {'''
          if text.count(loop_anchor) != 1:
              raise SystemExit(f"media validation loop: expected one match, found {text.count(loop_anchor)}")
          path.write_text(text.replace(loop_anchor, loop_replacement, 1))
          PY
          rustfmt --edition 2021 crates/rustok-media/src/ports.rs
          cargo test -p rustok-media --lib
      - name: Commit branch-only media fix
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/server-compile-diagnostics-once.yml
          rm .github/workflows/media-port-compat-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-media/src/ports.rs \
            .github/workflows/server-compile-diagnostics-once.yml \
            .github/workflows/media-port-compat-once.yml
          git commit -m "fix(media): map invalid content port errors"
          git push origin HEAD:agent/cache-hardening-continuation
