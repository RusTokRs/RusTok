name: Media port compatibility once

on:
  pull_request:
    paths:
      - ".github/workflows/media-port-compat-once.yml"

permissions:
  contents: write

concurrency:
  group: media-port-compat-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/cache-hardening-continuation'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cache-hardening-continuation
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Apply and test media port mapping
        id: verify
        shell: bash
        run: |
          set +e
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee "$RUNNER_TEMP/media-port-apply.log"
          from pathlib import Path

          path = Path("crates/rustok-media/src/ports.rs")
          text = path.read_text()

          file_too_large = "        MediaError::FileTooLarge { size, max } => PortError::validation("
          invalid_arm = (
              "        MediaError::InvalidMediaContent { declared, reason } => PortError::validation(\n"
              "            \"media.invalid_content\",\n"
              "            format!(\"media content does not match declared type `{declared}`: {reason}\"),\n"
              "        ),\n"
          )
          if text.count(file_too_large) != 1:
              raise SystemExit(
                  f"media file-too-large anchor: expected one match, found {text.count(file_too_large)}"
              )
          if "MediaError::InvalidMediaContent { declared, reason }" not in text:
              text = text.replace(file_too_large, invalid_arm + file_too_large, 1)

          oversized_line = (
              "        let oversized = media_error_to_port_error("
              "MediaError::FileTooLarge { size: 12, max: 10 });"
          )
          invalid_test = (
              "        let invalid_content = media_error_to_port_error(MediaError::InvalidMediaContent {\n"
              "            declared: \"image/png\".to_string(),\n"
              "            reason: \"signature mismatch\".to_string(),\n"
              "        });\n"
          )
          if text.count(oversized_line) != 1:
              raise SystemExit(
                  f"media oversized test anchor: expected one match, found {text.count(oversized_line)}"
              )
          if "let invalid_content = media_error_to_port_error" not in text:
              text = text.replace(oversized_line, invalid_test + oversized_line, 1)

          loop_anchor = "        for error in [unsupported, oversized, invalid_locale] {"
          loop_replacement = (
              "        assert_eq!(invalid_content.code, \"media.invalid_content\");\n"
              "        for error in [unsupported, invalid_content, oversized, invalid_locale] {"
          )
          if text.count(loop_anchor) != 1:
              raise SystemExit(
                  f"media validation loop: expected one match, found {text.count(loop_anchor)}"
              )
          text = text.replace(loop_anchor, loop_replacement, 1)
          path.write_text(text)
          PY
          apply_status=${PIPESTATUS[0]}
          echo "$apply_status" > "$RUNNER_TEMP/media-port-apply.status"

          if [[ "$apply_status" -eq 0 ]]; then
            rustfmt --edition 2021 crates/rustok-media/src/ports.rs \
              2>&1 | tee "$RUNNER_TEMP/media-port-rustfmt.log"
            fmt_status=${PIPESTATUS[0]}
          else
            fmt_status=125
            : > "$RUNNER_TEMP/media-port-rustfmt.log"
          fi
          echo "$fmt_status" > "$RUNNER_TEMP/media-port-rustfmt.status"

          if [[ "$apply_status" -eq 0 && "$fmt_status" -eq 0 ]]; then
            cargo test -p rustok-media --lib \
              2>&1 | tee "$RUNNER_TEMP/rustok-media-test.log"
            test_status=${PIPESTATUS[0]}
          else
            test_status=125
            : > "$RUNNER_TEMP/rustok-media-test.log"
          fi
          echo "$test_status" > "$RUNNER_TEMP/rustok-media-test.status"

          if [[ "$apply_status" -eq 0 && "$fmt_status" -eq 0 && "$test_status" -eq 0 ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: media-port-compat-diagnostics
          path: |
            ${{ runner.temp }}/media-port-apply.log
            ${{ runner.temp }}/media-port-apply.status
            ${{ runner.temp }}/media-port-rustfmt.log
            ${{ runner.temp }}/media-port-rustfmt.status
            ${{ runner.temp }}/rustok-media-test.log
            ${{ runner.temp }}/rustok-media-test.status
          if-no-files-found: error
      - name: Commit branch-only media fix
        if: steps.verify.outputs.ok == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/server-compile-diagnostics-once.yml
          rm .github/workflows/media-port-compat-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-media/src/ports.rs \
            .github/workflows/server-compile-diagnostics-once.yml \
            .github/workflows/media-port-compat-once.yml
          git commit -m "fix(media): map invalid content port errors"
          git push origin HEAD:agent/cache-hardening-continuation
