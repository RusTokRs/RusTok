name: One-off Repair Rust CSP Style Verifier

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-csp-style-diagnostic.yml

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIAGNOSTIC_ISSUE: 1850

jobs:
  repair:
    if: >-
      github.event.head_commit.message == 'fix(ci): repair Rust CSP style verifier boundary'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - name: Make production policy scanning test-aware
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-csp-inline-style-exceptions.mjs")
          source = path.read_text()
          helper_marker = '''function forbidMarkers(file, markers) {
            const source = read(file);
            for (const marker of markers) {
              if (source.includes(marker)) failures.push(`${file}: forbidden legacy marker ${marker}`);
            }
            return source;
          }
          '''
          helper_replacement = helper_marker + '''
          function productionRustSource(source) {
            const testBoundary = source.search(/^\\s*#\\[cfg\\(test\\)\\]\\s*$/m);
            return testBoundary === -1 ? source : source.slice(0, testBoundary);
          }

          function forbidProductionMarkers(file, markers) {
            const source = productionRustSource(read(file));
            for (const marker of markers) {
              if (source.includes(marker)) {
                failures.push(`${file}: forbidden production legacy marker ${marker}`);
              }
            }
            return source;
          }

          const testOnlyForbiddenFixture = `const POLICY: &str = "style-src-attr 'none'";
          #[cfg(test)]
          mod tests { const FORBIDDEN: &str = "style-src-attr 'unsafe-inline'"; }`;
          if (productionRustSource(testOnlyForbiddenFixture).includes("style-src-attr 'unsafe-inline'")) {
            failures.push("production Rust source parser must exclude cfg(test) negative fixtures");
          }
          const productionForbiddenFixture = `const POLICY: &str = "style-src-attr 'unsafe-inline'";
          #[cfg(test)]
          mod tests {}`;
          if (!productionRustSource(productionForbiddenFixture).includes("style-src-attr 'unsafe-inline'")) {
            failures.push("production Rust source parser must preserve forbidden production policy markers");
          }
          '''
          if source.count(helper_marker) != 1:
              raise SystemExit("expected exactly one forbidMarkers helper")
          source = source.replace(helper_marker, helper_replacement, 1)

          policy_marker = '''  forbidMarkers(file, [
              "style-src 'self' 'unsafe-inline'",
              "style-src-attr 'unsafe-inline'",
              "RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES",
              "strict_style_attributes_enabled",
              "STRICT_STYLE_TEMPLATE",
            ]);
          '''
          policy_replacement = policy_marker.replace("forbidMarkers", "forbidProductionMarkers", 1)
          if source.count(policy_marker) != 1:
              raise SystemExit("expected exactly one CSP production-policy forbid block")
          path.write_text(source.replace(policy_marker, policy_replacement, 1))
          PY
      - name: Verify repaired Rust-hosted CSP style boundary
        run: node scripts/verify/verify-csp-inline-style-exceptions.mjs
      - name: Verify bounded diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test "$(git diff --name-only)" = "scripts/verify/verify-csp-inline-style-exceptions.mjs"
      - name: Publish verifier repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify/verify-csp-inline-style-exceptions.mjs
          git commit -m "fix(ci): distinguish CSP policy from test fixtures"
          git push origin HEAD:main
      - name: Record repair evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh issue comment "$DIAGNOSTIC_ISSUE"
          --repo "$GITHUB_REPOSITORY"
          --body "Rust-hosted CSP verifier now scans production policy before the cfg(test) boundary, retains fail-closed fixtures for real production unsafe-inline markers, and passes with the zero-exception ratchet unchanged."
