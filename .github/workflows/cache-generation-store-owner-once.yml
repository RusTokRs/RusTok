name: One-shot service-owned generation store

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cache-generation-store-owner-once.yml"

permissions:
  contents: write

jobs:
  transform:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Move generation store ownership into CacheService
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, name: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{name}: expected one exact match, found {count}")
              return text.replace(old, new, 1)

          def sub_once(text: str, pattern: str, replacement: str, name: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{name}: expected one regex match, found {count}")
              return updated

          service_path = Path("crates/rustok-cache/src/service.rs")
          service = service_path.read_text()
          service = replace_once(
              service,
              "use rustok_core::{CacheBackend, CacheCompareAndSetOutcome, CacheStats, InMemoryCacheBackend};\n",
              "use rustok_core::{CacheBackend, CacheCompareAndSetOutcome, CacheStats, InMemoryCacheBackend};\n\nuse crate::generation::CacheNamespaceGenerationStore;\n",
              "generation store import",
          )
          service = replace_once(
              service,
              "    invalidations: CacheInvalidationService,\n}",
              "    invalidations: CacheInvalidationService,\n    generation_store: CacheNamespaceGenerationStore,\n}",
              "service generation field",
          )
          service = replace_once(
              service,
              "        let invalidations = CacheInvalidationService::new(redis_client.clone());\n        Self {\n",
              "        let invalidations = CacheInvalidationService::new(redis_client.clone());\n        let generation_store = CacheNamespaceGenerationStore::new(redis_client.clone());\n        Self {\n",
              "redis generation construction",
          )
          service = replace_once(
              service,
              "            invalidations,\n        }\n    }\n\n    #[cfg(not(feature = \"redis-cache\"))]",
              "            invalidations,\n            generation_store,\n        }\n    }\n\n    #[cfg(not(feature = \"redis-cache\"))]",
              "redis generation field construction",
          )
          service = replace_once(
              service,
              "            invalidations: CacheInvalidationService::new(),\n        }\n    }",
              "            invalidations: CacheInvalidationService::new(),\n            generation_store: CacheNamespaceGenerationStore::new(),\n        }\n    }",
              "local generation field construction",
          )
          service = sub_once(
              service,
              r"    /// Stable clone-shared identity for process-local generation store ownership\..*?    pub\(crate\) fn generation_store_identity\(&self\) -> Arc<dyn std::any::Any \+ Send \+ Sync> \{\n        self\.loaders\.clone\(\)\n    \}\n",
              "    /// Returns the clone-shared namespace generation store owned by this service.\n"
              "    pub fn namespace_generations(&self) -> CacheNamespaceGenerationStore {\n"
              "        self.generation_store.clone()\n"
              "    }\n",
              "identity accessor replacement",
          )
          service_path.write_text(service)

          generation_path = Path("crates/rustok-cache/src/generation.rs")
          generation = generation_path.read_text()
          generation = replace_once(generation, "use std::any::Any;\n", "", "Any import")
          generation = replace_once(
              generation,
              "use std::sync::{Arc, Mutex as StdMutex, OnceLock};\n",
              "use std::sync::{Arc, Mutex as StdMutex};\n",
              "OnceLock import",
          )
          generation = replace_once(generation, "\nuse crate::CacheService;\n", "", "CacheService import")
          generation = replace_once(
              generation,
              "pub const DEFAULT_MAX_SHARED_GENERATION_STORES: usize = 256;\n",
              "",
              "shared store registry capacity",
          )
          generation = generation.replace(
              "    fn new(redis_client: Option<redis::Client>) -> Self {",
              "    pub(crate) fn new(redis_client: Option<redis::Client>) -> Self {",
              1,
          )
          generation = generation.replace(
              "    fn new() -> Self {",
              "    pub(crate) fn new() -> Self {",
              1,
          )
          generation = sub_once(
              generation,
              r"\nstruct RegisteredGenerationStore \{.*?\n\}\n\n#\[derive\(Debug, Clone, PartialEq, Eq\)\]",
              "\n#[derive(Debug, Clone, PartialEq, Eq)]",
              "global generation store registry",
          )
          generation = replace_once(
              generation,
              "mod tests {\n    use super::*;\n",
              "mod tests {\n    use super::*;\n    use crate::CacheService;\n",
              "test CacheService import",
          )
          generation_path.write_text(generation)
          PY

          cargo fmt --all
          cargo check -p rustok-cache --lib
          cargo test -p rustok-cache --lib generation
          cargo test -p rustok-cache --test generation_store_regression

      - name: Commit validated transformation to branch
        shell: bash
        run: |
          git switch -c cache/service-owned-generation-store-v2
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-cache/src/service.rs crates/rustok-cache/src/generation.rs
          git commit -m "fix(cache): own generation store in cache service"
          git push origin HEAD:cache/service-owned-generation-store-v2
