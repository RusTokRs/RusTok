name: One-off Bind Base-Owned API Workflow

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bind-base-owned-workflow:
    if: >-
      github.event.issue.title == '[automation] bind base-owned API compatibility workflow' &&
      (github.event_name == 'issues' || github.event.comment.body == '/bind-base-owned-api-workflow')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact trust-boundary markers
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-api-compatibility-contract.mjs")
          source = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"expected one structural marker match, found {count}: {old!r}")
              source = source.replace(old, new, 1)

          replace_once(
              '  "name: API Compatibility",\n'
              '  "github.event.pull_request.base.repo.full_name",\n',
              '  "name: API Compatibility",\n'
              '  "pull_request_target:",\n'
              '  "github.event_name == \'pull_request_target\'",\n'
              '  "github.event.pull_request.base.repo.full_name",\n',
          )
          replace_once(
              '  "repository: ${{ env.HEAD_REPOSITORY }}",\n'
              '  "Verify base comparator fixtures",\n',
              '  "repository: ${{ env.HEAD_REPOSITORY }}",\n'
              '  "persist-credentials: false",\n'
              '  "Verify base comparator fixtures",\n',
          )
          replace_once(
              'forbidMarkers(".github/workflows/api-compatibility.yml", [\n'
              '  \'head/scripts/verify/verify-api-compatibility.mjs\',\n',
              'forbidMarkers(".github/workflows/api-compatibility.yml", [\n'
              '  "\\n  pull_request:\\n",\n'
              '  "github.event_name == \'pull_request\'",\n'
              '  \'head/scripts/verify/verify-api-compatibility.mjs\',\n',
          )

          path.write_text(source)
          workflow = Path(".github/workflows/one-off-bind-base-owned-api-workflow.yml")
          if not workflow.exists():
              raise SystemExit("one-off workflow is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'pull_request_target:' scripts/verify/verify-api-compatibility-contract.mjs
          grep -Fq 'persist-credentials: false' scripts/verify/verify-api-compatibility-contract.mjs
          grep -Fq 'github.event_name == '\''pull_request'\''' scripts/verify/verify-api-compatibility-contract.mjs
          test ! -e .github/workflows/one-off-bind-base-owned-api-workflow.yml
      - name: Commit trust-boundary markers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(api): bind base-owned workflow trust boundary"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Base-owned workflow trigger and credential isolation are structurally guarded; one-off workflow removed itself."
