name: SEO revision rollback transaction patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.head_ref == 'agent/seo-revision-rollback-transaction' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply revision rollback transaction patch
        run: python scripts/seo/apply_revision_rollback_transaction.py

      - name: Commit clean SEO slice
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/seo-revision-rollback-transaction.yml
          rm -f scripts/seo/apply_revision_rollback_transaction.py
          git config user.name "RusTok Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(seo): persist revision rollback atomically"
          git push origin HEAD:${{ github.head_ref }}
