name: Agent Baseline Failure Diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    if: ${{ github.event.pull_request.head.ref == 'agent/ci-baseline-page-builder-diagnostics' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: agent-baseline-failure-diagnostics
      - name: Install typos CLI
        uses: crate-ci/typos@master
        continue-on-error: true
      - name: Capture all current baseline failures
        shell: bash
        run: |
          mkdir -p /tmp/baseline-failures
          set +e
          cargo +stable fmt --all -- --check > /tmp/baseline-failures/fmt.log 2>&1
          echo $? > /tmp/baseline-failures/fmt.status
          cargo +stable check --workspace --all-targets --all-features \
            > /tmp/baseline-failures/check.log 2>&1
          echo $? > /tmp/baseline-failures/check.status
          cargo +stable clippy --workspace --all-targets --no-deps -- -D warnings \
            > /tmp/baseline-failures/clippy.log 2>&1
          echo $? > /tmp/baseline-failures/clippy.status
          cargo +stable doc --no-deps --all-features --workspace \
            > /tmp/baseline-failures/doc.log 2>&1
          echo $? > /tmp/baseline-failures/doc.status
          cargo +1.93.1 test -p rustok-page-builder-admin --lib -- --nocapture \
            > /tmp/baseline-failures/page-builder.log 2>&1
          echo $? > /tmp/baseline-failures/page-builder.status
          cargo +stable test -p rustok-cache --no-default-features -- --nocapture \
            > /tmp/baseline-failures/cache-memory.log 2>&1
          echo $? > /tmp/baseline-failures/cache-memory.status
          "$RUNNER_TEMP/typos" . > /tmp/baseline-failures/typos.log 2>&1
          echo $? > /tmp/baseline-failures/typos.status
          exit 0
      - uses: actions/upload-artifact@v7
        with:
          name: agent-baseline-failure-diagnostics
          path: /tmp/baseline-failures
      - name: Fail on diagnostics
        shell: bash
        run: |
          failed=0
          for status in /tmp/baseline-failures/*.status; do
            code=$(cat "$status")
            echo "$(basename "$status"): $code"
            if [[ "$code" != "0" ]]; then failed=1; fi
          done
          exit "$failed"
