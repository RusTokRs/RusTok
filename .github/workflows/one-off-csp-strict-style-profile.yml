name: One-off Strict Style CSP Profile

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  add-strict-style-profile:
    if: >-
      github.event.issue.title == '[automation] add strict style CSP smoke profile' &&
      (github.event_name == 'issues' || github.event.comment.body == '/add-strict-style-csp-profile')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact strict-profile patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact match, found {count}: {old!r}")
              file.write_text(source.replace(old, new, 1))

          def replace_count(path: str, old: str, new: str, expected: int) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != expected:
                  raise SystemExit(f"{path}: expected {expected} exact matches, found {count}: {old!r}")
              file.write_text(source.replace(old, new))

          server = "apps/server/src/middleware/security_headers.rs"
          relaxed = "const UI_CSP_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";"
          strict = "const UI_CSP_STRICT_STYLE_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";"
          replace_once(server, relaxed, relaxed + "\n" + strict)
          replace_once(
              server,
              """    let enforced_policy = select_csp(
                  &path,
                  csp_nonce.as_ref(),
                  plaintext_websocket_allowed(),
              );""",
              """    let enforced_policy = select_csp(
                  &path,
                  csp_nonce.as_ref(),
                  plaintext_websocket_allowed(),
                  strict_style_attributes_enabled(),
              );""",
          )
          replace_once(
              server,
              """fn select_csp(
              path: &str,
              csp_nonce: Option<&CspNonce>,
              allow_plaintext_websocket: bool,
          ) -> String {""",
              """fn select_csp(
              path: &str,
              csp_nonce: Option<&CspNonce>,
              allow_plaintext_websocket: bool,
              strict_style_attributes: bool,
          ) -> String {""",
          )
          replace_once(
              server,
              """        UI_CSP_TEMPLATE
                      .replace("{nonce}", csp_nonce.source_expression().as_str())
                      .replace("{connect_sources}", connect_sources)""",
              """        let template = if strict_style_attributes {
                      UI_CSP_STRICT_STYLE_TEMPLATE
                  } else {
                      UI_CSP_TEMPLATE
                  };
                  template
                      .replace("{nonce}", csp_nonce.source_expression().as_str())
                      .replace("{connect_sources}", connect_sources)""",
          )
          replace_once(
              server,
              """fn parse_env_flag(value: &str) -> bool {""",
              """fn strict_style_attributes_enabled() -> bool {
              std::env::var("RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES")
                  .map(|value| parse_env_flag(value.as_str()))
                  .unwrap_or(false)
          }

          fn parse_env_flag(value: &str) -> bool {""",
          )
          for old, new in [
              ('select_csp("/api/graphql", None, false)', 'select_csp("/api/graphql", None, false, false)'),
              ('select_csp("/metrics", None, false)', 'select_csp("/metrics", None, false, false)'),
              ('select_csp("/health/ready", None, false)', 'select_csp("/health/ready", None, false, false)'),
              ('select_csp("/swagger/index.html", None, false)', 'select_csp("/swagger/index.html", None, false, false)'),
              ('select_csp(path, Some(&nonce), false)', 'select_csp(path, Some(&nonce), false, false)'),
              ('select_csp("/", Some(&nonce), false)', 'select_csp("/", Some(&nonce), false, false)'),
              ('select_csp("/", Some(&nonce), true)', 'select_csp("/", Some(&nonce), true, false)'),
              ('select_csp("/admin", Some(&nonce), false)', 'select_csp("/admin", Some(&nonce), false, false)'),
          ]:
              replace_once(server, old, new)
          replace_once(
              server,
              """    #[test]
              fn production_ui_csp_forbids_plaintext_websocket() {""",
              """    #[test]
              fn strict_style_attribute_profile_enforces_none() {
                  let nonce = CspNonce::generate();
                  let relaxed = select_csp("/admin", Some(&nonce), false, false);
                  let strict = select_csp("/admin", Some(&nonce), false, true);

                  assert!(relaxed.contains("style-src-attr 'unsafe-inline'"));
                  assert!(!relaxed.contains("style-src-attr 'none'"));
                  assert!(strict.contains("style-src-attr 'none'"));
                  assert!(!strict.contains("style-src-attr 'unsafe-inline'"));
                  assert!(strict.contains(nonce.source_expression().as_str()));
              }

              #[test]
              fn production_ui_csp_forbids_plaintext_websocket() {""",
          )

          admin = "apps/admin/src/app/security.rs"
          relaxed_admin = "const ADMIN_UI_CSP_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";"
          strict_admin = "const ADMIN_UI_CSP_STRICT_STYLE_TEMPLATE: &str = \"default-src 'self'; script-src 'self' {nonce}; script-src-attr 'none'; style-src 'self' {nonce}; style-src-attr 'none'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src {connect_sources}; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'\";"
          replace_once(admin, relaxed_admin, relaxed_admin + "\n" + strict_admin)
          replace_once(
              admin,
              """    let policy = select_csp(
                  path.as_str(),
                  csp_nonce.as_ref(),
                  !is_production_environment(),
              );""",
              """    let policy = select_csp(
                  path.as_str(),
                  csp_nonce.as_ref(),
                  !is_production_environment(),
                  strict_style_attributes_enabled(),
              );""",
          )
          replace_once(
              admin,
              """fn select_csp(
              path: &str,
              csp_nonce: Option<&CspNonce>,
              allow_plaintext_websocket: bool,
          ) -> String {""",
              """fn select_csp(
              path: &str,
              csp_nonce: Option<&CspNonce>,
              allow_plaintext_websocket: bool,
              strict_style_attributes: bool,
          ) -> String {""",
          )
          replace_once(
              admin,
              """    ADMIN_UI_CSP_TEMPLATE
                  .replace("{nonce}", csp_nonce.source_expression().as_str())
                  .replace("{connect_sources}", connect_sources)""",
              """    let template = if strict_style_attributes {
                  ADMIN_UI_CSP_STRICT_STYLE_TEMPLATE
              } else {
                  ADMIN_UI_CSP_TEMPLATE
              };
              template
                  .replace("{nonce}", csp_nonce.source_expression().as_str())
                  .replace("{connect_sources}", connect_sources)""",
          )
          replace_once(
              admin,
              """fn parse_env_flag(value: &str) -> bool {""",
              """fn strict_style_attributes_enabled() -> bool {
              std::env::var("RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES")
                  .map(|value| parse_env_flag(value.as_str()))
                  .unwrap_or(false)
          }

          fn parse_env_flag(value: &str) -> bool {""",
          )
          for old, new in [
              ('select_csp("/dashboard", Some(&nonce), false)', 'select_csp("/dashboard", Some(&nonce), false, false)'),
              ('select_csp("/dashboard", Some(&nonce), true)', 'select_csp("/dashboard", Some(&nonce), true, false)'),
              ('select_csp("/api/admin/pages", None, false)', 'select_csp("/api/admin/pages", None, false, false)'),
          ]:
              replace_once(admin, old, new)
          replace_once(
              admin,
              """    #[test]
              fn standalone_admin_api_policy_is_scriptless() {""",
              """    #[test]
              fn standalone_strict_style_attribute_profile_enforces_none() {
                  let nonce = CspNonce::generate();
                  let relaxed = select_csp("/dashboard", Some(&nonce), false, false);
                  let strict = select_csp("/dashboard", Some(&nonce), false, true);

                  assert!(relaxed.contains("style-src-attr 'unsafe-inline'"));
                  assert!(strict.contains("style-src-attr 'none'"));
                  assert!(!strict.contains("style-src-attr 'unsafe-inline'"));
                  assert!(strict.contains(nonce.source_expression().as_str()));
              }

              #[test]
              fn standalone_admin_api_policy_is_scriptless() {""",
          )

          gate = "scripts/verify/verify-csp-inline-style-exceptions.mjs"
          replace_once(
              gate,
              '["style-src \'self\' {nonce}", "style-src-attr \'unsafe-inline\'", "style-src-attr \'none\'"]',
              '["style-src \'self\' {nonce}", "style-src-attr \'unsafe-inline\'", "style-src-attr \'none\'", "RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES", "strict_style_attributes_enabled"]',
          )
          replace_once(
              gate,
              '["style-src \'self\' {nonce}", "style-src-attr \'unsafe-inline\'"]',
              '["style-src \'self\' {nonce}", "style-src-attr \'unsafe-inline\'", "style-src-attr \'none\'", "RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES", "strict_style_attributes_enabled"]',
          )

          workflow = Path(".github/workflows/one-off-csp-strict-style-profile.yml")
          if not workflow.exists():
              raise SystemExit("one-off strict profile workflow is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES' apps/server/src/middleware/security_headers.rs
          grep -Fq 'RUSTOK_CSP_STRICT_STYLE_ATTRIBUTES' apps/admin/src/app/security.rs
          grep -Fq "style-src-attr 'none'" apps/admin/src/app/security.rs
          test ! -e .github/workflows/one-off-csp-strict-style-profile.yml
      - name: Commit strict profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: add opt-in strict style CSP profile"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Opt-in strict style CSP profile added; one-off workflow removed itself."
