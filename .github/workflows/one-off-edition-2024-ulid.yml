name: One-off Edition 2024 Ulid Repair

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  repair:
    if: >-
      github.event.issue.number == 1851 &&
      github.event.comment.body == '/repair-edition-2024-ulid'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Apply exact edition repair
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/rustok-events/src/types.rs')
          source = path.read_text()
          old = 'Ulid::gen()'
          if source.count(old) != 1:
              raise SystemExit(f'{path}: expected one remaining {old} call')
          path.write_text(source.replace(old, 'Ulid::r#gen()', 1))
          PY
          if grep -R --line-number --fixed-strings 'Ulid::gen()' crates --include='*.rs'; then
            echo 'unescaped Ulid::gen() remains under Rust 2024 edition' >&2
            exit 1
          fi
          git diff --check
          test "$(git diff --name-only | sort)" = 'crates/rustok-events/src/types.rs'
      - name: Compile rustok-events
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/edition-2024-ulid
        run: cargo check --locked -p rustok-events
      - name: Publish edition repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates/rustok-events/src/types.rs
          git commit -m 'fix(events): escape remaining Ulid gen for edition 2024'
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git merge-base --is-ancestor origin/main HEAD; then
              git rebase origin/main
              if grep -R --line-number --fixed-strings 'Ulid::gen()' crates --include='*.rs'; then
                exit 1
              fi
              cargo check --locked -p rustok-events
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
          done
          exit 1
      - name: Record repair
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 1851 --repo "$GITHUB_REPOSITORY" \
            --body 'Edition-2024 ULID call repair published; `rustok-events` compiles on the locked graph.'
