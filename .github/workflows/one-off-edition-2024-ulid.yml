name: One-off Publish Dependency Containment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SECURITY_ISSUE: 1851
  CARGO_TERM_COLOR: never

jobs:
  publish:
    if: >-
      github.event.issue.number == 1851 &&
      github.event.comment.body == '/publish-dependency-containment-unblocked'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0
      - name: Apply bounded policy repair
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/maintenance/retire-dependency-waivers.py
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/security/advisory-exceptions.md')
          source = path.read_text()
          replacements = {
              '| Reachability | The final edge is selected only for AVR, `riscv32i-unknown-none-elf`, `riscv32imc-unknown-none-elf`, `thumbv6m-none-eabi` and `xtensa-esp32s2-none-elf`; it is absent from supported RusToK server targets but intentionally appears in the all-target graph because embedded SurrealDB storage is an optional Athanor capability |': '| Reachability | Locked metadata retains a target-conditioned optional path for AVR, RISC-V, Thumb v6-M and Xtensa, but locked inverse trees are empty for `--target all` and each representative target triple; no workspace build currently selects `atomic-polyfill`, while `cargo audit` still reports its lockfile presence |',
              '| Compensating controls | Production deployment profiles target supported server operating systems only; do not ship RusToK or the Athanor Surreal adapter to the affected embedded target families; keep `athanor-surreal` optional and disabled by default |': '| Compensating controls | The permanent reachability workflow requires empty inverse trees for the all-target graph and representative embedded targets; production profiles target supported server operating systems; keep `athanor-surreal` optional and disabled by default |',
              '| Remediation | Upgrade the Athanor/SurrealDB dependency path to a `geo`/`rstar`/`heapless` graph that uses `portable-atomic`, or formally remove the embedded SurrealDB capability if it is no longer required; do not prune the reachable lock entry |': '| Remediation | Remove the waiver only when an Athanor/SurrealDB dependency update, bounded fork or lockfile/tooling change removes the lock-only package, or when the parent chain adopts `portable-atomic`; never delete lockfile package blocks manually |',
              '| Evidence required | Locked `cargo tree -i atomic-polyfill --workspace --all-features --target all`, Athanor upstream remediation, and capability-specific integration tests |': '| Evidence required | Empty locked inverse trees for `--target all` and representative embedded triples, locked metadata for the target-conditioned optional path, Athanor upstream remediation, and capability-specific integration tests |',
          }
          for old, new in replacements.items():
              if source.count(old) != 1:
                  raise SystemExit(f'advisory register marker drift: {old}')
              source = source.replace(old, new, 1)
          path.write_text(source)
          PY
      - name: Verify structural dependency policy
        run: |
          node --check scripts/verify/verify-dependency-feature-hygiene.mjs
          node scripts/verify/verify-dependency-feature-hygiene.mjs
          node scripts/verify/verify-advisory-exceptions.mjs
      - name: Verify ignored packages remain lockfile-only
        shell: bash
        run: |
          set -euo pipefail
          grep -q '^name = "rsa"$' Cargo.lock
          grep -q '^name = "atomic-polyfill"$' Cargo.lock

          check_empty_tree() {
            local package=$1
            local target=$2
            local output="/tmp/${package}-${target}.tree"
            cargo tree --locked --workspace --all-features --target "$target" -i "$package" \
              > "$output" 2> "/tmp/${package}-${target}.stderr"
            if [ -s "$output" ]; then
              cat "$output"
              echo "$package became build-reachable for target $target" >&2
              exit 1
            fi
          }

          check_empty_tree rsa all
          for target in all thumbv6m-none-eabi riscv32i-unknown-none-elf \
            riscv32imc-unknown-none-elf xtensa-esp32s2-none-elf
          do
            check_empty_tree atomic-polyfill "$target"
          done
      - name: Diagnose minimal server profile
        id: server_check
        continue-on-error: true
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/dependency-waiver-containment
        shell: bash
        run: |
          set +e
          cargo check --locked -p rustok-server --no-default-features \
            > /tmp/server-check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 80 /tmp/server-check.log
          exit "$status"
      - name: Verify bounded diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(
            Cargo.toml
            docs/security/advisory-exceptions.md
            docs/security/rsa-rustsec-2023-0071.md
            scripts/verify/verify-dependency-feature-hygiene.mjs
          )
          test "${#changed[@]}" = "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${changed[$index]}" = "${expected[$index]}"
          done
          git diff --exit-code -- Cargo.lock .cargo/audit.toml deny.toml
      - name: Publish containment
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Cargo.toml docs/security/advisory-exceptions.md \
            docs/security/rsa-rustsec-2023-0071.md \
            scripts/verify/verify-dependency-feature-hygiene.mjs
          git commit -m 'security(deps): contain lock-only advisory paths'
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git merge-base --is-ancestor origin/main HEAD; then
              git rebase origin/main
              node scripts/verify/verify-dependency-feature-hygiene.mjs
              node scripts/verify/verify-advisory-exceptions.mjs
              test -z "$(cargo tree --locked --workspace --all-features --target all -i rsa 2>/dev/null)"
              test -z "$(cargo tree --locked --workspace --all-features --target all -i atomic-polyfill 2>/dev/null)"
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
          done
          exit 1
      - name: Record containment evidence
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER_CHECK_OUTCOME: ${{ steps.server_check.outcome }}
          SERVER_CHECK_STATUS: ${{ steps.server_check.outputs.status }}
        run: |
          gh issue comment "$SECURITY_ISSUE" --repo "$GITHUB_REPOSITORY" --body \
            "Lock-only containment published: explicit SeaORM feature parity; empty RSA and atomic-polyfill inverse trees; audit and lock files unchanged. Minimal server diagnostic outcome: ${SERVER_CHECK_OUTCOME} (exit ${SERVER_CHECK_STATUS}); user-owned full validation remains separate."
