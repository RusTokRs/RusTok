name: One-off Dependency Waiver Status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-status.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.head_commit.message == 'test(ci): persist dependency waiver repair status'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      STATUS_ISSUE: 1851
    steps:
      - name: Persist waiver repair runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-dependency-waiver-diagnostic.yml \
            --limit 8 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url)
          current_body=$(gh issue view "$STATUS_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          base_body=$(printf '%s\n' "$current_body" | sed '/^## Repair run status$/,$d')
          {
            printf '%s\n\n' "$base_body"
            printf '## Repair run status\n\n```json\n%s\n```\n' "$runs"
          } >/tmp/dependency-waiver-status.md
          gh issue edit "$STATUS_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-waiver-status.md
