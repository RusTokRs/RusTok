name: One-off Dependency Waiver Status

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-off-dependency-waiver-status.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.head_commit.message == 'test(ci): capture exact containment compile failure'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      STATUS_ISSUE: 1851
      FAILED_RUN: 29744332828
    steps:
      - name: Persist exact containment failure
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          failure_tail=$(gh run view "$FAILED_RUN" \
            --repo "$GITHUB_REPOSITORY" \
            --log-failed 2>&1 | tail -n 80)
          {
            printf 'Inspect the exact baseline compiler failure that follows successful dependency-policy checks.\n\n'
            printf '## Run %s failure tail\n\n```text\n%s\n```\n' "$FAILED_RUN" "$failure_tail"
          } >/tmp/dependency-waiver-status.md
          gh issue edit "$STATUS_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-waiver-status.md
