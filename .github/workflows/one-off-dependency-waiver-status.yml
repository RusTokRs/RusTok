name: One-off Dependency Waiver Status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.issue.number == 1851 &&
      github.event.comment.user.login == 'loid345' &&
      github.event.comment.body == '/status-dependency-waivers'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      STATUS_ISSUE: 1851
    steps:
      - name: Persist waiver repair runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-dependency-waiver-diagnostic.yml \
            --limit 10 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url)
          current_body=$(gh issue view "$STATUS_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body)
          base_body=$(printf '%s\n' "$current_body" | sed '/^## Current repair runs$/,$d')
          {
            printf '%s\n\n' "$base_body"
            printf '## Current repair runs\n\n```json\n%s\n```\n' "$runs"
          } >/tmp/dependency-waiver-status.md
          gh issue edit "$STATUS_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-waiver-status.md
