name: One-off Dependency Waiver Status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  status:
    if: >-
      github.event.issue.number == 1851 &&
      github.event.comment.body == '/status-dependency-publisher'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      STATUS_ISSUE: 1851
    steps:
      - name: Persist publisher runs and failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          runs=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow one-off-edition-2024-ulid.yml \
            --limit 10 \
            --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url)
          failed_run=$(printf '%s' "$runs" | node -e '
            let input = "";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const run = JSON.parse(input).find(item => item.conclusion === "failure");
              if (run) process.stdout.write(String(run.databaseId));
            });
          ')
          failure_tail="No failed publisher run found."
          if [ -n "$failed_run" ]; then
            set +e
            failure_tail=$(gh run view "$failed_run" \
              --repo "$GITHUB_REPOSITORY" \
              --log-failed 2>&1 | tail -n 50)
            set -e
          fi
          {
            printf 'Track the issue-triggered lock-only containment publisher.\n\n'
            printf '## Publisher runs\n\n```json\n%s\n```\n\n' "$runs"
            printf '## Latest publisher failure\n\n```text\n%s\n```\n' "$failure_tail"
          } >/tmp/dependency-publisher-status.md
          gh issue edit "$STATUS_ISSUE" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file /tmp/dependency-publisher-status.md
