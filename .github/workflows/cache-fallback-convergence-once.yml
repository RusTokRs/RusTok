name: One-shot cache fallback convergence

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cache-fallback-convergence-once.yml"

permissions:
  contents: write

concurrency:
  group: cache-fallback-convergence-once
  cancel-in-progress: false

jobs:
  patch-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cache-hardening
      - name: Apply bounded fallback convergence fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("crates/rustok-cache/src/fallback.rs")
          text = path.read_text()

          old_prune = '''        let scan = state
              .insertion_order
              .iter()
              .take(DEGRADED_WRITE_PRUNE_SCAN)
              .cloned()
              .collect::<Vec<_>>();
          for candidate in scan {
              if fallback.get(&candidate).await?.is_none() {
                  state.keys.remove(&candidate);
              }
          }
          while state
              .insertion_order
              .front()
              .is_some_and(|candidate| !state.keys.contains(candidate))
          {
              state.insertion_order.pop_front();
          }
  '''
          new_prune = '''        let scan = DEGRADED_WRITE_PRUNE_SCAN.min(state.insertion_order.len());
          for _ in 0..scan {
              let Some(candidate) = state.insertion_order.pop_front() else {
                  break;
              };
              if !state.keys.contains(&candidate) {
                  continue;
              }
              if fallback.get(&candidate).await?.is_none() {
                  state.keys.remove(&candidate);
              } else {
                  state.insertion_order.push_back(candidate);
              }
          }
  '''
          if text.count(old_prune) != 1:
              raise SystemExit(f"expected one degraded tracker prune block, found {text.count(old_prune)}")
          text = text.replace(old_prune, new_prune, 1)

          old_hit = '''                match primary_value {
                      Some(value) => Ok(Some(value)),
                      None => {
  '''
          new_hit = '''                match primary_value {
                      Some(value) => {
                          if let Err(error) =
                              self.fallback.set(key.to_string(), value.clone()).await
                          {
                              tracing::warn!(
                                  %error,
                                  key,
                                  "Failed to refresh local cache mirror from primary read"
                              );
                          }
                          Ok(Some(value))
                      }
                      None => {
  '''
          if text.count(old_hit) != 1:
              raise SystemExit(f"expected one primary hit block, found {text.count(old_hit)}")
          text = text.replace(old_hit, new_hit, 1)

          tests = '''
      #[tokio::test]
      async fn primary_hit_refreshes_the_local_mirror() {
          let primary = Arc::new(RecoveringStaleBackend {
              fail_writes: AtomicBool::new(false),
              value: StdMutex::new(Some(b"fresh".to_vec())),
          });
          let fallback = Arc::new(InMemoryCacheBackend::new(Duration::from_secs(30), 16));
          fallback
              .set("key".to_string(), b"stale".to_vec())
              .await
              .unwrap();
          let backend = backend(primary, Arc::clone(&fallback));

          assert_eq!(backend.get("key").await.unwrap(), Some(b"fresh".to_vec()));
          assert_eq!(fallback.get("key").await.unwrap(), Some(b"fresh".to_vec()));
      }

      #[tokio::test]
      async fn degraded_tracker_rotates_prune_candidates_without_tombstone_growth() {
          let tracker = DegradedWriteTracker::new(3);
          let fallback = InMemoryCacheBackend::new(Duration::from_secs(30), 64);
          fallback
              .set("live".to_string(), b"live".to_vec())
              .await
              .unwrap();
          tracker.insert("live", b"live", &fallback).await.unwrap();

          for index in 0..64 {
              let key = format!("expired-{index}");
              fallback
                  .set(key.clone(), b"temporary".to_vec())
                  .await
                  .unwrap();
              tracker
                  .insert(&key, b"temporary", &fallback)
                  .await
                  .unwrap();
              fallback.invalidate(&key).await.unwrap();
          }

          fallback
              .set("fresh".to_string(), b"fresh".to_vec())
              .await
              .unwrap();
          tracker
              .insert("fresh", b"fresh", &fallback)
              .await
              .unwrap();

          let state = tracker.state.lock().await;
          assert!(state.keys.contains("live"));
          assert!(state.keys.contains("fresh"));
          assert!(state.insertion_order.len() <= tracker.maximum_keys);
          assert_eq!(state.insertion_order.len(), state.keys.len());
      }
  '''
          marker = '''    #[tokio::test]
      async fn zero_ttl_delete_fails_closed_when_shared_primary_is_unavailable() {
  '''
          if text.count(marker) != 1:
              raise SystemExit(f"expected one final fallback test marker, found {text.count(marker)}")
          text = text.replace(marker, tests + "\n" + marker, 1)
          path.write_text(text)
          PY
      - name: Format only the intended source
        shell: bash
        run: |
          cargo fmt --all
          unexpected="$(git diff --name-only | grep -vE '^(crates/rustok-cache/src/fallback.rs|\.github/workflows/cache-fallback-convergence-once\.yml)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "cargo fmt changed unrelated files:"
            echo "$unexpected"
            exit 1
          fi
          cargo fmt --all --check
      - name: Compile and test fallback convergence
        run: |
          cargo check -p rustok-cache --lib
          cargo test -p rustok-cache --lib fallback::tests
      - name: Publish verified source change
        shell: bash
        run: |
          rm .github/workflows/cache-fallback-convergence-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-cache/src/fallback.rs .github/workflows/cache-fallback-convergence-once.yml
          git commit -m "fix(cache): converge local fallback after primary reads"
          git pull --rebase origin main
          git push origin HEAD:main
