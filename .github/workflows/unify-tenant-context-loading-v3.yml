name: Unify tenant context loading v3

on:
  push:
    branches: [main]
    paths:
      - scripts/migrations/tenant-context-v3.payload.*
      - .github/workflows/unify-tenant-context-loading-v3.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unify-tenant-context-loading-v3-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Assemble, verify and execute migration
        id: migration
        shell: bash
        run: |
          set +e
          {
            python3 - <<'PY'
          import base64
          import hashlib
          import zlib
          from pathlib import Path

          fragments = sorted(Path("scripts/migrations").glob("tenant-context-v3.payload.*"))
          if len(fragments) != 7:
              raise RuntimeError(f"expected 7 payload fragments, got {len(fragments)}")
          payload = "".join(fragment.read_text().strip() for fragment in fragments)
          if len(payload) != 6100:
              raise RuntimeError(f"expected payload length 6100, got {len(payload)}")
          if hashlib.sha256(payload.encode()).hexdigest() != "ab6a542155a84d3e1cf89091acb8f7a1c22027ab8e19c2d3d8a22db56f9d4616":
              raise RuntimeError("payload checksum mismatch")
          source = zlib.decompress(base64.b64decode(payload, validate=True))
          if hashlib.sha256(source).hexdigest() != "c65a593a40264f282c57f3c152e4c708e116af4ba7e2fd804d9042d4a13e6068":
              raise RuntimeError("migration source checksum mismatch")
          migration = Path("/tmp/unify_tenant_context_loading_v3.py")
          migration.write_bytes(source)
          compile(source, str(migration), "exec")
          PY
            python3 /tmp/unify_tenant_context_loading_v3.py && \
            rustfmt --edition 2021 \
              apps/server/src/middleware/tenant_resolution.rs \
              apps/server/src/middleware/tenant.rs \
              apps/server/src/middleware/mod.rs \
              apps/server/src/controllers/graphql.rs && \
            node scripts/verify/verify-tenant-resolution-architecture.mjs && \
            git diff --check
          } > /tmp/tenant-migration-v3.log 2>&1
          status=$?
          cat /tmp/tenant-migration-v3.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare failure report
        if: steps.migration.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '# Tenant context loading migration v3 failure'
            echo
            echo '```text'
            cat /tmp/tenant-migration-v3.log
            echo '```'
          } > TENANT_MIGRATION_FAILURE.md

      - name: Remove one-time migration infrastructure
        shell: bash
        run: |
          rm scripts/migrations/tenant-context-v3.payload.*
          rm .github/workflows/unify-tenant-context-loading-v3.yml

      - name: Commit result atomically to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.migration.outputs.status }}" == "0" ]]; then
            message="refactor(tenant): unify context loading across transports"
          else
            message="chore: record tenant context migration v3 failure"
          fi
          git commit -m "$message"
          git pull --rebase origin main
          git push origin HEAD:main
