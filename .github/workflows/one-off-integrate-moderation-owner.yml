name: One-off Integrate Moderation Owner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-off-integrate-moderation-owner
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integrate:
    if: github.repository == 'RusTokRs/RusTok' && github.head_ref == 'agent/moderation-owner-core'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/moderation-owner-core
          fetch-depth: 0

      - name: Install exact Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --no-self-update
          rustup default 1.96.0

      - name: Wire owner into workspace and composed migrations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              source = path.read_text()
              if old not in source:
                  if new in source:
                      return
                  raise SystemExit(f"{path}: integration marker not found")
              if source.count(old) != 1:
                  raise SystemExit(f"{path}: expected one integration marker")
              path.write_text(source.replace(old, new, 1))

          root = Path("Cargo.toml")
          replace_once(
              root,
              'rustok-comments = { path = "crates/rustok-comments", default-features = false }\n',
              'rustok-comments = { path = "crates/rustok-comments", default-features = false }\n'
              'rustok-moderation = { path = "crates/rustok-moderation" }\n',
          )

          migration_manifest = Path("crates/rustok-migrations/Cargo.toml")
          replace_once(
              migration_manifest,
              "rustok-comments.workspace = true\n",
              "rustok-comments.workspace = true\nrustok-moderation.workspace = true\n",
          )

          migrator = Path("crates/rustok-migrations/src/lib.rs")
          replace_once(
              migrator,
              '''    ModuleMigrationSource {
                  slug: "comments",
                  source: &rustok_comments::CommentsModule,
              },
              ModuleMigrationSource {
                  slug: "pages",
          ''',
              '''    ModuleMigrationSource {
                  slug: "comments",
                  source: &rustok_comments::CommentsModule,
              },
              ModuleMigrationSource {
                  slug: "moderation",
                  source: &rustok_moderation::ModerationModule,
              },
              ModuleMigrationSource {
                  slug: "pages",
          ''',
          )
          replace_once(
              migrator,
              "        all.extend(rustok_comments::migrations::migrations());\n        all.extend(rustok_pages::migrations::migrations());\n",
              "        all.extend(rustok_comments::migrations::migrations());\n        all.extend(rustok_moderation::migrations::migrations());\n        all.extend(rustok_pages::migrations::migrations());\n",
          )

          registry = Path("docs/modules/implementation-plans-registry.md")
          replace_once(
              registry,
              "| `comments` | [plan](../../crates/rustok-comments/docs/implementation-plan.md) | `in_progress` | Close runtime contract execution/fallback smoke for CommentsThreadPort and confirm blog embedded/native compatibility snapshots; for FFA, keep the native-only admin exception without new legacy/headless contract while maintaining host-neutral parity/evidence guardrails. |\n",
              "| `comments` | [plan](../../crates/rustok-comments/docs/implementation-plan.md) | `in_progress` | Close runtime contract execution/fallback smoke for CommentsThreadPort and confirm blog embedded/native compatibility snapshots; for FFA, keep the native-only admin exception without new legacy/headless contract while maintaining host-neutral parity/evidence guardrails. |\n"
              "| `moderation` | [plan](../../crates/rustok-moderation/docs/implementation-plan.md) | `in_progress` | Add repository-backed receipt-first report and case services, then prove active-case deduplication and revision CAS under PostgreSQL contention. |\n",
          )
          PY

      - name: Reconcile lockfile without broad dependency updates
        run: cargo metadata --no-deps --format-version 1 > /tmp/cargo-metadata.json

      - name: Format moderation owner
        run: |
          rustfmt --edition 2021 \
            crates/rustok-moderation/src/lib.rs \
            crates/rustok-moderation/src/domain.rs \
            crates/rustok-moderation/src/ports.rs \
            crates/rustok-moderation/src/migrations/mod.rs \
            crates/rustok-moderation/src/migrations/m20260720_000001_create_moderation_core.rs

      - name: Verify owner and composed migrator
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/moderation-owner-integration
        run: |
          cargo check --locked -p rustok-moderation -p rustok-migrations
          cargo run --locked -p rustok-migrations --bin export_migration_plan -- \
            --output /tmp/moderation-migration-plan.json
          test -s /tmp/moderation-migration-plan.json

      - name: Verify bounded integration
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -Fq 'rustok-moderation = { path = "crates/rustok-moderation" }' Cargo.toml
          grep -Fq 'rustok-moderation.workspace = true' crates/rustok-migrations/Cargo.toml
          grep -Fq 'slug: "moderation"' crates/rustok-migrations/src/lib.rs
          grep -Fq 'rustok_moderation::migrations::migrations()' crates/rustok-migrations/src/lib.rs
          grep -Fq 'name = "rustok-moderation"' Cargo.lock

      - name: Commit verified integration
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock \
            crates/rustok-migrations/Cargo.toml \
            crates/rustok-migrations/src/lib.rs \
            crates/rustok-moderation \
            docs/modules/implementation-plans-registry.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(moderation): integrate owner runtime schema"
          git push origin HEAD:agent/moderation-owner-core
