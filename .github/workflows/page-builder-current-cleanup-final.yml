name: Final current-only Page Builder cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Load all staged cleanup scripts
        shell: bash
        run: |
          git fetch origin chore/page-builder-cleanup-stage
          mkdir -p scripts/migrations
          for script in \
            cleanup_page_builder_current \
            cleanup_page_builder_contributions \
            cleanup_page_builder_compile_fixes \
            cleanup_page_builder_test_fixtures
          do
            git show "origin/chore/page-builder-cleanup-stage:scripts/migrations/${script}.py" \
              > "scripts/migrations/${script}.py"
          done

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96
          components: rustfmt

      - name: Apply and validate current-only API
        id: cleanup
        shell: bash
        run: |
          set +e
          {
            python3 scripts/migrations/cleanup_page_builder_current.py && \
            python3 scripts/migrations/cleanup_page_builder_contributions.py && \
            python3 scripts/migrations/cleanup_page_builder_compile_fixes.py && \
            python3 scripts/migrations/cleanup_page_builder_test_fixtures.py && \
            cargo fmt --package fly --package fly-ui --package fly-leptos --package rustok-page-builder && \
            cargo check -p fly -p fly-ui -p fly-leptos -p rustok-page-builder --all-features --all-targets && \
            cargo test -p fly --lib codec::tests && \
            cargo test -p fly --lib landing_contract::tests && \
            cargo test -p fly --lib registry::tests && \
            cargo test -p fly-ui --lib contribution_manifest::tests && \
            cargo test -p rustok-page-builder --lib --all-features && \
            python3 - <<'PY'
          from pathlib import Path
          import re

          roots = [
              Path('crates/rustok-page-builder'),
              Path('crates/rustok-pages/admin'),
              Path('crates/fly-ui/src'),
          ]
          fly_files = [
              Path('crates/fly/src/model.rs'),
              Path('crates/fly/src/codec.rs'),
              Path('crates/fly/src/registry.rs'),
              Path('crates/fly/src/fragment.rs'),
              Path('crates/fly/src/bundle.rs'),
              Path('crates/fly/src/landing_contract.rs'),
              Path('crates/fly/src/command/patch.rs'),
          ]
          forbidden = re.compile(
              r'GrapesJsV1|GRAPESJS_V1|PageBuilderContractMetadata|'
              r'schema_version|schemaVersion|provider_version|legacy_bridge_readonly|'
              r'FLY_[A-Z0-9_]*_V1|\blegacy\b',
              re.IGNORECASE,
          )
          violations = []
          candidates = list(fly_files)
          for root in roots:
              candidates.extend(
                  path for path in root.rglob('*')
                  if path.is_file() and path.suffix in {'.rs', '.md', '.json', '.toml', '.mjs'}
              )
          for path in candidates:
              if not path.exists():
                  continue
              for number, line in enumerate(path.read_text(encoding='utf-8').splitlines(), 1):
                  if forbidden.search(line):
                      violations.append(f'{path}:{number}: {line.strip()}')
          if violations:
              raise SystemExit(
                  'forbidden Page Builder version/legacy markers remain:\n' + '\n'.join(violations)
              )
          PY
            scan_status=$?
            test "$scan_status" -eq 0 && git diff --check
          } > /tmp/page-builder-current-cleanup.log 2>&1
          status=$?
          cat /tmp/page-builder-current-cleanup.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Reset partial changes after failure
        if: steps.cleanup.outputs.status != '0'
        run: git reset --hard HEAD

      - name: Write isolated failure report
        if: steps.cleanup.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '# Final Page Builder current-only cleanup failure'
            echo
            echo '```text'
            cat /tmp/page-builder-current-cleanup.log
            echo '```'
          } > PAGE_BUILDER_CURRENT_CLEANUP_FAILURE.md

      - name: Remove temporary runner and scripts
        run: |
          rm -f \
            scripts/migrations/cleanup_page_builder_*.py \
            .github/workflows/page-builder-current-cleanup-final.yml

      - name: Commit atomically to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.cleanup.outputs.status }}" == "0" ]]; then
            message="refactor(page-builder): keep only the current API"
          else
            message="chore(page-builder): record isolated cleanup failure"
          fi
          git commit -m "$message"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done
          exit 1
