name: One-off Sync API Infrastructure Guards

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-infrastructure-guards:
    if: >-
      github.event.issue.title == '[automation] sync API infrastructure guards' &&
      (github.event_name == 'issues' || github.event.comment.body == '/sync-api-infrastructure-guards')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact guard synchronization
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact match, found {count}: {old!r}")
              file.write_text(source.replace(old, new, 1))

          infrastructure = "scripts/verify/verify-api-compatibility-infrastructure-approval.mjs"
          replace_once(
              infrastructure,
              '  "scripts/verify/verify-api-compatibility-infrastructure-approval.mjs",\n];',
              '  "scripts/verify/verify-api-compatibility-infrastructure-approval.mjs",\n'
              '  "scripts/verify/verify-api-compatibility-infra-self-test.mjs",\n'
              '];',
          )

          contract = "scripts/verify/verify-api-compatibility-contract.mjs"
          replace_once(
              contract,
              'requireMarkers("scripts/verify/verify-api-compatibility-exception-approval-self-test.mjs", [\n'
              '  "verify-api-compatibility-exception-approval.mjs",\n'
              '  \'"--self-test"\',\n'
              ']);\n',
              'requireMarkers("scripts/verify/verify-api-compatibility-exception-approval-self-test.mjs", [\n'
              '  "verify-api-compatibility-exception-approval.mjs",\n'
              '  \'"--self-test"\',\n'
              ']);\n'
              'requireMarkers("scripts/verify/verify-api-compatibility-infrastructure-approval.mjs", [\n'
              '  "api-contract-infra-approved",\n'
              '  "const PROTECTED_PATHS",\n'
              '  "verify-api-compatibility-infra-self-test.mjs",\n'
              '  "function changedProtectedPaths",\n'
              '  "function approvalDecision",\n'
              '  "function runSelfTest",\n'
              ']);\n'
              'requireMarkers("scripts/verify/verify-api-compatibility-infra-self-test.mjs", [\n'
              '  "verify-api-compatibility-infrastructure-approval.mjs",\n'
              '  \'"--self-test"\',\n'
              ']);\n',
          )
          replace_once(
              contract,
              '  "name: API Compatibility",\n'
              '  "github.event.pull_request.base.repo.full_name",\n',
              '  "name: API Compatibility",\n'
              '  "pull_request_target:",\n'
              '  "github.event_name == \'pull_request_target\'",\n'
              '  "github.event.pull_request.base.repo.full_name",\n',
          )
          replace_once(
              contract,
              '  "repository: ${{ env.HEAD_REPOSITORY }}",\n'
              '  "Verify base comparator fixtures",\n',
              '  "repository: ${{ env.HEAD_REPOSITORY }}",\n'
              '  "persist-credentials: false",\n'
              '  "Verify base comparator fixtures",\n',
          )
          replace_once(
              contract,
              '  \'base/scripts/verify/verify-api-compatibility.mjs" --self-test\',\n'
              '  "Require approval for compatibility exception changes",\n',
              '  \'base/scripts/verify/verify-api-compatibility.mjs" --self-test\',\n'
              '  "Require approval for compatibility infrastructure changes",\n'
              '  "api-contract-infra-approved",\n'
              '  "allow_infrastructure_changes",\n'
              '  "base/scripts/verify/verify-api-compatibility-infrastructure-approval.mjs",\n'
              '  "--base-dir",\n'
              '  "--head-dir",\n'
              '  "Require approval for compatibility exception changes",\n',
          )
          replace_once(
              contract,
              'forbidMarkers(".github/workflows/api-compatibility.yml", [\n'
              '  \'head/scripts/verify/verify-api-compatibility.mjs\',\n',
              'forbidMarkers(".github/workflows/api-compatibility.yml", [\n'
              '  "\\n  pull_request:\\n",\n'
              '  "github.event_name == \'pull_request\'",\n'
              '  \'head/scripts/verify/verify-api-compatibility.mjs\',\n',
          )
          replace_once(
              contract,
              '  "Verify API compatibility exception approval fixtures",\n'
              '  "verify-api-compatibility-exception-approval-self-test.mjs",\n',
              '  "Verify API compatibility exception approval fixtures",\n'
              '  "verify-api-compatibility-exception-approval-self-test.mjs",\n'
              '  "Verify API compatibility infrastructure approval fixtures",\n'
              '  "verify-api-compatibility-infra-self-test.mjs",\n',
          )
          replace_once(
              contract,
              '  "verify-api-compatibility-exception-approval-self-test.mjs:API Compatibility Exception Approval Fixtures",\n'
              '  "verify-api-compatibility-exceptions-local.mjs:API Compatibility Exceptions",\n',
              '  "verify-api-compatibility-exception-approval-self-test.mjs:API Compatibility Exception Approval Fixtures",\n'
              '  "verify-api-compatibility-infra-self-test.mjs:API Compatibility Infrastructure Approval Fixtures",\n'
              '  "verify-api-compatibility-exceptions-local.mjs:API Compatibility Exceptions",\n',
          )

          workflow = Path(".github/workflows/one-off-sync-api-infrastructure-guards.yml")
          if not workflow.exists():
              raise SystemExit("one-off workflow is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'verify-api-compatibility-infra-self-test.mjs' scripts/verify/verify-api-compatibility-infrastructure-approval.mjs
          grep -Fq 'pull_request_target:' scripts/verify/verify-api-compatibility-contract.mjs
          grep -Fq 'api-contract-infra-approved' scripts/verify/verify-api-compatibility-contract.mjs
          grep -Fq 'persist-credentials: false' scripts/verify/verify-api-compatibility-contract.mjs
          test ! -e .github/workflows/one-off-sync-api-infrastructure-guards.yml
      - name: Commit guard synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(api): bind contract infrastructure guards"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "API contract infrastructure protection is synchronized across workflow, hardening and master gates; one-off workflow removed itself."
