name: Index Storage Scale Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/rustok-index/**"
      - "ops/benches/**"
      - "scripts/verify/verify-index-fba.mjs"
      - "scripts/verify/validate-index-storage-evidence.mjs"
      - "scripts/verify/compare-index-storage-evidence.mjs"
      - ".github/workflows/index-storage-smoke.yml"
      - ".github/workflows/index-storage-scale-evidence.yml"
      - ".github/workflows/index-storage-scale-run.yml"
  push:
    branches:
      - "agent/index-m2-scale-evidence"
      - "agent/index-m2-1m-standard-runner"
    paths:
      - "crates/rustok-index/**"
      - "ops/benches/**"
      - "scripts/verify/verify-index-fba.mjs"
      - "scripts/verify/validate-index-storage-evidence.mjs"
      - "scripts/verify/compare-index-storage-evidence.mjs"
      - ".github/workflows/index-storage-smoke.yml"
      - ".github/workflows/index-storage-scale-evidence.yml"
      - ".github/workflows/index-storage-scale-run.yml"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Index scale evidence contract
    # Pull-request runs exist only to cancel an older PR-ref execution through
    # concurrency. Heavy scale evidence is emitted once from push/dispatch.
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Publish push-run identity
        if: ${{ github.event_name == 'push' && github.ref_name == 'agent/index-m2-1m-standard-runner' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2009,
              body: `Index scale push run: **${context.runId}** on commit \`${context.sha}\`. The 100k and guarded 1m jobs start independently after the contract gate.`,
            });
      - uses: actions/checkout@v7
      - name: Verify Index boundary and benchmark contract
        run: node scripts/verify/verify-index-fba.mjs
      - name: Verify scale evidence validator syntax
        run: node --check scripts/verify/validate-index-storage-evidence.mjs
      - name: Verify cross-scale comparator syntax
        run: node --check scripts/verify/compare-index-storage-evidence.mjs

  evidence-100k:
    needs: contract
    uses: ./.github/workflows/index-storage-scale-run.yml
    with:
      scale: 100k
      timeout_minutes: 180
      runner_label: ubuntu-latest
      minimum_free_bytes: 6000000000

  evidence-1m:
    # The 100k packet is already archived and inspected. Start the same-commit
    # rerun and the 1m extension independently after the shared contract gate.
    # Typed target_entity predicates on both link hops are verifier-locked so the
    # scale packet measures the intended reverse link indexes, not a prefix miss.
    needs: contract
    uses: ./.github/workflows/index-storage-scale-run.yml
    with:
      scale: 1m
      timeout_minutes: 300
      # Prefer an explicitly configured larger runner. Otherwise the hosted image
      # may proceed only after the reusable job verifies at least 35 GB free;
      # the inspected 100k runner reported about 93 GB free before evidence.
      runner_label: ${{ vars.INDEX_BENCH_LARGE_RUNNER || 'ubuntu-latest' }}
      minimum_free_bytes: 35000000000

  comparison:
    name: Cross-scale storage comparison
    needs:
      - evidence-100k
      - evidence-1m
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Download validated 100k evidence
        uses: actions/download-artifact@v8
        with:
          name: index-storage-100k-${{ github.sha }}
          path: evidence/index-storage/100k

      - name: Download validated 1m evidence
        uses: actions/download-artifact@v8
        with:
          name: index-storage-1m-${{ github.sha }}
          path: evidence/index-storage/1m

      - name: Generate deterministic cross-scale comparison
        run: >-
          node scripts/verify/compare-index-storage-evidence.mjs
          --input evidence/index-storage/100k
          --input evidence/index-storage/1m
          --output evidence/index-storage/comparison

      - name: Require decision-ready comparison
        run: >-
          node -e "const report = require('./evidence/index-storage/comparison/comparison.json');
          if (report.decision_ready !== true) throw new Error('cross-scale comparison is not decision-ready');"

      - name: Archive cross-scale comparison
        uses: actions/upload-artifact@v7
        with:
          name: index-storage-comparison-${{ github.sha }}
          path: evidence/index-storage/comparison
          if-no-files-found: error
          retention-days: 90
          compression-level: 9

      - name: Archive comparison failure diagnostic
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: index-storage-comparison-diagnostic-${{ github.sha }}
          path: evidence/index-storage/comparison
          if-no-files-found: warn
          retention-days: 14
