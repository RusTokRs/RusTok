name: Forum ID route cleanup runner v2

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: forum-id-route-cleanup-v2-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == '/apply-forum-id-route-fixture-v2' &&
      github.event.comment.user.login == 'loid345'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve and validate PR head
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail
          head_repo="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.repo.full_name')"
          head_ref="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.ref')"
          head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          test "${head_repo}" = "${GITHUB_REPOSITORY}"
          test "${head_ref}" = "agent/forum-id-route-fixture"
          echo "repo=${head_repo}" >> "${GITHUB_OUTPUT}"
          echo "ref=${head_ref}" >> "${GITHUB_OUTPUT}"
          echo "sha=${head_sha}" >> "${GITHUB_OUTPUT}"

      - name: Check out exact PR head and merge current main
        env:
          HEAD_REF: ${{ steps.meta.outputs.ref }}
          HEAD_SHA: ${{ steps.meta.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B "${HEAD_REF}" "${HEAD_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main

      - name: Apply guarded Forum route contract patch and remove runners
        env:
          HEAD_REF: ${{ steps.meta.outputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          category_id = "11111111-1111-4111-8111-111111111111"
          topic_id = "22222222-2222-4222-8222-222222222222"

          fixture_path = Path("apps/next-frontend/contracts/seo/runtime-parity-fixtures.json")
          fixture = fixture_path.read_text()
          old_forum = '''    {
              "ownerModule": "rustok-forum",
              "routePatterns": [
                "/modules/forum?topic=:slug",
                "/forum/:slug"
              ],
              "targetKind": "forum_topic",
              "nextSmokeRoute": {
                "locale": "en",
                "routeSegment": "forum",
                "query": {
                  "topic": "welcome"
                }
              },
              "rustStorefrontRoute": "/modules/forum?topic=welcome"
            }'''
          new_forum = f'''    {{
              "ownerModule": "rustok-forum",
              "routePatterns": [
                "/modules/forum?category=:category_id",
                "/modules/forum?topic=:topic_id",
                "/modules/forum?category=:category_id&topic=:topic_id"
              ],
              "targetKind": "forum_topic",
              "nextSmokeRoute": {{
                "locale": "en",
                "routeSegment": "forum",
                "query": {{
                  "category": "{category_id}",
                  "topic": "{topic_id}"
                }}
              }},
              "rustStorefrontRoute": "/modules/forum?category={category_id}&topic={topic_id}"
            }}'''
          if old_forum in fixture:
              fixture = fixture.replace(old_forum, new_forum, 1)
          elif new_forum not in fixture:
              raise SystemExit("Forum route ownership fixture matches neither expected old nor new contract")
          fixture = fixture.replace(
              '  "updatedAt": "2026-06-26T00:00:00Z",',
              '  "updatedAt": "2026-07-24T00:00:00Z",',
              1,
          )
          if "/forum/:slug" in fixture or "topic=welcome" in fixture or '"topic": "welcome"' in fixture:
              raise SystemExit("legacy Forum slug fixture remains")
          json.loads(fixture)
          fixture_path.write_text(fixture)

          verifier_path = Path("apps/next-frontend/scripts/verify-seo-runtime-fixtures.mjs")
          verifier = verifier_path.read_text()
          marker = "const smokeRows = fixtures.smokeEvidence ?? [];"
          guard = f'''const forumRoute = routeRows.find((item) => item.targetKind === "forum_topic");
          const forumCategoryId = "{category_id}";
          const forumTopicId = "{topic_id}";
          const expectedForumRoutePatterns = [
            "/modules/forum?category=:category_id",
            "/modules/forum?topic=:topic_id",
            "/modules/forum?category=:category_id&topic=:topic_id",
          ];
          assert(
            JSON.stringify(forumRoute?.routePatterns) === JSON.stringify(expectedForumRoutePatterns),
            "Forum route fixtures must remain on the accepted ID-based compatibility contract until FORUM-24",
          );
          assert(
            forumRoute?.nextSmokeRoute?.query?.category === forumCategoryId &&
              forumRoute?.nextSmokeRoute?.query?.topic === forumTopicId,
            "Forum Next route fixture must use deterministic UUID category/topic values",
          );
          assert(
            forumRoute?.rustStorefrontRoute ===
              `/modules/forum?category=${{forumCategoryId}}&topic=${{forumTopicId}}`,
            "Forum Rust storefront fixture must match the canonical ID-based topic route",
          );
          assert(
            !(forumRoute?.routePatterns ?? []).some((pattern) => pattern.includes(":slug")),
            "Forum route fixtures must not advertise localized slug paths before FORUM-24",
          );

          {marker}'''
          if "const expectedForumRoutePatterns" not in verifier:
              if verifier.count(marker) != 1:
                  raise SystemExit("expected exactly one smokeRows verifier marker")
              verifier = verifier.replace(marker, guard, 1)
          verifier_path.write_text(verifier)

          plan_path = Path("crates/rustok-forum/docs/implementation-plan.md")
          plan = plan_path.read_text()
          plan = plan.replace("last_reviewed: 2026-07-22", "last_reviewed: 2026-07-24", 1)
          plan_marker = "ID routes remain internal compatibility paths, not the primary storefront UX.\n"
          plan_guard = '''ID routes remain internal compatibility paths, not the primary storefront UX.

          ### Current compatibility contract

          Until FORUM-24 is implemented atomically, runtime route resolution and SEO
          parity evidence remain UUID-based:

          - category compatibility routes use `/modules/forum?category=<uuid>`;
          - topic compatibility routes accept `/modules/forum?topic=<uuid>` and emit
            `/modules/forum?category=<uuid>&topic=<uuid>` as the canonical owner route;
          - `/forum/:slug`, `topic=<slug>` and localized slug claims are rejected;
          - the compile-free SEO fixture verifier and
            `forum_route_contract_remains_id_based` backend test must stay aligned;
          - no Forum smoke-evidence row is claimed until seeded UUID runtime evidence
            is captured.
'''
          if "### Current compatibility contract" not in plan:
              if plan.count(plan_marker) != 1:
                  raise SystemExit("expected exactly one FORUM-24 compatibility marker")
              plan = plan.replace(plan_marker, plan_guard, 1)
          plan_path.write_text(plan)

          for workflow in [
              ".github/workflows/apply-forum-id-route-fixture-once.yml",
              ".github/workflows/forum-id-route-fixture-runner.yml",
              ".github/workflows/forum-id-route-comment-runner.yml",
              ".github/workflows/forum-id-route-cleanup-runner-v2.yml",
          ]:
              path = Path(workflow)
              if path.exists():
                  path.unlink()
          PY

          git diff --check
          git add apps/next-frontend/contracts/seo/runtime-parity-fixtures.json \
            apps/next-frontend/scripts/verify-seo-runtime-fixtures.mjs \
            crates/rustok-forum/docs/implementation-plan.md \
            .github/workflows/apply-forum-id-route-fixture-once.yml \
            .github/workflows/forum-id-route-fixture-runner.yml \
            .github/workflows/forum-id-route-comment-runner.yml \
            .github/workflows/forum-id-route-cleanup-runner-v2.yml
          git commit -m "fix(forum): align SEO fixture with ID routes"
          git push origin HEAD:"${HEAD_REF}"
