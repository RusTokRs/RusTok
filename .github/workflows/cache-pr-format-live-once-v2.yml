name: One-shot cache PR formatter v2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cache-pr-format-live-once-v2.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cache/live-redis-validation
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Format PR branch
        shell: bash
        run: |
          cargo fmt --all
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "style(cache): apply PR branch rustfmt"
          git push origin HEAD:cache/live-redis-validation
