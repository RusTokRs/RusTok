name: Forum locale fail-closed patch

on:
  push:
    branches:
      - agent/fail-closed-forum-content-locales

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply focused forum locale patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one anchor, found {count}")
              return source.replace(old, new, 1)

          topic_path = Path("crates/rustok-forum/src/services/topic.rs")
          topic = topic_path.read_text(encoding="utf-8")

          topic = replace_once(
              topic,
              '''        Ok(to_topic_response(
            topic,
            translations,
            TopicResponseParts {
                channel_slugs,
                tags,
                metadata,
                vote_summary,
                is_subscribed,
                solution_reply_id,
            },
            &locale,
            fallback_locale.as_deref(),
        ))
''',
              '''        to_topic_response(
            topic,
            translations,
            TopicResponseParts {
                channel_slugs,
                tags,
                metadata,
                vote_summary,
                is_subscribed,
                solution_reply_id,
            },
            &locale,
            fallback_locale.as_deref(),
        )
''',
              "topic detail result",
          )

          topic = replace_once(
              topic,
              '''            let resolved = resolve_by_locale_with_fallback(
                &localized,
                locale,
                fallback_locale,
                |translation| translation.locale.as_str(),
            );
            let metadata = self
''',
              '''            let resolved = resolve_by_locale_with_fallback(
                &localized,
                locale,
                fallback_locale,
                |translation| translation.locale.as_str(),
            );
            let translation = resolved.item.ok_or_else(|| {
                ForumError::Validation(format!(
                    "Topic {} has no localized translation",
                    topic.id
                ))
            })?;
            let metadata = self
''',
              "topic list translation guard",
          )

          topic = replace_once(
              topic,
              '''                title: resolved
                    .item
                    .map(|translation| translation.title.clone())
                    .unwrap_or_default(),
                slug: resolved
                    .item
                    .and_then(|translation| translation.slug.clone())
                    .unwrap_or_default(),
''',
              '''                title: translation.title.clone(),
                slug: translation.slug.clone().unwrap_or_default(),
''',
              "topic list localized fields",
          )

          topic = replace_once(
              topic,
              '''fn to_topic_response(
    topic: forum_topic::Model,
    translations: Vec<forum_topic_translation::Model>,
    parts: TopicResponseParts,
    locale: &str,
    fallback_locale: Option<&str>,
) -> TopicResponse {
    let resolved =
        resolve_by_locale_with_fallback(&translations, locale, fallback_locale, |translation| {
            translation.locale.as_str()
        });
    let body = resolved
        .item
        .map(|translation| translation.body.clone())
        .unwrap_or_default();
    let body_format = resolved
        .item
        .map(|translation| translation.body_format.clone())
        .unwrap_or_else(|| "markdown".to_string());
    let content_json = if body_format == "rt_json_v1" {
        serde_json::from_str(&body).ok()
    } else {
        None
    };

    TopicResponse {
        id: topic.id,
        requested_locale: locale.to_string(),
        locale: locale.to_string(),
        effective_locale: resolved.effective_locale,
        available_locales: available_locales_from(&translations, |translation| {
            translation.locale.as_str()
        }),
        category_id: topic.category_id,
        author_id: topic.author_id,
        title: resolved
            .item
            .map(|translation| translation.title.clone())
            .unwrap_or_default(),
        slug: resolved
            .item
            .and_then(|translation| translation.slug.clone())
            .unwrap_or_default(),
        body,
        body_format,
        content_json,
        metadata: parts.metadata,
        status: topic.status.to_string(),
        tags: parts.tags,
        channel_slugs: parts.channel_slugs,
        vote_score: parts.vote_summary.score,
        current_user_vote: parts.vote_summary.current_user_vote,
        is_subscribed: parts.is_subscribed,
        solution_reply_id: parts.solution_reply_id,
        is_pinned: topic.is_pinned,
        is_locked: topic.is_locked,
        reply_count: topic.reply_count,
        created_at: topic.created_at.to_rfc3339(),
        updated_at: topic.updated_at.to_rfc3339(),
    }
}
''',
              '''fn to_topic_response(
    topic: forum_topic::Model,
    translations: Vec<forum_topic_translation::Model>,
    parts: TopicResponseParts,
    locale: &str,
    fallback_locale: Option<&str>,
) -> ForumResult<TopicResponse> {
    let resolved =
        resolve_by_locale_with_fallback(&translations, locale, fallback_locale, |translation| {
            translation.locale.as_str()
        });
    let translation = resolved.item.ok_or_else(|| {
        ForumError::Validation(format!(
            "Topic {} has no localized translation",
            topic.id
        ))
    })?;
    let body = translation.body.clone();
    let body_format = translation.body_format.clone();
    let content_json = if body_format == "rt_json_v1" {
        serde_json::from_str(&body).ok()
    } else {
        None
    };

    Ok(TopicResponse {
        id: topic.id,
        requested_locale: locale.to_string(),
        locale: locale.to_string(),
        effective_locale: resolved.effective_locale,
        available_locales: available_locales_from(&translations, |translation| {
            translation.locale.as_str()
        }),
        category_id: topic.category_id,
        author_id: topic.author_id,
        title: translation.title.clone(),
        slug: translation.slug.clone().unwrap_or_default(),
        body,
        body_format,
        content_json,
        metadata: parts.metadata,
        status: topic.status.to_string(),
        tags: parts.tags,
        channel_slugs: parts.channel_slugs,
        vote_score: parts.vote_summary.score,
        current_user_vote: parts.vote_summary.current_user_vote,
        is_subscribed: parts.is_subscribed,
        solution_reply_id: parts.solution_reply_id,
        is_pinned: topic.is_pinned,
        is_locked: topic.is_locked,
        reply_count: topic.reply_count,
        created_at: topic.created_at.to_rfc3339(),
        updated_at: topic.updated_at.to_rfc3339(),
    })
}
''',
              "topic response translation guard",
          )

          topic_path.write_text(topic, encoding="utf-8")

          reply_path = Path("crates/rustok-forum/src/services/reply.rs")
          reply = reply_path.read_text(encoding="utf-8")

          reply = replace_once(
              reply,
              '''        Ok(to_reply_response(
            reply,
            bodies,
            vote_summary,
            solution_reply_id,
            &locale,
            fallback_locale.as_deref(),
        ))
''',
              '''        to_reply_response(
            reply,
            bodies,
            vote_summary,
            solution_reply_id,
            &locale,
            fallback_locale.as_deref(),
        )
''',
              "reply detail result",
          )

          reply = replace_once(
              reply,
              '''        let items = replies
            .into_iter()
            .map(|reply| {
                let bodies = bodies_map.get(&reply.id).cloned().unwrap_or_default();
                let resolved = resolve_reply_body(&bodies, &locale, fallback_locale.as_deref());
                let content = resolved
                    .item
                    .map(|body| body.body.clone())
                    .unwrap_or_default();
                let preview: String = content.chars().take(200).collect();
                ReplyListItem {
                    id: reply.id,
                    locale: locale.clone(),
                    effective_locale: resolved.effective_locale,
                    topic_id: reply.topic_id,
                    author_id: reply.author_id,
                    content_preview: preview,
                    status: reply.status.to_string(),
                    vote_score: vote_summaries
                        .get(&reply.id)
                        .map(|summary| summary.score)
                        .unwrap_or_default(),
                    current_user_vote: vote_summaries
                        .get(&reply.id)
                        .and_then(|summary| summary.current_user_vote),
                    is_solution: Some(reply.id) == solution_reply_id,
                    parent_reply_id: reply.parent_reply_id,
                    created_at: reply.created_at.to_rfc3339(),
                }
            })
            .collect();
''',
              '''        let items = replies
            .into_iter()
            .map(|reply| -> ForumResult<ReplyListItem> {
                let bodies = bodies_map.get(&reply.id).cloned().unwrap_or_default();
                let resolved = resolve_reply_body(&bodies, &locale, fallback_locale.as_deref());
                let body = resolved.item.ok_or_else(|| {
                    ForumError::Validation(format!(
                        "Reply {} has no localized body",
                        reply.id
                    ))
                })?;
                let preview: String = body.body.chars().take(200).collect();
                Ok(ReplyListItem {
                    id: reply.id,
                    locale: locale.clone(),
                    effective_locale: resolved.effective_locale,
                    topic_id: reply.topic_id,
                    author_id: reply.author_id,
                    content_preview: preview,
                    status: reply.status.to_string(),
                    vote_score: vote_summaries
                        .get(&reply.id)
                        .map(|summary| summary.score)
                        .unwrap_or_default(),
                    current_user_vote: vote_summaries
                        .get(&reply.id)
                        .and_then(|summary| summary.current_user_vote),
                    is_solution: Some(reply.id) == solution_reply_id,
                    parent_reply_id: reply.parent_reply_id,
                    created_at: reply.created_at.to_rfc3339(),
                })
            })
            .collect::<ForumResult<Vec<_>>>()?;
''',
              "reply list body guard",
          )

          reply = replace_once(
              reply,
              '''        let items = replies
            .into_iter()
            .map(|reply| {
                let reply_id = reply.id;
                to_reply_response(
                    reply,
                    bodies_map.get(&reply_id).cloned().unwrap_or_default(),
                    vote_summaries.get(&reply_id).copied().unwrap_or_default(),
                    solution_reply_id,
                    &locale,
                    fallback_locale.as_deref(),
                )
            })
            .collect();
''',
              '''        let items = replies
            .into_iter()
            .map(|reply| {
                let reply_id = reply.id;
                to_reply_response(
                    reply,
                    bodies_map.get(&reply_id).cloned().unwrap_or_default(),
                    vote_summaries.get(&reply_id).copied().unwrap_or_default(),
                    solution_reply_id,
                    &locale,
                    fallback_locale.as_deref(),
                )
            })
            .collect::<ForumResult<Vec<_>>>()?;
''',
              "reply response list result",
          )

          reply = replace_once(
              reply,
              '''                    body: Set(if body.is_empty() {
                        seed.as_ref()
                            .map(|row| row.body.clone())
                            .unwrap_or_default()
                    } else {
                        body
                    }),
''',
              '''                    body: Set(if body.is_empty() {
                        seed.as_ref().map(|row| row.body.clone()).ok_or_else(|| {
                            ForumError::Validation(
                                "Reply body is required for a new locale".to_string(),
                            )
                        })?
                    } else {
                        body
                    }),
''',
              "reply locale seed guard",
          )

          reply = replace_once(
              reply,
              '''fn to_reply_response(
    reply: forum_reply::Model,
    bodies: Vec<forum_reply_body::Model>,
    vote_summary: VoteSummary,
    solution_reply_id: Option<Uuid>,
    locale: &str,
    fallback_locale: Option<&str>,
) -> ReplyResponse {
    let resolved = resolve_reply_body(&bodies, locale, fallback_locale);
    let content = resolved
        .item
        .map(|body| body.body.clone())
        .unwrap_or_default();
    let content_format = resolved
        .item
        .map(|body| body.body_format.clone())
        .unwrap_or_else(|| "markdown".to_string());
    let content_json = if content_format == "rt_json_v1" {
        serde_json::from_str(&content).ok()
    } else {
        None
    };

    ReplyResponse {
        id: reply.id,
        requested_locale: locale.to_string(),
        locale: locale.to_string(),
        effective_locale: resolved.effective_locale,
        topic_id: reply.topic_id,
        author_id: reply.author_id,
        content,
        content_format,
        content_json,
        status: reply.status.to_string(),
        vote_score: vote_summary.score,
        current_user_vote: vote_summary.current_user_vote,
        is_solution: Some(reply.id) == solution_reply_id,
        parent_reply_id: reply.parent_reply_id,
        created_at: reply.created_at.to_rfc3339(),
        updated_at: reply.updated_at.to_rfc3339(),
    }
}
''',
              '''fn to_reply_response(
    reply: forum_reply::Model,
    bodies: Vec<forum_reply_body::Model>,
    vote_summary: VoteSummary,
    solution_reply_id: Option<Uuid>,
    locale: &str,
    fallback_locale: Option<&str>,
) -> ForumResult<ReplyResponse> {
    let resolved = resolve_reply_body(&bodies, locale, fallback_locale);
    let body = resolved.item.ok_or_else(|| {
        ForumError::Validation(format!("Reply {} has no localized body", reply.id))
    })?;
    let content = body.body.clone();
    let content_format = body.body_format.clone();
    let content_json = if content_format == "rt_json_v1" {
        serde_json::from_str(&content).ok()
    } else {
        None
    };

    Ok(ReplyResponse {
        id: reply.id,
        requested_locale: locale.to_string(),
        locale: locale.to_string(),
        effective_locale: resolved.effective_locale,
        topic_id: reply.topic_id,
        author_id: reply.author_id,
        content,
        content_format,
        content_json,
        status: reply.status.to_string(),
        vote_score: vote_summary.score,
        current_user_vote: vote_summary.current_user_vote,
        is_solution: Some(reply.id) == solution_reply_id,
        parent_reply_id: reply.parent_reply_id,
        created_at: reply.created_at.to_rfc3339(),
        updated_at: reply.updated_at.to_rfc3339(),
    })
}
''',
              "reply response body guard",
          )

          reply_path.write_text(reply, encoding="utf-8")
          PY

          rustfmt --edition 2024 \
            crates/rustok-forum/src/services/topic.rs \
            crates/rustok-forum/src/services/reply.rs

          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-forum/src/services/topic.rs crates/rustok-forum/src/services/reply.rs
          git commit -m "fix(forum): fail closed on missing localized content [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
