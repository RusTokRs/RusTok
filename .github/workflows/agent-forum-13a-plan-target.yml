name: Apply guarded FORUM-13A plan patch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  patch-plan:
    if: ${{ github.event.issue.pull_request && github.event.issue.number == 1869 && github.event.comment.body == '/apply-forum-13a-plan' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forum-13a-category-presentation-contract
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update canonical plan
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('crates/rustok-forum/docs/implementation-plan.md')
          text = path.read_text()
          old_ledger = '| `FORUM-13` | `planned` | Category icon tokens and media-owned cover images. |'
          new_ledger = '| `FORUM-13` | `in_progress` | FORUM-13A adds bounded icon/color and transport-neutral cover candidate policy; Media quarantine/deletion state, persistence and UI remain. |'
          if old_ledger in text:
              text = text.replace(old_ledger, new_ledger, 1)
          elif new_ledger not in text:
              raise SystemExit('FORUM-13 ledger entry changed')

          marker = '### Delivered in `FORUM-13A`'
          if marker not in text:
              anchor = '''### Degraded mode

With media disabled, icon/color behavior remains available, image selection is
hidden, and existing image descriptors degrade to absent without breaking
category reads. A command that attempts to set a media reference fails with a
typed capability-unavailable error.

'''
              delivered = '''### Delivered in `FORUM-13A`

- category icon writes normalize to bounded lowercase kebab-case semantic keys
  at the database write boundary; CSS classes, markup, URLs and paths fail closed;
- category colors remain restricted to safe bounded hexadecimal values;
- `CategoryCoverMediaCandidate` is a transport-neutral validation input containing
  only media identity, tenant, MIME, size, dimensions and `MediaImageDescriptor`;
- cover candidate policy rejects foreign tenants, unsupported MIME, size or
  dimension violations, descriptor mismatch and non-direct-public delivery;
- a verifier rejects Media persistence/storage access and arbitrary category
  image URL/path fields.

### Remaining scope

- Media must publish quarantine and deletion lifecycle state through its owner
  read contract before Forum persists `cover_media_id`;
- add the owner command, persistence, response descriptor hydration and
  admin/storefront image selection after that state is available;
- add typed capability-unavailable transport mapping and degraded-mode runtime
  evidence for Media-disabled deployments.

'''
              if anchor not in text:
                  raise SystemExit('FORUM-13 degraded-mode anchor changed')
              text = text.replace(anchor, anchor + delivered, 1)

          verification_anchor = '''### Definition of done

No forum table stores arbitrary asset URLs and a foreign/quarantined asset
cannot be attached.
'''
          verification = '''### Verification

```bash
cargo test -p rustok-forum category_presentation
node scripts/verify/verify-forum-category-presentation.mjs
node scripts/verify/verify-forum-category-presentation.test.mjs
cargo xtask module validate forum
```

'''
          if verification not in text:
              if verification_anchor not in text:
                  raise SystemExit('FORUM-13 definition anchor changed')
              text = text.replace(verification_anchor, verification_anchor + '\n' + verification, 1)

          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/rustok-forum/docs/implementation-plan.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'docs(forum): record FORUM-13A [forum-13a-plan]'
          git push origin HEAD:agent/forum-13a-category-presentation-contract
