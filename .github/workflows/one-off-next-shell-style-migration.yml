name: One-off Next Shell Style Migration

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate-shell-styles:
    if: >-
      github.event.issue.title == '[automation] migrate Next shell inline styles' &&
      (github.event_name == 'issues' || github.event.comment.body == '/migrate-next-shell-styles')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply bounded shell migrations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact match, found {count}: {old!r}")
              file.write_text(source.replace(old, new, 1))

          def replace_count(path: str, old: str, new: str, expected: int) -> None:
              file = Path(path)
              source = file.read_text()
              count = source.count(old)
              if count != expected:
                  raise SystemExit(f"{path}: expected {expected} exact matches, found {count}: {old!r}")
              file.write_text(source.replace(old, new))

          def sub_once(path: str, pattern: str, replacement: str) -> None:
              file = Path(path)
              source = file.read_text()
              updated, count = re.subn(pattern, replacement, source, count=1, flags=re.MULTILINE | re.DOTALL)
              if count != 1:
                  raise SystemExit(f"{path}: expected one regex match, found {count}: {pattern!r}")
              file.write_text(updated)

          infobar = "apps/next-admin/src/shared/ui/shadcn/infobar.tsx"
          sub_once(
              infobar,
              r"const INFOBAR_WIDTH = '22rem';\s*const INFOBAR_WIDTH_ICON = '3rem';\s*const INFOBAR_WIDTH_MOBILE = '18rem';\s*",
              "",
          )
          sub_once(
              infobar,
              r"function InfobarProvider\(\{\s*defaultOpen = true,\s*open: openProp,\s*onOpenChange: setOpenProp,\s*className,\s*style,\s*children,\s*\.\.\.props\s*\}: React\.ComponentProps<'div'> & \{\s*defaultOpen\?: boolean;\s*open\?: boolean;\s*onOpenChange\?: \(open: boolean\) => void;\s*\}\) \{",
              """type InfobarProviderProps = Omit<React.ComponentProps<'div'>, 'style'> & {
            defaultOpen?: boolean;
            open?: boolean;
            onOpenChange?: (open: boolean) => void;
          };

          function InfobarProvider({
            defaultOpen = true,
            open: openProp,
            onOpenChange: setOpenProp,
            className,
            children,
            ...props
          }: InfobarProviderProps) {""",
          )
          sub_once(
              infobar,
              r"\s*style=\{\s*\{\s*'--infobar-width': INFOBAR_WIDTH,\s*'--infobar-width-icon': INFOBAR_WIDTH_ICON,\s*\.\.\.style\s*\}\s*as React\.CSSProperties\s*\}",
              "",
          )
          replace_once(
              infobar,
              "group/infobar-wrapper has-data-[variant=inset]:bg-sidebar flex min-h-svh w-full",
              "group/infobar-wrapper has-data-[variant=inset]:bg-sidebar flex min-h-svh w-full [--infobar-width:22rem] [--infobar-width-icon:3rem]",
          )
          sub_once(
              infobar,
              r"\s*style=\{\s*\{\s*'--infobar-width': INFOBAR_WIDTH_MOBILE\s*\}\s*as React\.CSSProperties\s*\}",
              "",
          )
          replace_once(
              infobar,
              "bg-sidebar text-sidebar-foreground w-(--infobar-width) p-0 [&>button]:hidden",
              "bg-sidebar text-sidebar-foreground w-[18rem] p-0 [&>button]:hidden",
          )
          sub_once(
              infobar,
              r"\s*style=\{\s*\{\s*'--infobar-transition-duration': isPathnameChanging \? '0ms' : '200ms'\s*\}\s*as React\.CSSProperties\s*\}",
              "\n      data-pathname-changing={isPathnameChanging}",
          )
          replace_count(
              infobar,
              "duration-(--infobar-transition-duration,200ms)",
              "duration-200 group-data-[pathname-changing=true]:duration-0",
              2,
          )
          sub_once(
              infobar,
              r"\s*// Random width between 50 to 90%\.\s*const width = React\.useMemo\(\(\) => \{\s*return `\$\{Math\.floor\(Math\.random\(\) \* 40\) \+ 50\}%`;\s*\}, \[\]\);\s*",
              "\n",
          )
          replace_once(
              infobar,
              "h-4 max-w-(--skeleton-width) flex-1",
              "h-4 max-w-[70%] flex-1",
          )
          sub_once(
              infobar,
              r"\s*style=\{\s*\{\s*'--skeleton-width': width\s*\}\s*as React\.CSSProperties\s*\}",
              "",
          )

          sidebar = "apps/next-admin/src/shared/ui/shadcn/sidebar.tsx"
          sub_once(
              sidebar,
              r"const SIDEBAR_WIDTH = '16rem';\s*const SIDEBAR_WIDTH_MOBILE = '18rem';\s*const SIDEBAR_WIDTH_ICON = '3rem';\s*",
              "",
          )
          sub_once(
              sidebar,
              r"function SidebarProvider\(\{\s*defaultOpen = true,\s*open: openProp,\s*onOpenChange: setOpenProp,\s*className,\s*style,\s*children,\s*\.\.\.props\s*\}: React\.ComponentProps<'div'> & \{\s*defaultOpen\?: boolean;\s*open\?: boolean;\s*onOpenChange\?: \(open: boolean\) => void;\s*\}\) \{",
              """type SidebarProviderProps = Omit<React.ComponentProps<'div'>, 'style'> & {
            defaultOpen?: boolean;
            open?: boolean;
            onOpenChange?: (open: boolean) => void;
          };

          function SidebarProvider({
            defaultOpen = true,
            open: openProp,
            onOpenChange: setOpenProp,
            className,
            children,
            ...props
          }: SidebarProviderProps) {""",
          )
          sub_once(
              sidebar,
              r"\s*style=\{\s*\{\s*'--sidebar-width': SIDEBAR_WIDTH,\s*'--sidebar-width-icon': SIDEBAR_WIDTH_ICON,\s*\.\.\.style\s*\}\s*as React\.CSSProperties\s*\}",
              "",
          )
          replace_once(
              sidebar,
              "group/sidebar-wrapper has-data-[variant=inset]:bg-sidebar flex min-h-svh w-full",
              "group/sidebar-wrapper has-data-[variant=inset]:bg-sidebar flex min-h-svh w-full [--sidebar-width:16rem] [--sidebar-width-icon:3rem]",
          )
          sub_once(
              sidebar,
              r"\s*style=\{\s*\{\s*'--sidebar-width': SIDEBAR_WIDTH_MOBILE\s*\}\s*as React\.CSSProperties\s*\}",
              "",
          )
          replace_once(
              sidebar,
              "bg-sidebar text-sidebar-foreground w-(--sidebar-width) p-0 [&>button]:hidden",
              "bg-sidebar text-sidebar-foreground w-[18rem] p-0 [&>button]:hidden",
          )
          sub_once(
              sidebar,
              r"\s*// Random width between 50 to 90%\.\s*const width = React\.useMemo\(\(\) => \{\s*return `\$\{Math\.floor\(Math\.random\(\) \* 40\) \+ 50\}%`;\s*\}, \[\]\);\s*",
              "\n",
          )
          replace_once(
              sidebar,
              "h-4 max-w-(--skeleton-width) flex-1",
              "h-4 max-w-[70%] flex-1",
          )
          sub_once(
              sidebar,
              r"\s*style=\{\s*\{\s*'--skeleton-width': width\s*\}\s*as React\.CSSProperties\s*\}",
              "",
          )

          register_path = Path("docs/security/csp-next-style-exceptions.json")
          register = json.loads(register_path.read_text())
          removed = {
              "apps/next-admin/src/shared/ui/shadcn/infobar.tsx",
              "apps/next-admin/src/shared/ui/shadcn/sidebar.tsx",
          }
          existing = {entry.get("path") for entry in register.get("exceptions", [])}
          if not removed.issubset(existing) or len(existing) != 5:
              raise SystemExit(f"unexpected Next style register before shell migration: {sorted(existing)}")
          register["exceptions"] = [
              entry for entry in register["exceptions"] if entry.get("path") not in removed
          ]
          register_path.write_text(json.dumps(register, indent=2) + "\n")

          verifier = "scripts/verify/verify-csp-next-style-boundary.mjs"
          replace_once(verifier, "const maxRegisteredFiles = 5;", "const maxRegisteredFiles = 3;")
          replace_once(verifier, "const maxStyleAttributeSites = 54;", "const maxStyleAttributeSites = 47;")
          shell_contract = """requireMarkers("apps/next-admin/src/shared/ui/shadcn/infobar.tsx", [
            "type InfobarProviderProps = Omit<React.ComponentProps<'div'>, 'style'>",
            "[--infobar-width:22rem]",
            "[--infobar-width-icon:3rem]",
            "data-pathname-changing={isPathnameChanging}",
            "group-data-[pathname-changing=true]:duration-0",
            "max-w-[70%]",
          ]);
          forbidMarkers("apps/next-admin/src/shared/ui/shadcn/infobar.tsx", [
            "style=",
            "Math.random",
            "INFOBAR_WIDTH",
            "--infobar-transition-duration",
          ]);
          requireMarkers("apps/next-admin/src/shared/ui/shadcn/sidebar.tsx", [
            "type SidebarProviderProps = Omit<React.ComponentProps<'div'>, 'style'>",
            "[--sidebar-width:16rem]",
            "[--sidebar-width-icon:3rem]",
            "w-[18rem]",
            "max-w-[70%]",
          ]);
          forbidMarkers("apps/next-admin/src/shared/ui/shadcn/sidebar.tsx", [
            "style=",
            "Math.random",
            "SIDEBAR_WIDTH",
          ]);
          """
          replace_once(
              verifier,
              "requireMarkers(\"apps/next-admin/src/shared/ui/shadcn/chart.tsx\", [\n",
              shell_contract + "requireMarkers(\"apps/next-admin/src/shared/ui/shadcn/chart.tsx\", [\n",
          )

          workflow = Path(".github/workflows/one-off-next-shell-style-migration.yml")
          if not workflow.exists():
              raise SystemExit("one-off workflow is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          test ! -e .github/workflows/one-off-next-shell-style-migration.yml
          grep -Fq 'const maxStyleAttributeSites = 47;' scripts/verify/verify-csp-next-style-boundary.mjs
          ! grep -R -F 'style=' apps/next-admin/src/shared/ui/shadcn/infobar.tsx apps/next-admin/src/shared/ui/shadcn/sidebar.tsx
      - name: Commit shell migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: remove Next shell inline styles"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Next shell inline styles removed; one-off workflow removed itself."
