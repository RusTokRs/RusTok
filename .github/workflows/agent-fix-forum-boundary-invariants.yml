name: Apply forum boundary invariant patch

on:
  push:
    branches:
      - agent/fix-forum-boundary-invariants
    paths:
      - .github/workflows/agent-fix-forum-boundary-invariants.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-forum-boundary-invariants
          fetch-depth: 0

      - name: Apply deterministic source patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def load(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def save(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def must_replace(text: str, old: str, new: str, *, label: str, count: int = 1) -> str:
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f"{label}: expected {count} matches, found {actual}")
              return text.replace(old, new, count)

          def patch_required_tenant_scope(path: str, minimum: int) -> None:
              text = load(path)
              matches = list(re.finditer(r"(?m)^    async fn ([a-zA-Z0-9_]+)\(", text))
              output = []
              cursor = 0
              patched = []
              for index, match in enumerate(matches):
                  output.append(text[cursor:match.start()])
                  end = matches[index + 1].start() if index + 1 < len(matches) else len(text)
                  part = text[match.start():end]
                  signature_end = part.find("{")
                  signature = part[: signature_end + 1]
                  if "tenant_id: Uuid" in signature and "tenant_id: Option<Uuid>" not in signature:
                      if "resolve_tenant_scope(tenant, Some(tenant_id))?" not in part:
                          part = part.replace(
                              "        let tenant = ctx.data::<rustok_api::TenantContext>()?;\n", ""
                          )
                          part = part.replace(
                              "        let tenant = ctx.data::<TenantContext>()?;\n", ""
                          )
                          marker = "        require_module_enabled(ctx, MODULE_SLUG).await?;\n"
                          if marker not in part:
                              raise SystemExit(f"{path}:{match.group(1)} missing module guard")
                          part = part.replace(
                              marker,
                              marker
                              + "        let tenant = ctx.data::<TenantContext>()?;\n"
                              + "        let tenant_id = resolve_tenant_scope(tenant, Some(tenant_id))?;\n",
                              1,
                          )
                          patched.append(match.group(1))
                  output.append(part)
                  cursor = end
              updated = "".join(output)
              if len(patched) < minimum:
                  raise SystemExit(f"{path}: expected at least {minimum} tenant guards, patched {patched}")
              save(path, updated)

          # GraphQL: every required tenant argument is checked against TenantContext.
          patch_required_tenant_scope("crates/rustok-forum/src/graphql/mutation.rs", 8)
          patch_required_tenant_scope("crates/rustok-forum/src/graphql/query.rs", 1)
          query_path = "crates/rustok-forum/src/graphql/query.rs"
          query = load(query_path)
          storefront_count = query.count("let resolved_tenant_id = tenant_id.unwrap_or(tenant.id);")
          if storefront_count < 4:
              raise SystemExit(f"expected at least four storefront tenant fallbacks, found {storefront_count}")
          query = query.replace(
              "let resolved_tenant_id = tenant_id.unwrap_or(tenant.id);",
              "let resolved_tenant_id = resolve_tenant_scope(tenant, tenant_id)?;",
          )
          save(query_path, query)

          # Category owner facade: explicit public API only, no raw persistence Deref.
          owner_path = "crates/rustok-forum/src/services/category_owner.rs"
          owner = load(owner_path)
          owner = must_replace(owner, "use std::ops::Deref;\n\n", "", label="remove category Deref import")
          owner = must_replace(
              owner,
              "    CategoryListItem, CategoryResponse, CategorySubtreeLifecycleResponse,\n",
              "    CategoryListItem, CategoryResponse, CategorySubtreeLifecycleResponse, CreateCategoryInput,\n",
              label="import CreateCategoryInput",
          )
          owner_new = """    pub fn new(db: DatabaseConnection) -> Self {
        Self {
            inner: category::CategoryService::new(db.clone()),
            commands: category_command::CategoryCommandService::new(db.clone()),
            lifecycle: category_lifecycle::CategoryLifecycleService::new(db.clone()),
            policy: category_policy::CategoryTopicPolicyService::new(db.clone()),
            tree: category_tree::CategoryTreeService::new(db),
        }
    }
"""
          owner_methods = owner_new + """
    pub async fn create(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        input: CreateCategoryInput,
    ) -> ForumResult<CategoryResponse> {
        self.inner.create(tenant_id, security, input).await
    }

    pub async fn get(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        category_id: Uuid,
        locale: &str,
    ) -> ForumResult<CategoryResponse> {
        self.inner.get(tenant_id, security, category_id, locale).await
    }

    pub async fn get_with_locale_fallback(
        &self,
        tenant_id: Uuid,
        security: SecurityContext,
        category_id: Uuid,
        locale: &str,
        fallback_locale: Option<&str>,
    ) -> ForumResult<CategoryResponse> {
        self.inner
            .get_with_locale_fallback(tenant_id, security, category_id, locale, fallback_locale)
            .await
    }

    pub async fn delete(
        &self,
        tenant_id: Uuid,
        category_id: Uuid,
        security: SecurityContext,
    ) -> ForumResult<()> {
        self.inner.delete(tenant_id, category_id, security).await
    }
"""
          owner = must_replace(owner, owner_new, owner_methods, label="add explicit category owner methods")
          owner = re.sub(
              r"\nimpl Deref for CategoryService \{.*?\n\}\n?$",
              "\n",
              owner,
              flags=re.S,
          )
          if "impl Deref for CategoryService" in owner:
              raise SystemExit("category owner Deref block was not removed")
          save(owner_path, owner)

          # Category persistence: serialize creation and maintain deterministic sibling positions.
          category_path = "crates/rustok-forum/src/services/category.rs"
          category = load(category_path)
          category = must_replace(
              category,
              "    ActiveModelTrait, ActiveValue::Set, ColumnTrait, DatabaseConnection, DatabaseTransaction,\n    EntityTrait, PaginatorTrait, QueryFilter, QueryOrder, TransactionTrait,\n",
              "    ActiveModelTrait, ActiveValue::Set, ColumnTrait, ConnectionTrait, DatabaseBackend,\n    DatabaseConnection, DatabaseTransaction, EntityTrait, PaginatorTrait, QueryFilter, QueryOrder,\n    Statement, TransactionTrait,\n",
              label="category DB imports",
          )
          create_marker = """        let now = Utc::now();
        let id = Uuid::new_v4();
        let txn = self.db.begin().await?;
"""
          create_guard = create_marker + """
        lock_category_tree_in_tx(&txn, tenant_id).await?;
        if let Some(parent_id) = input.parent_id {
            Self::find_category_in_tx(&txn, tenant_id, parent_id).await?;
        }

        let sibling_query = forum_category::Entity::find()
            .filter(forum_category::Column::TenantId.eq(tenant_id));
        let sibling_query = match input.parent_id {
            Some(parent_id) => sibling_query.filter(forum_category::Column::ParentId.eq(parent_id)),
            None => sibling_query.filter(forum_category::Column::ParentId.is_null()),
        };
        let siblings = sibling_query
            .order_by_asc(forum_category::Column::Position)
            .order_by_asc(forum_category::Column::Id)
            .all(&txn)
            .await?;
        let sibling_count = i32::try_from(siblings.len()).map_err(|_| {
            ForumError::Validation("Category sibling count exceeds i32 range".to_string())
        })?;
        let requested_position = input.position.unwrap_or(sibling_count);
        if requested_position < 0 {
            return Err(ForumError::Validation(
                "Category position cannot be negative".to_string(),
            ));
        }
        let requested_index = usize::try_from(requested_position).map_err(|_| {
            ForumError::Validation("Category position exceeds usize range".to_string())
        })?;
        let requested_index = requested_index.min(siblings.len());
        let requested_position = i32::try_from(requested_index).map_err(|_| {
            ForumError::Validation("Category position exceeds i32 range".to_string())
        })?;

        for (index, sibling) in siblings.into_iter().enumerate() {
            let normalized_index = index + usize::from(index >= requested_index);
            let normalized_position = i32::try_from(normalized_index).map_err(|_| {
                ForumError::Validation("Category position exceeds i32 range".to_string())
            })?;
            if sibling.position == normalized_position {
                continue;
            }
            let mut active: forum_category::ActiveModel = sibling.into();
            active.position = Set(normalized_position);
            active.updated_at = Set(now.into());
            active.update(&txn).await?;
        }
"""
          category = must_replace(category, create_marker, create_guard, label="category create lock")
          category = must_replace(
              category,
              "            position: Set(input.position.unwrap_or(0)),",
              "            position: Set(requested_position),",
              label="category normalized create position",
          )

          lock_helper = """
async fn lock_category_tree_in_tx(
    txn: &DatabaseTransaction,
    tenant_id: Uuid,
) -> ForumResult<()> {
    match txn.get_database_backend() {
        DatabaseBackend::Postgres => {
            txn.execute(Statement::from_sql_and_values(
                DatabaseBackend::Postgres,
                "SELECT pg_advisory_xact_lock(hashtextextended($1, 0))",
                [tenant_id.to_string().into()],
            ))
            .await?;
            Ok(())
        }
        DatabaseBackend::Sqlite => Ok(()),
        backend => Err(ForumError::Validation(format!(
            "Forum category creation does not support {backend:?}"
        ))),
    }
}

"""
          if "async fn lock_category_tree_in_tx(" not in category:
              category = category.replace("fn to_category_response(\n", lock_helper + "fn to_category_response(\n", 1)

          # Translation reads are tenant-scoped and fail closed when no translation exists.
          category = must_replace(
              category,
              "        let translations = self.load_translations(category_id).await?;",
              "        let translations = self.load_translations(tenant_id, category_id).await?;",
              label="tenant-scoped single translation load",
          )
          category = must_replace(
              category,
              "            .load_translations_map_for_categories(&category_ids)",
              "            .load_translations_map_for_categories(tenant_id, &category_ids)",
              label="tenant-scoped translation map load",
          )

          list_start = category.index("        let items = categories\n")
          list_end = category.index("\n\n        Ok((items, total))", list_start)
          list_block = """        let mut items = Vec::with_capacity(categories.len());
        for category in categories {
            let localized = translations_by_category_id
                .get(&category.id)
                .cloned()
                .unwrap_or_default();
            let resolved = resolve_by_locale_with_fallback(
                &localized,
                &locale,
                fallback_locale.as_deref(),
                |translation| translation.locale.as_str(),
            );
            let translation = resolved.item.ok_or_else(|| {
                ForumError::Validation(format!(
                    "Forum category {} has no localized translation",
                    category.id
                ))
            })?;

            items.push(CategoryListItem {
                id: category.id,
                requested_locale: locale.clone(),
                locale: locale.clone(),
                effective_locale: resolved.effective_locale,
                available_locales: available_locales_from(&localized, |translation| {
                    translation.locale.as_str()
                }),
                name: translation.name.clone(),
                slug: translation.slug.clone(),
                description: translation.description.clone(),
                icon: category.icon.clone(),
                color: category.color.clone(),
                topic_count: category.topic_count,
                reply_count: category.reply_count,
                is_subscribed: subscription_flags
                    .get(&category.id)
                    .copied()
                    .unwrap_or(false),
            });
        }"""
          category = category[:list_start] + list_block + category[list_end:]

          category = must_replace(
              category,
              """        Ok(to_category_response(
            category,
            translations,
            is_subscribed,
            &locale,
            fallback_locale.as_deref(),
        ))
""",
              """        to_category_response(
            category,
            translations,
            is_subscribed,
            &locale,
            fallback_locale.as_deref(),
        )
""",
              label="fallible category response",
          )

          response_start = category.index("fn to_category_response(\n")
          response_end = category.index("\nfn validate_category_name", response_start)
          response_fn = """fn to_category_response(
    category: forum_category::Model,
    translations: Vec<forum_category_translation::Model>,
    is_subscribed: bool,
    locale: &str,
    fallback_locale: Option<&str>,
) -> ForumResult<CategoryResponse> {
    let resolved =
        resolve_by_locale_with_fallback(&translations, locale, fallback_locale, |translation| {
            translation.locale.as_str()
        });
    let translation = resolved.item.ok_or_else(|| {
        ForumError::Validation(format!(
            "Forum category {} has no localized translation",
            category.id
        ))
    })?;

    Ok(CategoryResponse {
        id: category.id,
        requested_locale: locale.to_string(),
        locale: locale.to_string(),
        effective_locale: resolved.effective_locale,
        available_locales: available_locales_from(&translations, |translation| {
            translation.locale.as_str()
        }),
        name: translation.name.clone(),
        slug: translation.slug.clone(),
        description: translation.description.clone(),
        icon: category.icon,
        color: category.color,
        parent_id: category.parent_id,
        position: category.position,
        topic_count: category.topic_count,
        reply_count: category.reply_count,
        moderated: category.moderated,
        is_subscribed,
    })
}
"""
          category = category[:response_start] + response_fn + category[response_end:]

          category = must_replace(
              category,
              """    async fn load_translations(
        &self,
        category_id: Uuid,
    ) -> ForumResult<Vec<forum_category_translation::Model>> {
        Ok(forum_category_translation::Entity::find()
            .filter(forum_category_translation::Column::CategoryId.eq(category_id))
""",
              """    async fn load_translations(
        &self,
        tenant_id: Uuid,
        category_id: Uuid,
    ) -> ForumResult<Vec<forum_category_translation::Model>> {
        Ok(forum_category_translation::Entity::find()
            .filter(forum_category_translation::Column::TenantId.eq(tenant_id))
            .filter(forum_category_translation::Column::CategoryId.eq(category_id))
""",
              label="single translation tenant predicate",
          )
          category = must_replace(
              category,
              """    async fn load_translations_for_categories(
        &self,
        category_ids: &[Uuid],
    ) -> ForumResult<Vec<forum_category_translation::Model>> {
""",
              """    async fn load_translations_for_categories(
        &self,
        tenant_id: Uuid,
        category_ids: &[Uuid],
    ) -> ForumResult<Vec<forum_category_translation::Model>> {
""",
              label="batch translation tenant parameter",
          )
          category = must_replace(
              category,
              """        Ok(forum_category_translation::Entity::find()
            .filter(forum_category_translation::Column::CategoryId.is_in(category_ids.to_vec()))
""",
              """        Ok(forum_category_translation::Entity::find()
            .filter(forum_category_translation::Column::TenantId.eq(tenant_id))
            .filter(forum_category_translation::Column::CategoryId.is_in(category_ids.to_vec()))
""",
              label="batch translation tenant predicate",
          )
          category = must_replace(
              category,
              """    async fn load_translations_map_for_categories(
        &self,
        category_ids: &[Uuid],
    ) -> ForumResult<HashMap<Uuid, Vec<forum_category_translation::Model>>> {
        let mut map: HashMap<Uuid, Vec<forum_category_translation::Model>> = HashMap::new();
        for translation in self.load_translations_for_categories(category_ids).await? {
""",
              """    async fn load_translations_map_for_categories(
        &self,
        tenant_id: Uuid,
        category_ids: &[Uuid],
    ) -> ForumResult<HashMap<Uuid, Vec<forum_category_translation::Model>>> {
        let mut map: HashMap<Uuid, Vec<forum_category_translation::Model>> = HashMap::new();
        for translation in self
            .load_translations_for_categories(tenant_id, category_ids)
            .await?
        {
""",
              label="translation map tenant propagation",
          )
          save(category_path, category)

          # HTTP: central safe ForumError mapping and correct category read permission.
          controllers_mod_path = "crates/rustok-forum/src/controllers/mod.rs"
          controllers_mod = load(controllers_mod_path)
          controllers_mod = must_replace(
              controllers_mod,
              "use sea_orm::DatabaseConnection;\n",
              "use sea_orm::DatabaseConnection;\nuse rustok_web::HttpError;\n",
              label="HTTP error import",
          )
          error_mapper = """
pub(crate) fn map_forum_error(error: crate::ForumError) -> HttpError {
    use axum::http::StatusCode;
    use crate::ForumError;

    let code = error.stable_code();
    match error {
        ForumError::CategoryNotFound(_)
        | ForumError::TopicNotFound(_)
        | ForumError::ReplyNotFound(_)
        | ForumError::SolutionNotFound(_) => {
            HttpError::not_found(code, "The requested forum resource was not found")
        }
        ForumError::Forbidden(_) => HttpError::forbidden(code, "Permission denied"),
        ForumError::RelationRevisionConflict => HttpError::new(
            StatusCode::CONFLICT,
            code,
            "Forum relation revision changed concurrently",
        ),
        ForumError::CapabilityUnavailable { .. } | ForumError::CapabilityFailure { .. } => {
            HttpError::new(
                StatusCode::SERVICE_UNAVAILABLE,
                code,
                "A required forum capability is temporarily unavailable",
            )
        }
        ForumError::Database(_) | ForumError::Content(_) | ForumError::Internal(_) => {
            HttpError::new(
                StatusCode::INTERNAL_SERVER_ERROR,
                code,
                "The forum operation could not be completed",
            )
        }
        error => HttpError::bad_request(code, error.to_string()),
    }
}

"""
          controllers_mod = must_replace(
              controllers_mod,
              "pub fn axum_router(runtime: &HostRuntimeContext) -> anyhow::Result<Router> {\n",
              error_mapper + "pub fn axum_router(runtime: &HostRuntimeContext) -> anyhow::Result<Router> {\n",
              label="central ForumError mapper",
          )
          save(controllers_mod_path, controllers_mod)

          bad_request_pattern = re.compile(
              r"\.map_err\(\|err\|\s*HttpError::bad_request\(\"forum_operation_failed\", err\.to_string\(\)\)\s*\)"
          )
          replaced_http = 0
          for path in Path("crates/rustok-forum/src/controllers").glob("*.rs"):
              text = path.read_text(encoding="utf-8")
              text, count = bad_request_pattern.subn(
                  ".map_err(crate::controllers::map_forum_error)", text
              )
              replaced_http += count
              path.write_text(text, encoding="utf-8")
          if replaced_http < 10:
              raise SystemExit(f"expected at least ten generic HTTP mappings, replaced {replaced_http}")

          for path, function_name, error_type in [
              ("crates/rustok-forum/src/controllers/content_commands.rs", "command_error", "crate::ForumError"),
              ("crates/rustok-forum/src/controllers/quote_commands.rs", "quote_command_error", "ForumError"),
          ]:
              text = load(path)
              pattern = re.compile(
                  rf"fn {function_name}\(error: {re.escape(error_type)}\) -> HttpError \{{.*?\n\}}",
                  re.S,
              )
              replacement = (
                  f"fn {function_name}(error: {error_type}) -> HttpError {{\n"
                  "    crate::controllers::map_forum_error(error)\n"
                  "}"
              )
              text, count = pattern.subn(replacement, text, count=1)
              if count != 1:
                  raise SystemExit(f"{path}: could not replace {function_name}")
              save(path, text)

          categories_path = "crates/rustok-forum/src/controllers/categories.rs"
          categories = load(categories_path)
          start = categories.index("pub async fn get_category(")
          end = categories.index("\n}\n\n#[utoipa::path", start) + 2
          get_category = categories[start:end]
          get_category = must_replace(
              get_category,
              "&[Permission::FORUM_CATEGORIES_LIST]",
              "&[Permission::FORUM_CATEGORIES_READ]",
              label="category read permission",
          )
          get_category = must_replace(
              get_category,
              "Permission denied: forum_categories:list required",
              "Permission denied: forum_categories:read required",
              label="category read permission message",
          )
          categories = categories[:start] + get_category + categories[end:]
          save(categories_path, categories)

          # Static invariants for the generated patch.
          mutation = load("crates/rustok-forum/src/graphql/mutation.rs")
          query = load("crates/rustok-forum/src/graphql/query.rs")
          if "tenant_id.unwrap_or(tenant.id)" in query:
              raise SystemExit("storefront tenant fallback bypass remains")
          if "impl Deref for CategoryService" in load(owner_path):
              raise SystemExit("raw CategoryService Deref remains")
          if "name: resolved" in load(category_path) or "slug: resolved" in load(category_path):
              raise SystemExit("silent category translation defaults remain")
          PY

      - name: Format and compile forum
        shell: bash
        run: |
          cargo fmt --all
          cargo check -p rustok-forum
          node scripts/verify/verify-forum-owner-boundary.mjs
          node scripts/verify/verify-forum-runtime-baseline.mjs --static-only

      - name: Commit patched sources
        shell: bash
        run: |
          rm .github/workflows/agent-fix-forum-boundary-invariants.yml
          git config user.name "OpenAI Agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add -A
          git commit -m "Fix forum boundary invariants"
          git push origin HEAD:agent/fix-forum-boundary-invariants
