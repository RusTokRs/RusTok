name: One-off Status Probe

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  actions: read

jobs:
  probe:
    name: Observe cache clock hardening
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: List cache clock hardening runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh run list
          --repo $GITHUB_REPOSITORY
          --workflow one-off-harden-cache-clock.yml
          --limit 10
          --json databaseId,event,status,conclusion,createdAt,updatedAt,headSha,displayTitle,url
