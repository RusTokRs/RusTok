name: One-off Expose API Contract Builder

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  expose-builder:
    if: >-
      github.event.issue.title == '[automation] expose API contract builder' &&
      (github.event_name == 'issues' || github.event.comment.body == '/expose-api-contract-builder')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact visibility patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("apps/server/src/controllers/swagger.rs")
          source = path.read_text()
          old = "fn build_openapi_document(settings: &RustokSettings) -> OpenApiDoc {"
          new = "pub fn build_openapi_document(settings: &RustokSettings) -> OpenApiDoc {"
          count = source.count(old)
          if count != 1:
              raise SystemExit(f"expected one OpenAPI builder match, found {count}")
          path.write_text(source.replace(old, new, 1))

          workflow = Path(".github/workflows/one-off-expose-api-contract-builder.yml")
          if not workflow.exists():
              raise SystemExit("one-off workflow is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'pub fn build_openapi_document(settings: &RustokSettings)' apps/server/src/controllers/swagger.rs
          test ! -e .github/workflows/one-off-expose-api-contract-builder.yml
      - name: Commit visibility patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(api): expose composed OpenAPI document"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Composed OpenAPI builder exposed for the contract exporter; one-off workflow removed itself."
