name: Validate landing property schemas

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/landing-property-schema.yml

permissions:
  contents: write

concurrency:
  group: landing-property-schema
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96
          components: rustfmt

      - name: Integrate property schema contract
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          # Fix owned diagnostic paths and wire standard FlyEditor commands in the new core module.
          path = Path('crates/fly/src/landing_property.rs')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              "struct PropertyTarget<'a> {\n    component: &'a ComponentObject,\n    path: &'a str,\n}",
              "struct PropertyTarget<'a> {\n    component: &'a ComponentObject,\n    path: String,\n}",
              'owned property target path',
          )
          text = replace_once(
              text,
              "    section_path: &'a str,\n    targets: &mut BTreeMap<String, Vec<PropertyTarget<'a>>>,",
              "    section_path: &str,\n    targets: &mut BTreeMap<String, Vec<PropertyTarget<'a>>>,",
              'owned section path signature',
          )
          text = replace_once(
              text,
              "    path: &'a str,\n    targets: &mut BTreeMap<String, Vec<PropertyTarget<'a>>>,",
              "    path: &str,\n    targets: &mut BTreeMap<String, Vec<PropertyTarget<'a>>>,",
              'owned recursive path signature',
          )
          text = replace_once(
              text,
              "            Some(role) => targets.entry(role.to_string()).or_default().push(PropertyTarget {\n                component,\n                path,\n            }),",
              "            Some(role) => targets.entry(role.to_string()).or_default().push(PropertyTarget {\n                component,\n                path: path.to_string(),\n            }),",
              'owned path snapshot',
          )
          text = text.replace('Some(target.path),', 'Some(target.path.as_str()),')
          text = replace_once(
              text,
              "        if let Some(child) = child.as_object() {\n            let child_path = format!(\"{path}.components[{index}]\");\n            collect_property_target(\n                child,\n                Box::leak(child_path.into_boxed_str()),",
              "        if let Some(child) = child.as_object() {\n            if child.extensions.contains_key(FLY_LANDING_SECTION_FIELD) {\n                continue;\n            }\n            let child_path = format!(\"{path}.components[{index}]\");\n            collect_property_target(\n                child,\n                &child_path,",
              'nested section boundary',
          )
          text = replace_once(
              text,
              "            None => {\n                if schema.required {\n                    issues.push(issue(\n                        page_index,\n                        page_id,\n                        section_path,\n                        Some(&schema.id),\n                        &schema.role,\n                        LandingPropertyIssueKind::MissingRole,\n                        Some(&schema.component_type),\n                        None,\n                        None,\n                    ));\n                }\n                None\n            }",
              "            None => {\n                issues.push(issue(\n                    page_index,\n                    page_id,\n                    section_path,\n                    Some(&schema.id),\n                    &schema.role,\n                    LandingPropertyIssueKind::MissingRole,\n                    Some(&schema.component_type),\n                    None,\n                    None,\n                ));\n                None\n            }",
              'required property target',
          )
          text = replace_once(
              text,
              '    use crate::{Editor, GrapesJsCodec, RegistrySet};',
              '    use crate::{FlyEditor, GrapesJsCodec, RegistrySet};',
              'FlyEditor test import',
          )
          text = replace_once(
              text,
              "        let command = headline.command_from_text(\"A new headline\").expect(\"command\");\n        let mut editor = Editor::new(project);\n        editor.execute(command).expect(\"patch\");\n        assert!(editor\n            .document()\n            .project\n            .pages[0]\n            .component\n            .as_ref()\n            .expect(\"root\")\n            .find(\"node-2\")\n            .is_some());",
              "        let target_id = headline\n            .target\n            .as_ref()\n            .and_then(|target| target.component_id.clone())\n            .expect(\"target id\");\n        let command = headline.command_from_text(\"A new headline\").expect(\"command\");\n        let mut editor = FlyEditor::new(project, RegistrySet::with_builtins());\n        editor.apply(command).expect(\"patch\");\n        assert_eq!(\n            editor\n                .document()\n                .component(&target_id)\n                .expect(\"patched headline\")\n                .extensions[\"content\"],\n            json!(\"A new headline\")\n        );",
              'FlyEditor command test',
          )
          path.write_text(text, encoding='utf-8')

          # Export the framework-neutral property contract.
          path = Path('crates/fly/src/lib.rs')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              'mod landing_contract;\nmod landing_readiness;',
              'mod landing_contract;\nmod landing_property;\nmod landing_readiness;',
              'landing property module',
          )
          text = replace_once(
              text,
              'pub use landing_contract::*;\npub use landing_readiness::*;',
              'pub use landing_contract::*;\npub use landing_property::*;\npub use landing_readiness::*;',
              'landing property exports',
          )
          path.write_text(text, encoding='utf-8')

          # Make the static publish gate require a valid semantic property surface.
          path = Path('crates/fly/src/landing_contract.rs')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              'LandingReadinessPolicy, LandingReadinessReport, PageHead, PageSelection, ProjectDocument,',
              'LandingPropertyValidationReport, LandingReadinessPolicy, LandingReadinessReport, PageHead,\n    PageSelection, ProjectDocument,',
              'landing property report import',
          )
          text = replace_once(
              text,
              '    pub landing_sections: LandingSectionValidationReport,\n    #[serde(default, skip_serializing_if = "Option::is_none")]\n    pub artifact: Option<StaticLandingArtifact>,',
              '    pub landing_sections: LandingSectionValidationReport,\n    pub landing_properties: LandingPropertyValidationReport,\n    #[serde(default, skip_serializing_if = "Option::is_none")]\n    pub artifact: Option<StaticLandingArtifact>,',
              'static build property report',
          )
          text = replace_once(
              text,
              '    let landing_sections = LandingSectionValidationReport::for_document(document)?;\n    let readiness = evaluate_landing_readiness(document, readiness_policy);\n    let ready = readiness.ready && registry_compatibility.compatible && landing_sections.valid;',
              '    let landing_sections = LandingSectionValidationReport::for_document(document)?;\n    let landing_properties = LandingPropertyValidationReport::for_document(document);\n    let readiness = evaluate_landing_readiness(document, readiness_policy);\n    let ready = readiness.ready\n        && registry_compatibility.compatible\n        && landing_sections.valid\n        && landing_properties.valid;',
              'static build property gate',
          )
          text = replace_once(
              text,
              '            registry_compatibility,\n            landing_sections,\n            artifact: None,',
              '            registry_compatibility,\n            landing_sections,\n            landing_properties,\n            artifact: None,',
              'failed build property report',
          )
          text = replace_once(
              text,
              '        registry_compatibility,\n        landing_sections,\n        artifact: Some(artifact),',
              '        registry_compatibility,\n        landing_sections,\n        landing_properties,\n        artifact: Some(artifact),',
              'successful build property report',
          )
          path.write_text(text, encoding='utf-8')

          # Expose the same report to Leptos, Dioxus, and other host adapters through inspection.
          path = Path('crates/rustok-page-builder/src/landing.rs')
          text = path.read_text(encoding='utf-8')
          text = replace_once(
              text,
              'GrapesJsCodec, LandingReadinessPolicy, ProjectDocument, RegistryCompatibilityIssue,',
              'GrapesJsCodec, LandingPropertyValidationReport, LandingReadinessPolicy, ProjectDocument,\n    RegistryCompatibilityIssue,',
              'inspection property import',
          )
          text = replace_once(
              text,
              '    validation: ValidationReport,\n    registry_compatibility: RegistryCompatibilityReport,',
              '    validation: ValidationReport,\n    landing_properties: LandingPropertyValidationReport,\n    registry_compatibility: RegistryCompatibilityReport,',
              'inspection property field',
          )
          text = replace_once(
              text,
              '        let validation = validate_project(&document, registries, limits);\n        let registry_compatibility = registry_compatibility(&document, &registry, registries);',
              '        let validation = validate_project(&document, registries, limits);\n        let landing_properties = LandingPropertyValidationReport::for_document(&document);\n        let registry_compatibility = registry_compatibility(&document, &registry, registries);',
              'inspection property calculation',
          )
          text = replace_once(
              text,
              '            validation,\n            registry_compatibility,',
              '            validation,\n            landing_properties,\n            registry_compatibility,',
              'inspection property construction',
          )
          text = replace_once(
              text,
              '    pub fn registry_compatibility(&self) -> &RegistryCompatibilityReport {\n        &self.registry_compatibility\n    }',
              '    pub fn landing_properties(&self) -> &LandingPropertyValidationReport {\n        &self.landing_properties\n    }\n\n    pub fn registry_compatibility(&self) -> &RegistryCompatibilityReport {\n        &self.registry_compatibility\n    }',
              'inspection property getter',
          )
          text = replace_once(
              text,
              '        if !self.registry_compatibility.compatible {',
              '        if !self.landing_properties.valid {\n            return Err(LandingProjectError::PropertyContractInvalid {\n                issue_count: self.landing_properties.issues.len(),\n            });\n        }\n        if !self.registry_compatibility.compatible {',
              'inspection property validation',
          )
          text = replace_once(
              text,
              '    #[error("page-builder component registry is incompatible ({issue_count} issue(s))")]\n    RegistryIncompatible { issue_count: usize },',
              '    #[error("page-builder landing property contract is invalid ({issue_count} issue(s))")]\n    PropertyContractInvalid { issue_count: usize },\n    #[error("page-builder component registry is incompatible ({issue_count} issue(s))")]\n    RegistryIncompatible { issue_count: usize },',
              'inspection property error',
          )
          path.write_text(text, encoding='utf-8')

          # Mark semantic targets in the five current landing templates.
          path = Path('crates/fly/src/registry.rs')
          text = path.read_text(encoding='utf-8')

          def replace_in_block(text: str, start: str, end: str, old: str, new: str, label: str) -> str:
              start_index = text.index(start)
              end_index = text.index(end, start_index)
              block = text[start_index:end_index]
              block = replace_once(block, old, new, label)
              return text[:start_index] + block + text[end_index:]

          text = replace_in_block(text, '"fly.hero"', '"fly.two_columns"',
              '{ "type": "heading", "tagName": "h1",',
              '{ "type": "heading", "flyLandingProperty": "headline", "tagName": "h1",',
              'hero headline role')
          text = replace_in_block(text, '"fly.hero"', '"fly.two_columns"',
              '{ "type": "text", "content": "A stable Rust-powered',
              '{ "type": "text", "flyLandingProperty": "body", "content": "A stable Rust-powered',
              'hero body role')
          text = replace_in_block(text, '"fly.hero"', '"fly.two_columns"',
              'builtin_component_template("button")',
              'landing_component("primary_action", builtin_component_template("button"))',
              'hero action role')

          text = replace_in_block(text, '"fly.two_columns"', '"fly.feature_grid"',
              '[builtin_component_template("heading"), builtin_component_template("text"), builtin_component_template("button")]',
              '[landing_component("headline", builtin_component_template("heading")), landing_component("body", builtin_component_template("text")), landing_component("primary_action", builtin_component_template("button"))]',
              'two-column content roles')
          text = replace_in_block(text, '"fly.two_columns"', '"fly.feature_grid"',
              '[builtin_component_template("image")]',
              '[landing_component("media", builtin_component_template("image"))]',
              'two-column media role')

          text = replace_in_block(text, '"fly.feature_grid"', '"fly.cta"',
              '{ "type": "heading", "content": "Everything you need",',
              '{ "type": "heading", "flyLandingProperty": "headline", "content": "Everything you need",',
              'feature grid headline role')

          text = replace_in_block(text, '"fly.cta"', '"fly.contact_form"',
              '{ "type": "heading", "content": "Ready to launch?",',
              '{ "type": "heading", "flyLandingProperty": "headline", "content": "Ready to launch?",',
              'cta headline role')
          text = replace_in_block(text, '"fly.cta"', '"fly.contact_form"',
              '{ "type": "text", "content": "Turn this page',
              '{ "type": "text", "flyLandingProperty": "body", "content": "Turn this page',
              'cta body role')
          text = replace_in_block(text, '"fly.cta"', '"fly.contact_form"',
              '{ "type": "button", "tagName": "a",',
              '{ "type": "button", "flyLandingProperty": "primary_action", "tagName": "a",',
              'cta action role')

          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              '{ "type": "heading", "content": "Talk to us",',
              '{ "type": "heading", "flyLandingProperty": "headline", "content": "Talk to us",',
              'contact headline role')
          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              '{ "type": "text", "content": "Tell us what',
              '{ "type": "text", "flyLandingProperty": "body", "content": "Tell us what',
              'contact body role')
          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              '{ "type": "form", "tagName": "form",',
              '{ "type": "form", "flyLandingProperty": "form", "tagName": "form",',
              'contact form role')
          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              '{ "type": "input", "tagName": "input", "attributes": { "type": "text",',
              '{ "type": "input", "flyLandingProperty": "name_field", "tagName": "input", "attributes": { "type": "text",',
              'contact name role')
          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              '{ "type": "input", "tagName": "input", "attributes": { "type": "email",',
              '{ "type": "input", "flyLandingProperty": "email_field", "tagName": "input", "attributes": { "type": "email",',
              'contact email role')
          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              '{ "type": "textarea", "tagName": "textarea",',
              '{ "type": "textarea", "flyLandingProperty": "message_field", "tagName": "textarea",',
              'contact message role')
          text = replace_in_block(text, '"fly.contact_form"', ']\n    ]\n    .into_iter()',
              'builtin_component_template("submit")',
              'landing_component("submit", builtin_component_template("submit"))',
              'contact submit role')

          text = replace_once(
              text,
              'fn feature_card(title: &str, body: &str) -> serde_json::Value {\n    json!({',
              'fn landing_component(role: &str, component: ComponentNode) -> serde_json::Value {\n    let mut value = serde_json::to_value(component)\n        .expect("built-in landing property component must serialize");\n    value\n        .as_object_mut()\n        .expect("built-in landing property component must be an object")\n        .insert(\n            "flyLandingProperty".to_string(),\n            serde_json::Value::String(role.to_string()),\n        );\n    value\n}\n\nfn feature_card(title: &str, body: &str) -> serde_json::Value {\n    json!({',
              'landing component helper',
          )
          text = replace_once(
              text,
              '{ "type": "heading", "tagName": "h3", "content": title,',
              '{ "type": "heading", "flyLandingProperty": "feature_title", "tagName": "h3", "content": title,',
              'feature title role',
          )
          text = replace_once(
              text,
              '{ "type": "text", "content": body,',
              '{ "type": "text", "flyLandingProperty": "feature_body", "content": body,',
              'feature body role',
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate contract and consumers
        id: validation
        shell: bash
        run: |
          set +e
          {
            cargo fmt --package fly --package rustok-page-builder && \
            cargo check -p fly --all-features --all-targets && \
            cargo test -p fly --lib landing_property::tests && \
            cargo test -p fly --lib landing_contract::tests && \
            cargo test -p fly --lib registry::tests && \
            cargo test -p rustok-page-builder --lib --all-features && \
            cargo check -p rustok-page-builder-admin -p rustok-pages-admin && \
            git diff --check
          } > /tmp/landing-property-schema.log 2>&1
          status=$?
          cat /tmp/landing-property-schema.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record failure
        if: steps.validation.outputs.status != '0'
        shell: bash
        run: |
          git reset --hard HEAD
          {
            echo '# Landing property schema validation failure'
            echo
            echo '```text'
            cat /tmp/landing-property-schema.log
            echo '```'
          } > LANDING_PROPERTY_SCHEMA_FAILURE.md

      - name: Remove one-time workflow
        run: rm -f .github/workflows/landing-property-schema.yml

      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.validation.outputs.status }}" == "0" ]]; then
            message="feat(page-builder): expose typed landing properties"
          else
            message="chore(page-builder): record landing property schema failure"
          fi
          git commit -m "$message"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done
          exit 1
