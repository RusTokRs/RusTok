name: Repair tenant context loading v6

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-tenant-context-loading-v6.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-tenant-context-loading-v6-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore immutable payload and execute repair
        id: migration
        shell: bash
        run: |
          set +e
          {
            python3 - <<'PY'
          import base64
          import hashlib
          import subprocess
          import zlib
          from pathlib import Path

          source_commit = "2bc7c33c165c7b51928fbdf4ca1958e1668aa7ff"
          fragments = []
          for index in range(1, 7):
              path = f"scripts/migrations/tenant-context-v5.payload.{index:02d}"
              fragments.append(subprocess.check_output(["git", "show", f"{source_commit}:{path}"], text=True).strip())
          payload = "".join(fragments)
          if len(payload) != 4900:
              raise RuntimeError(f"expected immutable payload length 4900, got {len(payload)}")
          source = zlib.decompress(base64.b64decode(payload, validate=True))
          if hashlib.sha256(source).hexdigest() != "7bb6dfff7b1ce7c384dae133cf69e4bad6c87afa3e542c30cf6d4ae8ab550a87":
              raise RuntimeError("repair source checksum mismatch")
          migration = Path("/tmp/repair_tenant_context_loading_v6.py")
          migration.write_bytes(source)
          compile(source, str(migration), "exec")
          PY
            python3 /tmp/repair_tenant_context_loading_v6.py && \
            rustfmt --edition 2021 \
              apps/server/src/middleware/tenant_resolution.rs \
              apps/server/src/middleware/tenant.rs \
              apps/server/src/middleware/mod.rs \
              apps/server/src/controllers/graphql.rs && \
            node scripts/verify/verify-tenant-resolution-architecture.mjs && \
            git diff --check
          } > /tmp/tenant-repair-v6.log 2>&1
          status=$?
          cat /tmp/tenant-repair-v6.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Reset partial changes after a failed repair
        if: steps.migration.outputs.status != '0'
        run: git reset --hard HEAD

      - name: Prepare failure report
        if: steps.migration.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '# Tenant context loading repair v6 failure'
            echo
            echo '```text'
            cat /tmp/tenant-repair-v6.log
            echo '```'
          } > TENANT_MIGRATION_FAILURE.md

      - name: Remove one-time repair workflow
        run: rm .github/workflows/repair-tenant-context-loading-v6.yml

      - name: Commit result atomically to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.migration.outputs.status }}" == "0" ]]; then
            message="refactor(tenant): unify context loading across transports"
          else
            message="chore: record tenant context repair v6 failure"
          fi
          git commit -m "$message"
          git pull --rebase origin main
          git push origin HEAD:main
