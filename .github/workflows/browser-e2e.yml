name: Browser E2E

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_SENTRY_DISABLED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  playwright-smoke:
    name: Playwright Smoke (${{ matrix.app }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app:
          - apps/next-admin
          - apps/next-frontend
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Chromium
        run: npx --no-install playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npm run test:e2e
      - name: Verify Fly GrapesJS browser captures
        if: matrix.app == 'apps/next-admin'
        run: node ../../scripts/verify/verify-fly-grapesjs-roundtrip.mjs
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-${{ matrix.app == 'apps/next-admin' && 'next-admin' || 'next-frontend' }}-${{ github.run_attempt }}
          path: |
            ${{ matrix.app }}/playwright-report
            ${{ matrix.app }}/test-results
          if-no-files-found: ignore
          retention-days: 14
