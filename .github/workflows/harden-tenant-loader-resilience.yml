name: Harden tenant loader resilience

on:
  push:
    branches: [main]
    paths:
      - scripts/migrations/harden_tenant_loader_resilience.py
      - .github/workflows/harden-tenant-loader-resilience.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: harden-tenant-loader-resilience-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply resilience hardening
        id: migration
        shell: bash
        run: |
          set +e
          {
            python3 scripts/migrations/harden_tenant_loader_resilience.py && \
            rustfmt --edition 2021 \
              apps/server/src/middleware/tenant.rs \
              apps/server/src/controllers/graphql.rs && \
            node scripts/verify/verify-tenant-resolution-architecture.mjs && \
            git diff --check
          } > /tmp/tenant-resilience.log 2>&1
          status=$?
          cat /tmp/tenant-resilience.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Reset partial changes after failure
        if: steps.migration.outputs.status != '0'
        run: git reset --hard HEAD

      - name: Prepare failure report
        if: steps.migration.outputs.status != '0'
        shell: bash
        run: |
          {
            echo '# Tenant loader resilience migration failure'
            echo
            echo '```text'
            cat /tmp/tenant-resilience.log
            echo '```'
          } > TENANT_MIGRATION_FAILURE.md

      - name: Remove one-time infrastructure
        shell: bash
        run: |
          rm scripts/migrations/harden_tenant_loader_resilience.py
          rm .github/workflows/harden-tenant-loader-resilience.yml

      - name: Commit atomically to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.migration.outputs.status }}" == "0" ]]; then
            message="security(tenant): degrade safely on negative-cache writes"
          else
            message="chore: record tenant resilience migration failure"
          fi
          git commit -m "$message"
          git pull --rebase origin main
          git push origin HEAD:main
