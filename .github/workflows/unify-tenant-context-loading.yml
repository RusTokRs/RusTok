name: Unify tenant context loading

on:
  push:
    branches: [main]
    paths:
      - scripts/migrations/unify_tenant_context_loading.py
      - .github/workflows/unify-tenant-context-loading.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unify-tenant-context-loading-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply canonical tenant context loader refactor
        run: python3 scripts/migrations/unify_tenant_context_loading.py

      - name: Format touched Rust files
        run: |
          rustfmt --edition 2021 \
            apps/server/src/middleware/tenant_resolution.rs \
            apps/server/src/middleware/tenant.rs \
            apps/server/src/middleware/mod.rs \
            apps/server/src/controllers/graphql.rs

      - name: Verify architecture and patch integrity
        run: |
          node scripts/verify/verify-tenant-resolution-architecture.mjs
          git diff --check

      - name: Commit atomically to main
        shell: bash
        run: |
          rm scripts/migrations/unify_tenant_context_loading.py
          rm .github/workflows/unify-tenant-context-loading.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "refactor(tenant): unify context loading across transports"
          git pull --rebase origin main
          git push origin HEAD:main
