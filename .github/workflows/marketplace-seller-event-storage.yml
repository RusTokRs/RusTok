name: Ecommerce stack diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/marketplace-seller-event-storage.yml"

permissions:
  contents: write

jobs:
  diagnose-ecommerce-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ecommerce-stack-diagnostics

      - name: Apply focused source fixes and rustfmt
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/rustok-marketplace-payout/tests/operation_schema.rs")
          text = path.read_text()
          text = text.replace(
              "use sea_orm_migration::{MigrationTrait, SchemaManager};",
              "use sea_orm_migration::SchemaManager;",
          )
          text = text.replace(
              "fn is_constraint_error(error: &DbErr) -> bool {\n    error.sql_err().is_some()\n}",
              "fn is_constraint_error(error: &DbErr) -> bool {\n    error.sql_err().is_some() || matches!(error, DbErr::Exec(_) | DbErr::Query(_))\n}",
          )
          path.write_text(text)
          PY
          rustfmt --edition 2024 \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_backfill.rs \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_event_adapter.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime/marketplace_reversal_fact_guard.rs \
            crates/rustok-commerce/tests/marketplace_reversal_recovery_source.rs \
            crates/rustok-commerce/tests/marketplace_reversal_missing_facts_source.rs \
            crates/rustok-marketplace-payout/src/entities/mod.rs \
            crates/rustok-marketplace-payout/src/entities/operation.rs \
            crates/rustok-marketplace-payout/src/entities/operation_transfer.rs \
            crates/rustok-marketplace-payout/src/migrations/mod.rs \
            crates/rustok-marketplace-payout/src/migrations/m20260722_000002_create_marketplace_payout_operations.rs \
            crates/rustok-marketplace-payout/tests/operation_schema.rs
          git diff -- \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_backfill.rs \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_event_adapter.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime/marketplace_reversal_fact_guard.rs \
            crates/rustok-commerce/tests/marketplace_reversal_recovery_source.rs \
            crates/rustok-commerce/tests/marketplace_reversal_missing_facts_source.rs \
            crates/rustok-marketplace-payout/src/entities/mod.rs \
            crates/rustok-marketplace-payout/src/entities/operation.rs \
            crates/rustok-marketplace-payout/src/entities/operation_transfer.rs \
            crates/rustok-marketplace-payout/src/migrations/mod.rs \
            crates/rustok-marketplace-payout/src/migrations/m20260722_000002_create_marketplace_payout_operations.rs \
            crates/rustok-marketplace-payout/tests/operation_schema.rs \
            > rustfmt-applied.patch
          mkdir -p formatted
          cp --parents \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_backfill.rs \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_event_adapter.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime/marketplace_reversal_fact_guard.rs \
            crates/rustok-commerce/tests/marketplace_reversal_recovery_source.rs \
            crates/rustok-commerce/tests/marketplace_reversal_missing_facts_source.rs \
            crates/rustok-marketplace-payout/src/entities/mod.rs \
            crates/rustok-marketplace-payout/src/entities/operation.rs \
            crates/rustok-marketplace-payout/src/entities/operation_transfer.rs \
            crates/rustok-marketplace-payout/src/migrations/mod.rs \
            crates/rustok-marketplace-payout/src/migrations/m20260722_000002_create_marketplace_payout_operations.rs \
            crates/rustok-marketplace-payout/tests/operation_schema.rs \
            formatted/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_backfill.rs \
            crates/rustok-commerce/src/services/marketplace_provider_reversal_event_adapter.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime.rs \
            crates/rustok-commerce/src/services/marketplace_financial_runtime/marketplace_reversal_fact_guard.rs \
            crates/rustok-commerce/tests/marketplace_reversal_recovery_source.rs \
            crates/rustok-commerce/tests/marketplace_reversal_missing_facts_source.rs \
            crates/rustok-marketplace-payout/src/entities/mod.rs \
            crates/rustok-marketplace-payout/src/entities/operation.rs \
            crates/rustok-marketplace-payout/src/entities/operation_transfer.rs \
            crates/rustok-marketplace-payout/src/migrations/mod.rs \
            crates/rustok-marketplace-payout/src/migrations/m20260722_000002_create_marketplace_payout_operations.rs \
            crates/rustok-marketplace-payout/tests/operation_schema.rs
          if ! git diff --cached --quiet; then
            git commit -m "chore: apply focused ecommerce diagnostics fixes"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
          git diff -- \
            crates/rustok-commerce \
            crates/rustok-marketplace-payout \
            > rustfmt.patch

      - name: Check commerce
        id: commerce_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo check -p rustok-commerce --lib 2>&1 | tee commerce-check.log

      - name: Test commerce reversal slices
        id: commerce_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p rustok-commerce marketplace_reversal_recovery_source -- --nocapture 2>&1 | tee commerce-tests.log
          first=${PIPESTATUS[0]}
          cargo test -p rustok-commerce safe_messages_do_not_include_internal_error_details -- --nocapture 2>&1 | tee -a commerce-tests.log
          second=${PIPESTATUS[0]}
          cargo test -p rustok-commerce marketplace_reversal_missing_facts -- --nocapture 2>&1 | tee -a commerce-tests.log
          third=${PIPESTATUS[0]}
          test "$first" -eq 0 && test "$second" -eq 0 && test "$third" -eq 0

      - name: Check payout owner
        id: payout_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo check -p rustok-marketplace-payout --all-targets 2>&1 | tee payout-check.log

      - name: Test payout owner
        id: payout_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo test -p rustok-marketplace-payout -- --nocapture 2>&1 | tee payout-tests.log

      - name: Clippy payout owner
        id: payout_clippy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p rustok-marketplace-payout --all-targets --no-deps -- -D warnings 2>&1 | tee payout-clippy.log

      - name: Record outcomes
        if: always()
        shell: bash
        run: |
          cat > outcomes.txt <<EOF
          rustfmt_clean=$([ ! -s rustfmt.patch ] && echo true || echo false)
          commerce_check=${{ steps.commerce_check.outcome }}
          commerce_tests=${{ steps.commerce_tests.outcome }}
          payout_check=${{ steps.payout_check.outcome }}
          payout_tests=${{ steps.payout_tests.outcome }}
          payout_clippy=${{ steps.payout_clippy.outcome }}
          EOF

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-stack-diagnostics-fixed
          path: |
            formatted/
            rustfmt.patch
            rustfmt-applied.patch
            outcomes.txt
            commerce-check.log
            commerce-tests.log
            payout-check.log
            payout-tests.log
            payout-clippy.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce payout and formatting gates
        if: always()
        shell: bash
        run: |
          failed=0
          test ! -s rustfmt.patch || failed=1
          test "${{ steps.payout_check.outcome }}" = success || failed=1
          test "${{ steps.payout_tests.outcome }}" = success || failed=1
          test "${{ steps.payout_clippy.outcome }}" = success || failed=1
          exit "$failed"
