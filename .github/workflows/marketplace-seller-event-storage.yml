name: Marketplace seller event storage

on:
  push:
    branches: [main]
    paths:
      - "crates/rustok-marketplace-seller/**"
      - "scripts/verify/verify-marketplace-seller-events.mjs"
      - ".github/workflows/marketplace-seller-event-storage.yml"
  pull_request:
    paths:
      - "crates/rustok-marketplace-seller/**"
      - "scripts/verify/verify-marketplace-seller-events.mjs"
      - ".github/workflows/marketplace-seller-event-storage.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: marketplace-seller-event-storage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  event-storage:
    name: Seller event storage contract
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.1"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: marketplace-seller-event-storage
      - name: Capture event storage rustfmt patch
        run: |
          rustfmt --edition 2021 \
            crates/rustok-marketplace-seller/src/command_receipts.rs \
            crates/rustok-marketplace-seller/src/seller_events.rs \
            crates/rustok-marketplace-seller/src/seller_events_tests.rs
          git diff -- \
            crates/rustok-marketplace-seller/src/command_receipts.rs \
            crates/rustok-marketplace-seller/src/seller_events.rs \
            crates/rustok-marketplace-seller/src/seller_events_tests.rs \
            > rustfmt.patch
          mkdir -p formatted
          cp --parents \
            crates/rustok-marketplace-seller/src/command_receipts.rs \
            crates/rustok-marketplace-seller/src/seller_events.rs \
            crates/rustok-marketplace-seller/src/seller_events_tests.rs \
            formatted/
      - name: Compile seller owner
        id: compile
        continue-on-error: true
        run: |
          set -o pipefail
          cargo check -p rustok-marketplace-seller --all-targets 2>&1 | tee cargo-check.log
      - name: Test seller event storage
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          cargo test -p rustok-marketplace-seller 2>&1 | tee cargo-test.log
      - name: Clippy seller owner
        id: clippy
        continue-on-error: true
        run: |
          set -o pipefail
          cargo clippy -p rustok-marketplace-seller --all-targets --no-deps -- -D warnings 2>&1 | tee cargo-clippy.log
      - name: Verify seller event boundary
        id: verify
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/verify/verify-marketplace-seller-events.mjs 2>&1 | tee seller-event-verifier.log
      - name: Upload seller event diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-seller-event-storage-diagnostics
          path: |
            formatted/
            rustfmt.patch
            cargo-check.log
            cargo-test.log
            cargo-clippy.log
            seller-event-verifier.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce seller event gates
        if: always()
        run: |
          failed=0
          if test -s rustfmt.patch; then
            echo "seller event Rust files are not rustfmt-clean"
            failed=1
          fi
          if test "${{ steps.compile.outcome }}" != "success"; then
            echo "seller owner compile failed"
            failed=1
          fi
          if test "${{ steps.tests.outcome }}" != "success"; then
            echo "seller event tests failed"
            failed=1
          fi
          if test "${{ steps.clippy.outcome }}" != "success"; then
            echo "seller owner Clippy failed"
            failed=1
          fi
          if test "${{ steps.verify.outcome }}" != "success"; then
            echo "seller event verifier failed"
            failed=1
          fi
          exit "$failed"
