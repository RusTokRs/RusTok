name: Marketplace listing owner outbox autofix

on:
  push:
    branches:
      - agent/marketplace-listing-owner-outbox

permissions:
  contents: write

concurrency:
  group: marketplace-listing-owner-outbox-autofix
  cancel-in-progress: false

jobs:
  rustfmt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/marketplace-listing-owner-outbox
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.1"
          components: rustfmt
      - name: Format listing crate and remove autofix workflow
        run: |
          cargo fmt --package rustok-marketplace-listing
          rm .github/workflows/marketplace-listing-owner-outbox-autofix.yml
      - name: Commit verified formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/rustok-marketplace-listing .github/workflows/marketplace-listing-owner-outbox-autofix.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(marketplace-listing): apply rustfmt"
          git push origin HEAD:agent/marketplace-listing-owner-outbox
