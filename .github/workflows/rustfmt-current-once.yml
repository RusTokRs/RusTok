name: One-shot current workspace rustfmt

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/rustfmt-current-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - name: Format current main and remove workflow
        shell: bash
        run: |
          cargo fmt --all
          rm .github/workflows/rustfmt-current-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "style: apply current workspace rustfmt"
          git push origin HEAD:main
