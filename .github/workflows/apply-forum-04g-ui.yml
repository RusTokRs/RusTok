name: Apply FORUM-04G admin UI integration

on:
  push:
    branches:
      - agent/forum-04g-admin-category-dnd

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forum-04g-admin-category-dnd
          fetch-depth: 1
      - name: Integrate canonical tree DnD component
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("crates/rustok-forum/admin/src/ui/leptos.rs")
          text = path.read_text()
          text = text.replace(
              "use crate::transport;\n",
              "use crate::transport;\nuse crate::ui::category_dnd::CategoryDndGrid;\n",
              1,
          )
          text = text.replace(
              "transport::fetch_categories(token_value, tenant_value, locale).await",
              "transport::fetch_category_tree(token_value, tenant_value, locale).await",
              1,
          )
          text = text.replace(
              "                    <CategoriesPage\n                        categories=categories\n",
              "                    <CategoriesPage\n                        categories=categories\n                        set_refresh_nonce=set_refresh_nonce\n",
              1,
          )
          text = text.replace(
              "fn CategoriesPage(\n    categories: LocalResource<Result<Vec<CategoryListItem>, String>>,\n",
              "fn CategoriesPage(\n    categories: LocalResource<Result<Vec<CategoryListItem>, String>>,\n    set_refresh_nonce: WriteSignal<u64>,\n",
              1,
          )
          old = "{move || categories.get().map(|result| render_category_grid(result, editing_id.get(), busy_key.get(), on_edit, on_delete, ui_locale.clone()))}"
          new = """{move || categories.get().map(|result| match result {
                            Ok(items) if !items.is_empty() => view! {
                                <CategoryDndGrid
                                    items=items
                                    editing_id=editing_id.get()
                                    busy_key=busy_key.get()
                                    on_edit=on_edit
                                    on_delete=on_delete
                                    set_refresh_nonce=set_refresh_nonce
                                    locale=ui_locale.clone()
                                />
                            }.into_any(),
                            other => render_category_grid(other, editing_id.get(), busy_key.get(), on_edit, on_delete, ui_locale.clone()),
                        })}"""
          if old not in text:
              raise SystemExit("category grid integration marker not found")
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/rustok-forum/admin/src/ui/leptos.rs
          if ! git diff --cached --quiet; then
            git commit -m "feat(forum-admin): integrate canonical category drag and drop"
            git push origin HEAD:agent/forum-04g-admin-category-dnd
          fi
