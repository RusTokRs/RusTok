name: One-off Zero Style Gate Repair

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repair-gate:
    if: >-
      github.event.issue.title == '[automation] repair zero-style CSP gate' &&
      (github.event_name == 'issues' || github.event.comment.body == '/repair-zero-style-gate')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebase on current main
        run: git pull --rebase origin main

      - name: Repair exact marker
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-csp-inline-style-exceptions.mjs")
          source = path.read_text()
          old = '  "max="100"",'
          new = "  'max=\"100\"',"
          count = source.count(old)
          if count != 1:
              raise SystemExit(f"expected one malformed max marker, found {count}")
          path.write_text(source.replace(old, new, 1))

          workflow = Path(".github/workflows/one-off-fix-zero-style-gate.yml")
          if not workflow.exists():
              raise SystemExit("one-off repair workflow is missing")
          workflow.unlink()
          PY

      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq "'max=\"100\"'" scripts/verify/verify-csp-inline-style-exceptions.mjs
          test ! -e .github/workflows/one-off-fix-zero-style-gate.yml

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair zero-style CSP gate marker"
          git push origin HEAD:main

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Zero-style gate marker repaired; the one-off workflow removed itself."
