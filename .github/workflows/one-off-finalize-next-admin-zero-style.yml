name: One-off Finalize Next Admin Zero Style

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  finalize-next-admin:
    if: >-
      github.event.issue.title == '[automation] finalize Next admin zero-style boundary' &&
      (github.event_name == 'issues' || github.event.comment.body == '/finalize-next-admin-zero-style')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git pull --rebase origin main
      - name: Apply exact gate reduction
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/verify/verify-csp-next-style-boundary.mjs")
          source = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"expected one exact gate match, found {count}: {old!r}")
              source = source.replace(old, new, 1)

          replace_once("const maxRegisteredFiles = 2;", "const maxRegisteredFiles = 1;")
          replace_once("const maxStyleAttributeSites = 45;", "const maxStyleAttributeSites = 43;")
          contract = '''requireMarkers("apps/next-admin/src/widgets/data-table/data-table.tsx", [
            "<TableHead key={header.id} colSpan={header.colSpan}>",
            "<TableCell key={cell.id}>",
          ]);
          forbidMarkers("apps/next-admin/src/widgets/data-table/data-table.tsx", [
            "style=",
            "getCommonPinningStyles",
          ]);
          forbidMarkers("apps/next-admin/src/shared/lib/data-table.ts", [
            "getCommonPinningStyles",
            "React.CSSProperties",
            "getIsPinned",
          ]);
          '''
          replace_once(
              'requireMarkers("apps/next-admin/src/shared/ui/shadcn/chart.tsx", [\n',
              contract + 'requireMarkers("apps/next-admin/src/shared/ui/shadcn/chart.tsx", [\n',
          )
          path.write_text(source)

          workflow = Path(".github/workflows/one-off-finalize-next-admin-zero-style.yml")
          if not workflow.exists():
              raise SystemExit("one-off finalizer is missing")
          workflow.unlink()
          PY
      - name: Verify patch shape
        run: |
          git diff --check
          grep -Fq 'const maxStyleAttributeSites = 43;' scripts/verify/verify-csp-next-style-boundary.mjs
          grep -Fq 'getCommonPinningStyles' scripts/verify/verify-csp-next-style-boundary.mjs
          test ! -e .github/workflows/one-off-finalize-next-admin-zero-style.yml
      - name: Commit Next admin boundary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: close Next admin inline style boundary"
          git push origin HEAD:main
      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Next admin style-prop baseline is zero; one-off finalizer removed itself."
