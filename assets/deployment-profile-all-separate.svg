<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1125" viewBox="0 0 1800 1125" role="img" aria-labelledby="title desc">
  <title id="title">RusToK All Separate Deployment</title>
  <desc id="desc">All separate deployment with server, admin and storefront deployed independently, including FFA and FBA boundaries.</desc>
  <defs>
    <style>.bg{fill:#f8fafc}.panel{fill:#fff;stroke:#d8dee8;stroke-width:2}.server{fill:#e0f2fe;stroke:#0284c7;stroke-width:3}.ui{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.transport{fill:#fef3c7;stroke:#d97706;stroke-width:2}.mod{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.remote{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.infra{fill:#f1f5f9;stroke:#64748b;stroke-width:2}.ffa{fill:#ecfdf5;stroke:#10b981;stroke-width:2}.fba{fill:#fff7ed;stroke:#f97316;stroke-width:2}.text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.title{font-size:48px;font-weight:800}.sub{font-size:24px;fill:#475569}.h{font-size:28px;font-weight:800}.m{font-size:21px;font-weight:700}.s{font-size:18px;font-weight:500}.xs{font-size:15px;font-weight:500;fill:#475569}.line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}.shadow{filter:url(#shadow)}</style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1800" height="1125"/>
  <text x="900" y="76" text-anchor="middle" class="text title">Deployment Profile 3: All Separate</text>
  <text x="900" y="112" text-anchor="middle" class="sub">Server, admin and storefront are independent deployment units with shared contracts</text>

  <rect x="100" y="180" width="440" height="180" rx="30" class="ui shadow"/>
  <text x="320" y="245" text-anchor="middle" class="text h">Admin host</text>
  <text x="320" y="284" text-anchor="middle" class="text s">Leptos standalone or Next.js</text>
  <text x="320" y="315" text-anchor="middle" class="xs">module-owned admin surfaces</text>

  <rect x="680" y="180" width="440" height="180" rx="30" class="ui shadow"/>
  <text x="900" y="245" text-anchor="middle" class="text h">Storefront host</text>
  <text x="900" y="284" text-anchor="middle" class="text s">Leptos standalone, Next.js or custom</text>
  <text x="900" y="315" text-anchor="middle" class="xs">module-owned storefront surfaces</text>

  <rect x="1260" y="180" width="440" height="180" rx="30" class="ui shadow"/>
  <text x="1480" y="245" text-anchor="middle" class="text h">Optional clients</text>
  <text x="1480" y="284" text-anchor="middle" class="text s">mobile, partner portal, backoffice</text>
  <text x="1480" y="315" text-anchor="middle" class="xs">same GraphQL / REST contracts</text>

  <rect x="270" y="455" width="1260" height="130" rx="28" class="transport shadow"/>
  <text x="900" y="510" text-anchor="middle" class="text h">Network transport layer</text>
  <text x="900" y="548" text-anchor="middle" class="text s">HTTP /api/fn/* for Leptos, GraphQL for Next.js and headless clients, REST for uploads and integrations</text>

  <rect x="225" y="675" width="620" height="190" rx="32" class="server shadow"/>
  <text x="535" y="742" text-anchor="middle" class="text h">apps/server</text>
  <text x="535" y="780" text-anchor="middle" class="text s">composition root, auth, RBAC, tenant context</text>
  <text x="535" y="812" text-anchor="middle" class="xs">public UI-facing API stays centralized</text>

  <rect x="955" y="675" width="620" height="190" rx="32" class="mod shadow"/>
  <text x="1265" y="742" text-anchor="middle" class="text h">Module services</text>
  <text x="1265" y="780" text-anchor="middle" class="text s">in-process by default, remote-capable via FBA</text>
  <text x="1265" y="812" text-anchor="middle" class="xs">domain contracts, events and read models</text>

  <rect x="225" y="910" width="1350" height="66" rx="22" class="infra"/>
  <text x="900" y="952" text-anchor="middle" class="text s">PostgreSQL | Redis / Cache | Meilisearch | Iggy Streaming | Object Storage | Telemetry</text>

  <path d="M320 360 L530 455" class="line"/>
  <path d="M900 360 L900 455" class="line"/>
  <path d="M1480 360 L1270 455" class="line"/>
  <path d="M900 585 C820 630, 680 640, 535 675" class="line"/>
  <path d="M845 770 L955 770" class="line"/>
  <path d="M1265 865 L1265 910" class="line"/>
  <path d="M535 865 L535 910" class="line"/>

  <rect x="100" y="1008" width="760" height="78" rx="24" class="ffa"/>
  <text x="135" y="1056" class="text s">FFA: UI identity is stable even when admin and storefront leave the server process.</text>
  <rect x="940" y="1008" width="760" height="78" rx="24" class="fba"/>
  <text x="975" y="1056" class="text s">FBA: module calls may be in-process, gRPC/RPC or event-driven without rewriting domain logic.</text>
</svg>
