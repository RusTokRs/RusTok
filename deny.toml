[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
unmaintained = "workspace"
unsound = "workspace"
git-fetch-with-cli = true
# TEMPORARY exceptions only. Both expire on 2026-07-24 and require the
# dependency-path/reachability evidence recorded in
# docs/security/advisory-exceptions.md. Prefer upgrading quick-xml to >=0.41.0.
ignore = [
    "RUSTSEC-2026-0194", # quick-xml CPU-exhaustion DoS; temporary until 2026-07-24
    "RUSTSEC-2026-0195", # quick-xml memory-exhaustion DoS; temporary until 2026-07-24
]

[licenses]
allow = [
    "0BSD",
    "MIT",
    "BUSL-1.1",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "NCSA",
    ]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
