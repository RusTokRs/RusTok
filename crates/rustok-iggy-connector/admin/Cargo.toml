[package]
name = "rustok-iggy-connector-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Module-owned Leptos admin surface for the Iggy Connector"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = ["leptos/ssr", "rustok-api/server", "dep:leptos_axum"]

[dependencies]
leptos.workspace = true
leptos-auth.workspace = true
leptos_axum = { workspace = true, optional = true }
rustok-api = { workspace = true, default-features = false }
rustok-graphql.workspace = true
rustok-iggy-connector.workspace = true
rustok-ui-core.workspace = true
rustok-ui-transport.workspace = true
serde = { workspace = true, features = ["derive"] }
