[package]
name = "rustok-product-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-product module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "dep:leptos_axum",
  "dep:loco-rs",
  "dep:rustok-product",
  "dep:rustok-outbox",
  "rustok-api/server",
]

[dependencies]
rustok-ui-core.workspace = true
leptos = { workspace = true, features = ["csr"] }
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-graphql.workspace = true
rustok-api = { workspace = true, default-features = false }


rustok-ui-i18n-leptos.workspace = true
leptos-ui-routing.workspace = true
rustok-product = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true, features = ["loco-adapter"] }
loco-rs = { workspace = true, optional = true }
rustok-seo-targets = { path = "../../rustok-seo-targets", default-features = false }
rustok-seo-admin-support.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
rust_decimal.workspace = true