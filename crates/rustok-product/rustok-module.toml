[module]
slug = "product"
name = "Product"
version = "0.1.0"
description = "Default catalog submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "ProductModule"

[dependencies]
taxonomy = { version_req = ">=0.1.0" }

[provides.admin_ui]
leptos_crate = "rustok-product-admin"
route_segment = "product"
nav_label = "Products"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
