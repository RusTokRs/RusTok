[package]
name = "rustok-outbox-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-outbox module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "rustok-api/server",
  "dep:leptos_axum",
  "dep:rustok-core",
  "dep:rustok-outbox",
  "dep:sea-orm",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-core = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true }
sea-orm = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
