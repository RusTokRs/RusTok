[package]
name = "rustok-sandbox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Neutral sandbox execution foundation for RusToK"

[features]
default = []
rhai = ["dep:rhai", "dep:parking_lot"]
wasm-component = ["dep:wasmtime"]

[dependencies]
async-trait.workspace = true
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true
url.workspace = true
tokio = { workspace = true, features = ["rt"] }
rhai = { workspace = true, features = ["sync", "metadata"], optional = true }
parking_lot = { version = "0.12", optional = true }
wasmtime = { version = "47.0.0", default-features = false, features = ["runtime", "component-model", "cranelift"], optional = true }
