[module]
slug = "marketplace_ledger"
name = "Marketplace Ledger"
version = "0.1.0"
description = "Marketplace Family immutable double-entry ledger owner"
ownership = "first_party"
trust_level = "verified"
ui_classification = "api_only"

[marketplace]
category = "commerce"
tags = ["marketplace", "ledger", "accounting", "commission", "seller-payable"]

[crate]
entry_type = "MarketplaceLedgerModule"

[fba.provider]
status = "in_progress"
role = "provider"
contract_version = "marketplace.ledger.v1"
registry = "contracts/marketplace-ledger-fba-registry.json"
context = "rustok_api::ports::PortContext"
error = "rustok_api::ports::PortError"

[fba.provider.rollout]
fallback_profiles = ["embedded_native", "remote_adapter_placeholder"]
degraded_modes = ["ledger_storage_unavailable", "commission_provider_unavailable", "ledger_receipt_requires_review"]
