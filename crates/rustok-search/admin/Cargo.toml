[package]
name = "rustok-search-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-search module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "dep:leptos_axum",
  "dep:loco-rs",
  "dep:rustok-core",
  "dep:rustok-events",
  "dep:rustok-outbox",
  "dep:rustok-search",
  "dep:sea-orm",
  "rustok-api/server",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-graphql.workspace = true
leptos-ui-routing.workspace = true
leptos_router.workspace = true
loco-rs = { workspace = true, optional = true }
rustok-api = { workspace = true, default-features = false }
rustok-ui-i18n-leptos.workspace = true
rustok-core = { workspace = true, optional = true }
rustok-events = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true, features = ["loco-adapter"] }
rustok-search = { workspace = true, optional = true }
sea-orm = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid.workspace = true