[package]
name = "rustok-search-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-search module"

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = ["leptos/ssr"]

[dependencies]
rustok-ui-core.workspace = true
rustok-ui-i18n-leptos.workspace = true
leptos.workspace = true
rustok-graphql.workspace = true
rustok-ui-transport.workspace = true
leptos-ui-routing.workspace = true
rustok-api.workspace = true
serde = { workspace = true, features = ["derive"] }
