[package]
name = "rustok-search"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Core search module for RusTok - Postgres-first search contracts, engine selection, and connector registry"

[dependencies]
async-graphql = { workspace = true, optional = true }
rustok-core.workspace = true
rustok-api.workspace = true
rustok-events.workspace = true
rustok-outbox = { workspace = true, optional = true }
rustok-telemetry.workspace = true
async-trait.workspace = true
axum = { workspace = true, optional = true }
sea-orm.workspace = true
sea-orm-migration.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true

[dev-dependencies]
tokio.workspace = true

[features]
default = []
graphql = ["dep:async-graphql", "dep:axum", "dep:rustok-outbox", "rustok-api/server"]