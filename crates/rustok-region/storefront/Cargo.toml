[package]
name = "rustok-region-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-region module"

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "dep:leptos_axum",
  "dep:rustok-region",
  "rustok-api/server",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
rustok-graphql.workspace = true
leptos-ui-routing.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-ui-i18n-leptos.workspace = true
rustok-region = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
