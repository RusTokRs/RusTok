[package]
name = "rustok-forum-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
    "leptos/ssr",
    "dep:rustok-core",
    "dep:rustok-forum",
    "dep:rustok-outbox",
    "rustok-api/server",
]

[dependencies]
rustok-ui-core.workspace = true
rustok-ui-i18n-leptos.workspace = true
leptos.workspace = true
rustok-graphql.workspace = true
leptos-ui-routing.workspace = true
serde = { workspace = true, features = ["derive"] }
rustok-api = { workspace = true, default-features = false }
rustok-core = { workspace = true, optional = true }
rustok-forum = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true }
uuid.workspace = true

[dev-dependencies]
serde_json.workspace = true
