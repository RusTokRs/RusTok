[package]
name = "rustok-seo-admin-support"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Reusable SEO admin widgets and transport helpers for module-owned entity editors"

[lib]
crate-type = ["rlib"]

[dependencies]
leptos.workspace = true
leptos-auth.workspace = true
rustok-graphql.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-seo-targets = { path = "../rustok-seo-targets", default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid.workspace = true