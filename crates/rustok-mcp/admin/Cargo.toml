[package]
name = "rustok-mcp-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-mcp control plane"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "dep:chrono",
  "dep:leptos_axum",
  "dep:loco-rs",
  "dep:rustok-api",
  "dep:rustok-core",
  "dep:rustok-mcp",
  "dep:sea-orm",
  "dep:uuid",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
loco-rs = { workspace = true, optional = true }
rustok-api = { workspace = true, optional = true, default-features = false }
rustok-core = { workspace = true, optional = true }
rustok-mcp = { workspace = true, optional = true }
sea-orm = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid = { workspace = true, optional = true }
