[package]
name = "rustok-page-builder-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SSR-first Leptos authoring surface for the RusTok Page Builder module"

[lib]
crate-type = ["rlib"]

[features]
default = ["ssr", "browser-js"]
browser-js = ["dep:wasm-bindgen", "dep:web-sys"]
wasm-client = ["fly-leptos/wasm-client", "browser-js"]
csr = ["leptos/csr", "wasm-client"]
hydrate = ["leptos/hydrate", "wasm-client"]
ssr = ["leptos/ssr", "fly-leptos/ssr"]

[dependencies]
fly = { path = "../../fly" }
fly-ui = { path = "../../fly-ui" }
fly-browser = { path = "../../fly-browser" }
fly-leptos = { path = "../../fly-leptos", default-features = false }
rustok-page-builder = { path = "..", default-features = false }
rustok-ui-core.workspace = true
rustok-ui-i18n-leptos.workspace = true
leptos.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", optional = true, features = [
  "Element",
  "EventTarget",
  "KeyboardEvent",
  "PointerEvent",
  "Window",
] }
