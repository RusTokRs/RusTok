[module]
slug = "email"
name = "Email"
version = "0.1.0"
description = "SMTP transport, email templates, delivery lifecycle."
ownership = "first_party"
trust_level = "core"
ui_classification = "capability_only"
[crate]
entry_type = "EmailModule"

[fba.provider]
registry = "contracts/email-fba-registry.json"
contract_version = "email.delivery.v1"
runtime_profile = "embedded_native"
fallback_profiles = ["embedded_disabled_noop", "embedded_smtp"]
degraded_modes = ["skip_disabled_provider", "surface_delivery_retry_needed"]
