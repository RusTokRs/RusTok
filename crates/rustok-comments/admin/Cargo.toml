[package]
name = "rustok-comments-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-comments module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "rustok-api/server",
  "dep:leptos_axum",
  "dep:rustok-core",
  "rustok-comments/server",
]

[dependencies]
rustok-ui-core.workspace = true
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-api = { workspace = true, default-features = false }


rustok-ui-i18n-leptos.workspace = true
leptos-ui-routing.workspace = true
rustok-comments = { workspace = true, default-features = false }
rustok-core = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
uuid.workspace = true

[dev-dependencies]
serde_json.workspace = true
