[module]
slug = "marketplace"
name = "Marketplace"
version = "0.1.0"
description = "Marketplace family root and cross-marketplace orchestration boundary"
ownership = "first_party"
trust_level = "verified"
ui_classification = "backend_only"

[marketplace]
category = "commerce"
tags = ["marketplace", "seller", "listing", "settlement"]

[dependencies]
marketplace_seller = { version_req = ">=0.1.0" }

[crate]
entry_type = "MarketplaceModule"

[fba.consumer]
registry = "contracts/marketplace-fba-registry.json"
contract_version = "marketplace.family.v1"
providers = ["marketplace_seller"]
context = "rustok_api::ports::PortContext"
error = "rustok_api::ports::PortError"
