[package]
name = "rustok-order-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-order module"

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
    "leptos/ssr",
    "dep:leptos_axum",
    "dep:rustok-commerce",
    "dep:rustok-outbox",
    "dep:rustok-payment",
    "rustok-api/server",
]

[dependencies]
rustok-ui-core.workspace = true
rustok-ui-i18n-leptos.workspace = true
rustok-ui-transport.workspace = true
leptos.workspace = true
rustok-graphql.workspace = true
leptos_axum = { workspace = true, optional = true }
rustok-api.workspace = true
rustok-commerce = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true }
rustok-payment = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tracing.workspace = true
uuid.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Location", "Window"] }
