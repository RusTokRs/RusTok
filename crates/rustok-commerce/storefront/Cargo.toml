[package]
name = "rustok-commerce-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-commerce module"

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = ["leptos/ssr", "dep:leptos_axum", "dep:loco-rs", "dep:rustok-cart", "dep:rustok-commerce", "dep:rustok-customer", "dep:rustok-inventory", "dep:rustok-pricing", "dep:rustok-region", "rustok-api/server"]

[dependencies]
rustok-ui-core.workspace = true
rustok-ui-transport.workspace = true
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
rustok-graphql.workspace = true
leptos-ui-routing.workspace = true
loco-rs = { workspace = true, optional = true }
rustok-api = { workspace = true, default-features = false }

rustok-ui-i18n-leptos.workspace = true
rustok-cart-storefront.workspace = true
rustok-cart = { workspace = true, optional = true }
rustok-commerce = { workspace = true, optional = true }
rustok-customer = { workspace = true, optional = true }
rustok-inventory = { workspace = true, optional = true }
rustok-pricing = { workspace = true, optional = true }
rustok-region = { workspace = true, optional = true }
rustok-payment-storefront.workspace = true
rustok-fulfillment-storefront.workspace = true
rustok-order-storefront.workspace = true
sea-orm.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio.workspace = true
