[package]
name = "rustok-groups-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront FFA package for social group discovery"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "rustok-api/server",
  "dep:leptos_axum",
  "dep:rustok-groups",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
rustok-api = { workspace = true, default-features = false }
rustok-graphql.workspace = true
rustok-groups = { path = "..", optional = true }
rustok-ui-core.workspace = true
rustok-ui-i18n-leptos.workspace = true
rustok-ui-routing.workspace = true
rustok-ui-transport.workspace = true
serde.workspace = true
uuid.workspace = true
