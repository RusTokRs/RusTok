[module]
slug = "rbac"
name = "RBAC"
version = "0.1.0"
description = "Roles, permissions, and access-control module"
ownership = "first_party"
trust_level = "core"
recommended_admin_surfaces = ["leptos-admin"]

[provides.admin_ui]
leptos_crate = "rustok-rbac-admin"
route_segment = "rbac"
nav_label = "RBAC"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
