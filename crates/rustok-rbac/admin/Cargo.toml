[package]
name = "rustok-rbac-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-rbac module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "dep:leptos_axum",
  "dep:rustok-core",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-api.workspace = true
rustok-core = { workspace = true, optional = true }
rustok-rbac.workspace = true
serde = { workspace = true, features = ["derive"] }
