[module]
slug = "payment"
name = "Payment"
version = "0.1.0"
description = "Default payment submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
ui_classification = "storefront_only"

[crate]
entry_type = "PaymentModule"

[provides.http]
axum_router = "http::axum_router"
axum_webhook_router = "http::axum_webhook_router"

[provides.storefront_ui]
leptos_crate = "rustok-payment-storefront"
slot = "checkout_payment_handoff"
route_segment = "payment"
page_title = "Payment"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"

[fba.provider]
status = "in_progress"
role = "provider"
contract_version = "payment.checkout.v1+provider_spi.v1+provider_webhook_inbox.v1"
registry = "contracts/payment-fba-registry.json"
context = "rustok_api::ports::PortContext"
error = "rustok_api::ports::PortError"

[fba.provider.rollout]
fallback_profiles = ["embedded_native", "graphql_checkout_compat"]
degraded_modes = ["typed_retry", "preserve_owner_snapshot"]
