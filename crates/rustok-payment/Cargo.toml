[package]
name = "rustok-payment"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Payment domain module extracted from rustok-commerce"

[features]
default = []
server = ["dep:anyhow", "dep:axum", "rustok-api/server"]
stripe = ["dep:hmac", "dep:reqwest", "dep:secrecy"]

[dependencies]
anyhow = { workspace = true, optional = true }
async-trait.workspace = true
axum = { workspace = true, optional = true }
chrono.workspace = true
hmac = { version = "0.13", optional = true }
reqwest = { workspace = true, optional = true, features = ["json"] }
rust_decimal.workspace = true
rustok-core.workspace = true
rustok-api.workspace = true
sea-orm.workspace = true
sea-orm-migration.workspace = true
secrecy = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
tracing.workspace = true
utoipa = { workspace = true, features = ["uuid", "chrono", "decimal"] }
uuid.workspace = true
validator.workspace = true

[dev-dependencies]
tokio.workspace = true
rustok-order.workspace = true
rustok-test-utils.workspace = true
