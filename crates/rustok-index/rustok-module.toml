[module]
slug = "index"
name = "Index"
version = "0.1.0"
description = "Cross-module relational index and query engine."
ownership = "first_party"
trust_level = "core"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "IndexModule"

[provides.admin_ui]
leptos_crate = "rustok-index-admin"
route_segment = "index"
nav_label = "Index"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

# Legacy provider boundary retained only during the Index Engine rewrite.
# Replacement query/rebuild contracts are tracked in docs/implementation-plan.md.
[fba.provider]
registry = "contracts/index-fba-registry.json"
contract_version = "index.read_model.v1"
ports = ["IndexReadModelPort", "IndexRebuildPort"]
fallback_profiles = ["embedded_native", "admin_read_only", "rebuild_disabled"]
