[module]
slug = "profiles"
name = "Profiles"
version = "0.1.0"
description = "Universal public profile domain for platform users"
ownership = "first_party"
trust_level = "verified"
ui_classification = "capability_only"
[crate]
entry_type = "ProfilesModule"

[dependencies]
taxonomy = { version_req = ">=0.1.0" }

[provides.graphql]
query = "graphql::ProfilesQuery"
mutation = "graphql::ProfilesMutation"

[provides.cli]
namespace = "profiles"
factory = "rustok_profiles_cli::command_provider"
