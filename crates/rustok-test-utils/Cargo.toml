[package]
name = "rustok-test-utils"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Test utilities for RusToK - fixtures, mocks, and helpers for testing"

[dependencies]
rustok-api.workspace = true
async-trait.workspace = true
chrono.workspace = true
rustok-core.workspace = true
rustok-events.workspace = true
rustok-outbox = { workspace = true, features = ["test-transport-fallback"] }
sea-orm = { workspace = true, features = ["sqlx-sqlite"] }
sea-orm-migration = { workspace = true, features = ["sqlx-sqlite"] }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
thiserror.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio-test = "0.4"

[package.metadata.cargo-udeps.ignore]
development = ["tokio-test"]
