[package]
name = "rustok-fulfillment-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-fulfillment module"

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
    "leptos/ssr",
    "dep:leptos_axum",
    "dep:loco-rs",
    "dep:rustok-commerce",
    "rustok-api/server",
]

[dependencies]
leptos.workspace = true
leptos-graphql.workspace = true
leptos_axum = { workspace = true, optional = true }
loco-rs = { workspace = true, optional = true }
rustok-api.workspace = true
rustok-commerce = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
uuid.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Location", "Window"] }
