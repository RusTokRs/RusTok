[module]
slug = "fulfillment"
name = "Fulfillment"
version = "0.1.0"
description = "Default fulfillment submodule in the ecommerce family"
ownership = "first_party"
trust_level = "verified"
ui_classification = "dual_surface"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "FulfillmentModule"

[provides.admin_ui]
leptos_crate = "rustok-fulfillment-admin"
route_segment = "fulfillment"
nav_label = "Fulfillment"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
[provides.storefront_ui]
leptos_crate = "rustok-fulfillment-storefront"
slot = "checkout_shipping_handoff"
route_segment = "fulfillment"
page_title = "Fulfillment"

[provides.storefront_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "storefront/locales"

[fba.provider]
status = "in_progress"
role = "provider"
contract_version = "fulfillment.shipping_selection.v1+provider_spi.v1"
registry = "contracts/fulfillment-fba-registry.json"
context = "rustok_api::ports::PortContext"
error = "rustok_api::ports::PortError"

[fba.provider.rollout]
fallback_profiles = ["embedded_native", "graphql_checkout_compat"]
degraded_modes = ["typed_retry", "preserve_owner_snapshot"]
