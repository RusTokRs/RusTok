[package]
name = "rustok-pages-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SSR-first Leptos admin UI package for the rustok-pages module"

[lib]
crate-type = ["rlib"]

[features]
default = ["ssr"]
csr = ["leptos/csr", "leptos-auth/csr", "rustok-page-builder-admin/csr"]
hydrate = ["leptos/hydrate", "leptos-auth/hydrate", "rustok-page-builder-admin/hydrate"]
ssr = [
  "leptos/ssr",
  "leptos-auth/ssr",
  "rustok-page-builder/server",
  "rustok-page-builder-admin/ssr",
  "dep:async-trait",
  "dep:rustok-api",
]

[dependencies]
fly = { path = "../../fly" }
fly-browser = { path = "../../fly-browser" }
fly-ui = { path = "../../fly-ui" }
rustok-ui-core.workspace = true
leptos.workspace = true
leptos-auth.workspace = true
rustok-graphql.workspace = true
rustok-page-builder = { path = "../../rustok-page-builder", default-features = false }
rustok-page-builder-admin = { path = "../../rustok-page-builder/admin", default-features = false }
rustok-ui-i18n-leptos.workspace = true
leptos-ui-routing.workspace = true
async-trait = { workspace = true, optional = true }
rustok-api = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
thiserror.workspace = true
