[package]
name = "rustok-pages-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-pages module"

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "dep:leptos_axum",
  "dep:loco-rs",
  "dep:rustok-channel",
  "dep:rustok-content",
  "dep:rustok-core",
  "dep:rustok-tenant",
  "rustok-api/loco-adapter",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-graphql.workspace = true
leptos-ui-routing.workspace = true
loco-rs = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-channel = { workspace = true, optional = true }
rustok-content = { workspace = true, optional = true }
rustok-core = { workspace = true, optional = true }
rustok-pages.workspace = true
rustok-tenant = { workspace = true, optional = true }
