[package]
name = "rustok-pages-storefront"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos storefront UI package for the rustok-pages module"

[features]
default = []
hydrate = [
  "leptos/hydrate",
  "rustok-page-builder-storefront/hydrate",
]
ssr = [
  "leptos/ssr",
  "rustok-page-builder-storefront/ssr",
  "dep:leptos_axum",
  "dep:rustok-channel",
  "dep:rustok-content",
  "dep:rustok-core",
  "dep:rustok-outbox",
  "dep:rustok-pages",
  "dep:rustok-tenant",
  "rustok-api/server",
]

[dependencies]
rustok-ui-core.workspace = true
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
rustok-graphql.workspace = true
rustok-ui-transport.workspace = true
leptos-ui-routing.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tracing.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-ui-i18n-leptos.workspace = true
rustok-page-builder-storefront = { path = "../../rustok-page-builder-storefront" }
rustok-channel = { workspace = true, optional = true }
rustok-content = { workspace = true, optional = true }
rustok-core = { workspace = true, optional = true }
rustok-pages = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true }
rustok-tenant = { workspace = true, optional = true }
