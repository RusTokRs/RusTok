[module]
slug = "channel"
name = "Channel"
version = "0.1.0"
description = "Experimental core channel-management module"
ownership = "first_party"
trust_level = "core"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "ChannelModule"

[provides.admin_ui]
leptos_crate = "rustok-channel-admin"
route_segment = "channels"
nav_label = "Channels"

[[provides.admin_ui.pages]]
subpath = "targets"
title = "Channel Targets"
nav_label = "Targets"

[[provides.admin_ui.pages]]
subpath = "apps"
title = "Channel Apps"
nav_label = "Apps"
