[package]
name = "rustok-tenant-admin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Leptos admin UI package for the rustok-tenant module"

[lib]
crate-type = ["rlib"]

[features]
default = []
hydrate = ["leptos/hydrate"]
ssr = [
  "leptos/ssr",
  "rustok-api/server",
  "dep:leptos_axum",
  "dep:rustok-core",
  "dep:rustok-tenant",
  "dep:sea-orm",
]

[dependencies]
leptos.workspace = true
leptos_axum = { workspace = true, optional = true }
leptos-auth.workspace = true
rustok-api = { workspace = true, default-features = false }
rustok-ui-i18n-leptos.workspace = true
rustok-core = { workspace = true, optional = true }
rustok-tenant = { workspace = true, optional = true }
sea-orm = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true