[module]
slug = "tenant"
name = "Tenant"
version = "0.1.0"
description = "Tenant lifecycle and tenancy-management module"
ownership = "first_party"
trust_level = "core"
recommended_admin_surfaces = ["leptos-admin"]

[provides.admin_ui]
leptos_crate = "rustok-tenant-admin"
route_segment = "tenant"
nav_label = "Tenant"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"
