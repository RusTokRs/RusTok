[module]
slug = "tenant"
name = "Tenant"
version = "0.1.0"
description = "Multi-tenancy helpers and tenant metadata."
ownership = "first_party"
trust_level = "core"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[crate]
entry_type = "TenantModule"

[provides.admin_ui]
leptos_crate = "rustok-tenant-admin"
route_segment = "tenant"
nav_label = "Tenant"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[fba.provider]
status = "in_progress"
contract_version = "tenant.read_projection.v1"
registry = "contracts/tenant-fba-registry.json"
ports = ["TenantReadPort"]
fallback_profiles = ["embedded_native"]
degraded_modes = ["hide_inactive_tenant", "show_tenant_resolution_retry"]
