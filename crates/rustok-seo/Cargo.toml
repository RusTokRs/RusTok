[package]
name = "rustok-seo"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SEO runtime, metadata, redirects, sitemaps, and robots module"

[features]
default = ["server"]
server = [
  "dep:anyhow",
  "dep:async-trait",
  "dep:axum",
  "dep:csv",
  "dep:moka",
  "dep:rustok-api",
  "dep:rustok-content",
  "dep:rustok-core",
  "dep:rustok-media",
  "dep:rustok-outbox",
  "dep:rustok-tenant",
  "dep:reqwest",
  "rustok-seo-targets/server",
  "dep:sea-orm",
  "dep:sea-orm-migration",
  "dep:thiserror",
  "dep:tokio",
  "dep:tracing",
  "dep:url",
]

[dependencies]
anyhow = { workspace = true, optional = true }
async-graphql.workspace = true
async-trait = { workspace = true, optional = true }
axum = { workspace = true, optional = true }
chrono.workspace = true
csv = { workspace = true, optional = true }
moka = { workspace = true, optional = true }
once_cell.workspace = true
sea-orm = { workspace = true, optional = true }
sea-orm-migration = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
thiserror = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
url = { version = "2.5", optional = true }
uuid.workspace = true

rustok-api = { workspace = true, optional = true }
rustok-content = { workspace = true, optional = true }
rustok-core = { workspace = true, optional = true }
rustok-media = { workspace = true, optional = true }
rustok-outbox = { workspace = true, optional = true }
rustok-seo-targets = { path = "../rustok-seo-targets", default-features = false }
rustok-tenant = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }

[dev-dependencies]
rustok-blog.workspace = true
rustok-forum.workspace = true
rustok-outbox = { workspace = true, features = ["test-transport-fallback"] }
rustok-pages.workspace = true
rustok-product.workspace = true
rustok-taxonomy.workspace = true
tokio.workspace = true
