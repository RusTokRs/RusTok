[module]
slug = "marketplace_listing"
name = "Marketplace Listing"
version = "0.1.0"
description = "Marketplace Family listing identity, versioned terms, lifecycle, approval, and eligibility owner"
ownership = "first_party"
trust_level = "verified"
ui_classification = "admin_only"
recommended_admin_surfaces = ["leptos-admin"]

[marketplace]
category = "commerce"
tags = ["marketplace", "listing", "eligibility", "moderation"]

[dependencies]
marketplace_seller = { version_req = ">=0.1.0" }
product = { version_req = ">=0.1.0" }

[crate]
entry_type = "MarketplaceListingModule"

[provides.admin_ui]
leptos_crate = "rustok-marketplace-listing-admin"
route_segment = "marketplace-listings"
nav_label = "Marketplace Listings"

[provides.admin_ui.i18n]
default_locale = "en"
supported_locales = ["en", "ru"]
leptos_locales_path = "admin/locales"

[fba.provider]
status = "in_progress"
role = "provider"
contract_version = "marketplace.listing.v1"
registry = "contracts/marketplace-listing-fba-registry.json"
context = "rustok_api::ports::PortContext"
error = "rustok_api::ports::PortError"

[fba.provider.rollout]
fallback_profiles = ["embedded_native", "remote_adapter_placeholder"]
degraded_modes = ["listing_directory_unavailable", "listing_eligibility_unavailable"]
