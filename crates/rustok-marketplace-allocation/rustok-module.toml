[module]
slug = "marketplace_allocation"
name = "Marketplace Allocation"
version = "0.1.0"
description = "Marketplace Family order-line seller and listing allocation owner"
ownership = "first_party"
trust_level = "verified"
ui_classification = "api_only"

[marketplace]
category = "commerce"
tags = ["marketplace", "allocation", "orders", "sellers", "listings"]

[crate]
entry_type = "MarketplaceAllocationModule"

[fba.provider]
status = "in_progress"
role = "provider"
contract_version = "marketplace.allocation.v1"
registry = "contracts/marketplace-allocation-fba-registry.json"
context = "rustok_api::ports::PortContext"
error = "rustok_api::ports::PortError"

[fba.provider.rollout]
fallback_profiles = ["embedded_native", "remote_adapter_placeholder"]
degraded_modes = ["allocation_storage_unavailable", "allocation_receipt_requires_review"]
